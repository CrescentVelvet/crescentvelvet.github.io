<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塔防战争 - Tower Defense</title>
    <style>
        :root {
            --bg: #101512;
            --panel-bg: rgba(22, 28, 25, 0.88);
            --panel-border: rgba(239, 199, 122, 0.24);
            --panel-highlight: rgba(255, 245, 204, 0.10);
            --gold: #f5c84c;
            --lives: #ff6b5f;
            --text: #f7ead2;
            --muted: #b7a886;
            --btn-green: #4f9d58;
            --btn-red: #b14f49;
            --btn-blue: #3f83a8;
            --accent: #d89b45;
            --stone: #2a312b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image:
                linear-gradient(180deg, #111619 0%, #17251b 48%, #0d1110 100%),
                repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 9px);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 0 12px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(115deg, rgba(242, 203, 128, 0.12), transparent 38%),
                linear-gradient(0deg, rgba(0, 0, 0, 0.34), transparent 42%, rgba(0, 0, 0, 0.18));
            mix-blend-mode: screen;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            padding: 10px 0;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* -- HUD -- */
        #hud-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
                var(--panel-bg);
            border-radius: 8px;
            padding: 9px 16px;
            color: var(--text);
            font-size: 14px;
            border: 1px solid var(--panel-border);
            box-shadow:
                0 14px 34px rgba(0,0,0,0.35),
                inset 0 1px 0 var(--panel-highlight);
            backdrop-filter: blur(10px);
        }
        #hud-bar .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            min-height: 30px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.055);
        }
        #hud-bar .stat .icon { font-size: 18px; }
        #hud-bar .val { font-weight: bold; font-size: 16px; }
        .gold-val { color: var(--gold); }
        .lives-val { color: var(--lives); }

        #hud-bar button {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            transition: all 0.15s;
            font-family: inherit;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 4px 10px rgba(0,0,0,0.22);
        }
        #hud-bar button:hover { filter: brightness(1.08); transform: translateY(-1px); }
        #hud-bar button:active { transform: scale(0.95); }
        #speed-btn { background: linear-gradient(180deg, #5b625c, #343a36); }
        #speed-btn.active { background: linear-gradient(180deg, #f0a83c, #b96a24); }
        #speed-btn.fast { background: linear-gradient(180deg, #e74c3c, #9b1a10); }
        #start-wave-btn { background: linear-gradient(180deg, #68b66d, var(--btn-green)); }
        #start-wave-btn:disabled { background: #555; opacity: 0.5; cursor: not-allowed; }
        #countdown-display { color: #f39c12; min-width: 50px; text-align: center; }
        #auto-wave-btn { background: linear-gradient(180deg, #5b625c, #343a36); }
        #auto-wave-btn.active { background: linear-gradient(180deg, #9b68d9, #6c3ca0); }
        #compendium-btn { background: linear-gradient(180deg, #5b625c, #343a36); }

        /* -- Compendium Overlay -- */
        #compendium-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(4,8,7,0.85);
            backdrop-filter: blur(6px);
            z-index: 200;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 30px 16px;
        }
        #compendium-overlay.show { display: flex; }
        #compendium-inner {
            background: rgba(18, 24, 21, 0.96);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 24px;
            color: var(--text);
            max-width: 900px;
            width: 100%;
            box-shadow: 0 22px 60px rgba(0,0,0,0.5), inset 0 1px 0 var(--panel-highlight);
        }
        #compendium-inner h2 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--gold);
        }
        #compendium-inner .compendium-subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 20px;
        }
        #compendium-inner .compendium-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .comp-card {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 14px;
        }
        .comp-card .comp-base-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .comp-card .comp-base-icon { font-size: 28px; }
        .comp-card .comp-base-name { font-size: 16px; font-weight: bold; }
        .comp-card .comp-base-cost { font-size: 12px; color: var(--gold); margin-left: auto; }
        .comp-card .comp-base-stats {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .comp-card .comp-branches-title {
            font-size: 11px;
            color: var(--accent);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 8px;
            margin-bottom: 8px;
        }
        .comp-card .comp-branch {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            margin-bottom: 4px;
            background: rgba(255,255,255,0.025);
            border-radius: 6px;
            font-size: 12px;
        }
        .comp-card .comp-branch .branch-icon { font-size: 18px; }
        .comp-card .comp-branch .branch-info { flex: 1; }
        .comp-card .comp-branch .branch-name { font-weight: bold; }
        .comp-card .comp-branch .branch-desc { font-size: 10px; color: var(--muted); }
        .comp-card .comp-branch .branch-cost { font-size: 10px; color: var(--gold); }
        #compendium-close {
            display: block;
            margin: 20px auto 0;
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(180deg, #68b66d, var(--btn-green));
            color: #fff;
            font-weight: bold;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.15s;
        }
        #compendium-close:hover { filter: brightness(1.1); }
        #compendium-close:active { transform: scale(0.95); }

        /* -- Canvas -- */
        #game-canvas {
            border: 3px solid #4d3a25;
            border-radius: 8px;
            width: 100%;
            max-height: calc(100vh - 160px);
            aspect-ratio: 800 / 600;
            background: #1f3a23;
            cursor: crosshair;
            touch-action: none;
            flex-shrink: 1;
            box-shadow:
                0 22px 60px rgba(0,0,0,0.48),
                0 0 0 1px rgba(255,218,137,0.18),
                inset 0 0 36px rgba(0,0,0,0.36);
        }

        /* -- Tower Selection Panel -- */
        #tower-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .tower-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 10px 14px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
                var(--panel-bg);
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.15s;
            min-width: 75px;
            box-shadow: inset 0 1px 0 var(--panel-highlight), 0 8px 18px rgba(0,0,0,0.28);
        }
        .tower-btn:hover {
            border-color: rgba(245,200,76,0.55);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)),
                rgba(32, 39, 34, 0.94);
            transform: translateY(-1px);
        }
        .tower-btn:active { transform: scale(0.95); }
        .tower-btn.selected {
            border-color: var(--gold);
            background: linear-gradient(180deg, rgba(245,200,76,0.22), rgba(245,200,76,0.08)), var(--panel-bg);
            box-shadow: 0 0 0 1px rgba(245,200,76,0.18), 0 0 18px rgba(245,200,76,0.28);
        }
        .tower-btn .tower-icon {
            font-size: 26px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.42));
        }
        .tower-btn .tower-cost { font-size: 11px; color: var(--gold); }
        .tower-btn .tower-name { font-size: 12px; font-weight: bold; }
        .tower-btn.disabled { opacity: 0.4; cursor: not-allowed; }

        /* -- Upgrade / Sell Popup -- */
        #tower-info-panel {
            display: none;
            position: fixed;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
                rgba(24, 30, 27, 0.96);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 14px 18px;
            color: var(--text);
            font-size: 13px;
            z-index: 100;
            min-width: 180px;
            box-shadow: 0 14px 34px rgba(0,0,0,0.5), inset 0 1px 0 var(--panel-highlight);
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        #tower-info-panel h3 { margin-bottom: 8px; font-size: 15px; }
        #tower-info-panel .stat-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 12px; }
        #tower-info-panel button {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            font-family: inherit;
        }
        #upgrade-btn { background: linear-gradient(180deg, #5aa2c4, var(--btn-blue)); }
        #upgrade-btn:disabled { background: #555; opacity: 0.5; cursor: not-allowed; }
        #sell-btn { background: linear-gradient(180deg, #d36a62, var(--btn-red)); }
        #evolve-btns { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
        .evolve-btn {
            flex: 1; padding: 7px 8px; border: none; border-radius: 6px;
            color: #fff; font-size: 12px; font-weight: bold; cursor: pointer;
            transition: transform 0.15s; white-space: nowrap;
            background: linear-gradient(135deg, #555, #777);
            box-shadow: 0 0 6px rgba(255,255,255,0.15);
            min-width: 0;
        }
        .evolve-btn:hover { transform: scale(1.04); }
        .evolve-btn:disabled { background: #444; opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .evolve-cost { opacity: 0.8; font-size: 10px; }

        /* -- Overlay -- */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(4,8,7,0.82);
            backdrop-filter: blur(6px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #overlay.show { display: flex; }
        #overlay h2 { font-size: 36px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        #overlay .sub-text { font-size: 18px; color: #ccc; }
        #overlay button {
            padding: 12px 32px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: var(--btn-green);
            color: #fff;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.15s;
        }
        #overlay button:hover { transform: scale(1.05); }
        #overlay button:active { transform: scale(0.95); }

        /* -- Tooltip -- */
        #tooltip {
            display: none;
            position: fixed;
            background: rgba(21, 25, 22, 0.92);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 150;
            white-space: nowrap;
            border: 1px solid rgba(239,199,122,0.24);
            box-shadow: 0 8px 18px rgba(0,0,0,0.34);
        }

        /* -- Mobile / Small screens -- */
        @media (max-width: 700px) {
            body { padding: 0 4px; }
            #game-wrapper { max-width: 100%; gap: 4px; padding: 4px 0; height: 100vh; height: 100dvh; }
            #game-canvas { max-height: calc(100vh - 140px); max-height: calc(100dvh - 140px); }
            #hud-bar { font-size: 10px; gap: 4px; padding: 4px 6px; }
            #hud-bar .val { font-size: 11px; }
            #hud-bar button { padding: 3px 8px; font-size: 10px; }
            .tower-btn { padding: 6px 8px; min-width: 55px; gap: 0; }
            .tower-btn .tower-icon { font-size: 20px; }
            .tower-btn .tower-name { font-size: 10px; }
            .tower-btn .tower-cost { font-size: 9px; }
            #tower-info-panel { min-width: 140px; padding: 8px 10px; font-size: 11px; }
            #overlay h2 { font-size: 22px; }
            #overlay .sub-text { font-size: 13px; }
        }
        @media (min-width: 1400px) {
            #game-wrapper { max-width: 1200px; }
        }
        @media (min-width: 1800px) {
            #game-wrapper { max-width: 1300px; }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud-bar">
        <div class="stat"><span class="icon">💰</span><span>金币:</span><span class="val gold-val" id="gold-display">200</span></div>
        <div class="stat"><span class="icon">❤️</span><span>生命:</span><span class="val lives-val" id="lives-display">20</span></div>
        <div class="stat"><span class="icon">🌊</span><span>波次:</span><span class="val" id="wave-display">0/20</span></div>
        <div class="stat"><span class="icon">⭐</span><span>分数:</span><span class="val" id="score-display">0</span></div>
        <span id="countdown-display"></span>
        <button id="speed-btn" onclick="toggleSpeed()">1x</button>
        <button id="start-wave-btn" onclick="startNextWave()">开始波次</button>
        <button id="auto-wave-btn" onclick="toggleAutoWave()">⏩ 自动</button>
        <button id="compendium-btn" onclick="toggleCompendium()">📖 图鉴</button>
    </div>
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="tower-panel">
        <button class="tower-btn" data-type="archer" onclick="selectTowerType('archer')">
            <span class="tower-icon">🏹</span><span class="tower-name">箭塔</span><span class="tower-cost">100💰</span>
        </button>
        <button class="tower-btn" data-type="artillery" onclick="selectTowerType('artillery')">
            <span class="tower-icon">💣</span><span class="tower-name">炮塔</span><span class="tower-cost">150💰</span>
        </button>
        <button class="tower-btn" data-type="ice" onclick="selectTowerType('ice')">
            <span class="tower-icon">❄️</span><span class="tower-name">冰塔</span><span class="tower-cost">120💰</span>
        </button>
        <button class="tower-btn" data-type="tesla" onclick="selectTowerType('tesla')">
            <span class="tower-icon">⚡</span><span class="tower-name">雷塔</span><span class="tower-cost">200💰</span>
        </button>
        <button class="tower-btn" data-type="fire" onclick="selectTowerType('fire')">
            <span class="tower-icon">🔥</span><span class="tower-name">火塔</span><span class="tower-cost">180💰</span>
        </button>
        <button class="tower-btn" data-type="wind" onclick="selectTowerType('wind')">
            <span class="tower-icon">🌪️</span><span class="tower-name">风塔</span><span class="tower-cost">130💰</span>
        </button>
        <button class="tower-btn" data-type="sheep" onclick="selectTowerType('sheep')">
            <span class="tower-icon">🐑</span><span class="tower-name">羊塔</span><span class="tower-cost">150💰</span>
        </button>
        <button class="tower-btn" data-type="missile" onclick="selectTowerType('missile')">
            <span class="tower-icon">🚀</span><span class="tower-name">导弹塔</span><span class="tower-cost">250💰</span>
        </button>
        <button class="tower-btn" data-type="laser" onclick="selectTowerType('laser')">
            <span class="tower-icon">🔆</span><span class="tower-name">激光塔</span><span class="tower-cost">200💰</span>
        </button>
    </div>
</div>

<div id="tower-info-panel">
    <h3 id="tip-tower-name"></h3>
    <div id="tip-stats"></div>
    <div id="evolve-btns" style="display:none;">
        <button id="evolve-btn-0" class="evolve-btn" onclick="evolveSelectedIndex(0)">
        </button>
        <button id="evolve-btn-1" class="evolve-btn" onclick="evolveSelectedIndex(1)">
        </button>
        <button id="evolve-btn-2" class="evolve-btn" onclick="evolveSelectedIndex(2)" style="display:none;">
        </button>
    </div>
    <button id="upgrade-btn" onclick="upgradeSelectedTower()">升级</button>
    <button id="sell-btn" onclick="sellSelectedTower()">出售</button>
</div>

<div id="overlay">
    <h2 id="overlay-title"></h2>
    <div class="sub-text" id="overlay-sub"></div>
    <button id="overlay-btn" onclick="restartGame()">重新开始</button>
</div>

<div id="compendium-overlay">
    <div id="compendium-inner">
        <h2>📖 塔防图鉴</h2>
        <div class="compendium-subtitle">所有防御塔与升级分支一览</div>
        <div class="compendium-grid" id="compendium-grid"></div>
        <button id="compendium-close" onclick="toggleCompendium()">关闭</button>
    </div>
</div>

<div id="tooltip"></div>

// ==================== GRID & SCENERY ====================
const grid = [];
for (let r = 0; r < ROWS; r++) {
    grid[r] = new Array(COLS).fill(TERRAIN.GRASS);
}

// Scenery items: { col, row, type, size }
let scenery = [];

// Seeded random for deterministic scenery
function seededRand(seed) {
    let s = seed;
    return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
    };
}

function initGrid() {
    // Mark path cells along waypoint segments (path is 2 cells wide)
    // Waypoints are centered in the 2-cell path; offset by -20 to get the top-left cell
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1];
        const b = WAYPOINTS[i];
        const ax = Math.floor((a.x - 20) / CELL);
        const ay = Math.floor((a.y - 20) / CELL);
        const bx = Math.floor((b.x - 20) / CELL);
        const by = Math.floor((b.y - 20) / CELL);

        if (ay === by) {
            const row = ay;
            const x0 = Math.max(0, Math.min(ax, bx));
            const x1 = Math.min(COLS - 1, Math.max(ax, bx));
            for (let c = x0; c <= x1; c++) {
                if (c >= 0 && c < COLS && row >= 0 && row < ROWS) grid[row][c] = TERRAIN.PATH;
                if (row + 1 < ROWS && c >= 0 && c < COLS) grid[row + 1][c] = TERRAIN.PATH;
            }
        } else if (ax === bx) {
            const col = ax;
            const y0 = Math.max(0, Math.min(ay, by));
            const y1 = Math.min(ROWS - 1, Math.max(ay, by));
            for (let r = y0; r <= y1; r++) {
                if (r >= 0 && r < ROWS && col >= 0 && col < COLS) grid[r][col] = TERRAIN.PATH;
                if (col + 1 < COLS && r >= 0 && r < ROWS) grid[r][col + 1] = TERRAIN.PATH;
            }
        }
    }

    // All non-path cells remain buildable (no blocking buffer)

    // Scenery disabled — no trees/rocks
    scenery = [];
}

function initScenery() {
    scenery = [];
    const rand = seededRand(42);
    const treeTypes = ['pine', 'oak', 'bush'];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.BLOCKED && rand() < 0.65) {
                const type = treeTypes[Math.floor(rand() * treeTypes.length)];
                const size = 0.7 + rand() * 0.6;
                const ox = (rand() - 0.5) * CELL * 0.5;
                const oy = (rand() - 0.5) * CELL * 0.5;
                scenery.push({ col: c, row: r, type, size, ox, oy });
            }
        }
    }
    // Also add rocks along path edges
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.BLOCKED) {
                let nextToPath = false;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === TERRAIN.PATH) {
                            nextToPath = true;
                        }
                    }
                }
                if (nextToPath && rand() < 0.5) {
                    const ox2 = (rand() - 0.5) * CELL * 0.3;
                    const oy2 = (rand() - 0.5) * CELL * 0.3;
                    scenery.push({ col: c, row: r, type: 'rock', size: 0.5 + rand() * 0.4, ox: ox2, oy: oy2 });
                }
            }
        }
    }
}

// ==================== WAVE DEFINITIONS ====================
function hpMultiplier(wave) {
    return 1 + (wave - 1) * 0.25 + Math.floor((wave - 1) / 5) * 0.5;
}

function enemyHP(type, wave) {
    const def = ENEMY_DEFS[type];
    const mult = hpMultiplier(wave);
    return Math.floor((def.hpBase + wave * def.hpScale) * mult);
}

function generateWave(waveNum) {
    const queue = [];
    const push = (type, count) => {
        for (let i = 0; i < count; i++) queue.push(type);
    };

    const waves = [
        () => { push('normal', 8); },
        () => { push('normal', 10); push('fast', 3); },
        () => { push('normal', 14); push('fast', 5); },
        () => { push('normal', 16); push('fast', 6); push('tank', 1); },
        () => { push('normal', 10); push('fast', 4); push('tank', 1); push('boss', 1); },
        () => { push('normal', 18); push('fast', 7); push('tank', 2); },
        () => { push('normal', 20); push('fast', 9); push('tank', 2); },
        () => { push('normal', 22); push('fast', 10); push('tank', 3); },
        () => { push('normal', 25); push('fast', 12); push('tank', 3); },
        () => { push('normal', 15); push('fast', 6); push('tank', 2); push('boss', 1); },
        () => { push('normal', 28); push('fast', 14); push('tank', 4); },
        () => { push('normal', 30); push('fast', 15); push('tank', 5); },
        () => { push('normal', 32); push('fast', 16); push('tank', 5); },
        () => { push('normal', 34); push('fast', 18); push('tank', 6); },
        () => { push('normal', 20); push('fast', 10); push('tank', 3); push('boss', 1); },
        () => { push('normal', 36); push('fast', 20); push('tank', 7); },
        () => { push('normal', 38); push('fast', 22); push('tank', 8); },
        () => { push('normal', 40); push('fast', 24); push('tank', 9); },
        () => { push('normal', 42); push('fast', 26); push('tank', 10); },
        () => { push('normal', 25); push('fast', 12); push('tank', 5); push('boss', 1); },
    ];

    if (waveNum <= waves.length) {
        waves[waveNum - 1]();
    } else {
        // Beyond wave 20: keep scaling
        const n = waveNum;
        push('normal', 25 + n); push('fast', 12 + Math.floor(n/2)); push('tank', 5 + Math.floor(n/3));
        if (n % 5 === 0) push('boss', 1);
    }

    // Shuffle the queue
    for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
    }
    return queue;
}

function spawnInterval(waveNum) {
    if (waveNum <= 5) return 800;
    if (waveNum <= 10) return 650;
    if (waveNum <= 15) return 500;
    return 400;
}

// ==================== HELPER FUNCTIONS ====================
function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
}

function angleTo(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
}

function bezierPoint(p0, p1, p2, t) {
    const u = 1 - t;
    return {
        x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x,
        y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y
    };
}

function bezierLength(p0, p1, p2) {
    let len = 0;
    let prev = p0;
    for (let i = 1; i <= 12; i++) {
        const pt = bezierPoint(p0, p1, p2, i / 12);
        len += Math.sqrt((pt.x - prev.x) ** 2 + (pt.y - prev.y) ** 2);
        prev = pt;
    }
    return len;
}

function bezierTangent(p0, p1, p2, t) {
    const u = 1 - t;
    return {
        x: 2 * u * (p1.x - p0.x) + 2 * t * (p2.x - p1.x),
        y: 2 * u * (p1.y - p0.y) + 2 * t * (p2.y - p1.y)
    };
}

function cellCenter(col, row) {
    return { x: col * CELL + CELL / 2, y: row * CELL + CELL / 2 };
}

function canvasToGrid(cx, cy) {
    return { col: Math.floor(cx / CELL), row: Math.floor(cy / CELL) };
}

function isBuildable(col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
    if (grid[row][col] !== TERRAIN.GRASS) return false;
    return !game.towers.some(t => t.col === col && t.row === row);
}

// ==================== TOWER LOGIC ====================
function createTower(type, col, row) {
    const def = TOWER_DEFS[type];
    const pos = cellCenter(col, row);
    return {
        id: game.nextTowerId++,
        type, col, row,
        x: pos.x, y: pos.y,
        level: 1,
        cooldown: 0,
        angle: 0,
        totalInvested: def.cost,
        target: null,
        freezeTargetId: null,
        freezeStack: 0,
        focusTargetId: null,
        focusStack: 0,
        overflowCharge: 0
    };
}

function placeTower(type, col, row) {
    const def = TOWER_DEFS[type];
    if (game.gold < def.cost) return false;
    if (!isBuildable(col, row)) return false;
    game.gold -= def.cost;
    const t = createTower(type, col, row);
    game.towers.push(t);
    updateHUD();
    updateTowerButtons();
    return true;
}

function upgradeTower(t) {
    if (t.level >= 3) return;
    const st = towerStats(t);
    if (!st.upgradeCost) return;
    if (game.gold < st.upgradeCost) return;
    game.gold -= st.upgradeCost;
    t.totalInvested += st.upgradeCost;
    t.level++;
    t.cooldown = 0;
    updateHUD();
    showTowerInfo(t);
}

function sellTower(t) {
    const refund = Math.floor(t.totalInvested * 0.6);
    game.gold += refund;
    game.towers = game.towers.filter(tw => tw !== t);
    if (game.selectedTower === t) {
        game.selectedTower = null;
        hideTowerInfo();
    }
    updateHUD();
    updateTowerButtons();
}

function towerAcquireTarget(t) {
    const st = towerStats(t);
    // laser_resonance: effective range extends to cover all linked towers' ranges
    let effectiveRange = st.range;
    if (t.type === 'laser_resonance' && t.linkedTo && t.linkedTo.length > 0) {
        for (const oid of t.linkedTo) {
            const ot = game.towers.find(tw => tw.id === oid);
            if (ot) {
                const ost = towerStats(ot);
                effectiveRange = Math.max(effectiveRange, ost.range);
            }
        }
    }
    let best = null;
    // Precision targeting: highest HP percentage
    if (st.precisionTracking) {
        let bestHpPct = -1;
        for (const e of game.enemies) {
            if (!e.alive || e.isTurncoat) continue;
            const d = dist(t, e);
            if (d > effectiveRange) continue;
            const hpPct = e.hp / e.maxHp;
            if (hpPct > bestHpPct || (hpPct === bestHpPct && e.waypointIndex > (best ? best.waypointIndex : -1))) {
                best = e;
                bestHpPct = hpPct;
            }
        }
        return best;
    }
    // Default: furthest progress
    let bestProgress = -1;
    for (const e of game.enemies) {
        if (!e.alive) continue;
        if (e.isTurncoat) continue;
        const d = dist(t, e);
        if (d > effectiveRange) continue;
        if (e.waypointIndex > bestProgress || (e.waypointIndex === bestProgress && e.hp < (best ? best.hp : Infinity))) {
            best = e;
            bestProgress = e.waypointIndex;
        }
    }
    return best;
}

function updateTowers(dt) {
    // Update laser tower links (all laser variants can link with each other)
    const LASER_TYPES = new Set(['laser', 'laser_core', 'laser_resonance', 'laser_refract']);
    const laserTowers = game.towers.filter(t => LASER_TYPES.has(t.type));
    for (const lt of laserTowers) {
        const linkRange = TOWER_DEFS[lt.type].linkRange;
        lt.linkedTo = [];
        for (const other of laserTowers) {
            if (other.id === lt.id) continue;
            if (dist(lt, other) <= linkRange) {
                lt.linkedTo.push(other.id);
            }
        }
        lt.linkedCount = lt.linkedTo.length;
    }
    // laser_core: determine which tower in each connected network is the core
    // Build adjacency and find connected components via BFS
    const visited = new Set();
    for (const lt of laserTowers) {
        if (visited.has(lt.id)) continue;
        // BFS to find the connected component
        const component = [];
        const queue = [lt];
        visited.add(lt.id);
        while (queue.length) {
            const cur = queue.shift();
            component.push(cur);
            for (const oid of cur.linkedTo) {
                if (!visited.has(oid)) {
                    visited.add(oid);
                    const ot = game.towers.find(t => t.id === oid);
                    if (ot && LASER_TYPES.has(ot.type)) queue.push(ot);
                }
            }
        }
        // Core candidates: only laser_core towers in this component
        const coreCandidates = component.filter(t => t.type === 'laser_core');
        if (coreCandidates.length > 0) {
            // Tower with most links becomes core; tiebreak by lowest id
            coreCandidates.sort((a, b) => b.linkedCount - a.linkedCount || a.id - b.id);
            const core = coreCandidates[0];
            for (const t of component) {
                if (t.type === 'laser_core') {
                    t.isCore = (t.id === core.id);
                }
            }
            core.coreLinkCount = core.linkedCount;
        } else {
            for (const t of component) {
                if (t.type === 'laser_core') t.isCore = false;
            }
        }
    }

    for (const t of game.towers) {
        t.cooldown -= dt * 1000;
        if (t.cooldown > 0) continue;
        // Frost aura — passive area slow, no projectile
        if (t.type === 'ice_aura') {
            const st = towerStats(t);
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                if (dist(t, e) <= st.range) {
                    applySlow(e, st.auraSlowFactor, st.cooldown + 200);
                }
            }
            t.cooldown = st.cooldown;
            continue;
        }
        // Ignite pulse — creates fire zones under enemies in range
        if (t.type === 'fire_ignite') {
            const st = towerStats(t);
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                if (dist(t, e) <= st.range) {
                    createFireZone(e.x, e.y, st.igniteFlameRadius, Math.floor(10 + st.igniteFlameRadius * 0.3), st.igniteFlameDuration, st.igniteFlameTickInterval);
                    createFireIgnition(e.x, e.y, st.igniteFlameRadius * 0.6);
                }
            }
            t.cooldown = st.cooldown;
            continue;
        }
        // Sheep aura — passive transformation pulse
        if (t.type === 'sheep_aura') {
            const st = towerStats(t);
            const candidates = [];
            for (const e of game.enemies) {
                if (!e.alive || e.isSheep || e.isTurncoat) continue;
                if (dist(t, e) <= st.range) candidates.push(e);
            }
            if (candidates.length > 0) {
                const target = candidates[Math.floor(Math.random() * candidates.length)];
                target.isSheep = true;
                target.sheepTimer = st.auraSheepDuration;
                applySlow(target, 0.25, st.auraSheepDuration);
                createSheepTransform(target.x, target.y);
            }
            t.cooldown = st.cooldown;
            continue;
        }
        // EMP pulse — passive vulnerability aura
        if (t.type === 'tesla_emp') {
            const st = towerStats(t);
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                if (dist(t, e) <= st.range) {
                    e.vulnFactor = Math.max(e.vulnFactor, st.vulnFactor);
                    e.vulnTimer = Math.max(e.vulnTimer, st.cooldown + 200);
                }
            }
            t.cooldown = st.cooldown;
            continue;
        }
        // Wind aura (无常风域) — passive speed fluctuation field, no projectile
        if (t.type === 'wind_aura') {
            const st = towerStats(t);
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                if (dist(t, e) <= st.range) {
                    if (!e.windAuraTimer) e.windAuraTimer = 0;
                    if (!e.windAuraFast) e.windAuraFast = false;
                    e.windAuraTimer -= dt * 1000;
                    if (e.windAuraTimer <= 0) {
                        e.windAuraFast = !e.windAuraFast;
                        const speedMult = e.windAuraFast ? st.auraSpeedMax : st.auraSpeedMin;
                        e.currentSpeed = e.speed * speedMult;
                        e.windAuraTimer = st.auraFlipInterval;
                        createWindFlipSpark(e.x, e.y, e.windAuraFast);
                    }
                }
            }
            t.cooldown = st.cooldown;
            continue;
        }
        // Wind gust (飓风过境) — normal attacks + periodic map-wide gust
        if (t.type === 'wind_gust') {
            const st = towerStats(t);
            if (!t.gustTimer) t.gustTimer = st.gustInterval;
            t.gustTimer -= dt * 1000;
            if (t.gustTimer <= 0) {
                // Map-wide hurricane sweep
                for (const e of game.enemies) {
                    if (!e.alive || e.isTurncoat) continue;
                    applyKnockback(e, st.gustForce);
                    dealDamage(e, st.gustDamage);
                    createWindBurst(e.x, e.y);
                }
                t.gustTimer = st.gustInterval;
                // Small cooldown so it doesn't also fire a projectile immediately
                t.cooldown = 500;
                continue;
            }
        }
        // laser_core: non-core towers skip firing, they only serve as relays
        if (t.type === 'laser_core' && !t.isCore) {
            t.cooldown = 100;
            continue;
        }
        const target = towerAcquireTarget(t);
        // Charge overflow — tesla_charge accumulates extra damage when idle
        if (t.type === 'tesla_charge' && !target) {
            const st = towerStats(t);
            t.overflowCharge = Math.min(t.overflowCharge + st.cooldown, st.chargeMaxTime);
            t.cooldown = 50; // check again soon
            continue;
        }
        if (target) {
            const st = towerStats(t);
            t.angle = angleTo(t, target);
            // Focus stacking — fire_focus ramps damage on same target
            if (st.focusMaxStacks > 0) {
                if (t.focusTargetId === target.id) {
                    t.focusStack = Math.min(t.focusStack + 1, st.focusMaxStacks);
                } else {
                    t.focusTargetId = target.id;
                    t.focusStack = 1;
                }
            }
            if (st.multiShot > 0) {
                // Fire multiple arrows at different targets
                const targets = [target];
                for (const e of game.enemies) {
                    if (targets.length >= st.multiShot) break;
                    if (!e.alive || e === target || e.isTurncoat) continue;
                    if (dist(t, e) <= st.range) {
                        targets.push(e);
                    }
                }
                for (const tg of targets) {
                    createProjectile(t, tg);
                }
            } else {
                const p = createProjectile(t, target);
                // Laser link damage boost (all laser variants)
                if ((t.type === 'laser' || t.type === 'laser_core' || t.type === 'laser_resonance' || t.type === 'laser_refract') && t.linkedCount > 0) {
                    p.linkBoost = 1 + t.linkedCount * st.linkDmgBoost;
                }
                // Focus damage ramp
                if (st.focusMaxStacks > 0 && t.focusStack > 0) {
                    p.damage = Math.floor(p.damage * (1 + (t.focusStack - 1) * st.focusDmgPerStack));
                }
                // Charge overflow damage multiplier
                if (st.chargeMaxTime > 0 && t.overflowCharge > 0) {
                    const chargeRatio = Math.min(t.overflowCharge / st.chargeMaxTime, 1);
                    const mult = 1 + chargeRatio * (st.chargeDmgMultiplier - 1);
                    p.damage = Math.floor(p.damage * mult);
                    t.overflowCharge = 0;
                }
            }
            t.cooldown = st.cooldown;
        }
    }
}

// ==================== ENEMY LOGIC ====================
function createEnemy(type, waveNum) {
    const laneOffset = (Math.random() - 0.5) * 70; // spread across full 2-cell path width
    const firstSegX = WAYPOINTS[1].x - WAYPOINTS[0].x;
    const firstSegY = WAYPOINTS[1].y - WAYPOINTS[0].y;
    const firstLen = Math.sqrt(firstSegX ** 2 + firstSegY ** 2) || 1;
    const perpX = -firstSegY / firstLen;
    const perpY = firstSegX / firstLen;
    const pos = {
        x: WAYPOINTS[0].x + perpX * laneOffset,
        y: WAYPOINTS[0].y + perpY * laneOffset
    };
    const def = ENEMY_DEFS[type];
    const hp = enemyHP(type, waveNum);
    return {
        id: game.nextEnemyId++,
        type,
        laneOffset,
        x: pos.x, y: pos.y,
        hp, maxHp: hp,
        speed: def.speed,
        currentSpeed: def.speed,
        waypointIndex: 1,
        reward: def.reward + waveNum + (type === 'boss' ? waveNum * 10 : 0) + (type === 'tank' ? waveNum * 2 : 0),
        alive: true,
        size: def.size,
        color: def.color,
        slowTimer: 0,
        slowFactor: 1,
        isSheep: false,
        sheepTimer: 0,
        isTurncoat: false,
        turncoatDmg: 0,
        knockbackVx: 0,
        knockbackVy: 0,
        knockbackTimer: 0,
        vulnFactor: 0,
        vulnTimer: 0,
        craterDmgAmp: 1
    };
}

function updateEnemies(dt) {
    const dtMs = dt * 1000;
    for (const e of game.enemies) {
        if (!e.alive) continue;

        // Update slow
        if (e.slowTimer > 0) {
            e.slowTimer -= dtMs;
            if (e.slowTimer <= 0) {
                e.slowFactor = 1;
                e.currentSpeed = e.speed;
            }
        }

        // Update sheep timer
        if (e.sheepTimer > 0) {
            e.sheepTimer -= dtMs;
            if (e.sheepTimer <= 0) {
                e.isSheep = false;
                e.isTurncoat = false;
                e.turncoatDmg = 0;
            }
        }

        // Update vulnerability timer
        if (e.vulnTimer > 0) {
            e.vulnTimer -= dtMs;
            if (e.vulnTimer <= 0) {
                e.vulnFactor = 0;
            }
        }

        // Apply knockback — smooth backward push
        if (e.knockbackTimer > 0) {
            e.knockbackTimer -= dtMs;
            e.x += e.knockbackVx * dt;
            e.y += e.knockbackVy * dt;
            e.knockbackVx *= 0.88;
            e.knockbackVy *= 0.88;
            // If pushed close to previous waypoint, snap back to it
            if (e.waypointIndex > 1) {
                const prev = WAYPOINTS[e.waypointIndex - 1];
                const wp = WAYPOINTS[e.waypointIndex];
                const toPrev = Math.sqrt((prev.x - e.x) ** 2 + (prev.y - e.y) ** 2);
                const segLen = Math.sqrt((wp.x - prev.x) ** 2 + (wp.y - prev.y) ** 2);
                if (toPrev < segLen * 0.25) {
                    e.waypointIndex--;
                    e.x = prev.x;
                    e.y = prev.y;
                }
            }
            if (e.knockbackTimer <= 0) {
                e.knockbackVx = 0;
                e.knockbackVy = 0;
            }
        }

        // Move along waypoints — turncoats go backwards
        if (e.knockbackTimer > 0) continue;
        if (e.waypointIndex >= WAYPOINTS.length) continue;

        if (e.isTurncoat) {
            // Move backward along path toward enemy spawn
            if (e.waypointIndex <= 0) {
                e.alive = false;
                continue;
            }
            const prevWp = WAYPOINTS[e.waypointIndex - 1];
            const dx = prevWp.x - e.x;
            const dy = prevWp.y - e.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            const moveSpeed = 55 * dt;
            if (d <= moveSpeed + 1) {
                e.x = prevWp.x;
                e.y = prevWp.y;
                e.waypointIndex--;
                if (e.waypointIndex <= 0) {
                    e.alive = false;
                }
            } else {
                e.x += (dx / d) * moveSpeed;
                e.y += (dy / d) * moveSpeed;
            }
            // Collision damage with normal enemies
            for (const other of game.enemies) {
                if (!other.alive || other === e) continue;
                if (other.isSheep || other.isTurncoat) continue;
                const cdist = Math.sqrt((other.x - e.x) ** 2 + (other.y - e.y) ** 2);
                if (cdist < e.size + other.size + 2) {
                    dealDamage(other, e.turncoatDmg);
                    createHitSpark(other.x, other.y, '#9B59B6');
                    e.alive = false;
                    break;
                }
            }
            continue;
        }

        const wp = WAYPOINTS[e.waypointIndex];
        // Segment direction approaching this waypoint
        let segDx, segDy;
        if (e.waypointIndex > 1) {
            const prev = WAYPOINTS[e.waypointIndex - 1];
            segDx = wp.x - prev.x;
            segDy = wp.y - prev.y;
        } else {
            segDx = WAYPOINTS[1].x - WAYPOINTS[0].x;
            segDy = WAYPOINTS[1].y - WAYPOINTS[0].y;
        }
        const segLen = Math.sqrt(segDx * segDx + segDy * segDy) || 1;
        const perpX = -segDy / segLen;
        const perpY = segDx / segLen;
        const targetX = wp.x + perpX * e.laneOffset;
        const targetY = wp.y + perpY * e.laneOffset;

        const dx = targetX - e.x;
        const dy = targetY - e.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const moveSpeed = e.currentSpeed * dt;

        if (d <= moveSpeed + 1) {
            e.x = targetX;
            e.y = targetY;
            e.waypointIndex++;
            if (e.waypointIndex >= WAYPOINTS.length) {
                enemyReachedExit(e);
            }
        } else {
            e.x += (dx / d) * moveSpeed;
            e.y += (dy / d) * moveSpeed;
        }
    }
    // Remove dead/escaped
    game.enemies = game.enemies.filter(e => e.alive);
}

function enemyReachedExit(e) {
    e.alive = false;
    const def = ENEMY_DEFS[e.type];
    const livesLost = e.type === 'boss' ? 5 : e.type === 'tank' ? 3 : 1;
    game.lives -= livesLost;
    updateHUD();
    if (game.lives <= 0) {
        game.lives = 0;
        endGame('gameover');
    }
}

function applySlow(enemy, factor, duration) {
    enemy.slowFactor = Math.min(enemy.slowFactor, factor);
    enemy.currentSpeed = enemy.speed * enemy.slowFactor;
    enemy.slowTimer = Math.max(enemy.slowTimer, duration);
}

function applyKnockback(enemy, distance) {
    if (enemy.waypointIndex >= WAYPOINTS.length) return;
    const wp = WAYPOINTS[enemy.waypointIndex];
    const dx = wp.x - enemy.x;
    const dy = wp.y - enemy.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) return;
    // Give a smooth backward velocity instead of teleporting
    const knockSpeed = distance * 6;
    enemy.knockbackVx = -(dx / d) * knockSpeed;
    enemy.knockbackVy = -(dy / d) * knockSpeed;
    enemy.knockbackTimer = 0.25;
}
