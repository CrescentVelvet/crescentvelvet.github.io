// ==================== PROJECTILE LOGIC ====================
function createProjectile(tower, target) {
    const st = towerStats(tower);
    const noTrack = tower.type === 'fire';
    const flightDist = Math.sqrt((target.x - tower.x) ** 2 + (target.y - tower.y) ** 2);
    const p = {
        x: tower.x,
        y: tower.y,
        target: noTrack ? null : target,
        targetX: target.x,
        targetY: target.y,
        startX: tower.x,
        startY: tower.y,
        damage: st.damage,
        speed: st.bulletSpeed,
        type: tower.type,
        color: st.bulletColor,
        splashRadius: st.splashRadius,
        splashDmgPct: st.splashDmgPct,
        slowFactor: st.slowFactor,
        slowDuration: st.slowDuration,
        chainCount: st.chainCount,
        chainRange: st.chainRange,
        chainFalloff: st.chainFalloff,
        flameRadius: st.flameRadius,
        flameDuration: st.flameDuration,
        flameTickInterval: st.flameTickInterval,
        sheepDuration: st.sheepDuration,
        gustForce: st.gustForce,
        vortexPull: st.vortexPull,
        vortexDuration: st.vortexDuration,
        vortexTickInterval: st.vortexTickInterval,
        gustInterval: st.gustInterval,
        gustDamage: st.gustDamage,
        auraSpeedMin: st.auraSpeedMin,
        auraSpeedMax: st.auraSpeedMax,
        auraFlipInterval: st.auraFlipInterval,
        arcHeight: st.arcHeight,
        flightDistance: flightDist,
        progress: 0,
        alive: true,
        towerX: tower.x,
        towerY: tower.y,
        critChance: st.critChance,
        critMultiplier: st.critMultiplier,
        shrapnelCount: st.shrapnelCount,
        shrapnelRange: st.shrapnelRange,
        shrapnelDmg: st.shrapnelDmg,
        stunFactor: st.stunFactor,
        stunDuration: st.stunDuration,
        freezeStacks: st.freezeStacks,
        freezeDuration: st.freezeDuration,
        auraSlowFactor: st.auraSlowFactor,
        pierceCount: st.pierceCount,
        pierceFalloff: st.pierceFalloff,
        focusDmgPerStack: st.focusDmgPerStack,
        focusMaxStacks: st.focusMaxStacks,
        detonateDmg: st.detonateDmg,
        detonateRadius: st.detonateRadius,
        chainDmgBoost: st.chainDmgBoost,
        turncoatDamage: st.turncoatDamage,
        contagionRange: st.contagionRange,
        contagionFalloff: st.contagionFalloff,
        clusterCount: st.clusterCount,
        clusterDmgPct: st.clusterDmgPct,
        clusterSplitPct: st.clusterSplitPct,
        nukeZoneDuration: st.nukeZoneDuration,
        nukeZoneRadius: st.nukeZoneRadius,
        nukeZoneDmg: st.nukeZoneDmg,
        nukeZoneInterval: st.nukeZoneInterval,
        precisionTracking: st.precisionTracking,
        towerId: tower.id
    };
    // Missile & variants: vertical launch then arc toward target
    if (tower.type === 'missile' || tower.type === 'missile_cluster' || tower.type === 'missile_nuke' || tower.type === 'missile_precision') {
        p.phase = 'launch';
        p.launchHeight = 55 + Math.random() * 35;
        p.launchSpeed = 300;
        p.bezierP0 = null;
        p.bezierP1 = null;
        p.bezierP2 = null;
        p.bezierT = 0;
        p.hasSplit = false;  // cluster split flag
    }
    // Laser & variants: link boost placeholder (set by caller)
    if (tower.type === 'laser' || tower.type === 'laser_core' || tower.type === 'laser_resonance' || tower.type === 'laser_refract') {
        p.linkBoost = 1;
    }
    // Pierce: straight-line penetration with falloff
    if (tower.type === 'archer_pierce') {
        p.pierceRemaining = st.pierceCount;
        p.pierceHitIds = new Set();
        p.target = null; // flies straight, no tracking
    }
    game.projectiles.push(p);
    return p;
}

function updateProjectiles(dt) {
    for (const p of game.projectiles) {
        if (!p.alive) continue;

        // Fire projectiles fly to fixed position (not tracking target)
        if (p.type === 'fire') {
            const dx = p.targetX - p.x;
            const dy = p.targetY - p.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            const moveSpeed = p.speed * dt;
            if (d <= moveSpeed + 2) {
                p.x = p.targetX;
                p.y = p.targetY;
                handleImpact(p);
                p.alive = false;
            } else {
                p.x += (dx / d) * moveSpeed;
                p.y += (dy / d) * moveSpeed;
            }
            continue;
        }

        // Wind vortex — slow-moving persistent tornado that pulls and damages enemies
        if (p.type === 'wind_vortex') {
            if (!p.vortexBorn) {
                p.vortexBorn = performance.now();
                p.vortexTimer = p.vortexDuration;
                p.vortexTickTimer = 0;
            }
            p.vortexTimer -= dt * 1000;
            // Vortex times out
            if (p.vortexTimer <= 0) {
                createWindDissipate(p.x, p.y, p.splashRadius);
                p.alive = false;
                continue;
            }
            // Move slowly toward target position
            const vdx = p.targetX - p.x;
            const vdy = p.targetY - p.y;
            const vd = Math.sqrt(vdx * vdx + vdy * vdy);
            const vSpeed = p.speed * dt;
            if (vd > 10) {
                p.x += (vdx / vd) * vSpeed;
                p.y += (vdy / vd) * vSpeed;
            }
            // Pull enemies toward vortex center
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                const ed = dist(p, e);
                if (ed <= p.splashRadius && ed > 3) {
                    const pullStrength = p.vortexPull * dt * (1 - ed / p.splashRadius);
                    e.x += (p.x - e.x) / ed * pullStrength;
                    e.y += (p.y - e.y) / ed * pullStrength;
                }
            }
            // Tick damage
            p.vortexTickTimer -= dt * 1000;
            while (p.vortexTickTimer <= 0) {
                for (const e of game.enemies) {
                    if (!e.alive || e.isTurncoat) continue;
                    if (dist(p, e) <= p.splashRadius) {
                        dealDamage(e, p.damage);
                        createHitSpark(e.x, e.y, '#80E8D8');
                    }
                }
                p.vortexTickTimer += p.vortexTickInterval;
            }
            // Spawn spin particles
            if (Math.random() < dt * 15) {
                const sa = Math.random() * Math.PI * 2;
                const sr = Math.random() * p.splashRadius * 0.7;
                game.particles.push({
                    x: p.x + Math.cos(sa) * sr,
                    y: p.y + Math.sin(sa) * sr,
                    vx: Math.cos(sa + Math.PI / 2) * 40,
                    vy: Math.sin(sa + Math.PI / 2) * 40 - 10,
                    life: 0.3 + Math.random() * 0.3,
                    maxLife: 0.6,
                    color: '#C8F8F0',
                    size: 1.5 + Math.random() * 2
                });
            }
            continue;
        }

        // Pierce — straight-line penetration, hits multiple enemies
        if (p.type === 'archer_pierce') {
            const dx = p.targetX - p.x;
            const dy = p.targetY - p.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            const moveSpeed = p.speed * dt;
            if (d <= moveSpeed + 2) {
                p.x = p.targetX;
                p.y = p.targetY;
                p.alive = false;
            } else {
                p.x += (dx / d) * moveSpeed;
                p.y += (dy / d) * moveSpeed;
            }
            // Check collision with any unhit enemy along the path
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                if (p.pierceHitIds.has(e.id)) continue;
                if (dist(p, e) <= e.size + 5) {
                    dealDamage(e, p.damage);
                    createHitSpark(e.x, e.y, '#D7BDE2');
                    p.pierceHitIds.add(e.id);
                    p.pierceRemaining--;
                    p.damage = Math.floor(p.damage * (1 - p.pierceFalloff));
                    if (p.pierceRemaining <= 0) {
                        p.alive = false;
                        break;
                    }
                }
            }
            if (p.alive && d <= moveSpeed + 2) {
                p.alive = false;
            }
            continue;
        }

        // Shrapnel — fly outward from impact, hit first enemy
        if (p.type === 'shrapnel') {
            const dx = p.vx * p.speed * dt;
            const dy = p.vy * p.speed * dt;
            p.x += dx;
            p.y += dy;
            p.progress += p.speed * dt;
            // Check collision with enemies
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                if (dist(p, e) <= e.size + 4) {
                    dealDamage(e, p.damage);
                    createHitSpark(e.x, e.y, '#FFAA00');
                    p.alive = false;
                    break;
                }
            }
            if (p.alive && p.progress >= p.flightDistance) {
                p.alive = false;
            }
            continue;
        }

        // Missile & variants — vertical launch then bezier arc toward target
        if (p.type === 'missile' || p.type === 'missile_cluster' || p.type === 'missile_nuke' || p.type === 'missile_precision') {
            if (p.phase === 'launch') {
                if (p.target && p.target.alive) {
                    p.targetX = p.target.x;
                    p.targetY = p.target.y;
                }
                p.y -= p.launchSpeed * dt;
                if (p.y <= p.startY - p.launchHeight) {
                    p.phase = 'cruise';
                    p.y = p.startY - p.launchHeight;
                    p.bezierP0 = { x: p.x, y: p.y };
                    p.bezierP2 = { x: p.targetX, y: p.targetY };
                    const midX = (p.bezierP0.x + p.bezierP2.x) / 2;
                    const midY = Math.min(p.bezierP0.y, p.bezierP2.y) - p.arcHeight;
                    p.bezierP1 = { x: midX, y: midY };
                    p.bezierLen = bezierLength(p.bezierP0, p.bezierP1, p.bezierP2);
                    p.bezierDist = 0;
                }
                spawnMissileTrail(p);
                continue;
            }
            // Precision tracking: re-aim bezier toward target midpoint during cruise
            if (p.precisionTracking && p.target && p.target.alive) {
                p.targetX = p.target.x;
                p.targetY = p.target.y;
                const remaining = 1 - (p.bezierDist / p.bezierLen);
                const newP2 = { x: p.targetX, y: p.targetY };
                const curPos = bezierPoint(p.bezierP0, p.bezierP1, p.bezierP2, p.bezierDist / p.bezierLen);
                const midX = (curPos.x + newP2.x) / 2;
                const midY = Math.min(curPos.y, newP2.y) - p.arcHeight * remaining;
                p.bezierP0 = curPos;
                p.bezierP1 = { x: midX, y: midY };
                p.bezierP2 = newP2;
                p.bezierLen = bezierLength(p.bezierP0, p.bezierP1, p.bezierP2);
                p.bezierDist = 0;
            }
            // Cluster split: burst into sub-missiles near end of cruise
            if (p.clusterCount > 0 && !p.hasSplit) {
                const progress = p.bezierDist / p.bezierLen;
                if (progress >= p.clusterSplitPct) {
                    p.hasSplit = true;
                    const splitPos = bezierPoint(p.bezierP0, p.bezierP1, p.bezierP2, progress);
                    // Gather candidate targets
                    const candidates = [];
                    for (const e of game.enemies) {
                        if (!e.alive || e.isTurncoat) continue;
                        if (dist({ x: splitPos.x, y: splitPos.y }, e) <= p.splashRadius * 2) {
                            candidates.push(e);
                        }
                    }
                    const subDmg = Math.floor(p.damage * p.clusterDmgPct);
                    for (let i = 0; i < p.clusterCount; i++) {
                        let stg;
                        if (candidates.length > 0) {
                            stg = candidates.splice(Math.floor(Math.random() * candidates.length), 1)[0];
                        }
                        const sub = {
                            x: splitPos.x + (Math.random() - 0.5) * 16,
                            y: splitPos.y + (Math.random() - 0.5) * 16,
                            target: stg || null,
                            targetX: stg ? stg.x : splitPos.x + (Math.random() - 0.5) * 200,
                            targetY: stg ? stg.y : splitPos.y + (Math.random() - 0.5) * 200,
                            startX: splitPos.x,
                            startY: splitPos.y,
                            damage: subDmg,
                            speed: 420,
                            type: 'missile_sub',
                            color: '#DDD6FE',
                            splashRadius: 0,
                            splashDmgPct: 0,
                            slowFactor: 0, slowDuration: 0,
                            chainCount: 0, chainRange: 0, chainFalloff: 0,
                            flameRadius: 0, flameDuration: 0, flameTickInterval: 0,
                            sheepDuration: 0, gustForce: 0, vortexPull: 0,
                            vortexDuration: 0, vortexTickInterval: 0,
                            gustInterval: 0, gustDamage: 0,
                            auraSpeedMin: 0, auraSpeedMax: 0, auraFlipInterval: 0,
                            arcHeight: 0,
                            flightDistance: 600,
                            progress: 0,
                            alive: true,
                            towerX: p.towerX,
                            towerY: p.towerY,
                            critChance: 0, critMultiplier: 0,
                            shrapnelCount: 0, shrapnelRange: 0, shrapnelDmg: 0,
                            stunFactor: 0, stunDuration: 0,
                            freezeStacks: 0, freezeDuration: 0,
                            auraSlowFactor: 0,
                            pierceCount: 0, pierceFalloff: 0,
                            focusDmgPerStack: 0, focusMaxStacks: 0,
                            detonateDmg: 0, detonateRadius: 0,
                            chainDmgBoost: 0,
                            turncoatDamage: 0,
                            contagionRange: 0, contagionFalloff: 0,
                            clusterCount: 0, clusterDmgPct: 0, clusterSplitPct: 0,
                            nukeZoneDuration: 0, nukeZoneRadius: 0, nukeZoneDmg: 0, nukeZoneInterval: 0,
                            precisionTracking: false,
                            towerId: p.towerId
                        };
                        game.projectiles.push(sub);
                    }
                    p.alive = false;
                    createHitSpark(splitPos.x, splitPos.y, '#DDD6FE');
                    continue;
                }
            }
            // Cruise phase: follow bezier curve to target
            p.bezierDist += p.speed * dt;
            if (p.bezierDist >= p.bezierLen) {
                const pos = bezierPoint(p.bezierP0, p.bezierP1, p.bezierP2, 1);
                p.x = pos.x; p.y = pos.y;
                handleImpact(p);
                p.alive = false;
            } else {
                const t = p.bezierDist / p.bezierLen;
                const pos = bezierPoint(p.bezierP0, p.bezierP1, p.bezierP2, t);
                p.x = pos.x; p.y = pos.y;
            }
            spawnMissileTrail(p);
            continue;
        }

        // Cluster sub-missile — fast homing projectile
        if (p.type === 'missile_sub') {
            if (p.target && p.target.alive) {
                p.targetX = p.target.x;
                p.targetY = p.target.y;
            }
            const dx = p.targetX - p.x;
            const dy = p.targetY - p.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            const moveSpeed = p.speed * dt;
            if (d <= moveSpeed + 3) {
                if (p.target && p.target.alive) {
                    dealDamage(p.target, p.damage);
                    createHitSpark(p.target.x, p.target.y, '#C0B0F0');
                }
                p.alive = false;
            } else {
                p.x += (dx / d) * moveSpeed;
                p.y += (dy / d) * moveSpeed;
            }
            spawnMissileTrail(p);
            continue;
        }

        if (!p.target || !p.target.alive) {
            p.alive = false;
            continue;
        }

        const dx = p.target.x - p.x;
        const dy = p.target.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);

        // Lightning / Laser & variants are instant
        if ((p.type === 'tesla' || p.type === 'laser' || p.type === 'laser_core' || p.type === 'laser_resonance' || p.type === 'laser_refract') && p.speed > 9000) {
            handleImpact(p);
            p.alive = false;
            continue;
        }

        const moveSpeed = p.speed * dt;
        if (d <= moveSpeed + 2) {
            handleImpact(p);
            p.alive = false;
        } else {
            p.x += (dx / d) * moveSpeed;
            p.y += (dy / d) * moveSpeed;
        }
    }
    game.projectiles = game.projectiles.filter(p => p.alive);
}

function handleImpact(p) {
    // Fire projectiles create a persistent ground fire zone
    if (p.type === 'fire') {
        createFireZone(p.x, p.y, p.flameRadius, p.damage, p.flameDuration, p.flameTickInterval);
        createFireIgnition(p.x, p.y, p.flameRadius);
        return;
    }

    // Missile & variants — create persistent crater zone + explosion particles
    if (p.type === 'missile' || p.type === 'missile_cluster' || p.type === 'missile_nuke' || p.type === 'missile_precision') {
        const isNuke = p.type === 'missile_nuke';
        const craterRadius = isNuke ? 20 : (p.type === 'missile_cluster' ? 18 : (p.type === 'missile_precision' ? 10 : 12));
        createCraterZone(p.x, p.y, p.type, craterRadius);
        // Explosion burst particles (no crater graphics, just debris + flash + dust)
        createImpactBurst(p.x, p.y, p.splashRadius, isNuke ? 'nuke' : 'missile');
        if (isNuke) {
            // Lingering radiation zone
            if (p.nukeZoneDuration > 0) {
                createFireZone(p.x, p.y, p.nukeZoneRadius, p.nukeZoneDmg, p.nukeZoneDuration, p.nukeZoneInterval);
            }
            // Full screen flash
            game.particles.push({
                x: CANVAS_W / 2, y: CANVAS_H / 2,
                vx: 0, vy: 0,
                life: 0.35, maxLife: 0.35,
                color: '#FFFFFF', size: Math.max(CANVAS_W, CANVAS_H), ring: true
            });
        }
        for (const e of game.enemies) {
            if (!e.alive || e.isTurncoat) continue;
            const d = dist({ x: p.x, y: p.y }, e);
            if (d <= p.splashRadius) {
                const dmg = Math.floor(p.damage * (1 - (d / p.splashRadius) * 0.5));
                dealDamage(e, Math.max(Math.floor(p.damage * p.splashDmgPct), dmg));
            }
        }
        return;
    }

    // Wind tower — push enemy backward with a wind burst
    if (p.type === 'wind') {
        if (!p.target || !p.target.alive) return;
        dealDamage(p.target, p.damage);
        applyKnockback(p.target, p.gustForce);
        createWindBurst(p.target.x, p.target.y);
        return;
    }

    // Wind gust — map-wide hurricane sweep (triggered periodically, not on projectile hit)
    if (p.type === 'wind_gust') {
        if (!p.target || !p.target.alive) return;
        dealDamage(p.target, p.damage);
        applyKnockback(p.target, p.gustForce);
        createWindBurst(p.target.x, p.target.y);
        return;
    }

    // Wind vortex — the projectile is the vortex itself, handled in updateProjectiles
    if (p.type === 'wind_vortex') {
        // Vortex doesn't impact — it pulses, pulls enemies, and times out
        // If somehow it reaches target directly, just let it continue
        return;
    }

    // Sheep & variants — transform target into a helpless sheep
    if (p.type === 'sheep' || p.type === 'sheep_turncoat' || p.type === 'sheep_contagion') {
        if (!p.target || !p.target.alive) return;
        dealDamage(p.target, p.damage);
        applySlow(p.target, 0.25, p.sheepDuration);
        p.target.isSheep = true;
        p.target.sheepTimer = p.sheepDuration;
        if (p.type === 'sheep_turncoat') {
            p.target.isTurncoat = true;
            p.target.turncoatDmg = p.turncoatDamage;
        }
        createSheepTransform(p.target.x, p.target.y);
        // Contagion — spread sheep to nearby enemies with reduced duration
        if (p.type === 'sheep_contagion' && p.contagionRange > 0) {
            for (const e of game.enemies) {
                if (!e.alive || e === p.target) continue;
                if (e.isSheep) continue;
                const cdist = Math.sqrt((e.x - p.target.x) ** 2 + (e.y - p.target.y) ** 2);
                if (cdist <= p.contagionRange) {
                    const contagionDuration = Math.floor(p.sheepDuration * p.contagionFalloff);
                    e.isSheep = true;
                    e.sheepTimer = Math.max(e.sheepTimer || 0, contagionDuration);
                    applySlow(e, 0.25, contagionDuration);
                    createSheepTransform(e.x, e.y);
                }
            }
        }
        return;
    }

    // Laser & variants — instant beam with link boost
    if (p.type === 'laser' || p.type === 'laser_core' || p.type === 'laser_resonance') {
        if (!p.target || !p.target.alive) return;
        const linkBoost = p.linkBoost || 1;
        dealDamage(p.target, Math.floor(p.damage * linkBoost));
        const bColor = p.type === 'laser_core' ? '#FF4422' : (p.type === 'laser_resonance' ? '#FFCC44' : '#FF4444');
        const gColor = p.type === 'laser_core' ? '#FF8866' : (p.type === 'laser_resonance' ? '#FFEE88' : '#FF8888');
        createLaserBeam(p.towerX, p.towerY, p.target.x, p.target.y, bColor, gColor);
        if (p.type === 'laser_core') {
            // Overcharged impact spark
            createImpactBurst(p.target.x, p.target.y, 20, 'nuke');
        }
        return;
    }
    // Laser refract — hits primary then chains to nearby enemies
    if (p.type === 'laser_refract') {
        if (!p.target || !p.target.alive) return;
        const linkBoost = p.linkBoost || 1;
        const hitEnemies = new Set();
        hitEnemies.add(p.target.id);
        dealDamage(p.target, Math.floor(p.damage * linkBoost));
        createLaserBeam(p.towerX, p.towerY, p.target.x, p.target.y, '#FF55EE', '#FFAAFF');
        // Refraction chain
        let currentDmg = p.damage;
        let lastPos = { x: p.target.x, y: p.target.y };
        let remaining = p.chainCount;
        while (remaining > 0) {
            let nearest = null;
            let nearestDist = p.chainRange;
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat || hitEnemies.has(e.id)) continue;
                const d = Math.sqrt((e.x - lastPos.x) ** 2 + (e.y - lastPos.y) ** 2);
                if (d < nearestDist) {
                    nearest = e;
                    nearestDist = d;
                }
            }
            if (!nearest) break;
            currentDmg = Math.floor(currentDmg * (1 - p.chainFalloff));
            dealDamage(nearest, currentDmg);
            hitEnemies.add(nearest.id);
            createLaserBeam(lastPos.x, lastPos.y, nearest.x, nearest.y, '#FF88EE', '#FFBBFF');
            lastPos = { x: nearest.x, y: nearest.y };
            remaining--;
        }
        return;
    }

    if (!p.target || !p.target.alive) return;

    if (p.splashRadius > 0) {
        // Splash damage (cannon, ice_splash & variants)
        for (const e of game.enemies) {
            if (!e.alive || e.isTurncoat) continue;
            const d = dist(p.target, e);
            if (d <= p.splashRadius) {
                const dmg = e === p.target ? p.damage : Math.floor(p.damage * p.splashDmgPct);
                dealDamage(e, dmg);
                // Concussive stun on splash
                if (p.stunFactor > 0 && p.stunDuration > 0) {
                    applySlow(e, p.stunFactor, p.stunDuration);
                }
                // Ice splash slow to all enemies in splash
                if (p.slowFactor > 0 && p.slowDuration > 0) {
                    applySlow(e, p.slowFactor, p.slowDuration);
                }
            }
        }
        // Visual effect depends on variant
        if (p.stunFactor > 0) {
            createCraterZone(p.target.x, p.target.y, 'artillery_concuss', 13);
            createImpactBurst(p.target.x, p.target.y, p.splashRadius, 'concuss');
        } else if (p.type === 'artillery_blast') {
            createCraterZone(p.target.x, p.target.y, 'artillery_blast', 8);
            createImpactBurst(p.target.x, p.target.y, p.splashRadius, 'blast');
        } else if (p.type === 'artillery_shrapnel') {
            createCraterZone(p.target.x, p.target.y, 'artillery_shrapnel', 15);
            createImpactBurst(p.target.x, p.target.y, p.splashRadius, 'shrapnel');
        } else if (p.slowFactor > 0) {
            createSplashRing(p.target.x, p.target.y, p.splashRadius, '#AED6F1');
        } else {
            createCraterZone(p.target.x, p.target.y, p.type === 'artillery' ? 'artillery' : 'artillery', 10);
            createImpactBurst(p.target.x, p.target.y, p.splashRadius, 'default');
        }
        // Fire zone — only for fire tower, not blast
        if (p.flameRadius > 0 && p.flameDuration > 0 && p.type === 'fire') {
            createFireZone(p.x, p.y, p.flameRadius, Math.floor(p.damage * 0.3), p.flameDuration, p.flameTickInterval);
            createFireIgnition(p.x, p.y, p.flameRadius);
        }
        // Shrapnel — spawn fragments
        if (p.shrapnelCount > 0) {
            spawnShrapnel(p);
        }
        // Detonate — on-kill explosion
        if (p.detonateDmg > 0 && p.detonateRadius > 0 && p.target && !p.target.alive) {
            createDetonateExplosion(p.target.x, p.target.y, p.detonateDmg, p.detonateRadius);
        }
    } else if (p.slowFactor > 0) {
        // Ice / freeze slow
        dealDamage(p.target, p.damage);
        applySlow(p.target, p.slowFactor, p.slowDuration);
        // Freeze stack tracking — consecutive hits on same target
        if (p.freezeStacks > 0) {
            const tower = game.towers.find(tw => tw.id === p.towerId);
            if (tower) {
                if (tower.freezeTargetId === p.target.id) {
                    tower.freezeStack = (tower.freezeStack || 0) + 1;
                } else {
                    tower.freezeTargetId = p.target.id;
                    tower.freezeStack = 1;
                }
                if (tower.freezeStack >= p.freezeStacks) {
                    applySlow(p.target, 0.05, p.freezeDuration);
                    tower.freezeTargetId = null;
                    tower.freezeStack = 0;
                    createFrostShatter(p.target.x, p.target.y);
                }
            }
        }
        createHitSpark(p.target.x, p.target.y, '#aed6f1');
    } else if (p.chainCount > 0) {
        // Chain lightning
        dealDamage(p.target, p.damage);
        createLightningArc(p.towerX, p.towerY, p.target.x, p.target.y);
        chainLightning(p.target, p.damage, p.chainCount - 1, p.chainRange, p.chainFalloff, p.chainDmgBoost, new Set([p.target.id]));
    } else {
        // Arrow - single target (with possible crit)
        let dmg = p.damage;
        let isCrit = false;
        if (p.critChance > 0 && Math.random() < p.critChance) {
            dmg = Math.floor(p.damage * p.critMultiplier);
            isCrit = true;
        }
        dealDamage(p.target, dmg);
        if (isCrit) {
            createCritSpark(p.target.x, p.target.y, p.critMultiplier);
        } else {
            createHitSpark(p.target.x, p.target.y, '#f1c40f');
        }
    }
}

function spawnShrapnel(p) {
    const impactX = p.target ? p.target.x : p.x;
    const impactY = p.target ? p.target.y : p.y;
    for (let i = 0; i < p.shrapnelCount; i++) {
        const angle = (Math.PI * 2 * i) / p.shrapnelCount + (Math.random() - 0.5) * 0.5;
        game.projectiles.push({
            x: impactX, y: impactY,
            vx: Math.cos(angle),
            vy: Math.sin(angle),
            target: null,
            targetX: impactX + Math.cos(angle) * p.shrapnelRange,
            targetY: impactY + Math.sin(angle) * p.shrapnelRange,
            startX: impactX, startY: impactY,
            damage: Math.floor(p.damage * p.shrapnelDmg),
            speed: 350,
            type: 'shrapnel',
            color: '#FFAA00',
            splashRadius: 0,
            splashDmgPct: 0,
            slowFactor: 0,
            slowDuration: 0,
            chainCount: 0,
            chainRange: 0,
            chainFalloff: 0,
            flameRadius: 0,
            flameDuration: 0,
            flameTickInterval: 0,
            sheepDuration: 0,
            gustForce: 0, vortexPull: 0,
            vortexDuration: 0, vortexTickInterval: 0,
            gustInterval: 0, gustDamage: 0,
            auraSpeedMin: 0, auraSpeedMax: 0, auraFlipInterval: 0,
            arcHeight: 0,
            flightDistance: p.shrapnelRange,
            progress: 0,
            alive: true,
            towerX: p.towerX,
            towerY: p.towerY,
            critChance: 0,
            critMultiplier: 0,
            shrapnelCount: 0,
            shrapnelRange: 0,
            shrapnelDmg: 0,
            stunFactor: 0,
            stunDuration: 0
        });
    }
}

function chainLightning(sourceEnemy, baseDmg, remainingChains, chainRange, falloff, boost, visited) {
    if (remainingChains <= 0) return;
    let nearest = null;
    let nearestDist = Infinity;
    for (const e of game.enemies) {
        if (!e.alive || visited.has(e.id) || e.isTurncoat) continue;
        const d = dist(sourceEnemy, e);
        if (d <= chainRange && d < nearestDist) {
            nearest = e;
            nearestDist = d;
        }
    }
    if (nearest) {
        const dmg = boost > 0 ? Math.floor(baseDmg * (1 + boost)) : Math.floor(baseDmg * (1 - falloff));
        dealDamage(nearest, dmg);
        visited.add(nearest.id);
        createLightningArc(sourceEnemy.x, sourceEnemy.y, nearest.x, nearest.y);
        chainLightning(nearest, dmg, remainingChains - 1, chainRange, falloff, boost, visited);
    }
}

function dealDamage(enemy, dmg) {
    if (enemy.vulnFactor > 0) {
        dmg = Math.floor(dmg * (1 + enemy.vulnFactor));
    }
    if (enemy.craterDmgAmp > 1) {
        dmg = Math.floor(dmg * enemy.craterDmgAmp);
    }
    enemy.hp -= dmg;
    if (enemy.hp <= 0) {
        enemy.hp = 0;
        enemy.alive = false;
        if (!enemy.isTurncoat) {
            game.gold += enemy.reward;
            game.score += enemy.reward * 10;
        }
        createDeathExplosion(enemy.x, enemy.y, enemy.size, enemy.color);
        updateHUD();
        updateTowerButtons();
    }
}

// ==================== WAVE MANAGEMENT ====================
function startNextWave() {
    if (game.state === 'wave_active') return;
    if (game.waveNum >= game.totalWaves && game.state !== 'victory') return;
    game.waveNum++;
    game.state = 'wave_active';
    game.spawnQueue = generateWave(game.waveNum);
    game.spawnInterval = spawnInterval(game.waveNum);
    game.spawnTimer = 0;
    game.waveSpawningDone = false;
    game.countdown = 0;
    updateHUD();
    document.getElementById('start-wave-btn').disabled = true;
    document.getElementById('countdown-display').textContent = '';
}

function updateWaveSpawning(dt) {
    if (game.state !== 'wave_active' || game.waveSpawningDone) return;
    game.spawnTimer -= dt * 1000 * game.speedMult;
    while (game.spawnTimer <= 0 && game.spawnQueue.length > 0) {
        const type = game.spawnQueue.shift();
        const enemy = createEnemy(type, game.waveNum);
        game.enemies.push(enemy);
        game.spawnTimer += game.spawnInterval / game.speedMult;
    }
    if (game.spawnQueue.length === 0 && game.enemies.every(e => !e.alive)) {
        game.waveSpawningDone = true;
    }
}

function checkWaveComplete() {
    if (game.state !== 'wave_active') return;
    if (!game.waveSpawningDone) return;
    if (game.enemies.length > 0) return; // still some alive

    // Wave complete
    const bonus = 50 + game.waveNum * 10;
    game.gold += bonus;
    game.score += bonus;
    game.state = 'idle';
    document.getElementById('start-wave-btn').disabled = false;

    if (game.waveNum >= game.totalWaves) {
        endGame('victory');
    } else if (game.autoWave) {
        document.getElementById('countdown-display').textContent = '⏩ 自动下一波...';
        startNextWave();
    } else {
        document.getElementById('countdown-display').textContent = '✔ 波次完成';
    }
    updateHUD();
    updateTowerButtons();
}

// ==================== PARTICLE SYSTEM ====================
function createHitSpark(x, y, color) {
    for (let i = 0; i < 5; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 80;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.3,
            maxLife: 0.6,
            color,
            size: 2 + Math.random() * 3
        });
    }
}

function createSplashRing(x, y, radius, color) {
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.5, maxLife: 0.5,
        color, size: radius, ring: true
    });
}

function createCritSpark(x, y, multiplier) {
    // Dramatic golden burst for critical hits
    for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 80 + Math.random() * 200;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.2 + Math.random() * 0.4,
            maxLife: 0.6,
            color: Math.random() < 0.5 ? '#FFD700' : '#FFA500',
            size: 2 + Math.random() * 4
        });
    }
    // Golden ring shockwave
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.4, maxLife: 0.4,
        color: '#FFD700', size: 12 + multiplier * 5, ring: true
    });
    // Big damage text flash via bright particles
    for (let i = 0; i < 5; i++) {
        game.particles.push({
            x: x + (Math.random() - 0.5) * 10,
            y: y + (Math.random() - 0.5) * 10,
            vx: (Math.random() - 0.5) * 30,
            vy: -30 - Math.random() * 50,
            life: 0.5 + Math.random() * 0.3,
            maxLife: 0.8,
            color: '#FFF',
            size: 3 + Math.random() * 5
        });
    }
}

function createDetonateExplosion(x, y, dmg, radius) {
    // Big fiery explosion
    for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 80 + Math.random() * 200;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.5,
            maxLife: 0.8,
            color: Math.random() < 0.5 ? '#FF5733' : '#FFC300',
            size: 2 + Math.random() * 5
        });
    }
    // Fire ring shockwave
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.45, maxLife: 0.45,
        color: '#FF4400', size: radius * 0.7, ring: true
    });
    // Fire zone at explosion point
    createFireZone(x, y, radius * 0.5, Math.floor(dmg * 0.4), 2000, 400);
    createFireIgnition(x, y, radius * 0.6);
    // Damage nearby enemies
    for (const e of game.enemies) {
        if (!e.alive || e.isTurncoat) continue;
        const d = dist({ x, y }, e);
        if (d <= radius) {
            const falloff = 1 - (d / radius) * 0.5;
            dealDamage(e, Math.floor(dmg * falloff));
        }
    }
}

function createFrostShatter(x, y) {
    // Ice shatter burst when freeze procs
    for (let i = 0; i < 14; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 60 + Math.random() * 160;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.5,
            maxLife: 0.8,
            color: Math.random() < 0.5 ? '#D6EAF8' : '#FFFFFF',
            size: 2 + Math.random() * 4
        });
    }
    // Ice ring shockwave
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.5, maxLife: 0.5,
        color: '#85C1E9', size: 18, ring: true
    });
    // Floating ice shards
    for (let i = 0; i < 6; i++) {
        const a = Math.PI * 2 * i / 6;
        game.particles.push({
            x: x + Math.cos(a) * 4, y: y + Math.sin(a) * 4,
            vx: Math.cos(a) * 40,
            vy: Math.sin(a) * 40,
            life: 0.4 + Math.random() * 0.4,
            maxLife: 0.8,
            color: '#AED6F1',
            size: 3 + Math.random() * 3
        });
    }
}

function createLightningArc(x1, y1, x2, y2) {
    game.particles.push({
        x: x1, y: y1, x2, y2,
        life: 0.15, maxLife: 0.15,
        color: '#f1c40f', size: 2, lightning: true
    });
}

function createLaserBeam(x1, y1, x2, y2, color, glowColor) {
    const core = color || '#FF4444';
    const glow = glowColor || '#FF8888';
    // Bright laser beam particle (rendered as a line in drawParticles)
    game.particles.push({
        x: x1, y: y1, x2, y2,
        life: 0.12, maxLife: 0.12,
        color: core, size: 3, laserBeam: true
    });
    // Outer glow
    game.particles.push({
        x: x1, y: y1, x2, y2,
        life: 0.18, maxLife: 0.18,
        color: glow, size: 6, laserBeam: true
    });
    // Impact spark at target
    for (let i = 0; i < 5; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 60 + Math.random() * 120;
        game.particles.push({
            x: x2, y: y2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.1 + Math.random() * 0.2,
            maxLife: 0.3,
            color: Math.random() < 0.5 ? '#FF6666' : '#FFAAAA',
            size: 1.5 + Math.random() * 2
        });
    }
}

function createDeathExplosion(x, y, size, color) {
    for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 30 + Math.random() * 100;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.5,
            maxLife: 0.8,
            color,
            size: 1 + Math.random() * size * 0.6
        });
    }
}

function updateParticles(dt) {
    for (const p of game.particles) {
        p.life -= dt;
        if (!p.ring && !p.lightning && !p.laserBeam) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }
    }
    game.particles = game.particles.filter(p => p.life > 0);
}

// ==================== FIRE ZONE SYSTEM ====================
function createFireZone(x, y, radius, damage, duration, tickInterval) {
    game.fireZones.push({
        x, y, radius, damage, duration, maxDuration: duration, tickInterval, tickTimer: 0
    });
}

function createFireIgnition(x, y, radius) {
    for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 30 + Math.random() * 120;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 30,
            life: 0.4 + Math.random() * 0.6,
            maxLife: 1.0,
            color: Math.random() < 0.5 ? '#FF6B35' : '#FFB830',
            size: 2 + Math.random() * 4
        });
    }
    // Central flash
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.3, maxLife: 0.3,
        color: '#FFD700', size: radius, ring: true
    });
}

function updateFireZones(dt) {
    const dtMs = dt * 1000;
    for (const fz of game.fireZones) {
        fz.duration -= dtMs;
        fz.tickTimer -= dtMs;
        while (fz.tickTimer <= 0) {
            for (const e of game.enemies) {
                if (!e.alive || e.isTurncoat) continue;
                if (dist(fz, e) <= fz.radius) {
                    dealDamage(e, fz.damage);
                }
            }
            fz.tickTimer += fz.tickInterval;
        }
    }
    game.fireZones = game.fireZones.filter(fz => fz.duration > 0);
}

function drawFireZones() {
    const time = Date.now() / 1000;
    for (const fz of game.fireZones) {
        const lifeRatio = fz.duration / fz.maxDuration;
        const fadeAlpha = Math.min(1, lifeRatio * 2.5);
        const flicker = 1 + Math.sin(time * 18 + fz.x) * 0.08 + Math.sin(time * 23 + fz.y) * 0.07;

        // Outer heat glow
        const glowGrad = ctx.createRadialGradient(fz.x, fz.y, fz.radius * 0.15, fz.x, fz.y, fz.radius * flicker);
        glowGrad.addColorStop(0, `rgba(255,200,40,${0.7 * fadeAlpha})`);
        glowGrad.addColorStop(0.45, `rgba(255,120,15,${0.45 * fadeAlpha})`);
        glowGrad.addColorStop(0.75, `rgba(255,50,5,${0.2 * fadeAlpha})`);
        glowGrad.addColorStop(1, 'rgba(255,20,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(fz.x, fz.y, fz.radius * flicker, 0, Math.PI * 2);
        ctx.fill();

        // Inner fire ring
        ctx.strokeStyle = `rgba(255,180,30,${0.5 * fadeAlpha})`;
        ctx.lineWidth = 3 * fadeAlpha;
        ctx.beginPath();
        ctx.arc(fz.x, fz.y, fz.radius * 0.75, 0, Math.PI * 2);
        ctx.stroke();

        // Flame tongues on the ground
        const numFlames = 8;
        for (let i = 0; i < numFlames; i++) {
            const a = (i / numFlames) * Math.PI * 2 + time * 1.5 + i;
            const baseX = fz.x + Math.cos(a) * fz.radius * 0.4;
            const baseY = fz.y + Math.sin(a) * fz.radius * 0.4;
            const h = fz.radius * (0.3 + 0.35 * Math.sin(time * 8 + i * 1.7));
            const dirA = a + Math.PI / 2;
            const tipX = baseX + Math.cos(dirA) * h * flicker;
            const tipY = baseY + Math.sin(dirA) * h * flicker;
            const fw = 3 + Math.sin(time * 10 + i) * 1.5;

            ctx.fillStyle = `rgba(255,160,30,${0.6 * fadeAlpha})`;
            ctx.beginPath();
            ctx.moveTo(baseX + Math.cos(a) * fw, baseY + Math.sin(a) * fw);
            ctx.quadraticCurveTo(baseX + Math.cos(dirA) * h * 0.3, baseY + Math.sin(dirA) * h * 0.3, tipX, tipY);
            ctx.quadraticCurveTo(baseX - Math.cos(dirA) * h * 0.3, baseY - Math.sin(dirA) * h * 0.3, baseX - Math.cos(a) * fw, baseY - Math.sin(a) * fw);
            ctx.closePath();
            ctx.fill();
        }

        // Ember sparks rising up
        for (let i = 0; i < 6; i++) {
            const sparkA = Math.random() * Math.PI * 2;
            const sparkR = Math.random() * fz.radius * 0.8;
            const sx = fz.x + Math.cos(sparkA) * sparkR;
            const sy = fz.y + Math.sin(sparkA) * sparkR - Math.random() * 15;
            const sparkAlpha = 0.4 + Math.random() * 0.4;
            ctx.fillStyle = `rgba(255,200,50,${sparkAlpha * fadeAlpha})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 1.2 + Math.random() * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// ==================== CRATER ZONE SYSTEM ====================
function createCraterZone(x, y, type, radius) {
    const defs = {
        // Artillery branches
        artillery_blast:   { duration: 8000,  slowFactor: 0.85, dmgAmp: 0,    tripChance: 0 },
        artillery_shrapnel:{ duration: 4000,  slowFactor: 0,    dmgAmp: 0,    tripChance: 0 },
        artillery_concuss: { duration: 6000,  slowFactor: 0,    dmgAmp: 0,    tripChance: 0.2 },
        artillery:         { duration: 5000,  slowFactor: 0,    dmgAmp: 0,    tripChance: 0 },
        // Missile branches
        missile_precision: { duration: 5000,  slowFactor: 0,    dmgAmp: 0,    tripChance: 0 },
        missile_cluster:   { duration: 6000,  slowFactor: 0.90, dmgAmp: 0,    tripChance: 0 },
        missile_nuke:      { duration: 12000, slowFactor: 0.75, dmgAmp: 0.10, tripChance: 0 },
        missile:           { duration: 5000,  slowFactor: 0,    dmgAmp: 0,    tripChance: 0 }
    };
    const d = defs[type] || defs.artillery;

    // Shrapnel: pre-generate pockmark offsets
    let pockmarks = null;
    if (type === 'artillery_shrapnel') {
        pockmarks = [];
        const count = 6 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = radius * (0.3 + Math.random() * 0.7);
            pockmarks.push({ ox: Math.cos(a) * r, oy: Math.sin(a) * r, r: 2 + Math.random() * 3 });
        }
    }

    // Cluster: pre-generate sub-crater positions
    let subCraters = null;
    if (type === 'missile_cluster') {
        subCraters = [];
        const count = 5 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * radius * 0.8;
            subCraters.push({ ox: Math.cos(a) * r, oy: Math.sin(a) * r, r: 5 + Math.random() * 7 });
        }
    }

    // Concuss: pre-generate crack lines
    let cracks = null;
    if (type === 'artillery_concuss') {
        cracks = [];
        const count = 4 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
            const a = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
            const len = radius * (0.5 + Math.random() * 0.5);
            cracks.push({ angle: a, length: len });
        }
    }

    game.craterZones.push({
        x, y, type, radius,
        radiusY: (type === 'artillery_blast' || type === 'missile_nuke') ? radius * 0.65 : radius,
        duration: d.duration,
        maxDuration: d.duration,
        slowFactor: d.slowFactor,
        dmgAmp: d.dmgAmp,
        tripChance: d.tripChance,
        pockmarks,
        subCraters,
        cracks
    });
}

function updateCraters(dt) {
    const dtMs = dt * 1000;
    // Reset per-frame crater effects on all enemies
    for (const e of game.enemies) {
        e.craterDmgAmp = 1;
    }
    for (const cz of game.craterZones) {
        cz.duration -= dtMs;
        if (cz.duration <= 0) continue;

        for (const e of game.enemies) {
            if (!e.alive || e.isTurncoat) continue;
            // Check if enemy is inside the oval crater
            const dx = (e.x - cz.x) / cz.radius;
            const dy = (e.y - cz.y) / (cz.radiusY || cz.radius);
            if (dx * dx + dy * dy > 1) continue;

            // Apply slow — use applySlow with short duration so it expires when leaving crater
            if (cz.slowFactor > 0 && cz.slowFactor < 1) {
                applySlow(e, cz.slowFactor, 150);
            }
            // Apply damage amp (cumulative across overlapping craters)
            if (cz.dmgAmp > 0) {
                e.craterDmgAmp = Math.max(e.craterDmgAmp, 1 + cz.dmgAmp);
            }
            // Trip chance (concuss crater)
            if (cz.tripChance > 0) {
                if (!e.lastTripCheck) e.lastTripCheck = 0;
                const now = performance.now();
                if (now - e.lastTripCheck > 500) {
                    e.lastTripCheck = now;
                    if (Math.random() < cz.tripChance * dt) {
                        applySlow(e, 0.05, 500);
                    }
                }
            }
        }
    }
    game.craterZones = game.craterZones.filter(cz => cz.duration > 0);
}

function drawCraters() {
    for (const cz of game.craterZones) {
        const lifeRatio = cz.duration / cz.maxDuration;
        const alpha = Math.min(1, lifeRatio * 2.5);
        ctx.save();
        ctx.globalAlpha = alpha;

        switch (cz.type) {
            case 'artillery_blast':
                drawBlastCrater(cz, alpha);
                break;
            case 'artillery_shrapnel':
                drawShrapnelCrater(cz, alpha);
                break;
            case 'artillery_concuss':
                drawConcussCrater(cz, alpha);
                break;
            case 'missile_precision':
                drawPrecisionCrater(cz, alpha);
                break;
            case 'missile_cluster':
                drawClusterCrater(cz, alpha);
                break;
            case 'missile_nuke':
                drawNukeCrater(cz, alpha);
                break;
            case 'missile':
                drawDefaultMissileCrater(cz, alpha);
                break;
            default:
                drawDefaultArtilleryCrater(cz, alpha);
                break;
        }
        ctx.restore();
    }
}

function drawOvalCrater(cx, cy, rx, ry, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
}

// 熔穿重炮弹坑 — small deep oval crater with molten slag center
function drawBlastCrater(cz, alpha) {
    const { x, y, radius: rx, radiusY: ry } = cz;
    // Shadow
    drawOvalCrater(x + 1, y + 1, rx, ry, `rgba(60,30,15,${0.6 * alpha})`);
    // Main crater
    drawOvalCrater(x, y, rx, ry, `rgba(90,50,25,${0.5 * alpha})`);
    // Molten slag center (smaller, brighter)
    drawOvalCrater(x, y, rx * 0.35, ry * 0.35, `rgba(200,120,40,${0.3 * alpha})`);
    // Glowing rim
    ctx.strokeStyle = `rgba(180,100,30,${0.25 * alpha})`;
    ctx.lineWidth = 1.5 * alpha;
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
}

// 破片风暴弹坑 — shallow wide crater with scattered pockmarks
function drawShrapnelCrater(cz, alpha) {
    const { x, y, radius: rx, radiusY: ry, pockmarks } = cz;
    // Shadow
    drawOvalCrater(x + 1, y + 1, rx * 0.8, ry * 0.8, `rgba(50,40,30,${0.4 * alpha})`);
    // Main shallow crater
    drawOvalCrater(x, y, rx * 0.75, ry * 0.75, `rgba(80,65,50,${0.35 * alpha})`);
    // Pockmarks
    if (pockmarks) {
        for (const pk of pockmarks) {
            ctx.fillStyle = `rgba(60,45,35,${0.45 * alpha})`;
            ctx.beginPath();
            ctx.arc(x + pk.ox, y + pk.oy, pk.r, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// 震撼弹幕弹坑 — ring crater with raised center and radial cracks
function drawConcussCrater(cz, alpha) {
    const { x, y, radius: rx, radiusY: ry, cracks } = cz;
    // Shadow ring
    ctx.strokeStyle = `rgba(45,35,25,${0.5 * alpha})`;
    ctx.lineWidth = 4 * alpha;
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Main ring depression
    ctx.strokeStyle = `rgba(75,60,45,${0.4 * alpha})`;
    ctx.lineWidth = 3 * alpha;
    ctx.beginPath();
    ctx.ellipse(x, y, rx * 0.9, ry * 0.9, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Radial cracks
    if (cracks) {
        ctx.strokeStyle = `rgba(55,40,30,${0.55 * alpha})`;
        ctx.lineWidth = 1.2 * alpha;
        for (const ck of cracks) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + Math.cos(ck.angle) * ck.length, y + Math.sin(ck.angle) * ck.length);
            ctx.stroke();
        }
    }
    // Slightly raised center
    ctx.fillStyle = `rgba(90,75,60,${0.15 * alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, rx * 0.2, 0, Math.PI * 2);
    ctx.fill();
}

// 精准导弹弹坑 — precise round crater with shockwave ring
function drawPrecisionCrater(cz, alpha) {
    const { x, y, radius: r } = cz;
    // Shadow
    ctx.fillStyle = `rgba(55,35,20,${0.55 * alpha})`;
    ctx.beginPath(); ctx.arc(x + 1, y + 1, r * 0.55, 0, Math.PI * 2); ctx.fill();
    // Main round crater
    ctx.fillStyle = `rgba(95,65,35,${0.45 * alpha})`;
    ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.fill();
    // Shockwave ring
    ctx.strokeStyle = `rgba(120,80,40,${0.2 * alpha})`;
    ctx.lineWidth = 1.5 * alpha;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
}

// 集束导弹弹坑 — cluster of small craters
function drawClusterCrater(cz, alpha) {
    const { x, y, radius: r, subCraters } = cz;
    if (!subCraters) return;
    // Faint overall shadow
    ctx.fillStyle = `rgba(50,30,15,${0.15 * alpha})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    // Individual sub-craters
    for (const sc of subCraters) {
        const sx = x + sc.ox, sy = y + sc.oy, sr = sc.r;
        ctx.fillStyle = `rgba(50,30,15,${0.45 * alpha})`;
        ctx.beginPath(); ctx.arc(sx + 1, sy + 1, sr, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = `rgba(85,55,30,${0.35 * alpha})`;
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    }
}

// 战术核弹弹坑 — huge deep oval crater with raised rim
function drawNukeCrater(cz, alpha) {
    const { x, y, radius: rx, radiusY: ry } = cz;
    // Shadow
    drawOvalCrater(x + 2, y + 2, rx, ry, `rgba(70,40,20,${0.65 * alpha})`);
    // Main deep crater
    drawOvalCrater(x, y, rx, ry, `rgba(110,70,35,${0.55 * alpha})`);
    // Inner deeper
    drawOvalCrater(x, y, rx * 0.6, ry * 0.6, `rgba(60,30,10,${0.3 * alpha})`);
    // Raised rim
    ctx.strokeStyle = `rgba(140,100,60,${0.4 * alpha})`;
    ctx.lineWidth = 2.5 * alpha;
    ctx.beginPath();
    ctx.ellipse(x, y, rx * 1.05, ry * 1.05, 0, 0, Math.PI * 2);
    ctx.stroke();
}

// 默认炮塔弹坑
function drawDefaultArtilleryCrater(cz, alpha) {
    const { x, y, radius: r } = cz;
    ctx.fillStyle = `rgba(55,40,20,${0.45 * alpha})`;
    ctx.beginPath(); ctx.arc(x + 1, y + 1, r * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(85,60,30,${0.35 * alpha})`;
    ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.fill();
}

// 默认导弹弹坑
function drawDefaultMissileCrater(cz, alpha) {
    const { x, y, radius: r } = cz;
    ctx.fillStyle = `rgba(55,35,20,${0.5 * alpha})`;
    ctx.beginPath(); ctx.arc(x + 1, y + 1, r * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(90,60,30,${0.4 * alpha})`;
    ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.fill();
    // Simple shockwave
    ctx.strokeStyle = `rgba(110,70,35,${0.15 * alpha})`;
    ctx.lineWidth = 1.2 * alpha;
    ctx.beginPath(); ctx.arc(x, y, r * 0.8, 0, Math.PI * 2); ctx.stroke();
}

function spawnMissileTrail(p) {
    // Dense smoke puff behind missile
    let angle;
    if (p.phase === 'launch') {
        angle = -Math.PI / 2; // Going straight up, trail goes downward
    } else if (p.bezierP1 && p.bezierLen > 0) {
        const t = Math.min(p.bezierDist / p.bezierLen, 1);
        const tan = bezierTangent(p.bezierP0, p.bezierP1, p.bezierP2, t);
        angle = Math.atan2(tan.y, tan.x);
    } else {
        angle = Math.atan2(p.targetY - p.startY, p.targetX - p.startX);
    }
    const tx = p.x - Math.cos(angle) * 8;
    const ty = p.y - Math.sin(angle) * 8;
    const isLaunch = p.phase === 'launch';
    game.particles.push({
        x: tx + (Math.random() - 0.5) * 6,
        y: ty + (Math.random() - 0.5) * 6,
        vx: (Math.random() - 0.5) * 30,
        vy: isLaunch ? (10 + Math.random() * 25) : (-15 - Math.random() * 25),
        life: 0.4 + Math.random() * 0.5,
        maxLife: 0.9,
        color: '#888',
        size: 4 + Math.random() * 7,
        smoke: true
    });
    // Orange fire spark
    game.particles.push({
        x: tx + (Math.random() - 0.5) * 3,
        y: ty + (Math.random() - 0.5) * 3,
        vx: (Math.random() - 0.5) * 50,
        vy: isLaunch ? (15 + Math.random() * 40) : (-20 - Math.random() * 40),
        life: 0.15 + Math.random() * 0.3,
        maxLife: 0.45,
        color: Math.random() < 0.5 ? '#FFB830' : '#FF6B35',
        size: 1.5 + Math.random() * 2.5
    });
}

// Impact burst particles — brief debris/flash/dust, crater itself is a persistent zone
function createImpactBurst(x, y, radius, theme) {
    const themes = {
        blast:    { debris: ['#5C3A28','#4A2818','#6B3020','#8B4513'], flash: '#FFCC88', dust: '#6B5040' },
        shrapnel: { debris: ['#909090','#B0B0B0','#787878','#A8A8A8'], flash: '#FFFFFF', dust: '#8A8A8A' },
        concuss:  { debris: ['#6B6040','#8B7B50','#5A4A30','#7A6B45'], flash: '#DDCCAA', dust: '#8B7D6B' },
        missile:  { debris: ['#5C4A38','#7A6050','#4A3828','#8B6B50'], flash: '#FFEECC', dust: '#8B7D6B' },
        nuke:     { debris: ['#4A3020','#3A2010','#5C3820','#6B4030'], flash: '#FFFFFF', dust: '#5C4030' },
        default:  { debris: ['#6B5B4F','#8B7355','#5C4A38','#7A6858'], flash: '#FFEECC', dust: '#8B7D6B' }
    };
    const t = themes[theme] || themes.default;

    // Debris chunks flying outward
    const count = theme === 'nuke' ? 35 : (theme === 'shrapnel' ? 28 : 18);
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = theme === 'nuke' ? 80 + Math.random() * 350 : 30 + Math.random() * 180;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - (theme === 'nuke' ? 50 : 20),
            life: 0.25 + Math.random() * 0.5,
            maxLife: 0.75,
            color: t.debris[Math.floor(Math.random() * t.debris.length)],
            size: 1.5 + Math.random() * (theme === 'nuke' ? 7 : 4)
        });
    }
    // Impact flash
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: theme === 'nuke' ? 0.3 : 0.18, maxLife: theme === 'nuke' ? 0.3 : 0.18,
        color: t.flash, size: radius * (theme === 'nuke' ? 1.1 : 0.5)
    });
    // Rising dust
    const dustCount = theme === 'nuke' ? 14 : 4;
    for (let i = 0; i < dustCount; i++) {
        game.particles.push({
            x: x + (Math.random() - 0.5) * radius * 0.5,
            y: y - Math.random() * 10,
            vx: (Math.random() - 0.5) * (theme === 'nuke' ? 35 : 15),
            vy: (theme === 'nuke' ? -50 : -20) - Math.random() * (theme === 'nuke' ? 80 : 35),
            life: 0.6 + Math.random() * (theme === 'nuke' ? 1.5 : 0.7),
            maxLife: theme === 'nuke' ? 2.5 : 1.3,
            color: t.dust,
            size: 5 + Math.random() * (theme === 'nuke' ? 14 : 8),
            smoke: true
        });
    }
}

function createSheepTransform(x, y) {
    // Magical pink/purple sparkles
    for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 30 + Math.random() * 80;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 40,
            life: 0.5 + Math.random() * 0.6,
            maxLife: 1.1,
            color: Math.random() < 0.5 ? '#F0D0FF' : '#FFE0F0',
            size: 2 + Math.random() * 3
        });
    }
    // Wool poof
    for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * 40,
            vy: Math.sin(angle) * 40 - 30,
            life: 0.4 + Math.random() * 0.4,
            maxLife: 0.8,
            color: '#FFFFFF',
            size: 3 + Math.random() * 5,
            wool: true
        });
    }
    // Star spark ring
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.3, maxLife: 0.3,
        color: '#F0D0FF', size: 25, ring: true
    });
}

// ==================== RENDERING ====================
function artNoise(r, c, salt = 0) {
    const n = Math.sin(r * 127.1 + c * 311.7 + salt * 74.7) * 43758.5453;
    return n - Math.floor(n);
}

function drawGrassField() {
    ctx.fillStyle = '#6daa45';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    const px = 4;
    for (let y = 0; y < CANVAS_H; y += px) {
        for (let x = 0; x < CANVAS_W; x += px) {
            const n = artNoise(x, y, 21);
            if (n < 0.18) {
                ctx.fillStyle = '#5b963e';
                ctx.fillRect(x, y, px, px);
            } else if (n > 0.86) {
                ctx.fillStyle = '#86bd4d';
                ctx.fillRect(x, y, px, px);
            }
        }
    }

    for (let i = 0; i < 520; i++) {
        const x = Math.floor(artNoise(i, 3, 31) * CANVAS_W / 4) * 4;
        const y = Math.floor(artNoise(i, 5, 32) * CANVAS_H / 4) * 4;
        const n = artNoise(i, 7, 33);
        ctx.fillStyle = n > 0.45 ? '#8fc354' : '#477f36';
        ctx.fillRect(x, y, 4, 4);
        if (n > 0.72) ctx.fillRect(x + 4, y, 4, 4);
        if (n < 0.22) ctx.fillRect(x, y - 4, 4, 4);
    }

    for (let i = 0; i < 120; i++) {
        const x = Math.floor(artNoise(i, 11, 34) * CANVAS_W / 4) * 4;
        const y = Math.floor(artNoise(i, 13, 35) * CANVAS_H / 4) * 4;
        ctx.fillStyle = artNoise(i, 17, 36) > 0.5 ? '#a6cb63' : '#3f7433';
        ctx.fillRect(x, y, 8, 4);
        ctx.fillRect(x + 4, y - 4, 4, 4);
    }
}

function strokeRoadPath(width, style) {
    ctx.save();
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = style;
    ctx.beginPath();
    ctx.moveTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
    for (let i = 1; i < WAYPOINTS.length - 1; i++) {
        const prev = WAYPOINTS[i - 1];
        const p = WAYPOINTS[i];
        const next = WAYPOINTS[i + 1];
        const inDx = p.x - prev.x;
        const inDy = p.y - prev.y;
        const outDx = next.x - p.x;
        const outDy = next.y - p.y;
        const inLen = Math.sqrt(inDx * inDx + inDy * inDy) || 1;
        const outLen = Math.sqrt(outDx * outDx + outDy * outDy) || 1;
        const cut = Math.min(42, inLen * 0.42, outLen * 0.42);
        const p1 = { x: p.x - (inDx / inLen) * cut, y: p.y - (inDy / inLen) * cut };
        const p2 = { x: p.x + (outDx / outLen) * cut, y: p.y + (outDy / outLen) * cut };
        ctx.lineTo(p1.x, p1.y);
        ctx.quadraticCurveTo(p.x, p.y, p2.x, p2.y);
    }
    const last = WAYPOINTS[WAYPOINTS.length - 1];
    ctx.lineTo(last.x, last.y);
    ctx.stroke();
    ctx.restore();
}

function strokeRoadTrack(offset, width, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1];
        const b = WAYPOINTS[i];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        ctx.beginPath();
        ctx.moveTo(a.x + nx * offset, a.y + ny * offset);
        ctx.lineTo(b.x + nx * offset, b.y + ny * offset);
        ctx.stroke();
    }
    ctx.restore();
}

function drawRoadTexture() {
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1];
        const b = WAYPOINTS[i];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        const steps = Math.max(2, Math.floor(len / 10));
        for (let s = 0; s < steps; s++) {
            const seed = i * 100 + s;
            const t = (s + artNoise(seed, 1, 1) * 0.8) / steps;
            const lateral = (artNoise(seed, 2, 2) - 0.5) * 48;
            const x = Math.floor((a.x + dx * t + nx * lateral) / 4) * 4;
            const y = Math.floor((a.y + dy * t + ny * lateral) / 4) * 4;
            const n = artNoise(seed, 4, 4);
            if (n < 0.30) {
                ctx.fillStyle = '#f6d985';
                ctx.fillRect(x, y, 4, 4);
            } else if (n < 0.70) {
                ctx.fillStyle = '#d6a85a';
                ctx.fillRect(x, y, 4, 4);
            } else {
                ctx.fillStyle = '#bc8545';
                ctx.fillRect(x, y, n > 0.88 ? 8 : 4, 4);
            }
            if (n > 0.92) {
                ctx.fillStyle = '#a56d39';
                ctx.fillRect(x + 4, y - 4, 4, 4);
            }
        }
    }
}

function drawRoadEdgePixels() {
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1];
        const b = WAYPOINTS[i];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        const steps = Math.max(3, Math.floor(len / 10));
        for (let side = -1; side <= 1; side += 2) {
            for (let s = 0; s < steps; s++) {
                const seed = i * 1000 + side * 101 + s;
                const t = (s + artNoise(seed, 1, 1) * 0.9) / steps;
                const edge = side * (39 + (artNoise(seed, 2, 2) - 0.5) * 14);
                const x = Math.floor((a.x + dx * t + nx * edge) / 4) * 4;
                const y = Math.floor((a.y + dy * t + ny * edge) / 4) * 4;
                const n = artNoise(seed, 3, 3);
                if (n < 0.38) {
                    ctx.fillStyle = '#e7c672';
                    ctx.fillRect(x, y, 8, 4);
                } else if (n < 0.76) {
                    ctx.fillStyle = '#b98545';
                    ctx.fillRect(x, y, 4, 4);
                } else {
                    ctx.fillStyle = '#8f6537';
                    ctx.fillRect(x, y, 4, 4);
                    ctx.fillStyle = '#f3d886';
                    ctx.fillRect(x + side * 4, y, 4, 4);
                }
            }
        }
    }
}

function drawDirtRoad() {
    strokeRoadPath(106, '#577d3d');
    strokeRoadPath(96, '#8a6a38');
    strokeRoadPath(88, '#a9783d');
    strokeRoadPath(80, '#d29a4d');
    strokeRoadPath(68, '#e9bd69');
    strokeRoadPath(52, '#f0cf7a');

    drawRoadEdgePixels();
    drawRoadTexture();
}

function drawPixelGroundDetails() {
    for (let i = 0; i < 95; i++) {
        const x = Math.floor(artNoise(i, 81, 41) * CANVAS_W / 4) * 4;
        const y = Math.floor(artNoise(i, 83, 42) * CANVAS_H / 4) * 4;
        const n = artNoise(i, 89, 43);
        if (n < 0.34) {
            ctx.fillStyle = '#76924a';
            ctx.fillRect(x, y, 8, 4);
            ctx.fillStyle = '#4a6f37';
            ctx.fillRect(x + 4, y + 4, 4, 4);
        } else if (n < 0.62) {
            ctx.fillStyle = '#b7c06b';
            ctx.fillRect(x, y, 4, 4);
            ctx.fillRect(x + 8, y, 4, 4);
            ctx.fillStyle = '#6a9344';
            ctx.fillRect(x + 4, y + 4, 4, 4);
        } else {
            ctx.fillStyle = '#477a39';
            ctx.fillRect(x, y, 12, 4);
            ctx.fillStyle = '#8fbd54';
            ctx.fillRect(x + 4, y - 4, 4, 4);
        }
    }
}

function drawPathDirectionMarkers() {
    ctx.save();
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1], b = WAYPOINTS[i];
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        if (mx < 0 || mx > CANVAS_W || my < 0 || my > CANVAS_H) continue;

        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        ctx.save();
        ctx.translate(mx, my);
        ctx.rotate(angle);
        ctx.fillStyle = 'rgba(255, 235, 180, 0.16)';
        ctx.strokeStyle = 'rgba(82, 54, 32, 0.20)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(9, 0);
        ctx.lineTo(-5, -7);
        ctx.lineTo(-2, 0);
        ctx.lineTo(-5, 7);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
    }
    ctx.restore();
}

function drawBattlefieldAtmosphere() {
    ctx.save();
    const sunlight = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
    sunlight.addColorStop(0, 'rgba(255, 232, 156, 0.08)');
    sunlight.addColorStop(0.46, 'rgba(255, 232, 156, 0.01)');
    sunlight.addColorStop(1, 'rgba(15, 21, 18, 0.16)');
    ctx.globalCompositeOperation = 'overlay';
    ctx.fillStyle = sunlight;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.restore();

    ctx.save();
    const vignette = ctx.createRadialGradient(CANVAS_W * 0.5, CANVAS_H * 0.45, 200, CANVAS_W * 0.5, CANVAS_H * 0.45, 560);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(0.74, 'rgba(0,0,0,0.04)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.restore();
}

function drawGrid() {
    drawGrassField();
    drawPixelGroundDetails();
    drawDirtRoad();
}

// Draw a single scenery item (tree, bush, rock)
function drawSceneryItem(cx, cy, type, size) {
    ctx.save();
    ctx.translate(cx, cy);
    const s = size;

    switch (type) {
        case 'pine': {
            // Trunk
            ctx.fillStyle = '#6B4226';
            ctx.fillRect(-2 * s, 0, 4 * s, 8 * s);
            // Three-tier pine triangle
            const tiers = [{y: -2, w: 10, h: 8}, {y: -6, w: 8, h: 7}, {y: -10, w: 5, h: 6}];
            for (const t of tiers) {
                ctx.fillStyle = '#3D6B2E';
                ctx.beginPath();
                ctx.moveTo(0, -t.y * s - t.h * s);
                ctx.lineTo(-t.w * s, -t.y * s);
                ctx.lineTo(t.w * s, -t.y * s);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#4A8038';
                ctx.beginPath();
                ctx.moveTo(0, -t.y * s - t.h * s + 3 * s);
                ctx.lineTo(-t.w * s + 2 * s, -t.y * s + 1 * s);
                ctx.lineTo(t.w * s - 2 * s, -t.y * s + 1 * s);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }
        case 'oak': {
            // Trunk
            ctx.fillStyle = '#8B5E3C';
            ctx.fillRect(-2.5 * s, 4 * s, 5 * s, 7 * s);
            // Canopy
            ctx.fillStyle = '#5B8C3E';
            ctx.beginPath();
            ctx.arc(0, -1 * s, 10 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6B9E4A';
            ctx.beginPath();
            ctx.arc(-3 * s, -3 * s, 6 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7AAF5C';
            ctx.beginPath();
            ctx.arc(2 * s, -5 * s, 5 * s, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'bush': {
            ctx.fillStyle = '#4A7C2E';
            ctx.beginPath();
            ctx.arc(0, 0, 6 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#5B9038';
            ctx.beginPath();
            ctx.arc(-2 * s, -1 * s, 4 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6BA044';
            ctx.beginPath();
            ctx.arc(2 * s, -2 * s, 3.5 * s, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'rock': {
            ctx.fillStyle = '#7A7A7A';
            ctx.beginPath();
            ctx.arc(0, 0, 5 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#8E8E8E';
            ctx.beginPath();
            ctx.arc(-1.5 * s, -2 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(-1 * s, -3 * s);
            ctx.lineTo(0.5 * s, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(1 * s, 1 * s);
            ctx.lineTo(3 * s, -1 * s);
            ctx.stroke();
            break;
        }
    }
    ctx.restore();
}

function drawTower(t) {
    const st = towerStats(t);

    ctx.ellipse(0, 5, 22, 8, 0, 0, Math.PI * 2);

    ctx.restore();
}

// ===== ARCHER TOWER — Kingdom Rush Marksmen Watchtower =====
function drawArcherTower(t, st, lv) {
    const b = 10 + lv * 2;  // base radius
    const h = 12 + lv * 4;  // roof height

    // Stone foundation ring
    ctx.fillStyle = '#8B7D6B';
    ctx.beginPath();
    ctx.arc(0, 6, b + 3, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#6B5D4B';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Timber platform (horizontal beams)
    ctx.fillStyle = '#C4A265';
    ctx.fillRect(-b - 2, 2, b * 2 + 4, 5);
    ctx.fillStyle = '#B89555';
    ctx.fillRect(-b, 2, b * 2, 3);

    // Main tower body — tapered wooden structure
    const bodyTop = -h + 10;
    const bw = b - 2;
    const tw = b - 5;
    ctx.fillStyle = '#A07840';
    ctx.beginPath();
    ctx.moveTo(-bw, 2);
    ctx.lineTo(bw, 2);
    ctx.lineTo(tw, bodyTop);
    ctx.lineTo(-tw, bodyTop);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7A5530';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Wood plank lines
    ctx.strokeStyle = '#8B6535';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 5; i++) {
        const y = 2 - i * (2 - bodyTop) / 5;
        ctx.beginPath();
        ctx.moveTo(-bw + 2 + i * 0.3, y);
        ctx.lineTo(bw - 2 - i * 0.3, y);
        ctx.stroke();
    }

    // Lookout window
    const winY = bodyTop + 8;
    ctx.fillStyle = '#3A2010';
    ctx.beginPath();
    ctx.roundRect(-4, winY, 8, 7, 2);
    ctx.fill();
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(-3, winY + 1, 6, 5);

    // Red tile roof — Kingdom Rush iconic
    ctx.fillStyle = '#8B2500';
    ctx.beginPath();
    ctx.moveTo(-b - 2, bodyTop + 2);
    ctx.lineTo(b + 2, bodyTop + 2);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#6B1C00';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Roof tile lines
    ctx.strokeStyle = '#A03000';
    ctx.lineWidth = 0.6;
    for (let i = 1; i <= lv + 1; i++) {
        const ry = bodyTop + 2 - i * (bodyTop + 2 + h) / (lv + 2);
        ctx.beginPath();
        const rw = b + 2 - (b + 2) * (i / (lv + 2)) * 0.5;
        ctx.moveTo(-rw, ry);
        ctx.lineTo(rw, ry);
        ctx.stroke();
    }

    // Roof finial / flag
    ctx.fillStyle = '#D4A030';
    ctx.fillRect(-1, -h, 2, -6);
    ctx.fillStyle = '#E74C3C';
    ctx.beginPath();
    ctx.moveTo(1, -h - 6);
    ctx.lineTo(10, -h - 8);
    ctx.lineTo(10, -h - 3);
    ctx.lineTo(1, -h - 2);
    ctx.closePath();
    ctx.fill();

    // Crossbow barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(3, -1, b + lv, 2.5);
    ctx.fillStyle = '#A07840';
    ctx.fillRect(b + lv - 3, -3, 8, 6);  // crossbow prod
    ctx.restore();
}

// ===== CRIT TOWER — Evolved archer: golden sniper with devastating crits =====
function drawCritTower(t, st, lv) {
    const b = 10 + lv * 2;
    const h = 14 + lv * 5;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 4) * 0.5;

    // Stone foundation ring — darker, reinforced
    ctx.fillStyle = '#5A4A3A';
    ctx.beginPath();
    ctx.arc(0, 6, b + 3, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#3A2A1A';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Golden-rimmed platform
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(-b - 2, 2, b * 2 + 4, 5);
    ctx.fillStyle = '#DAA520';
    ctx.fillRect(-b, 3, b * 2, 3);

    // Main tower body — taller, dark oak
    const bodyTop = -h + 12;
    const bw = b - 1;
    const tw = b - 4;
    const bodyGrad = ctx.createLinearGradient(-bw, 0, bw, 0);
    bodyGrad.addColorStop(0, '#5C3A1E');
    bodyGrad.addColorStop(0.3, '#8B5E3C');
    bodyGrad.addColorStop(0.7, '#7A4E2C');
    bodyGrad.addColorStop(1, '#4A2A10');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-bw, 2);
    ctx.lineTo(bw, 2);
    ctx.lineTo(tw, bodyTop);
    ctx.lineTo(-tw, bodyTop);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3A1A08';
    ctx.lineWidth = 1.3;
    ctx.stroke();

    // Gold trim bands
    for (let i = 0; i < 3; i++) {
        const by = bodyTop + 5 + i * 6;
        ctx.fillStyle = '#DAA520';
        ctx.fillRect(-tw - 1, by, tw * 2 + 2, 1.5);
    }

    // Lookout window — glowing
    const winY = bodyTop + 8;
    ctx.fillStyle = '#1A0A00';
    ctx.beginPath();
    ctx.roundRect(-4, winY, 8, 9, 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,200,50,${0.3 + pulse * 0.3})`;
    ctx.fillRect(-3, winY + 1, 6, 7);

    // Purple-gold roof
    const roofGrad = ctx.createLinearGradient(0, bodyTop, 0, -h);
    roofGrad.addColorStop(0, '#6B1C5A');
    roofGrad.addColorStop(0.5, '#9B2D8A');
    roofGrad.addColorStop(1, '#4A1040');
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.moveTo(-b - 2, bodyTop + 2);
    ctx.lineTo(b + 2, bodyTop + 2);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#DAA520';
    ctx.lineWidth = 1.8;
    ctx.stroke();

    // Roof tile lines
    ctx.strokeStyle = '#7B1D6A';
    ctx.lineWidth = 0.5;

// ===== ARTILLERY TOWER — Kingdom Rush Dwarven Bombard =====
function drawArtilleryTower(t, st, lv) {
    const r = 13 + lv * 1.5;

    // Stone foundation platform
    const platGrad = ctx.createLinearGradient(0, -r, 0, r);
    platGrad.addColorStop(0, '#9E9080');
    platGrad.addColorStop(0.5, '#7A6E60');
    platGrad.addColorStop(1, '#5C5040');
    ctx.fillStyle = platGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4A3E30';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Stone brick pattern
    ctx.strokeStyle = '#6B5D4B';
    ctx.lineWidth = 0.7;
    for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(-r + 3, i * r * 0.35);
        ctx.lineTo(r - 3, i * r * 0.35);
        ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(0, -r + 2);
    ctx.lineTo(0, r - 2);
    ctx.stroke();

    // Inner iron platform
    const ir = r * 0.5 + lv;
    ctx.fillStyle = '#5C5C5C';
    ctx.beginPath();
    ctx.arc(0, 0, ir, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3A3A3A';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Rivets on platform
    ctx.fillStyle = '#888';
    for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * (ir - 2), Math.sin(a) * (ir - 2), 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wheels / gears on sides
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(-r + 2, 2, 4 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(r - 2, 2, 4 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Cannon barrel — big iron
    ctx.save();
    ctx.rotate(t.angle);
    const bw = 5 + lv;
    const bl = r * 0.6 + lv * 2;
    // Barrel gradient
    const barrelGrad = ctx.createLinearGradient(0, -bw, 0, bw);
    barrelGrad.addColorStop(0, '#666');
    barrelGrad.addColorStop(0.4, '#999');
    barrelGrad.addColorStop(0.6, '#777');
    barrelGrad.addColorStop(1, '#444');
    ctx.fillStyle = barrelGrad;
    ctx.fillRect(ir - 2, -bw / 2, bl, bw);
    // Barrel ring
    ctx.fillStyle = '#B8860B';
    ctx.fillRect(ir + bl * 0.5, -bw / 2 - 2, bw * 0.8, bw + 4);
    // Muzzle flare
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(ir + bl - 2, -bw / 2 - 3);
    ctx.lineTo(ir + bl + 4, -bw / 2);
    ctx.lineTo(ir + bl + 4, bw / 2);
    ctx.lineTo(ir + bl - 2, bw / 2 + 3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Smoke stack at back (for Lv2+)
    if (lv >= 2) {
        ctx.fillStyle = '#555';
        ctx.fillRect(-ir + 4, -r + 1, 5, -4 - lv * 2);
        ctx.fillStyle = '#777';
        ctx.fillRect(-ir + 3, -r + 1, 7, 2);
    }
}
