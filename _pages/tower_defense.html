<script>
"use strict";

// ==================== CONSTANTS ====================
const COLS = 20, ROWS = 15, CELL = 40;
const CANVAS_W = 800, CANVAS_H = 600;
const TERRAIN = { PATH: 0, GRASS: 1, BLOCKED: 2 };

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// ==================== TOWER STATS TABLE ====================
const TOWER_DEFS = {
    archer: {
        name: '箭塔', icon: '🏹',
        cost: 100, upgradeCost: [80, 160],
        damage: [15, 30, 50], range: [130, 145, 160], cooldown: [500, 420, 350],
        color: '#7B8D3C', bulletColor: '#D4C898', bulletSpeed: 450,
        splash: 0, slowFactor: 0, slowDuration: 0, chainCount: 0
    },
    artillery: {
        name: '炮塔', icon: '💣',
        cost: 150, upgradeCost: [120, 240],
        damage: [40, 75, 120], range: [110, 120, 135], cooldown: [2000, 1800, 1600],
        color: '#8B4513', bulletColor: '#333', bulletSpeed: 250,
        splash: [55, 65, 75], slowFactor: 0, slowDuration: 0, chainCount: 0, splashDmgPct: 0.5
    },
    mage: {
        name: '法师塔', icon: '🔮',
        cost: 120, upgradeCost: [100, 200],
        damage: [8, 15, 25], range: [110, 120, 135], cooldown: [1000, 900, 750],
        color: '#6C5CE7', bulletColor: '#B8B0F0', bulletSpeed: 350,
        splash: 0, slowFactor: [0.5, 0.6, 0.7], slowDuration: [2000, 2500, 3000], chainCount: 0
    },
    tesla: {
        name: '雷塔', icon: '⚡',
        cost: 200, upgradeCost: [150, 300],
        damage: [25, 45, 70], range: [120, 130, 145], cooldown: [1200, 1050, 900],
        color: '#B8860B', bulletColor: '#FFE44D', bulletSpeed: 9999,
        splash: 0, slowFactor: 0, slowDuration: 0, chainCount: [3, 4, 5], chainRange: [80, 90, 100], chainFalloff: 0.3
    }
};

const ENEMY_DEFS = {
    normal: { name: '普通兵', speed: 60, size: 8, color: '#e74c3c', reward: 10, hpBase: 60, hpScale: 8 },
    fast:   { name: '快速兵', speed: 110, size: 6, color: '#f39c12', reward: 8, hpBase: 30, hpScale: 5 },
    tank:   { name: '重装兵', speed: 35, size: 12, color: '#8e44ad', reward: 25, hpBase: 200, hpScale: 30 },
    boss:   { name: 'BOSS',  speed: 40, size: 18, color: '#c0392b', reward: 100, hpBase: 600, hpScale: 150 }
};

// ==================== PATH WAYPOINTS (pixel centers) ====================
const WAYPOINTS = [
    { x: -20, y: 100 },   // off-screen left
    { x: 180, y: 100 },   // (col 4, row 2)
    { x: 180, y: 460 },   // (col 4, row 11)
    { x: 340, y: 460 },   // (col 8, row 11)
    { x: 340, y: 180 },   // (col 8, row 4)
    { x: 540, y: 180 },   // (col 13, row 4)
    { x: 540, y: 460 },   // (col 13, row 11)
    { x: 700, y: 460 },   // (col 17, row 11)
    { x: 700, y: 300 },   // (col 17, row 7)
    { x: 820, y: 300 }    // off-screen right
];

// ==================== GAME STATE ====================
const game = {
    gold: 200,
    lives: 20,
    score: 0,
    waveNum: 0,
    totalWaves: 20,
    state: 'idle',          // idle | wave_active | wave_complete | game_over | victory
    speedMult: 1,
    countdown: 0,
    towers: [],
    enemies: [],
    projectiles: [],
    particles: [],
    selectedType: null,
    selectedTower: null,
    hoverCol: -1,
    hoverRow: -1,
    nextTowerId: 1,
    nextEnemyId: 1,
    spawnQueue: [],
    spawnTimer: 0,
    spawnInterval: 800,
    waveSpawningDone: false
};

// ==================== GRID & SCENERY ====================
const grid = [];
for (let r = 0; r < ROWS; r++) {
    grid[r] = new Array(COLS).fill(TERRAIN.GRASS);
}

// Scenery items: { col, row, type, size }
let scenery = [];

// Seeded random for deterministic scenery
function seededRand(seed) {
    let s = seed;
    return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
    };
}

function initGrid() {
    // Mark path cells along waypoint segments (path is 2 cells wide)
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1];
        const b = WAYPOINTS[i];
        const ax = Math.round(a.x / CELL - 0.5);
        const ay = Math.round(a.y / CELL - 0.5);
        const bx = Math.round(b.x / CELL - 0.5);
        const by = Math.round(b.y / CELL - 0.5);

        if (ay === by) {
            const row = ay;
            const x0 = Math.max(0, Math.min(ax, bx));
            const x1 = Math.min(COLS - 1, Math.max(ax, bx));
            for (let c = x0; c <= x1; c++) {
                if (c >= 0 && c < COLS && row >= 0 && row < ROWS) grid[row][c] = TERRAIN.PATH;
                if (row + 1 < ROWS && c >= 0 && c < COLS) grid[row + 1][c] = TERRAIN.PATH;
            }
        } else if (ax === bx) {
            const col = ax;
            const y0 = Math.max(0, Math.min(ay, by));
            const y1 = Math.min(ROWS - 1, Math.max(ay, by));
            for (let r = y0; r <= y1; r++) {
                if (r >= 0 && r < ROWS && col >= 0 && col < COLS) grid[r][col] = TERRAIN.PATH;
                if (col + 1 < COLS && r >= 0 && r < ROWS) grid[r][col + 1] = TERRAIN.PATH;
            }
        }
    }

    // Mark path-adjacent cells as BLOCKED (buffer 1 cell around path, unless already buildable)
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.PATH) {
                for (let dr = -2; dr <= 2; dr++) {
                    for (let dc = -2; dc <= 2; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === TERRAIN.GRASS) {
                            if (Math.abs(dr) + Math.abs(dc) <= 2) {
                                grid[nr][nc] = TERRAIN.BLOCKED;
                            }
                        }
                    }
                }
            }
        }
    }

    // Reclaim buildable spots: cells adjacent to blocked but not directly next to path
    // Keep the outer ring of blocked cells, mark inner grass as buildable
    const buildableSeeds = [];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.BLOCKED) {
                let nearPath = false;
                for (let dr = -1; dr <= 1 && !nearPath; dr++) {
                    for (let dc = -1; dc <= 1 && !nearPath; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === TERRAIN.PATH) {
                            nearPath = true;
                        }
                    }
                }
                if (!nearPath && (c > 1 && c < COLS - 2 && r > 1 && r < ROWS - 2)) {
                    buildableSeeds.push([c, r]);
                }
            }
        }
    }
    for (const [c, r] of buildableSeeds) {
        grid[r][c] = TERRAIN.GRASS;
    }

    // Generate scenery
    initScenery();
}

function initScenery() {
    scenery = [];
    const rand = seededRand(42);
    const treeTypes = ['pine', 'oak', 'bush'];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.BLOCKED && rand() < 0.65) {
                const type = treeTypes[Math.floor(rand() * treeTypes.length)];
                const size = 0.7 + rand() * 0.6;
                const ox = (rand() - 0.5) * CELL * 0.5;
                const oy = (rand() - 0.5) * CELL * 0.5;
                scenery.push({ col: c, row: r, type, size, ox, oy });
            }
        }
    }
    // Also add rocks along path edges
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.BLOCKED) {
                let nextToPath = false;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === TERRAIN.PATH) {
                            nextToPath = true;
                        }
                    }
                }
                if (nextToPath && rand() < 0.5) {
                    const ox2 = (rand() - 0.5) * CELL * 0.3;
                    const oy2 = (rand() - 0.5) * CELL * 0.3;
                    scenery.push({ col: c, row: r, type: 'rock', size: 0.5 + rand() * 0.4, ox: ox2, oy: oy2 });
                }
            }
        }
    }
}

// ==================== WAVE DEFINITIONS ====================
function hpMultiplier(wave) {
    return 1 + (wave - 1) * 0.25 + Math.floor((wave - 1) / 5) * 0.5;
}

function enemyHP(type, wave) {
    const def = ENEMY_DEFS[type];
    const mult = hpMultiplier(wave);
    return Math.floor((def.hpBase + wave * def.hpScale) * mult);
}

function generateWave(waveNum) {
    const queue = [];
    const push = (type, count) => {
        for (let i = 0; i < count; i++) queue.push(type);
    };

    const waves = [
        () => { push('normal', 8); },
        () => { push('normal', 10); push('fast', 3); },
        () => { push('normal', 14); push('fast', 5); },
        () => { push('normal', 16); push('fast', 6); push('tank', 1); },
        () => { push('normal', 10); push('fast', 4); push('tank', 1); push('boss', 1); },
        () => { push('normal', 18); push('fast', 7); push('tank', 2); },
        () => { push('normal', 20); push('fast', 9); push('tank', 2); },
        () => { push('normal', 22); push('fast', 10); push('tank', 3); },
        () => { push('normal', 25); push('fast', 12); push('tank', 3); },
        () => { push('normal', 15); push('fast', 6); push('tank', 2); push('boss', 1); },
        () => { push('normal', 28); push('fast', 14); push('tank', 4); },
        () => { push('normal', 30); push('fast', 15); push('tank', 5); },
        () => { push('normal', 32); push('fast', 16); push('tank', 5); },
        () => { push('normal', 34); push('fast', 18); push('tank', 6); },
        () => { push('normal', 20); push('fast', 10); push('tank', 3); push('boss', 1); },
        () => { push('normal', 36); push('fast', 20); push('tank', 7); },
        () => { push('normal', 38); push('fast', 22); push('tank', 8); },
        () => { push('normal', 40); push('fast', 24); push('tank', 9); },
        () => { push('normal', 42); push('fast', 26); push('tank', 10); },
        () => { push('normal', 25); push('fast', 12); push('tank', 5); push('boss', 1); },
    ];

    if (waveNum <= waves.length) {
        waves[waveNum - 1]();
    } else {
        // Beyond wave 20: keep scaling
        const n = waveNum;
        push('normal', 25 + n); push('fast', 12 + Math.floor(n/2)); push('tank', 5 + Math.floor(n/3));
        if (n % 5 === 0) push('boss', 1);
    }

    // Shuffle the queue
    for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
    }
    return queue;
}

function spawnInterval(waveNum) {
    if (waveNum <= 5) return 800;
    if (waveNum <= 10) return 650;
    if (waveNum <= 15) return 500;
    return 400;
}

// ==================== HELPER FUNCTIONS ====================
function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
}

function angleTo(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
}

function cellCenter(col, row) {
    return { x: col * CELL + CELL / 2, y: row * CELL + CELL / 2 };
}

function canvasToGrid(cx, cy) {
    return { col: Math.floor(cx / CELL), row: Math.floor(cy / CELL) };
}

function isBuildable(col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
    if (grid[row][col] !== TERRAIN.GRASS) return false;
    return !game.towers.some(t => t.col === col && t.row === row);
}

// ==================== TOWER LOGIC ====================
function createTower(type, col, row) {
    const def = TOWER_DEFS[type];
    const pos = cellCenter(col, row);
    return {
        id: game.nextTowerId++,
        type, col, row,
        x: pos.x, y: pos.y,
        level: 1,
        cooldown: 0,
        angle: 0,
        totalInvested: def.cost,
        target: null
    };
}

function towerStats(t) {
    const def = TOWER_DEFS[t.type];
    const lv = t.level - 1;
    return {
        damage: def.damage[lv],
        range: def.range[lv],
        cooldown: def.cooldown[lv],
        splashRadius: Array.isArray(def.splash) ? def.splash[lv] : def.splash,
        slowFactor: Array.isArray(def.slowFactor) ? def.slowFactor[lv] : def.slowFactor,
        slowDuration: Array.isArray(def.slowDuration) ? def.slowDuration[lv] : def.slowDuration,
        chainCount: Array.isArray(def.chainCount) ? def.chainCount[lv] : def.chainCount,
        chainRange: Array.isArray(def.chainRange) ? def.chainRange[lv] : (def.chainRange || 0),
        chainFalloff: def.chainFalloff || 0,
        splashDmgPct: def.splashDmgPct || 0,
        color: def.color,
        bulletColor: def.bulletColor,
        bulletSpeed: def.bulletSpeed,
        name: def.name,
        icon: def.icon,
        upgradeCost: t.level < 3 ? def.upgradeCost[t.level - 1] : null
    };
}

function placeTower(type, col, row) {
    const def = TOWER_DEFS[type];
    if (game.gold < def.cost) return false;
    if (!isBuildable(col, row)) return false;
    game.gold -= def.cost;
    const t = createTower(type, col, row);
    game.towers.push(t);
    updateHUD();
    updateTowerButtons();
    return true;
}

function upgradeTower(t) {
    if (t.level >= 3) return;
    const st = towerStats(t);
    if (!st.upgradeCost) return;
    if (game.gold < st.upgradeCost) return;
    game.gold -= st.upgradeCost;
    t.totalInvested += st.upgradeCost;
    t.level++;
    t.cooldown = 0;
    updateHUD();
    showTowerInfo(t);
}

function sellTower(t) {
    const refund = Math.floor(t.totalInvested * 0.6);
    game.gold += refund;
    game.towers = game.towers.filter(tw => tw !== t);
    if (game.selectedTower === t) {
        game.selectedTower = null;
        hideTowerInfo();
    }
    updateHUD();
    updateTowerButtons();
}

function towerAcquireTarget(t) {
    const st = towerStats(t);
    let best = null;
    let bestProgress = -1;
    for (const e of game.enemies) {
        if (!e.alive) continue;
        const d = dist(t, e);
        if (d > st.range) continue;
        if (e.waypointIndex > bestProgress || (e.waypointIndex === bestProgress && e.hp < (best ? best.hp : Infinity))) {
            best = e;
            bestProgress = e.waypointIndex;
        }
    }
    return best;
}

function updateTowers(dt) {
    for (const t of game.towers) {
        t.cooldown -= dt * 1000;
        if (t.cooldown > 0) continue;
        const target = towerAcquireTarget(t);
        if (target) {
            const st = towerStats(t);
            t.angle = angleTo(t, target);
            createProjectile(t, target);
            t.cooldown = st.cooldown;
        }
    }
}

// ==================== ENEMY LOGIC ====================
function createEnemy(type, waveNum) {
    const pos = { x: WAYPOINTS[0].x, y: WAYPOINTS[0].y };
    const def = ENEMY_DEFS[type];
    const hp = enemyHP(type, waveNum);
    return {
        id: game.nextEnemyId++,
        type,
        x: pos.x, y: pos.y,
        hp, maxHp: hp,
        speed: def.speed,
        currentSpeed: def.speed,
        waypointIndex: 1,
        reward: def.reward + waveNum + (type === 'boss' ? waveNum * 10 : 0) + (type === 'tank' ? waveNum * 2 : 0),
        alive: true,
        size: def.size,
        color: def.color,
        slowTimer: 0,
        slowFactor: 1
    };
}

function updateEnemies(dt) {
    const dtMs = dt * 1000;
    for (const e of game.enemies) {
        if (!e.alive) continue;

        // Update slow
        if (e.slowTimer > 0) {
            e.slowTimer -= dtMs;
            if (e.slowTimer <= 0) {
                e.slowFactor = 1;
                e.currentSpeed = e.speed;
            }
        }

        // Move along waypoints
        if (e.waypointIndex >= WAYPOINTS.length) continue;
        const wp = WAYPOINTS[e.waypointIndex];
        const dx = wp.x - e.x;
        const dy = wp.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const moveSpeed = e.currentSpeed * dt;

        if (d <= moveSpeed + 1) {
            e.x = wp.x;
            e.y = wp.y;
            e.waypointIndex++;
            if (e.waypointIndex >= WAYPOINTS.length) {
                enemyReachedExit(e);
            }
        } else {
            e.x += (dx / d) * moveSpeed;
            e.y += (dy / d) * moveSpeed;
        }
    }
    // Remove dead/escaped
    game.enemies = game.enemies.filter(e => e.alive);
}

function enemyReachedExit(e) {
    e.alive = false;
    const def = ENEMY_DEFS[e.type];
    const livesLost = e.type === 'boss' ? 5 : e.type === 'tank' ? 3 : 1;
    game.lives -= livesLost;
    updateHUD();
    if (game.lives <= 0) {
        game.lives = 0;
        endGame('gameover');
    }
}

function applySlow(enemy, factor, duration) {
    enemy.slowFactor = Math.min(enemy.slowFactor, factor);
    enemy.currentSpeed = enemy.speed * enemy.slowFactor;
    enemy.slowTimer = Math.max(enemy.slowTimer, duration);
}

// ==================== PROJECTILE LOGIC ====================
function createProjectile(tower, target) {
    const st = towerStats(tower);
    const p = {
        x: tower.x,
        y: tower.y,
        target: target,
        damage: st.damage,
        speed: st.bulletSpeed,
        type: tower.type,
        color: st.bulletColor,
        splashRadius: st.splashRadius,
        splashDmgPct: st.splashDmgPct,
        slowFactor: st.slowFactor,
        slowDuration: st.slowDuration,
        chainCount: st.chainCount,
        chainRange: st.chainRange,
        chainFalloff: st.chainFalloff,
        alive: true,
        towerX: tower.x,
        towerY: tower.y
    };
    game.projectiles.push(p);
}

function updateProjectiles(dt) {
    const dtMs = dt * 1000;
    for (const p of game.projectiles) {
        if (!p.alive) continue;
        if (!p.target || !p.target.alive) {
            p.alive = false;
            continue;
        }

        const dx = p.target.x - p.x;
        const dy = p.target.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);

        // Lightning is instant
        if (p.type === 'tesla' && p.speed > 9000) {
            handleImpact(p);
            p.alive = false;
            continue;
        }

        const moveSpeed = p.speed * dt;
        if (d <= moveSpeed + 2) {
            handleImpact(p);
            p.alive = false;
        } else {
            p.x += (dx / d) * moveSpeed;
            p.y += (dy / d) * moveSpeed;
        }
    }
    game.projectiles = game.projectiles.filter(p => p.alive);
}

function handleImpact(p) {
    if (!p.target || !p.target.alive) return;

    if (p.splashRadius > 0) {
        // Splash damage (cannon)
        for (const e of game.enemies) {
            if (!e.alive) continue;
            const d = dist(p.target, e);
            if (d <= p.splashRadius) {
                const dmg = e === p.target ? p.damage : Math.floor(p.damage * p.splashDmgPct);
                dealDamage(e, dmg);
            }
        }
        createSplashRing(p.target.x, p.target.y, p.splashRadius, '#e74c3c');
    } else if (p.slowFactor > 0) {
        // Ice slow
        dealDamage(p.target, p.damage);
        applySlow(p.target, p.slowFactor, p.slowDuration);
        createHitSpark(p.target.x, p.target.y, '#aed6f1');
    } else if (p.chainCount > 0) {
        // Chain lightning
        dealDamage(p.target, p.damage);
        createLightningArc(p.towerX, p.towerY, p.target.x, p.target.y);
        chainLightning(p.target, p.damage, p.chainCount - 1, p.chainRange, p.chainFalloff, new Set([p.target.id]));
    } else {
        // Arrow - single target
        dealDamage(p.target, p.damage);
        createHitSpark(p.target.x, p.target.y, '#f1c40f');
    }
}

function chainLightning(sourceEnemy, baseDmg, remainingChains, chainRange, falloff, visited) {
    if (remainingChains <= 0) return;
    let nearest = null;
    let nearestDist = Infinity;
    for (const e of game.enemies) {
        if (!e.alive || visited.has(e.id)) continue;
        const d = dist(sourceEnemy, e);
        if (d <= chainRange && d < nearestDist) {
            nearest = e;
            nearestDist = d;
        }
    }
    if (nearest) {
        const dmg = Math.floor(baseDmg * (1 - falloff));
        dealDamage(nearest, dmg);
        visited.add(nearest.id);
        createLightningArc(sourceEnemy.x, sourceEnemy.y, nearest.x, nearest.y);
        chainLightning(nearest, dmg, remainingChains - 1, chainRange, falloff, visited);
    }
}

function dealDamage(enemy, dmg) {
    enemy.hp -= dmg;
    if (enemy.hp <= 0) {
        enemy.hp = 0;
        enemy.alive = false;
        game.gold += enemy.reward;
        game.score += enemy.reward * 10;
        createDeathExplosion(enemy.x, enemy.y, enemy.size, enemy.color);
        updateHUD();
        updateTowerButtons();
    }
}

// ==================== WAVE MANAGEMENT ====================
function startNextWave() {
    if (game.state === 'wave_active') return;
    if (game.waveNum >= game.totalWaves && game.state !== 'victory') return;
    game.waveNum++;
    game.state = 'wave_active';
    game.spawnQueue = generateWave(game.waveNum);
    game.spawnInterval = spawnInterval(game.waveNum);
    game.spawnTimer = 0;
    game.waveSpawningDone = false;
    game.countdown = 0;
    updateHUD();
    document.getElementById('start-wave-btn').disabled = true;
    document.getElementById('countdown-display').textContent = '';
}

function updateWaveSpawning(dt) {
    if (game.state !== 'wave_active' || game.waveSpawningDone) return;
    game.spawnTimer -= dt * 1000 * game.speedMult;
    while (game.spawnTimer <= 0 && game.spawnQueue.length > 0) {
        const type = game.spawnQueue.shift();
        const enemy = createEnemy(type, game.waveNum);
        game.enemies.push(enemy);
        game.spawnTimer += game.spawnInterval / game.speedMult;
    }
    if (game.spawnQueue.length === 0 && game.enemies.every(e => !e.alive)) {
        game.waveSpawningDone = true;
    }
}

function checkWaveComplete() {
    if (game.state !== 'wave_active') return;
    if (!game.waveSpawningDone) return;
    if (game.enemies.length > 0) return; // still some alive

    // Wave complete
    const bonus = 50 + game.waveNum * 10;
    game.gold += bonus;
    game.score += bonus;
    game.state = 'idle';
    document.getElementById('start-wave-btn').disabled = false;

    if (game.waveNum >= game.totalWaves) {
        endGame('victory');
    } else {
        document.getElementById('countdown-display').textContent = '✔ 波次完成';
    }
    updateHUD();
    updateTowerButtons();
}

// ==================== PARTICLE SYSTEM ====================
function createHitSpark(x, y, color) {
    for (let i = 0; i < 5; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 80;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.3,
            maxLife: 0.6,
            color,
            size: 2 + Math.random() * 3
        });
    }
}

function createSplashRing(x, y, radius, color) {
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.5, maxLife: 0.5,
        color, size: radius, ring: true
    });
}

function createLightningArc(x1, y1, x2, y2) {
    game.particles.push({
        x: x1, y: y1, x2, y2,
        life: 0.15, maxLife: 0.15,
        color: '#f1c40f', size: 2, lightning: true
    });
}

function createDeathExplosion(x, y, size, color) {
    for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 30 + Math.random() * 100;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.5,
            maxLife: 0.8,
            color,
            size: 1 + Math.random() * size * 0.6
        });
    }
}

function updateParticles(dt) {
    for (const p of game.particles) {
        p.life -= dt;
        if (!p.ring && !p.lightning) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }
    }
    game.particles = game.particles.filter(p => p.life > 0);
}

// ==================== RENDERING ====================
function drawGrid() {
    // === Layer 1: Base terrain with biome zones ===
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = c * CELL, y = r * CELL;
            const t = grid[r][c];

            if (t === TERRAIN.PATH) {
                // Dirt road - two-tone earth
                const shade = ((r + c) % 3) * 5;
                ctx.fillStyle = `rgb(${160 + shade},${130 + shade},${95 + shade})`;
                ctx.fillRect(x, y, CELL, CELL);
                // Cart tracks (subtle lines)
                ctx.fillStyle = `rgba(120,95,65,0.3)`;
                ctx.fillRect(x + 5, y, 2, CELL);
                ctx.fillRect(x + CELL - 8, y, 2, CELL);
            } else if (t === TERRAIN.GRASS) {
                // Buildable plateau - raised earth with stone border hint
                const shade = ((r * 13 + c * 7) % 16) - 8;
                ctx.fillStyle = `rgb(${62 + shade},${108 + shade},${42 + shade})`;
                ctx.fillRect(x, y, CELL, CELL);
                // Subtle plateau highlight
                ctx.fillStyle = `rgba(255,255,255,0.04)`;
                ctx.fillRect(x + 1, y + 1, CELL - 2, 2);
                // Stone edge accent
                ctx.strokeStyle = 'rgba(139,119,90,0.25)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
            } else {
                // Scenery ground - darker, varied greens and browns
                const biome = Math.floor((r / 5)) % 3;
                let base;
                if (biome === 0) {
                    base = { r: 48, g: 72, b: 30 }; // forest green
                } else if (biome === 1) {
                    base = { r: 55, g: 65, b: 35 }; // meadow
                } else {
                    base = { r: 50, g: 58, b: 40 }; // rocky area
                }
                const v = ((r * 17 + c * 11) % 14) - 7;
                ctx.fillStyle = `rgb(${base.r + v},${base.g + v},${base.b + v})`;
                ctx.fillRect(x, y, CELL, CELL);
                // Ground texture dots
                ctx.fillStyle = `rgba(0,0,0,0.06)`;
                const dotSeed = r * 100 + c;
                for (let d = 0; d < 3; d++) {
                    const dx = ((dotSeed * 7 + d * 13) % CELL);
                    const dy = ((dotSeed * 11 + d * 19) % CELL);
                    ctx.fillRect(x + dx, y + dy, 2, 2);
                }
            }
        }
    }

    // === Layer 2: Path edge softening (blend terrain) ===
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] !== TERRAIN.PATH) continue;
            const x = c * CELL, y = r * CELL;
            // Check neighbors — if adjacent to BLOCKED, draw grassy edge
            const neighbors = [
                [r-1,c],[r+1,c],[r,c-1],[r,c+1]
            ];
            for (const [nr, nc] of neighbors) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === TERRAIN.BLOCKED) {
                    ctx.fillStyle = 'rgba(90,130,50,0.35)';
                    if (nr < r) ctx.fillRect(x, y, CELL, 4);
                    if (nr > r) ctx.fillRect(x, y + CELL - 4, CELL, 4);
                    if (nc < c) ctx.fillRect(x, y, 4, CELL);
                    if (nc > c) ctx.fillRect(x + CELL - 4, y, 4, CELL);
                }
            }
        }
    }

    // === Layer 3: Scenery (trees, bushes, rocks) ===
    for (const s of scenery) {
        const cx = s.col * CELL + CELL / 2 + s.ox;
        const cy = s.row * CELL + CELL / 2 + s.oy;
        drawSceneryItem(cx, cy, s.type, s.size);
    }

    // === Layer 4: Subtle grid lines (only over grass cells) ===
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(COLS * CELL, r * CELL);
        ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, ROWS * CELL);
        ctx.stroke();
    }
}

// Draw a single scenery item (tree, bush, rock)
function drawSceneryItem(cx, cy, type, size) {
    ctx.save();
    ctx.translate(cx, cy);
    const s = size;

    switch (type) {
        case 'pine': {
            // Trunk
            ctx.fillStyle = '#6B4226';
            ctx.fillRect(-2 * s, 0, 4 * s, 8 * s);
            // Three-tier pine triangle
            const tiers = [{y: -2, w: 10, h: 8}, {y: -6, w: 8, h: 7}, {y: -10, w: 5, h: 6}];
            for (const t of tiers) {
                ctx.fillStyle = '#3D6B2E';
                ctx.beginPath();
                ctx.moveTo(0, -t.y * s - t.h * s);
                ctx.lineTo(-t.w * s, -t.y * s);
                ctx.lineTo(t.w * s, -t.y * s);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#4A8038';
                ctx.beginPath();
                ctx.moveTo(0, -t.y * s - t.h * s + 3 * s);
                ctx.lineTo(-t.w * s + 2 * s, -t.y * s + 1 * s);
                ctx.lineTo(t.w * s - 2 * s, -t.y * s + 1 * s);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }
        case 'oak': {
            // Trunk
            ctx.fillStyle = '#8B5E3C';
            ctx.fillRect(-2.5 * s, 4 * s, 5 * s, 7 * s);
            // Canopy
            ctx.fillStyle = '#5B8C3E';
            ctx.beginPath();
            ctx.arc(0, -1 * s, 10 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6B9E4A';
            ctx.beginPath();
            ctx.arc(-3 * s, -3 * s, 6 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7AAF5C';
            ctx.beginPath();
            ctx.arc(2 * s, -5 * s, 5 * s, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'bush': {
            ctx.fillStyle = '#4A7C2E';
            ctx.beginPath();
            ctx.arc(0, 0, 6 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#5B9038';
            ctx.beginPath();
            ctx.arc(-2 * s, -1 * s, 4 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6BA044';
            ctx.beginPath();
            ctx.arc(2 * s, -2 * s, 3.5 * s, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'rock': {
            ctx.fillStyle = '#7A7A7A';
            ctx.beginPath();
            ctx.arc(0, 0, 5 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#8E8E8E';
            ctx.beginPath();
            ctx.arc(-1.5 * s, -2 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(-1 * s, -3 * s);
            ctx.lineTo(0.5 * s, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(1 * s, 1 * s);
            ctx.lineTo(3 * s, -1 * s);
            ctx.stroke();
            break;
        }
    }
    ctx.restore();
}

function drawTower(t) {
    const st = towerStats(t);
    const lv = t.level;
    ctx.save();
    ctx.translate(t.x, t.y);

    // Shadow under tower
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 3, 15, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    switch (t.type) {
        case 'archer': drawArcherTower(t, st, lv); break;
        case 'artillery': drawArtilleryTower(t, st, lv); break;
        case 'mage': drawMageTower(t, st, lv); break;
        case 'tesla': drawTeslaTower(t, st, lv); break;
    }

    ctx.restore();
}

// ===== ARCHER TOWER — Kingdom Rush Marksmen Watchtower =====
function drawArcherTower(t, st, lv) {
    const b = 10 + lv * 2;  // base radius
    const h = 12 + lv * 4;  // roof height

    // Stone foundation ring
    ctx.fillStyle = '#8B7D6B';
    ctx.beginPath();
    ctx.arc(0, 6, b + 3, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#6B5D4B';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Timber platform (horizontal beams)
    ctx.fillStyle = '#C4A265';
    ctx.fillRect(-b - 2, 2, b * 2 + 4, 5);
    ctx.fillStyle = '#B89555';
    ctx.fillRect(-b, 2, b * 2, 3);

    // Main tower body — tapered wooden structure
    const bodyTop = -h + 10;
    const bw = b - 2;
    const tw = b - 5;
    ctx.fillStyle = '#A07840';
    ctx.beginPath();
    ctx.moveTo(-bw, 2);
    ctx.lineTo(bw, 2);
    ctx.lineTo(tw, bodyTop);
    ctx.lineTo(-tw, bodyTop);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7A5530';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Wood plank lines
    ctx.strokeStyle = '#8B6535';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 5; i++) {
        const y = 2 - i * (2 - bodyTop) / 5;
        ctx.beginPath();
        ctx.moveTo(-bw + 2 + i * 0.3, y);
        ctx.lineTo(bw - 2 - i * 0.3, y);
        ctx.stroke();
    }

    // Lookout window
    const winY = bodyTop + 8;
    ctx.fillStyle = '#3A2010';
    ctx.beginPath();
    ctx.roundRect(-4, winY, 8, 7, 2);
    ctx.fill();
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(-3, winY + 1, 6, 5);

    // Red tile roof — Kingdom Rush iconic
    ctx.fillStyle = '#8B2500';
    ctx.beginPath();
    ctx.moveTo(-b - 2, bodyTop + 2);
    ctx.lineTo(b + 2, bodyTop + 2);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#6B1C00';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Roof tile lines
    ctx.strokeStyle = '#A03000';
    ctx.lineWidth = 0.6;
    for (let i = 1; i <= lv + 1; i++) {
        const ry = bodyTop + 2 - i * (bodyTop + 2 + h) / (lv + 2);
        ctx.beginPath();
        const rw = b + 2 - (b + 2) * (i / (lv + 2)) * 0.5;
        ctx.moveTo(-rw, ry);
        ctx.lineTo(rw, ry);
        ctx.stroke();
    }

    // Roof finial / flag
    ctx.fillStyle = '#D4A030';
    ctx.fillRect(-1, -h, 2, -6);
    ctx.fillStyle = '#E74C3C';
    ctx.beginPath();
    ctx.moveTo(1, -h - 6);
    ctx.lineTo(10, -h - 8);
    ctx.lineTo(10, -h - 3);
    ctx.lineTo(1, -h - 2);
    ctx.closePath();
    ctx.fill();

    // Crossbow barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(3, -1, b + lv, 2.5);
    ctx.fillStyle = '#A07840';
    ctx.fillRect(b + lv - 3, -3, 8, 6);  // crossbow prod
    ctx.restore();
}

// ===== ARTILLERY TOWER — Kingdom Rush Dwarven Bombard =====
function drawArtilleryTower(t, st, lv) {
    const r = 13 + lv * 1.5;

    // Stone foundation platform
    const platGrad = ctx.createLinearGradient(0, -r, 0, r);
    platGrad.addColorStop(0, '#9E9080');
    platGrad.addColorStop(0.5, '#7A6E60');
    platGrad.addColorStop(1, '#5C5040');
    ctx.fillStyle = platGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4A3E30';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Stone brick pattern
    ctx.strokeStyle = '#6B5D4B';
    ctx.lineWidth = 0.7;
    for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(-r + 3, i * r * 0.35);
        ctx.lineTo(r - 3, i * r * 0.35);
        ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(0, -r + 2);
    ctx.lineTo(0, r - 2);
    ctx.stroke();

    // Inner iron platform
    const ir = r * 0.5 + lv;
    ctx.fillStyle = '#5C5C5C';
    ctx.beginPath();
    ctx.arc(0, 0, ir, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3A3A3A';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Rivets on platform
    ctx.fillStyle = '#888';
    for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * (ir - 2), Math.sin(a) * (ir - 2), 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wheels / gears on sides
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(-r + 2, 2, 4 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(r - 2, 2, 4 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Cannon barrel — big iron
    ctx.save();
    ctx.rotate(t.angle);
    const bw = 5 + lv;
    const bl = r * 0.6 + lv * 2;
    // Barrel gradient
    const barrelGrad = ctx.createLinearGradient(0, -bw, 0, bw);
    barrelGrad.addColorStop(0, '#666');
    barrelGrad.addColorStop(0.4, '#999');
    barrelGrad.addColorStop(0.6, '#777');
    barrelGrad.addColorStop(1, '#444');
    ctx.fillStyle = barrelGrad;
    ctx.fillRect(ir - 2, -bw / 2, bl, bw);
    // Barrel ring
    ctx.fillStyle = '#B8860B';
    ctx.fillRect(ir + bl * 0.5, -bw / 2 - 2, bw * 0.8, bw + 4);
    // Muzzle flare
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(ir + bl - 2, -bw / 2 - 3);
    ctx.lineTo(ir + bl + 4, -bw / 2);
    ctx.lineTo(ir + bl + 4, bw / 2);
    ctx.lineTo(ir + bl - 2, bw / 2 + 3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Smoke stack at back (for Lv2+)
    if (lv >= 2) {
        ctx.fillStyle = '#555';
        ctx.fillRect(-ir + 4, -r + 1, 5, -4 - lv * 2);
        ctx.fillStyle = '#777';
        ctx.fillRect(-ir + 3, -r + 1, 7, 2);
    }
}

// ===== MAGE TOWER — Kingdom Rush Arcane Wizard Spire =====
function drawMageTower(t, st, lv) {
    const b = 9 + lv * 1.5;   // base radius
    const h = 18 + lv * 6;    // spire height

    // Stone circle base
    const baseGrad = ctx.createRadialGradient(0, 3, b * 0.2, 0, 3, b);
    baseGrad.addColorStop(0, '#D5CFE8');
    baseGrad.addColorStop(0.6, '#9B8EC0');
    baseGrad.addColorStop(1, '#5C4A8A');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(0, 3, b + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4A3A70';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Runic circle on base
    ctx.strokeStyle = 'rgba(180,160,220,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 3, b * 0.7, 0, Math.PI * 2);
    ctx.stroke();
    // Rune marks
    for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        const rx = Math.cos(a) * b * 0.7;
        const ry = Math.sin(a) * b * 0.7 + 3;
        ctx.fillStyle = 'rgba(220,200,255,0.7)';
        ctx.beginPath();
        ctx.arc(rx, ry, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Main tower body — tall thin stone tower
    const tw = b * 0.5;
    const bw = b * 0.8;
    ctx.fillStyle = '#C8BFE8';
    ctx.beginPath();
    ctx.moveTo(-bw, 0);
    ctx.lineTo(bw, 0);
    ctx.lineTo(tw, -h * 0.7);
    ctx.lineTo(-tw, -h * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#8B7DBA';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Tower stone block lines
    ctx.strokeStyle = '#A095C8';
    ctx.lineWidth = 0.4;
    for (let i = 1; i < 6; i++) {
        const y = -i * h * 0.7 / 6;
        ctx.beginPath();
        const wAtY = bw - (bw - tw) * (i / 6);
        ctx.moveTo(-wAtY + 1, y);
        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();
    }

    // Window / arcane slit
    ctx.fillStyle = '#3A2060';
    ctx.fillRect(-2, -h * 0.45, 4, 10);
    ctx.fillStyle = 'rgba(180,150,255,0.5)';
    ctx.fillRect(-1.5, -h * 0.45 + 1, 3, 8);

    // Pointed spire roof
    ctx.fillStyle = '#7B6CB0';
    ctx.beginPath();
    ctx.moveTo(-tw - 1, -h * 0.7);
    ctx.lineTo(tw + 1, -h * 0.7);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#5C4A8A';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Arcane orb at top
    const orbY = -h;
    const orbR = 3 + lv;
    ctx.shadowColor = 'rgba(150,120,255,0.8)';
    ctx.shadowBlur = 8 + lv * 3;
    const orbGrad = ctx.createRadialGradient(0, orbY - orbR * 0.3, orbR * 0.1, 0, orbY, orbR);
    orbGrad.addColorStop(0, '#FFFFFF');
    orbGrad.addColorStop(0.3, '#D8C8FF');
    orbGrad.addColorStop(0.7, '#8B60E0');
    orbGrad.addColorStop(1, 'rgba(100,40,180,0)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(0, orbY, orbR + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Orbiting crystals
    const time = Date.now() / 1000;
    for (let i = 0; i < lv + 1; i++) {
        const a = time * 2 + i * Math.PI * 2 / (lv + 1);
        const dist = b + 4;
        const cx = Math.cos(a) * dist;
        const cy = -h * 0.3 + Math.sin(a) * dist * 0.5;
        ctx.fillStyle = '#C8B8FF';
        ctx.beginPath();
        // Small diamond crystal
        ctx.moveTo(cx, cy - 3);
        ctx.lineTo(cx + 2, cy);
        ctx.lineTo(cx, cy + 3);
        ctx.lineTo(cx - 2, cy);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.4;
        ctx.stroke();
    }

    // Magic wand barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#A090C8';
    ctx.fillRect(3, -1, tw + 6, 2);
    ctx.fillStyle = '#D8C8FF';
    ctx.beginPath();
    ctx.arc(tw + 8, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== TESLA TOWER — Kingdom Rush Tesla / Dwarven Engineer =====
function drawTeslaTower(t, st, lv) {
    const w = 9 + lv;
    const h = 20 + lv * 5;

    // Riveted metal base
    ctx.fillStyle = '#6B5030';
    ctx.beginPath();
    ctx.roundRect(-w - 2, 3, (w + 2) * 2, w + 2, 3);
    ctx.fill();
    ctx.strokeStyle = '#4A3020';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Base rivets
    ctx.fillStyle = '#D4A030';
    for (let i = 0; i < 4; i++) {
        const rx = -w + 3 + i * (w * 2 - 6) / 3;
        ctx.beginPath();
        ctx.arc(rx, 3 + w / 2, 1.8, 0, Math.PI * 2);
        ctx.fill();
    }

    // Copper coil column
    const coilW = 4 + lv * 0.7;
    const coilH = h * 0.6;
    // Column body
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(-coilW, -coilH, coilW * 2, coilH + 3);
    ctx.strokeStyle = '#6B4F10';
    ctx.lineWidth = 1;
    ctx.strokeRect(-coilW, -coilH, coilW * 2, coilH + 3);

    // Copper windings
    const numCoils = 4 + lv * 2;
    for (let i = 0; i < numCoils; i++) {
        const y = -coilH + 2 + i * coilH / numCoils;
        ctx.strokeStyle = (i % 3 === 0) ? '#E8A020' : '#C87830';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-coilW - 0.8, y);
        ctx.lineTo(0, y + 3);
        ctx.lineTo(coilW + 0.8, y);
        ctx.stroke();
    }

    // Tesla coil top — metal dome
    const domeY = -coilH - 3;
    ctx.fillStyle = '#A08040';
    ctx.beginPath();
    ctx.arc(0, domeY, coilW + 2, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#7A6030';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Antenna / spike
    ctx.fillStyle = '#D4A030';
    ctx.fillRect(-1, domeY - 8 - lv * 3, 2, 8 + lv * 3);
    // Antenna ball
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, domeY - 9 - lv * 3, 3 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Energy orb glow
    const orbCY = domeY - 9 - lv * 3;
    const orbR = 6 + lv * 2;
    const glowGrad = ctx.createRadialGradient(0, orbCY - orbR * 0.3, orbR * 0.05, 0, orbCY, orbR);
    glowGrad.addColorStop(0, 'rgba(255,255,200,0.95)');
    glowGrad.addColorStop(0.2, 'rgba(255,228,50,0.7)');
    glowGrad.addColorStop(0.5, 'rgba(255,180,0,0.3)');
    glowGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, orbCY, orbR, 0, Math.PI * 2);
    ctx.fill();

    // Pulsing arcs
    const time = Date.now() / 1000;
    ctx.strokeStyle = 'rgba(255,228,80,0.8)';
    ctx.lineWidth = 1;
    for (let i = 0; i < lv + 1; i++) {
        const a0 = time * 5 + i * Math.PI * 2 / (lv + 1);
        const x0 = Math.cos(a0) * orbR * 0.4;
        const y0 = orbCY + Math.sin(a0) * orbR * 0.4;
        const a1 = a0 + 0.5 + Math.sin(time * 4 + i) * 0.3;
        const d1 = orbR * 0.8;
        const x1 = Math.cos(a1) * d1;
        const y1 = orbCY + Math.sin(a1) * d1;
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        const mx = (x0 + x1) / 2 + (Math.random() - 0.5) * 12;
        const my = (y0 + y1) / 2 + (Math.random() - 0.5) * 12;
        ctx.quadraticCurveTo(mx, my, x1, y1);
        ctx.stroke();
    }

    // Electrical prong barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#C89830';
    ctx.fillRect(2, -1, coilW + 8, 2);
    ctx.fillStyle = '#FFE44D';
    ctx.beginPath();
    ctx.arc(coilW + 9, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawEnemy(e) {
    if (!e.alive) return;
    ctx.save();
    ctx.translate(e.x, e.y);

    // Body
    const isBoss = e.type === 'boss';
    if (isBoss) {
        // Boss glow
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 8 + Math.sin(Date.now() / 200) * 3;
    }
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(0, 0, e.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Slow visual
    if (e.slowTimer > 0 && e.slowFactor < 1) {
        ctx.fillStyle = 'rgba(173,216,230,0.4)';
        ctx.beginPath();
        ctx.arc(0, 0, e.size + 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Health bar
    const barW = e.size * 2.5;
    const barH = 3;
    const barY = -e.size - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(-barW / 2, barY, barW, barH);
    const hpPct = e.hp / e.maxHp;
    const hpColor = hpPct > 0.5 ? '#2ecc71' : hpPct > 0.25 ? '#f39c12' : '#e74c3c';
    ctx.fillStyle = hpColor;
    ctx.fillRect(-barW / 2, barY, barW * hpPct, barH);

    ctx.restore();
}

function drawProjectile(p) {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
}

function drawParticles() {
    for (const p of game.particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        if (p.ring) {
            const progress = 1 - alpha;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3 * alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * progress, 0, Math.PI * 2);
            ctx.stroke();
        } else if (p.lightning) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2 * alpha;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            const midX = (p.x + p.x2) / 2 + (Math.random() - 0.5) * 30;
            const midY = (p.y + p.y2) / 2 + (Math.random() - 0.5) * 30;
            ctx.quadraticCurveTo(midX, midY, p.x2, p.y2);
            ctx.stroke();
        } else {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawHoverPreview() {
    if (!game.selectedType || game.hoverCol < 0 || game.hoverRow < 0) return;
    const pos = cellCenter(game.hoverCol, game.hoverRow);
    const valid = isBuildable(game.hoverCol, game.hoverRow);
    const def = TOWER_DEFS[game.selectedType];

    ctx.globalAlpha = valid ? 0.45 : 0.5;
    ctx.fillStyle = valid ? def.color : '#e74c3c';

    // Draw type-specific silhouette
    ctx.save();
    ctx.translate(pos.x, pos.y);
    const s = 14;
    switch (game.selectedType) {
        case 'archer':
            ctx.beginPath();
            ctx.roundRect(-s, 0, s * 2, s + 1, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-s + 1, -8);
            ctx.lineTo(s - 1, -8);
            ctx.lineTo(0, -20);
            ctx.closePath();
            ctx.fill();
            break;
        case 'artillery':
            ctx.beginPath();
            ctx.arc(0, 0, s + 2, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'mage':
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(s - 2, -5);
            ctx.lineTo(s + 2, 2);
            ctx.lineTo(0, s);
            ctx.lineTo(-s - 2, 2);
            ctx.lineTo(-s + 2, -5);
            ctx.closePath();
            ctx.fill();
            break;
        case 'tesla':
            ctx.fillRect(-4, -18, 8, 8);
            ctx.fillRect(-6, -8, 12, 12);
            ctx.beginPath();
            ctx.arc(0, -6, 8, Math.PI, 0);
            ctx.fill();
            break;
    }
    ctx.restore();

    ctx.strokeStyle = valid ? '#fff' : '#f00';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Range indicator
    if (valid) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, def.range[0], 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1;
}

function drawSelectedTowerRange() {
    if (!game.selectedTower) return;
    const t = game.selectedTower;
    const st = towerStats(t);
    const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;

    // Range circle
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(t.x, t.y, st.range, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Selection ring (pulsing gold)
    ctx.strokeStyle = `rgba(241,196,15,${0.5 + pulse * 0.3})`;
    ctx.lineWidth = 2.5 * pulse;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 20 + t.level * 2, 0, Math.PI * 2);
    ctx.stroke();

    // Inner highlight dot
    ctx.fillStyle = `rgba(255,255,255,${0.3 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
    ctx.fill();
}

function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Layer 1: Grid
    drawGrid();

    // Layer 2: Tower range of selected
    drawSelectedTowerRange();

    // Layer 3: Towers
    for (const t of game.towers) drawTower(t);

    // Layer 4: Enemies
    for (const e of game.enemies) drawEnemy(e);

    // Layer 5: Projectiles
    for (const p of game.projectiles) drawProjectile(p);

    // Layer 6: Particles
    drawParticles();

    // Layer 7: Hover preview
    drawHoverPreview();

    // Path arrows (subtle direction hints at waypoints)
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1], b = WAYPOINTS[i];
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        if (mx < 0 || mx > CANVAS_W || my < 0 || my > CANVAS_H) continue;
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.arc(mx, my, 6, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ==================== UI ====================
function updateHUD() {
    document.getElementById('gold-display').textContent = game.gold;
    document.getElementById('lives-display').textContent = game.lives;
    document.getElementById('wave-display').textContent = game.waveNum + '/' + game.totalWaves;
    document.getElementById('score-display').textContent = game.score;
}

function updateTowerButtons() {
    const btns = document.querySelectorAll('.tower-btn');
    btns.forEach(btn => {
        const type = btn.dataset.type;
        const cost = TOWER_DEFS[type].cost;
        if (game.gold < cost) {
            btn.classList.add('disabled');
        } else {
            btn.classList.remove('disabled');
        }
        if (type === game.selectedType) {
            btn.classList.add('selected');
        } else {
            btn.classList.remove('selected');
        }
    });
}

function selectTowerType(type) {
    if (game.gold < TOWER_DEFS[type].cost) return;
    if (game.state === 'game_over' || game.state === 'victory') return;
    if (game.selectedType === type) {
        game.selectedType = null;
    } else {
        game.selectedType = type;
        game.selectedTower = null;
        hideTowerInfo();
    }
    updateTowerButtons();
}

function showTowerInfo(t) {
    game.selectedTower = t;
    const st = towerStats(t);
    const panel = document.getElementById('tower-info-panel');
    document.getElementById('tip-tower-name').textContent = st.name + ' Lv.' + t.level;
    document.getElementById('tip-stats').innerHTML =
        '<div class="stat-row"><span>伤害</span><span>' + st.damage + '</span></div>' +
        '<div class="stat-row"><span>射程</span><span>' + st.range + '</span></div>' +
        '<div class="stat-row"><span>攻速</span><span>' + (st.cooldown / 1000).toFixed(1) + 's</span></div>' +
        (st.splashRadius > 0 ? '<div class="stat-row"><span>溅射</span><span>' + st.splashRadius + 'px</span></div>' : '') +
        (st.slowFactor > 0 ? '<div class="stat-row"><span>减速</span><span>' + Math.round(st.slowFactor * 100) + '%</span></div>' : '') +
        (st.chainCount > 0 ? '<div class="stat-row"><span>连锁</span><span>' + st.chainCount + '个</span></div>' : '');

    const upBtn = document.getElementById('upgrade-btn');
    if (t.level >= 3) {
        upBtn.textContent = '已满级';
        upBtn.disabled = true;
    } else {
        upBtn.textContent = '升级 (' + st.upgradeCost + '💰)';
        upBtn.disabled = game.gold < st.upgradeCost;
    }

    const sellBtn = document.getElementById('sell-btn');
    const refund = Math.floor(t.totalInvested * 0.6);
    sellBtn.textContent = '出售 (' + refund + '💰)';

    // Position panel near the tower (but within viewport)
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    let px = rect.left + t.x / scaleX + 20;
    let py = rect.top + t.y / scaleY - 60;
    if (px + 200 > window.innerWidth) px = window.innerWidth - 210;
    if (py < 10) py = 10;
    if (py + 200 > window.innerHeight) py = window.innerHeight - 210;
    panel.style.left = px + 'px';
    panel.style.top = py + 'px';
    panel.style.display = 'block';
}

function hideTowerInfo() {
    document.getElementById('tower-info-panel').style.display = 'none';
    game.selectedTower = null;
}

function upgradeSelectedTower() {
    if (game.selectedTower) upgradeTower(game.selectedTower);
}

function sellSelectedTower() {
    if (game.selectedTower) sellTower(game.selectedTower);
}

function toggleSpeed() {
    game.speedMult = game.speedMult === 1 ? 2 : 1;
    const btn = document.getElementById('speed-btn');
    btn.textContent = game.speedMult + 'x';
    if (game.speedMult === 2) btn.classList.add('active'); else btn.classList.remove('active');
}

function endGame(result) {
    game.state = result === 'victory' ? 'victory' : 'game_over';
    game.selectedType = null;
    game.selectedTower = null;
    hideTowerInfo();
    const overlay = document.getElementById('overlay');
    overlay.classList.add('show');
    document.getElementById('start-wave-btn').disabled = true;

    if (result === 'victory') {
        document.getElementById('overlay-title').textContent = '🎉 胜利！';
        document.getElementById('overlay-sub').textContent = '总分数: ' + game.score + ' | 剩余生命: ' + game.lives;
    } else {
        document.getElementById('overlay-title').textContent = '💀 游戏结束';
        document.getElementById('overlay-sub').textContent = '坚持了 ' + game.waveNum + ' 波 | 总分数: ' + game.score;
    }
}

function restartGame() {
    game.gold = 200;
    game.lives = 20;
    game.score = 0;
    game.waveNum = 0;
    game.state = 'idle';
    game.speedMult = 1;
    game.countdown = 0;
    game.towers = [];
    game.enemies = [];
    game.projectiles = [];
    game.particles = [];
    game.selectedType = null;
    game.selectedTower = null;
    game.spawnQueue = [];
    game.spawnTimer = 0;
    game.waveSpawningDone = false;
    game.nextTowerId = 1;
    game.nextEnemyId = 1;

    document.getElementById('overlay').classList.remove('show');
    document.getElementById('speed-btn').textContent = '1x';
    document.getElementById('speed-btn').classList.remove('active');
    document.getElementById('start-wave-btn').disabled = false;
    document.getElementById('countdown-display').textContent = '';
    hideTowerInfo();
    updateHUD();
    updateTowerButtons();
}

// ==================== INPUT HANDLING ====================
function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
    };
}

canvas.addEventListener('mousemove', (e) => {
    const pos = getCanvasCoords(e);
    const g = canvasToGrid(pos.x, pos.y);
    game.hoverCol = g.col;
    game.hoverRow = g.row;

    // Update cursor
    if (game.selectedType && isBuildable(g.col, g.row)) {
        canvas.style.cursor = 'pointer';
    } else if (game.selectedType) {
        canvas.style.cursor = 'not-allowed';
    } else if (g.col >= 0 && g.row >= 0 && game.towers.some(t => t.col === g.col && t.row === g.row)) {
        canvas.style.cursor = 'pointer';
    } else {
        canvas.style.cursor = 'crosshair';
    }

    // Tooltip for existing towers
    const tower = game.towers.find(t => t.col === g.col && t.row === g.row);
    const tip = document.getElementById('tooltip');
    if (tower && !game.selectedType) {
        const st = towerStats(tower);
        tip.style.display = 'block';
        tip.style.left = (e.clientX + 15) + 'px';
        tip.style.top = (e.clientY - 30) + 'px';
        tip.textContent = st.name + ' Lv.' + tower.level + ' | 伤害:' + st.damage + ' | 射程:' + st.range;
    } else {
        tip.style.display = 'none';
    }
});

canvas.addEventListener('click', (e) => {
    e.stopPropagation();
    if (game.state === 'game_over' || game.state === 'victory') return;
    const pos = getCanvasCoords(e);
    const g = canvasToGrid(pos.x, pos.y);

    // Close tower info panel if clicking elsewhere
    if (game.selectedTower) {
        const t = game.selectedTower;
        if (t.col !== g.col || t.row !== g.row) {
            hideTowerInfo();
        }
    }

    // If placing a tower
    if (game.selectedType) {
        if (placeTower(game.selectedType, g.col, g.row)) {
            // Keep type selected for rapid placement (shift+click behavior)
            // Clear selection on single click
             game.selectedType = null;
             updateTowerButtons();
        }
        return;
    }

    // Click existing tower
    const tower = game.towers.find(t => t.col === g.col && t.row === g.row);
    if (tower) {
        showTowerInfo(tower);
        game.selectedType = null;
        updateTowerButtons();
    }
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Touch events
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('click', { clientX: touch.clientX, clientY: touch.clientY });
    canvas.dispatchEvent(mouseEvent);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
    canvas.dispatchEvent(mouseEvent);
}, { passive: false });

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (game.state === 'game_over' || game.state === 'victory') return;
    switch(e.key) {
        case 'Escape':
            game.selectedType = null;
            hideTowerInfo();
            updateTowerButtons();
            break;
        case '1': selectTowerType('archer'); break;
        case '2': selectTowerType('artillery'); break;
        case '3': selectTowerType('mage'); break;
        case '4': selectTowerType('tesla'); break;
        case ' ':
            e.preventDefault();
            if (game.state === 'idle') startNextWave();
            break;
    }
});

// Click outside canvas closes panels
document.addEventListener('click', (e) => {
    if (!canvas.contains(e.target) && !document.getElementById('tower-info-panel').contains(e.target)) {
        hideTowerInfo();
    }
});

// Make startNextWave and toggleSpeed globally accessible for onclick
window.startNextWave = startNextWave;
window.toggleSpeed = toggleSpeed;
window.selectTowerType = selectTowerType;
window.upgradeSelectedTower = upgradeSelectedTower;
window.sellSelectedTower = sellSelectedTower;
window.restartGame = restartGame;

// ==================== GAME LOOP ====================
let lastFrameTime = null;
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);

function gameLoop(timestamp) {
    if (!lastFrameTime) {
        lastFrameTime = timestamp;
        requestAnimationFrame(gameLoop);
        return;
    }

    let dt = (timestamp - lastFrameTime) / 1000;
    lastFrameTime = timestamp;

    if (dt <= 0 || dt > 0.5) {
        requestAnimationFrame(gameLoop);
        return;
    }

    // Apply speed multiplier for logic
    const logicDt = dt * game.speedMult;

    // Update game logic
    if (game.state === 'wave_active') {
        updateWaveSpawning(dt);
        updateEnemies(logicDt);
        updateTowers(logicDt);
        updateProjectiles(logicDt);
        checkWaveComplete();
    } else if (game.state === 'idle' || game.state === 'wave_complete') {
        // Still update towers during idle (they don't fire but let's keep state clean)
        updateTowers(0);
        updateProjectiles(0);
    }

    updateParticles(dt);

    // Render every frame (always at 1x visual speed)
    render();

    // Update HUD periodically
    updateHUD();

    requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
function init() {
    initGrid();
    updateHUD();
    updateTowerButtons();
    document.getElementById('start-wave-btn').disabled = false;
    document.getElementById('countdown-display').textContent = '';
    requestAnimationFrame(gameLoop);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
