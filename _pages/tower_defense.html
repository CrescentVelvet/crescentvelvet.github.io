<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>塔防战争 - Tower Defense</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(0,0,0,0.75);
            --gold: #f1c40f;
            --lives: #e74c3c;
            --text: #ecf0f1;
            --btn-green: #27ae60;
            --btn-red: #c0392b;
            --btn-blue: #2980b9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at center, #1a2740 0%, #0d1117 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 0 12px;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            padding: 8px 0;
            justify-content: center;
        }

        /* -- HUD -- */
        #hud-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: var(--panel-bg);
            border-radius: 10px;
            padding: 8px 16px;
            color: var(--text);
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #hud-bar .stat { display: flex; align-items: center; gap: 4px; }
        #hud-bar .stat .icon { font-size: 18px; }
        #hud-bar .val { font-weight: bold; font-size: 16px; }
        .gold-val { color: var(--gold); }
        .lives-val { color: var(--lives); }

        #hud-bar button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            transition: all 0.15s;
            font-family: inherit;
        }
        #hud-bar button:active { transform: scale(0.95); }
        #speed-btn { background: #555; }
        #speed-btn.active { background: #e67e22; }
        #start-wave-btn { background: var(--btn-green); }
        #start-wave-btn:disabled { background: #555; opacity: 0.5; cursor: not-allowed; }
        #countdown-display { color: #f39c12; min-width: 50px; text-align: center; }

        /* -- Canvas -- */
        #game-canvas {
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            width: 100%;
            max-height: calc(100vh - 160px);
            aspect-ratio: 800 / 600;
            background: #1a2e1a;
            cursor: crosshair;
            touch-action: none;
            flex-shrink: 1;
        }

        /* -- Tower Selection Panel -- */
        #tower-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .tower-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 10px 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: var(--panel-bg);
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.15s;
            min-width: 75px;
        }
        .tower-btn:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }
        .tower-btn:active { transform: scale(0.95); }
        .tower-btn.selected { border-color: #f1c40f; background: rgba(241,196,15,0.15); box-shadow: 0 0 12px rgba(241,196,15,0.3); }
        .tower-btn .tower-icon { font-size: 26px; }
        .tower-btn .tower-cost { font-size: 11px; color: var(--gold); }
        .tower-btn .tower-name { font-size: 12px; font-weight: bold; }
        .tower-btn.disabled { opacity: 0.4; cursor: not-allowed; }

        /* -- Upgrade / Sell Popup -- */
        #tower-info-panel {
            display: none;
            position: fixed;
            background: rgba(20,20,40,0.95);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 14px 18px;
            color: var(--text);
            font-size: 13px;
            z-index: 100;
            min-width: 180px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        #tower-info-panel h3 { margin-bottom: 8px; font-size: 15px; }
        #tower-info-panel .stat-row { display: flex; justify-content: space-between; margin: 3px 0; font-size: 12px; }
        #tower-info-panel button {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            font-family: inherit;
        }
        #upgrade-btn { background: var(--btn-blue); }
        #upgrade-btn:disabled { background: #555; opacity: 0.5; cursor: not-allowed; }
        #sell-btn { background: var(--btn-red); }

        /* -- Overlay -- */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;

        #overlay.show { display: flex; }
        #overlay h2 { font-size: 36px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        #overlay .sub-text { font-size: 18px; color: #ccc; }
        #overlay button {
            padding: 12px 32px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: var(--btn-green);
            color: #fff;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.15s;
        }
        #overlay button:hover { transform: scale(1.05); }
        #overlay button:active { transform: scale(0.95); }

        /* -- Tooltip -- */
        #tooltip {
            display: none;
            position: fixed;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 150;
            white-space: nowrap;

        /* -- Mobile / Small screens -- */
        @media (max-width: 700px) {
            body { padding: 0 4px; }

            .tower-btn .tower-name { font-size: 10px; }

        }
        @media (min-width: 1400px) {
            #game-wrapper { max-width: 1200px; }
        }
        @media (min-width: 1800px) {
            #game-wrapper { max-width: 1300px; }
        }

<script>
"use strict";

// ==================== CONSTANTS ====================
const COLS = 20, ROWS = 15, CELL = 40;
const CANVAS_W = 800, CANVAS_H = 600;
const TERRAIN = { PATH: 0, GRASS: 1, BLOCKED: 2 };

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// ==================== TOWER STATS TABLE ====================
const TOWER_DEFS = {
    archer: {
        name: '箭塔', icon: '🏹',
        cost: 100, upgradeCost: [80, 160],
        damage: [15, 30, 50], range: [130, 145, 160], cooldown: [500, 420, 350],
        color: '#7B8D3C', bulletColor: '#D4C898', bulletSpeed: 450,
        splash: 0, slowFactor: 0, slowDuration: 0, chainCount: 0
    },
    artillery: {
        name: '炮塔', icon: '💣',
        cost: 150, upgradeCost: [120, 240],
        damage: [40, 75, 120], range: [110, 120, 135], cooldown: [2000, 1800, 1600],
        color: '#8B4513', bulletColor: '#333', bulletSpeed: 250,
        splash: [55, 65, 75], slowFactor: 0, slowDuration: 0, chainCount: 0, splashDmgPct: 0.5
    },
    ice: {
        name: '冰塔', icon: '❄️',
        cost: 120, upgradeCost: [100, 200],
        damage: [8, 15, 25], range: [110, 120, 135], cooldown: [1000, 900, 750],
        color: '#5DADE2', bulletColor: '#AED6F1', bulletSpeed: 350,
        splash: 0, slowFactor: [0.5, 0.6, 0.7], slowDuration: [2000, 2500, 3000], chainCount: 0
    },
    tesla: {
        name: '雷塔', icon: '⚡',
        cost: 200, upgradeCost: [150, 300],
        damage: [25, 45, 70], range: [120, 130, 145], cooldown: [1200, 1050, 900],
        color: '#B8860B', bulletColor: '#FFE44D', bulletSpeed: 9999,
        splash: 0, slowFactor: 0, slowDuration: 0, chainCount: [3, 4, 5], chainRange: [80, 90, 100], chainFalloff: 0.3
    },
    fire: {
        name: '火塔', icon: '🔥',
        cost: 180, upgradeCost: [140, 280],
        damage: [14, 24, 38], range: [110, 120, 135], cooldown: [2500, 2200, 1800],
        color: '#D4452A', bulletColor: '#FF6B35', bulletSpeed: 280,
        splash: 0, slowFactor: 0, slowDuration: 0, chainCount: 0,
        flameRadius: [50, 55, 65], flameDuration: [2200, 2600, 3200], flameTickInterval: 350
    },
    knockback: {
        name: '震波塔', icon: '💥',
        cost: 130, upgradeCost: [100, 200],
        damage: [20, 35, 55], range: [85, 90, 100], cooldown: [1600, 1400, 1100],
        color: '#4A90D9', bulletColor: '#C8E0F8', bulletSpeed: 500,
        splash: 0, slowFactor: 0, slowDuration: 0, chainCount: 0,
        knockbackDist: [45, 55, 70]
    },
    sheep: {
        name: '羊塔', icon: '🐑',
        cost: 150, upgradeCost: [120, 240],
        damage: [5, 10, 18], range: [120, 130, 145], cooldown: [3000, 2600, 2100],
        color: '#C9A0DC', bulletColor: '#F0D0FF', bulletSpeed: 320,
        splash: 0, slowFactor: 0, slowDuration: 0, chainCount: 0,
        sheepDuration: [2200, 3000, 4000]
    },
    missile: {
        name: '导弹塔', icon: '🚀',
        cost: 250, upgradeCost: [200, 400],
        damage: [80, 140, 220], range: [180, 200, 230], cooldown: [3500, 3000, 2400],
        color: '#4A5568', bulletColor: '#CBD5E0', bulletSpeed: 380,
        splash: [60, 70, 85], slowFactor: 0, slowDuration: 0, chainCount: 0, splashDmgPct: 0.6,
        arcHeight: 70
    }
};

const ENEMY_DEFS = {
    normal: { name: '普通兵', speed: 60, size: 8, color: '#e74c3c', reward: 10, hpBase: 60, hpScale: 8 },
    fast:   { name: '快速兵', speed: 110, size: 6, color: '#f39c12', reward: 8, hpBase: 30, hpScale: 5 },
    tank:   { name: '重装兵', speed: 35, size: 12, color: '#8e44ad', reward: 25, hpBase: 200, hpScale: 30 },
    boss:   { name: 'BOSS',  speed: 40, size: 18, color: '#c0392b', reward: 100, hpBase: 600, hpScale: 150 }
};

// ==================== PATH WAYPOINTS (pixel centers) ====================
const WAYPOINTS = [
    { x: -20, y: 120 },
    { x: 200, y: 120 },
    { x: 200, y: 480 },
    { x: 360, y: 480 },
    { x: 360, y: 200 },
    { x: 560, y: 200 },
    { x: 560, y: 480 },
    { x: 720, y: 480 },
    { x: 720, y: 320 },
    { x: 820, y: 320 }
];

// ==================== GAME STATE ====================
const game = {
    gold: 200,
    lives: 20,
    score: 0,
    waveNum: 0,
    totalWaves: 20,
    state: 'idle',          // idle | wave_active | wave_complete | game_over | victory
    speedMult: 1,
    countdown: 0,
    towers: [],
    enemies: [],
    projectiles: [],
    particles: [],
    fireZones: [],
    selectedType: null,
    selectedTower: null,
    hoverCol: -1,
    hoverRow: -1,
    nextTowerId: 1,
    nextEnemyId: 1,
    spawnQueue: [],
    spawnTimer: 0,
    spawnInterval: 800,
    waveSpawningDone: false
};

// ==================== GRID & SCENERY ====================
const grid = [];
for (let r = 0; r < ROWS; r++) {
    grid[r] = new Array(COLS).fill(TERRAIN.GRASS);
}

// Scenery items: { col, row, type, size }
let scenery = [];

// Seeded random for deterministic scenery
function seededRand(seed) {
    let s = seed;
    return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
    };
}

function initGrid() {
    // Mark path cells along waypoint segments (path is 2 cells wide)
    // Waypoints are centered in the 2-cell path; offset by -20 to get the top-left cell
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1];
        const b = WAYPOINTS[i];
        const ax = Math.floor((a.x - 20) / CELL);
        const ay = Math.floor((a.y - 20) / CELL);
        const bx = Math.floor((b.x - 20) / CELL);
        const by = Math.floor((b.y - 20) / CELL);

        if (ay === by) {
            const row = ay;
            const x0 = Math.max(0, Math.min(ax, bx));
            const x1 = Math.min(COLS - 1, Math.max(ax, bx));
            for (let c = x0; c <= x1; c++) {
                if (c >= 0 && c < COLS && row >= 0 && row < ROWS) grid[row][c] = TERRAIN.PATH;
                if (row + 1 < ROWS && c >= 0 && c < COLS) grid[row + 1][c] = TERRAIN.PATH;
            }
        } else if (ax === bx) {
            const col = ax;
            const y0 = Math.max(0, Math.min(ay, by));
            const y1 = Math.min(ROWS - 1, Math.max(ay, by));
            for (let r = y0; r <= y1; r++) {
                if (r >= 0 && r < ROWS && col >= 0 && col < COLS) grid[r][col] = TERRAIN.PATH;
                if (col + 1 < COLS && r >= 0 && r < ROWS) grid[r][col + 1] = TERRAIN.PATH;
            }
        }
    }

    // All non-path cells remain buildable (no blocking buffer)

    // Scenery disabled — no trees/rocks
    scenery = [];
}

function initScenery() {
    scenery = [];
    const rand = seededRand(42);
    const treeTypes = ['pine', 'oak', 'bush'];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.BLOCKED && rand() < 0.65) {
                const type = treeTypes[Math.floor(rand() * treeTypes.length)];
                const size = 0.7 + rand() * 0.6;
                const ox = (rand() - 0.5) * CELL * 0.5;
                const oy = (rand() - 0.5) * CELL * 0.5;
                scenery.push({ col: c, row: r, type, size, ox, oy });
            }
        }
    }
    // Also add rocks along path edges
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] === TERRAIN.BLOCKED) {
                let nextToPath = false;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === TERRAIN.PATH) {
                            nextToPath = true;
                        }
                    }
                }
                if (nextToPath && rand() < 0.5) {
                    const ox2 = (rand() - 0.5) * CELL * 0.3;
                    const oy2 = (rand() - 0.5) * CELL * 0.3;
                    scenery.push({ col: c, row: r, type: 'rock', size: 0.5 + rand() * 0.4, ox: ox2, oy: oy2 });
                }
            }
        }
    }
}

// ==================== WAVE DEFINITIONS ====================
function hpMultiplier(wave) {
    return 1 + (wave - 1) * 0.25 + Math.floor((wave - 1) / 5) * 0.5;
}

function enemyHP(type, wave) {
    const def = ENEMY_DEFS[type];
    const mult = hpMultiplier(wave);
    return Math.floor((def.hpBase + wave * def.hpScale) * mult);
}

function generateWave(waveNum) {
    const queue = [];
    const push = (type, count) => {
        for (let i = 0; i < count; i++) queue.push(type);
    };

    const waves = [
        () => { push('normal', 8); },
        () => { push('normal', 10); push('fast', 3); },
        () => { push('normal', 14); push('fast', 5); },
        () => { push('normal', 16); push('fast', 6); push('tank', 1); },
        () => { push('normal', 10); push('fast', 4); push('tank', 1); push('boss', 1); },
        () => { push('normal', 18); push('fast', 7); push('tank', 2); },
        () => { push('normal', 20); push('fast', 9); push('tank', 2); },
        () => { push('normal', 22); push('fast', 10); push('tank', 3); },
        () => { push('normal', 25); push('fast', 12); push('tank', 3); },
        () => { push('normal', 15); push('fast', 6); push('tank', 2); push('boss', 1); },
        () => { push('normal', 28); push('fast', 14); push('tank', 4); },
        () => { push('normal', 30); push('fast', 15); push('tank', 5); },
        () => { push('normal', 32); push('fast', 16); push('tank', 5); },
        () => { push('normal', 34); push('fast', 18); push('tank', 6); },
        () => { push('normal', 20); push('fast', 10); push('tank', 3); push('boss', 1); },
        () => { push('normal', 36); push('fast', 20); push('tank', 7); },
        () => { push('normal', 38); push('fast', 22); push('tank', 8); },
        () => { push('normal', 40); push('fast', 24); push('tank', 9); },
        () => { push('normal', 42); push('fast', 26); push('tank', 10); },
        () => { push('normal', 25); push('fast', 12); push('tank', 5); push('boss', 1); },
    ];

    if (waveNum <= waves.length) {
        waves[waveNum - 1]();
    } else {
        // Beyond wave 20: keep scaling
        const n = waveNum;
        push('normal', 25 + n); push('fast', 12 + Math.floor(n/2)); push('tank', 5 + Math.floor(n/3));
        if (n % 5 === 0) push('boss', 1);
    }

    // Shuffle the queue
    for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
    }
    return queue;
}

function spawnInterval(waveNum) {
    if (waveNum <= 5) return 800;
    if (waveNum <= 10) return 650;
    if (waveNum <= 15) return 500;
    return 400;
}

// ==================== HELPER FUNCTIONS ====================
function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
}

function angleTo(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
}

function bezierPoint(p0, p1, p2, t) {
    const u = 1 - t;
    return {
        x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x,
        y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y
    };
}

function bezierLength(p0, p1, p2) {
    let len = 0;
    let prev = p0;
    for (let i = 1; i <= 12; i++) {
        const pt = bezierPoint(p0, p1, p2, i / 12);
        len += Math.sqrt((pt.x - prev.x) ** 2 + (pt.y - prev.y) ** 2);
        prev = pt;
    }
    return len;
}

function bezierTangent(p0, p1, p2, t) {
    const u = 1 - t;
    return {
        x: 2 * u * (p1.x - p0.x) + 2 * t * (p2.x - p1.x),
        y: 2 * u * (p1.y - p0.y) + 2 * t * (p2.y - p1.y)
    };
}

function cellCenter(col, row) {
    return { x: col * CELL + CELL / 2, y: row * CELL + CELL / 2 };
}

function canvasToGrid(cx, cy) {
    return { col: Math.floor(cx / CELL), row: Math.floor(cy / CELL) };
}

function isBuildable(col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
    if (grid[row][col] !== TERRAIN.GRASS) return false;
    return !game.towers.some(t => t.col === col && t.row === row);
}

// ==================== TOWER LOGIC ====================
function createTower(type, col, row) {
    const def = TOWER_DEFS[type];
    const pos = cellCenter(col, row);
    return {
        id: game.nextTowerId++,
        type, col, row,
        x: pos.x, y: pos.y,
        level: 1,
        cooldown: 0,
        angle: 0,
        totalInvested: def.cost,
        target: null
    };
}

function towerStats(t) {
    const def = TOWER_DEFS[t.type];
    const lv = t.level - 1;
    return {
        damage: def.damage[lv],
        range: def.range[lv],
        cooldown: def.cooldown[lv],
        splashRadius: Array.isArray(def.splash) ? def.splash[lv] : def.splash,
        slowFactor: Array.isArray(def.slowFactor) ? def.slowFactor[lv] : def.slowFactor,
        slowDuration: Array.isArray(def.slowDuration) ? def.slowDuration[lv] : def.slowDuration,
        chainCount: Array.isArray(def.chainCount) ? def.chainCount[lv] : def.chainCount,
        chainRange: Array.isArray(def.chainRange) ? def.chainRange[lv] : (def.chainRange || 0),
        chainFalloff: def.chainFalloff || 0,
        splashDmgPct: def.splashDmgPct || 0,
        flameRadius: Array.isArray(def.flameRadius) ? def.flameRadius[lv] : (def.flameRadius || 0),
        flameDuration: Array.isArray(def.flameDuration) ? def.flameDuration[lv] : (def.flameDuration || 0),
        flameTickInterval: def.flameTickInterval || 0,
        sheepDuration: Array.isArray(def.sheepDuration) ? def.sheepDuration[lv] : (def.sheepDuration || 0),
        knockbackDist: Array.isArray(def.knockbackDist) ? def.knockbackDist[lv] : (def.knockbackDist || 0),
        arcHeight: def.arcHeight || 0,
        color: def.color,
        bulletColor: def.bulletColor,
        bulletSpeed: def.bulletSpeed,
        name: def.name,
        icon: def.icon,
        upgradeCost: t.level < 3 ? def.upgradeCost[t.level - 1] : null
    };
}

function placeTower(type, col, row) {
    const def = TOWER_DEFS[type];
    if (game.gold < def.cost) return false;
    if (!isBuildable(col, row)) return false;
    game.gold -= def.cost;
    const t = createTower(type, col, row);
    game.towers.push(t);
    updateHUD();
    updateTowerButtons();
    return true;
}

function upgradeTower(t) {
    if (t.level >= 3) return;
    const st = towerStats(t);
    if (!st.upgradeCost) return;
    if (game.gold < st.upgradeCost) return;
    game.gold -= st.upgradeCost;
    t.totalInvested += st.upgradeCost;
    t.level++;
    t.cooldown = 0;
    updateHUD();
    showTowerInfo(t);
}

function sellTower(t) {
    const refund = Math.floor(t.totalInvested * 0.6);
    game.gold += refund;
    game.towers = game.towers.filter(tw => tw !== t);
    if (game.selectedTower === t) {
        game.selectedTower = null;
        hideTowerInfo();
    }
    updateHUD();
    updateTowerButtons();
}

function towerAcquireTarget(t) {
    const st = towerStats(t);
    let best = null;
    let bestProgress = -1;
    for (const e of game.enemies) {
        if (!e.alive) continue;
        const d = dist(t, e);
        if (d > st.range) continue;
        if (e.waypointIndex > bestProgress || (e.waypointIndex === bestProgress && e.hp < (best ? best.hp : Infinity))) {
            best = e;
            bestProgress = e.waypointIndex;
        }
    }
    return best;
}

function updateTowers(dt) {
    for (const t of game.towers) {
        t.cooldown -= dt * 1000;
        if (t.cooldown > 0) continue;
        const target = towerAcquireTarget(t);
        if (target) {
            const st = towerStats(t);
            t.angle = angleTo(t, target);
            createProjectile(t, target);
            t.cooldown = st.cooldown;
        }
    }
}

// ==================== ENEMY LOGIC ====================
function createEnemy(type, waveNum) {
    const laneOffset = (Math.random() - 0.5) * 70; // spread across full 2-cell path width
    const firstSegX = WAYPOINTS[1].x - WAYPOINTS[0].x;
    const firstSegY = WAYPOINTS[1].y - WAYPOINTS[0].y;
    const firstLen = Math.sqrt(firstSegX ** 2 + firstSegY ** 2) || 1;
    const perpX = -firstSegY / firstLen;
    const perpY = firstSegX / firstLen;
    const pos = {
        x: WAYPOINTS[0].x + perpX * laneOffset,
        y: WAYPOINTS[0].y + perpY * laneOffset
    };
    const def = ENEMY_DEFS[type];
    const hp = enemyHP(type, waveNum);
    return {
        id: game.nextEnemyId++,
        type,
        laneOffset,
        x: pos.x, y: pos.y,
        hp, maxHp: hp,
        speed: def.speed,
        currentSpeed: def.speed,
        waypointIndex: 1,
        reward: def.reward + waveNum + (type === 'boss' ? waveNum * 10 : 0) + (type === 'tank' ? waveNum * 2 : 0),
        alive: true,
        size: def.size,
        color: def.color,
        slowTimer: 0,
        slowFactor: 1,
        isSheep: false,
        sheepTimer: 0,
        knockbackVx: 0,
        knockbackVy: 0,
        knockbackTimer: 0
    };
}

function updateEnemies(dt) {
    const dtMs = dt * 1000;
    for (const e of game.enemies) {
        if (!e.alive) continue;

        // Update slow
        if (e.slowTimer > 0) {
            e.slowTimer -= dtMs;
            if (e.slowTimer <= 0) {
                e.slowFactor = 1;
                e.currentSpeed = e.speed;
            }
        }

        // Update sheep timer
        if (e.sheepTimer > 0) {
            e.sheepTimer -= dtMs;
            if (e.sheepTimer <= 0) {
                e.isSheep = false;
            }
        }

        // Apply knockback — smooth backward push
        if (e.knockbackTimer > 0) {
            e.knockbackTimer -= dtMs;
            e.x += e.knockbackVx * dt;
            e.y += e.knockbackVy * dt;
            e.knockbackVx *= 0.88;
            e.knockbackVy *= 0.88;
            // If pushed close to previous waypoint, snap back to it
            if (e.waypointIndex > 1) {
                const prev = WAYPOINTS[e.waypointIndex - 1];
                const wp = WAYPOINTS[e.waypointIndex];
                const toPrev = Math.sqrt((prev.x - e.x) ** 2 + (prev.y - e.y) ** 2);
                const segLen = Math.sqrt((wp.x - prev.x) ** 2 + (wp.y - prev.y) ** 2);
                if (toPrev < segLen * 0.25) {
                    e.waypointIndex--;
                    e.x = prev.x;
                    e.y = prev.y;
                }
            }
            if (e.knockbackTimer <= 0) {
                e.knockbackVx = 0;
                e.knockbackVy = 0;
            }
        }

        // Move along waypoints with lane offset (spread across path width)
        if (e.knockbackTimer > 0) continue;
        if (e.waypointIndex >= WAYPOINTS.length) continue;
        const wp = WAYPOINTS[e.waypointIndex];
        // Segment direction approaching this waypoint
        let segDx, segDy;
        if (e.waypointIndex > 1) {
            const prev = WAYPOINTS[e.waypointIndex - 1];
            segDx = wp.x - prev.x;
            segDy = wp.y - prev.y;
        } else {
            segDx = WAYPOINTS[1].x - WAYPOINTS[0].x;
            segDy = WAYPOINTS[1].y - WAYPOINTS[0].y;
        }
        const segLen = Math.sqrt(segDx * segDx + segDy * segDy) || 1;
        const perpX = -segDy / segLen;
        const perpY = segDx / segLen;
        const targetX = wp.x + perpX * e.laneOffset;
        const targetY = wp.y + perpY * e.laneOffset;

        const dx = targetX - e.x;
        const dy = targetY - e.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const moveSpeed = e.currentSpeed * dt;

        if (d <= moveSpeed + 1) {
            e.x = targetX;
            e.y = targetY;
            e.waypointIndex++;
            if (e.waypointIndex >= WAYPOINTS.length) {
                enemyReachedExit(e);
            }
        } else {
            e.x += (dx / d) * moveSpeed;
            e.y += (dy / d) * moveSpeed;
        }
    }
    // Remove dead/escaped
    game.enemies = game.enemies.filter(e => e.alive);
}

function enemyReachedExit(e) {
    e.alive = false;
    const def = ENEMY_DEFS[e.type];
    const livesLost = e.type === 'boss' ? 5 : e.type === 'tank' ? 3 : 1;
    game.lives -= livesLost;
    updateHUD();
    if (game.lives <= 0) {
        game.lives = 0;
        endGame('gameover');
    }
}

function applySlow(enemy, factor, duration) {
    enemy.slowFactor = Math.min(enemy.slowFactor, factor);
    enemy.currentSpeed = enemy.speed * enemy.slowFactor;
    enemy.slowTimer = Math.max(enemy.slowTimer, duration);
}

function applyKnockback(enemy, distance) {
    if (enemy.waypointIndex >= WAYPOINTS.length) return;
    const wp = WAYPOINTS[enemy.waypointIndex];
    const dx = wp.x - enemy.x;
    const dy = wp.y - enemy.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) return;
    // Give a smooth backward velocity instead of teleporting
    const knockSpeed = distance * 6;
    enemy.knockbackVx = -(dx / d) * knockSpeed;
    enemy.knockbackVy = -(dy / d) * knockSpeed;
    enemy.knockbackTimer = 0.25;
}

function createKnockbackShockwave(x, y) {
    for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 30 + Math.random() * 100;
        game.particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 0.25 + Math.random() * 0.3, maxLife: 0.55,
            color: '#AED6F1', size: 2 + Math.random() * 3
        });
    }
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.35, maxLife: 0.35,
        color: '#5DADE2', size: 30, ring: true
    });
}

// ==================== PROJECTILE LOGIC ====================
function createProjectile(tower, target) {
    const st = towerStats(tower);
    const noTrack = tower.type === 'fire';
    const flightDist = Math.sqrt((target.x - tower.x) ** 2 + (target.y - tower.y) ** 2);
    const p = {
        x: tower.x,
        y: tower.y,
        target: noTrack ? null : target,
        targetX: target.x,
        targetY: target.y,
        startX: tower.x,
        startY: tower.y,
        damage: st.damage,
        speed: st.bulletSpeed,
        type: tower.type,
        color: st.bulletColor,
        splashRadius: st.splashRadius,
        splashDmgPct: st.splashDmgPct,
        slowFactor: st.slowFactor,
        slowDuration: st.slowDuration,
        chainCount: st.chainCount,
        chainRange: st.chainRange,
        chainFalloff: st.chainFalloff,
        flameRadius: st.flameRadius,
        flameDuration: st.flameDuration,
        flameTickInterval: st.flameTickInterval,
        sheepDuration: st.sheepDuration,
        knockbackDist: st.knockbackDist,
        arcHeight: st.arcHeight,
        flightDistance: flightDist,
        progress: 0,
        alive: true,
        towerX: tower.x,
        towerY: tower.y
    };
    // Missile: vertical launch then arc toward target
    if (tower.type === 'missile') {
        p.phase = 'launch';
        p.launchHeight = 55 + Math.random() * 35;
        p.launchSpeed = 300;
        p.bezierP0 = null;
        p.bezierP1 = null;
        p.bezierP2 = null;
        p.bezierT = 0;
    }
    game.projectiles.push(p);
}

function updateProjectiles(dt) {
    for (const p of game.projectiles) {
        if (!p.alive) continue;

        // Fire projectiles fly to fixed position (not tracking target)
        if (p.type === 'fire') {
            const dx = p.targetX - p.x;
            const dy = p.targetY - p.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            const moveSpeed = p.speed * dt;
            if (d <= moveSpeed + 2) {
                p.x = p.targetX;
                p.y = p.targetY;
                handleImpact(p);
                p.alive = false;
            } else {
                p.x += (dx / d) * moveSpeed;
                p.y += (dy / d) * moveSpeed;
            }
            continue;
        }

        // Missile — vertical launch then bezier arc toward target
        if (p.type === 'missile') {
            if (p.phase === 'launch') {
                // Update target tracking during launch
                if (p.target && p.target.alive) {
                    p.targetX = p.target.x;
                    p.targetY = p.target.y;
                }
                // Vertical launch: fly straight up from silo
                p.y -= p.launchSpeed * dt;
                if (p.y <= p.startY - p.launchHeight) {
                    p.phase = 'cruise';
                    p.y = p.startY - p.launchHeight;
                    // Lock bezier curve at cruise start
                    p.bezierP0 = { x: p.x, y: p.y };
                    p.bezierP2 = { x: p.targetX, y: p.targetY };
                    const midX = (p.bezierP0.x + p.bezierP2.x) / 2;
                    const midY = Math.min(p.bezierP0.y, p.bezierP2.y) - p.arcHeight;
                    p.bezierP1 = { x: midX, y: midY };
                    p.bezierLen = bezierLength(p.bezierP0, p.bezierP1, p.bezierP2);
                    p.bezierDist = 0;
                }
                spawnMissileTrail(p);
                continue;
            }
            // Cruise phase: follow bezier curve to target
            p.bezierDist += p.speed * dt;
            if (p.bezierDist >= p.bezierLen) {
                const pos = bezierPoint(p.bezierP0, p.bezierP1, p.bezierP2, 1);
                p.x = pos.x; p.y = pos.y;
                handleImpact(p);
                p.alive = false;
            } else {
                const t = p.bezierDist / p.bezierLen;
                const pos = bezierPoint(p.bezierP0, p.bezierP1, p.bezierP2, t);
                p.x = pos.x; p.y = pos.y;
            }
            spawnMissileTrail(p);
            continue;
        }

        if (!p.target || !p.target.alive) {
            p.alive = false;
            continue;
        }

        const dx = p.target.x - p.x;
        const dy = p.target.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);

        // Lightning is instant
        if (p.type === 'tesla' && p.speed > 9000) {
            handleImpact(p);
            p.alive = false;
            continue;
        }

        const moveSpeed = p.speed * dt;
        if (d <= moveSpeed + 2) {
            handleImpact(p);
            p.alive = false;
        } else {
            p.x += (dx / d) * moveSpeed;
            p.y += (dy / d) * moveSpeed;
        }
    }
    game.projectiles = game.projectiles.filter(p => p.alive);
}

function handleImpact(p) {
    // Fire projectiles create a persistent ground fire zone
    if (p.type === 'fire') {
        createFireZone(p.x, p.y, p.flameRadius, p.damage, p.flameDuration, p.flameTickInterval);
        createFireIgnition(p.x, p.y, p.flameRadius);
        return;
    }

    // Missile — big splash explosion at impact point
    if (p.type === 'missile') {
        createMissileExplosion(p.x, p.y, p.splashRadius);
        for (const e of game.enemies) {
            if (!e.alive) continue;
            const d = dist({ x: p.x, y: p.y }, e);
            if (d <= p.splashRadius) {
                const dmg = Math.floor(p.damage * (1 - (d / p.splashRadius) * 0.5));
                dealDamage(e, Math.max(Math.floor(p.damage * p.splashDmgPct), dmg));
            }
        }
        return;
    }

    // Knockback — push enemy backward along the path
    if (p.type === 'knockback') {
        if (!p.target || !p.target.alive) return;
        dealDamage(p.target, p.damage);
        applyKnockback(p.target, p.knockbackDist);
        createHitSpark(p.target.x, p.target.y, '#C8E0F8');
        createKnockbackShockwave(p.target.x, p.target.y);
        return;
    }

    // Sheep — transform target into a helpless sheep
    if (p.type === 'sheep') {
        if (!p.target || !p.target.alive) return;
        dealDamage(p.target, p.damage);
        applySlow(p.target, 0.25, p.sheepDuration);
        p.target.isSheep = true;
        p.target.sheepTimer = p.sheepDuration;
        createSheepTransform(p.target.x, p.target.y);
        return;
    }

    if (!p.target || !p.target.alive) return;

    if (p.splashRadius > 0) {
        // Splash damage (cannon)
        for (const e of game.enemies) {
            if (!e.alive) continue;
            const d = dist(p.target, e);
            if (d <= p.splashRadius) {
                const dmg = e === p.target ? p.damage : Math.floor(p.damage * p.splashDmgPct);
                dealDamage(e, dmg);
            }
        }
        createSplashRing(p.target.x, p.target.y, p.splashRadius, '#e74c3c');
    } else if (p.slowFactor > 0) {
        // Ice slow
        dealDamage(p.target, p.damage);
        applySlow(p.target, p.slowFactor, p.slowDuration);
        createHitSpark(p.target.x, p.target.y, '#aed6f1');
    } else if (p.chainCount > 0) {
        // Chain lightning
        dealDamage(p.target, p.damage);
        createLightningArc(p.towerX, p.towerY, p.target.x, p.target.y);
        chainLightning(p.target, p.damage, p.chainCount - 1, p.chainRange, p.chainFalloff, new Set([p.target.id]));
    } else {
        // Arrow - single target
        dealDamage(p.target, p.damage);
        createHitSpark(p.target.x, p.target.y, '#f1c40f');
    }
}

function chainLightning(sourceEnemy, baseDmg, remainingChains, chainRange, falloff, visited) {
    if (remainingChains <= 0) return;
    let nearest = null;
    let nearestDist = Infinity;
    for (const e of game.enemies) {
        if (!e.alive || visited.has(e.id)) continue;
        const d = dist(sourceEnemy, e);
        if (d <= chainRange && d < nearestDist) {
            nearest = e;
            nearestDist = d;
        }
    }
    if (nearest) {
        const dmg = Math.floor(baseDmg * (1 - falloff));
        dealDamage(nearest, dmg);
        visited.add(nearest.id);
        createLightningArc(sourceEnemy.x, sourceEnemy.y, nearest.x, nearest.y);
        chainLightning(nearest, dmg, remainingChains - 1, chainRange, falloff, visited);
    }
}

function dealDamage(enemy, dmg) {
    enemy.hp -= dmg;
    if (enemy.hp <= 0) {
        enemy.hp = 0;
        enemy.alive = false;
        game.gold += enemy.reward;
        game.score += enemy.reward * 10;
        createDeathExplosion(enemy.x, enemy.y, enemy.size, enemy.color);
        updateHUD();
        updateTowerButtons();
    }
}

// ==================== WAVE MANAGEMENT ====================
function startNextWave() {
    if (game.state === 'wave_active') return;
    if (game.waveNum >= game.totalWaves && game.state !== 'victory') return;
    game.waveNum++;
    game.state = 'wave_active';
    game.spawnQueue = generateWave(game.waveNum);
    game.spawnInterval = spawnInterval(game.waveNum);
    game.spawnTimer = 0;
    game.waveSpawningDone = false;
    game.countdown = 0;
    updateHUD();
    document.getElementById('start-wave-btn').disabled = true;
    document.getElementById('countdown-display').textContent = '';
}

function updateWaveSpawning(dt) {
    if (game.state !== 'wave_active' || game.waveSpawningDone) return;
    game.spawnTimer -= dt * 1000 * game.speedMult;
    while (game.spawnTimer <= 0 && game.spawnQueue.length > 0) {
        const type = game.spawnQueue.shift();
        const enemy = createEnemy(type, game.waveNum);
        game.enemies.push(enemy);
        game.spawnTimer += game.spawnInterval / game.speedMult;
    }
    if (game.spawnQueue.length === 0 && game.enemies.every(e => !e.alive)) {
        game.waveSpawningDone = true;
    }
}

function checkWaveComplete() {
    if (game.state !== 'wave_active') return;
    if (!game.waveSpawningDone) return;
    if (game.enemies.length > 0) return; // still some alive

    // Wave complete
    const bonus = 50 + game.waveNum * 10;
    game.gold += bonus;
    game.score += bonus;
    game.state = 'idle';
    document.getElementById('start-wave-btn').disabled = false;

    if (game.waveNum >= game.totalWaves) {
        endGame('victory');
    } else {
        document.getElementById('countdown-display').textContent = '✔ 波次完成';
    }
    updateHUD();
    updateTowerButtons();
}

// ==================== PARTICLE SYSTEM ====================
function createHitSpark(x, y, color) {
    for (let i = 0; i < 5; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 80;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.3,
            maxLife: 0.6,
            color,
            size: 2 + Math.random() * 3
        });
    }
}

function createSplashRing(x, y, radius, color) {
    game.particles.push({
        x, y, vx: 0, vy: 0,
        life: 0.5, maxLife: 0.5,
        color, size: radius, ring: true
    });
}

function createLightningArc(x1, y1, x2, y2) {
    game.particles.push({
        x: x1, y: y1, x2, y2,
        life: 0.15, maxLife: 0.15,
        color: '#f1c40f', size: 2, lightning: true
    });
}

function createDeathExplosion(x, y, size, color) {
    for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 30 + Math.random() * 100;
        game.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.5,
            maxLife: 0.8,
            color,
            size: 1 + Math.random() * size * 0.6
        });
    }
}

function updateParticles(dt) {
    for (const p of game.particles) {
        p.life -= dt;
        if (!p.ring && !p.lightning) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }
    }
    game.particles = game.particles.filter(p => p.life > 0);
}

// ==================== FIRE ZONE SYSTEM ====================
function createFireZone(x, y, radius, damage, duration, tickInterval) {
    game.fireZones.push({
        x, y, radius, damage, duration, maxDuration: duration, tickInterval, tickTimer: 0
    });
}

function createFireIgnition(x, y, radius) {
    for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;

        game.particles.push({

        });

    // Central flash

    });
}

function updateFireZones(dt) {
    const dtMs = dt * 1000;
    for (const fz of game.fireZones) {
        fz.duration -= dtMs;
        fz.tickTimer -= dtMs;
        while (fz.tickTimer <= 0) {
            for (const e of game.enemies) {
                if (!e.alive) continue;
                if (dist(fz, e) <= fz.radius) {
                    dealDamage(e, fz.damage);
                }
            }
            fz.tickTimer += fz.tickInterval;
        }
    }
    game.fireZones = game.fireZones.filter(fz => fz.duration > 0);
}

function drawFireZones() {
    const time = Date.now() / 1000;
    for (const fz of game.fireZones) {
        const lifeRatio = fz.duration / fz.maxDuration;
        const fadeAlpha = Math.min(1, lifeRatio * 2.5);
        const flicker = 1 + Math.sin(time * 18 + fz.x) * 0.08 + Math.sin(time * 23 + fz.y) * 0.07;

        // Outer heat glow
        const glowGrad = ctx.createRadialGradient(fz.x, fz.y, fz.radius * 0.15, fz.x, fz.y, fz.radius * flicker);
        glowGrad.addColorStop(0, `rgba(255,200,40,${0.7 * fadeAlpha})`);
        glowGrad.addColorStop(0.45, `rgba(255,120,15,${0.45 * fadeAlpha})`);
        glowGrad.addColorStop(0.75, `rgba(255,50,5,${0.2 * fadeAlpha})`);
        glowGrad.addColorStop(1, 'rgba(255,20,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(fz.x, fz.y, fz.radius * flicker, 0, Math.PI * 2);
        ctx.fill();

        // Inner fire ring
        ctx.strokeStyle = `rgba(255,180,30,${0.5 * fadeAlpha})`;
        ctx.lineWidth = 3 * fadeAlpha;
        ctx.beginPath();
        ctx.arc(fz.x, fz.y, fz.radius * 0.75, 0, Math.PI * 2);
        ctx.stroke();

        // Flame tongues on the ground
        const numFlames = 8;
        for (let i = 0; i < numFlames; i++) {
            const a = (i / numFlames) * Math.PI * 2 + time * 1.5 + i;
            const baseX = fz.x + Math.cos(a) * fz.radius * 0.4;
            const baseY = fz.y + Math.sin(a) * fz.radius * 0.4;
            const h = fz.radius * (0.3 + 0.35 * Math.sin(time * 8 + i * 1.7));
            const dirA = a + Math.PI / 2;
            const tipX = baseX + Math.cos(dirA) * h * flicker;
            const tipY = baseY + Math.sin(dirA) * h * flicker;
            const fw = 3 + Math.sin(time * 10 + i) * 1.5;

            ctx.fillStyle = `rgba(255,160,30,${0.6 * fadeAlpha})`;
            ctx.beginPath();
            ctx.moveTo(baseX + Math.cos(a) * fw, baseY + Math.sin(a) * fw);
            ctx.quadraticCurveTo(baseX + Math.cos(dirA) * h * 0.3, baseY + Math.sin(dirA) * h * 0.3, tipX, tipY);
            ctx.quadraticCurveTo(baseX - Math.cos(dirA) * h * 0.3, baseY - Math.sin(dirA) * h * 0.3, baseX - Math.cos(a) * fw, baseY - Math.sin(a) * fw);
            ctx.closePath();
            ctx.fill();
        }

        // Ember sparks rising up
        for (let i = 0; i < 6; i++) {
            const sparkA = Math.random() * Math.PI * 2;
            const sparkR = Math.random() * fz.radius * 0.8;
            const sx = fz.x + Math.cos(sparkA) * sparkR;
            const sy = fz.y + Math.sin(sparkA) * sparkR - Math.random() * 15;
            const sparkAlpha = 0.4 + Math.random() * 0.4;
            ctx.fillStyle = `rgba(255,200,50,${sparkAlpha * fadeAlpha})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 1.2 + Math.random() * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function spawnMissileTrail(p) {
    // Dense smoke puff behind missile
    let angle;
    if (p.phase === 'launch') {
        angle = -Math.PI / 2; // Going straight up, trail goes downward
    } else if (p.bezierP1 && p.bezierLen > 0) {
        const t = Math.min(p.bezierDist / p.bezierLen, 1);
        const tan = bezierTangent(p.bezierP0, p.bezierP1, p.bezierP2, t);
        angle = Math.atan2(tan.y, tan.x);
    } else {
        angle = Math.atan2(p.targetY - p.startY, p.targetX - p.startX);
    }
    const tx = p.x - Math.cos(angle) * 8;
    const ty = p.y - Math.sin(angle) * 8;
    const isLaunch = p.phase === 'launch';
    game.particles.push({
        x: tx + (Math.random() - 0.5) * 6,
        y: ty + (Math.random() - 0.5) * 6,
        vx: (Math.random() - 0.5) * 30,
        vy: isLaunch ? (10 + Math.random() * 25) : (-15 - Math.random() * 25),
        life: 0.4 + Math.random() * 0.5,
        maxLife: 0.9,
        color: '#888',
        size: 4 + Math.random() * 7,
        smoke: true
    });
    // Orange fire spark
    game.particles.push({
        x: tx + (Math.random() - 0.5) * 3,
        y: ty + (Math.random() - 0.5) * 3,
        vx: (Math.random() - 0.5) * 50,
        vy: isLaunch ? (15 + Math.random() * 40) : (-20 - Math.random() * 40),

        color: Math.random() < 0.5 ? '#FFB830' : '#FF6B35',
        size: 1.5 + Math.random() * 2.5
    });
}
