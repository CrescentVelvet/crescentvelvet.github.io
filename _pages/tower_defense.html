    ctx.fillStyle = crystalGrad;
    ctx.beginPath();
    ctx.roundRect(-colW, -colH, colW * 2, colH + 2, 2);
    ctx.fill();
    ctx.strokeStyle = '#FF9999';
    ctx.lineWidth = 1;
    ctx.strokeRect(-colW, -colH, colW * 2, colH + 2);

    // Crystal inner glow
    const innerGlowGrad = ctx.createLinearGradient(0, -colH, 0, 0);
    innerGlowGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
    innerGlowGrad.addColorStop(0.5, 'rgba(255,100,100,0.3)');
    innerGlowGrad.addColorStop(1, 'rgba(200,0,0,0.1)');
    ctx.fillStyle = innerGlowGrad;
    ctx.fillRect(-colW + 1, -colH + 1, colW * 2 - 2, colH);

    // Energy rings around crystal
    for (let i = 0; i < 3; i++) {
        const ry = -colH + (i + 1) * colH / 4;
        const ringAlpha = 0.3 + Math.sin(time * 5 + i) * 0.2;
        ctx.strokeStyle = `rgba(255,150,150,${ringAlpha})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-colW - 2, ry);
        ctx.lineTo(colW + 2, ry);
        ctx.stroke();
    }

    // Focusing lens on top
    const lensW = colW + 2;
    const lensH = 4 + lv;
    const lensGrad = ctx.createLinearGradient(0, -colH - lensH, 0, -colH);
    lensGrad.addColorStop(0, '#FF9999');
    lensGrad.addColorStop(0.5, '#FF4444');
    lensGrad.addColorStop(1, '#AA1111');
    ctx.fillStyle = lensGrad;
    ctx.beginPath();
    ctx.moveTo(-lensW, -colH);
    ctx.lineTo(lensW, -colH);
    ctx.lineTo(lensW - 2, -colH - lensH);
    ctx.lineTo(-lensW + 2, -colH - lensH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#FFBBBB';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Lens glow
    ctx.fillStyle = `rgba(255,200,200,${0.4 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(0, -colH - lensH * 0.5, lensW * 0.6, 0, Math.PI * 2);
    ctx.fill();

    // Rotating emitter prongs
    for (let i = 0; i < 3; i++) {
        const a = time * 2 + i * Math.PI * 2 / 3;
        const px = Math.cos(a) * (lensW * 0.7);
        const py = -colH - lensH - 3 + Math.sin(a) * 2;
        ctx.fillStyle = '#FF6666';
        ctx.beginPath();
        ctx.arc(px, py, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Emitter tip — brightest point
    ctx.fillStyle = `rgba(255,255,255,${0.7 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(0, -colH - lensH - 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Outer emitter glow
    ctx.fillStyle = `rgba(255,100,100,${0.3 + pulse * 0.2})`;
    ctx.beginPath();
    ctx.arc(0, -colH - lensH - 1, 6, 0, Math.PI * 2);
    ctx.fill();

    // Link energy beams drawn in main render loop
}

// ===== LASER CORE TOWER — Overcharged mega-crystal absorbing network energy =====
function drawLaserCoreTower(t, st, lv) {
    const bw = 10 + lv;
    const h = 18 + lv * 4;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 4) * 0.5;
    const linkedCount = t.linkedCount || 0;
    const isCore = t.isCore;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, 5, bw + 4, bw * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    // Heavy metallic base
    const baseGrad = ctx.createLinearGradient(0, 0, 0, bw + 3);
    baseGrad.addColorStop(0, '#3A3A4E');
    baseGrad.addColorStop(0.3, '#1A1A2E');
    baseGrad.addColorStop(1, '#0A0A1E');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 3, 2, (bw + 3) * 2, bw + 5, 3);
    ctx.fill();
    ctx.strokeStyle = '#FF4422';
    ctx.lineWidth = isCore ? 2.5 : 1;
    ctx.stroke();

    // Energy conduits — glowing brighter when core
    const conduitAlpha = isCore ? (0.6 + pulse * 0.4) : (0.2 + pulse * 0.15);
    for (let i = -1; i <= 1; i += 2) {
        const cx = i * bw * 0.5;
        ctx.strokeStyle = `rgba(255,100,40,${conduitAlpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, 4);
        ctx.lineTo(cx, bw + 3);
        ctx.stroke();
    }
    // Link indicators
    if (linkedCount > 0) {
        for (let i = 0; i < linkedCount && i < 5; i++) {
            const lx = -bw + 2 + i * 4.5;
            ctx.fillStyle = `rgba(255,180,40,${0.5 + pulse * 0.4})`;
            ctx.beginPath();
            ctx.arc(lx, bw + 2, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Massive crystal column — chunky and glowing
    const colW = 6 + lv;
    const colH = h * 0.5;
    const crystalGrad = ctx.createLinearGradient(-colW, 0, colW, 0);
    if (isCore) {
        crystalGrad.addColorStop(0, '#FF3311');
        crystalGrad.addColorStop(0.3, '#FF6644');
        crystalGrad.addColorStop(0.5, '#FFAA66');
        crystalGrad.addColorStop(0.7, '#FF4422');
        crystalGrad.addColorStop(1, '#AA1100');
    } else {
        crystalGrad.addColorStop(0, '#6B2020');
        crystalGrad.addColorStop(0.3, '#A04040');
        crystalGrad.addColorStop(0.5, '#885050');
        crystalGrad.addColorStop(0.7, '#5B1818');
        crystalGrad.addColorStop(1, '#3A1010');
    }
    ctx.fillStyle = crystalGrad;
    ctx.beginPath();
    ctx.roundRect(-colW, -colH, colW * 2, colH + 3, 2);
    ctx.fill();
    ctx.strokeStyle = isCore ? '#FFAA88' : '#664444';
    ctx.lineWidth = isCore ? 2 : 1;
    ctx.strokeRect(-colW, -colH, colW * 2, colH + 3);

    // Core pulsing energy inside crystal
    if (isCore) {
        const coreGlow = ctx.createRadialGradient(0, -colH * 0.3, colW * 0.3, 0, -colH * 0.3, colW * 1.2);
        coreGlow.addColorStop(0, 'rgba(255,255,200,0.7)');
        coreGlow.addColorStop(0.4, 'rgba(255,150,50,0.4)');
        coreGlow.addColorStop(1, 'rgba(255,50,0,0)');
        ctx.fillStyle = coreGlow;
        ctx.fillRect(-colW, -colH, colW * 2, colH);

        // Energy arcs crackling inside
        ctx.strokeStyle = `rgba(255,255,200,${0.3 + pulse * 0.3})`;
        ctx.lineWidth = 1;
        for (let a = 0; a < 3; a++) {
            ctx.beginPath();
            const ay = -colH + a * colH / 3 + Math.sin(time * 8 + a) * 3;
            ctx.moveTo(-colW + 1, ay);
            ctx.quadraticCurveTo(0, ay + Math.sin(time * 7 + a) * 5, colW - 1, ay);
            ctx.stroke();
        }
    } else {
        // Dormant relay glow
        ctx.fillStyle = `rgba(255,80,40,${0.08 + Math.sin(time * 2) * 0.04})`;
        ctx.fillRect(-colW, -colH, colW * 2, colH);
    }

    // Focusing lens — larger and more intense
    const lensW = colW + 3;
    const lensH = 5 + lv;
    const lensGrad = ctx.createLinearGradient(0, -colH - lensH, 0, -colH);
    if (isCore) {
        lensGrad.addColorStop(0, '#FFFFFF');
        lensGrad.addColorStop(0.3, '#FFCC88');
        lensGrad.addColorStop(0.7, '#FF5533');
        lensGrad.addColorStop(1, '#CC2200');
    } else {
        lensGrad.addColorStop(0, '#886666');
        lensGrad.addColorStop(0.5, '#664444');
        lensGrad.addColorStop(1, '#442222');
    }
    ctx.fillStyle = lensGrad;
    ctx.beginPath();
    ctx.moveTo(-lensW, -colH);
    ctx.lineTo(lensW, -colH);
    ctx.lineTo(lensW - 2, -colH - lensH);
    ctx.lineTo(-lensW + 2, -colH - lensH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = isCore ? '#FFCCAA' : '#886666';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Bright emitter point
    ctx.fillStyle = `rgba(255,255,255,${isCore ? (0.8 + pulse * 0.2) : 0.3})`;
    ctx.beginPath();
    ctx.arc(0, -colH - lensH - 1, isCore ? 3.5 : 2, 0, Math.PI * 2);
    ctx.fill();
    if (isCore) {
        ctx.fillStyle = `rgba(255,200,100,${0.4 + pulse * 0.3})`;
        ctx.beginPath();
        ctx.arc(0, -colH - lensH - 1, 8, 0, Math.PI * 2);
        ctx.fill();
    }

    // Charging particles swirling up (only when core)
    if (isCore) {
        for (let i = 0; i < 4; i++) {
            const a = time * 3 + i * Math.PI / 2;
            const r = bw + 3 + Math.sin(time * 5 + i) * 2;
            const px = Math.cos(a) * r;
            const py = -colH * 0.5 + Math.sin(a * 0.5) * colH * 0.7;
            ctx.fillStyle = `rgba(255,200,100,${0.3 + Math.sin(time * 6 + i) * 0.2})`;
            ctx.beginPath();
            ctx.arc(px, py, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// ===== LASER RESONANCE TOWER — Network hub with shared range antenna =====
function drawLaserResonanceTower(t, st, lv) {
    const bw = 9 + lv;
    const h = 16 + lv * 4;
    const time = Date.now() / 1000;
    const pulse = 0.6 + Math.sin(time * 3.5) * 0.4;
    const linkedCount = t.linkedCount || 0;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 4, bw + 3, bw * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Metallic base with golden accents
    const baseGrad = ctx.createLinearGradient(0, 0, 0, bw + 2);
    baseGrad.addColorStop(0, '#5A5A55');
    baseGrad.addColorStop(0.4, '#4A4A40');
    baseGrad.addColorStop(1, '#2A2A20');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 2, 1, (bw + 2) * 2, bw + 4, 3);
    ctx.fill();
    ctx.strokeStyle = '#8A8030';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Golden conduits
    for (let i = -1; i <= 1; i += 2) {
        const cx = i * bw * 0.5;
        ctx.strokeStyle = `rgba(255,200,80,${0.3 + pulse * 0.3})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx, 3);
        ctx.lineTo(cx, bw + 2);
        ctx.stroke();
    }
    // Link count display on base
    if (linkedCount > 0) {
        for (let i = 0; i < linkedCount && i < 4; i++) {
            const lx = -bw + 3 + i * 5;
            ctx.fillStyle = `rgba(255,220,80,${0.5 + pulse * 0.4})`;
            ctx.beginPath();
            ctx.arc(lx, bw + 1, 1.8, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Crystal column — amber/golden hue
    const colW = 4 + lv * 0.5;
    const colH = h * 0.4;
    const crystalGrad = ctx.createLinearGradient(-colW, 0, colW, 0);
    crystalGrad.addColorStop(0, '#6B5A10');
    crystalGrad.addColorStop(0.3, '#D0A830');
    crystalGrad.addColorStop(0.5, '#F0D060');
    crystalGrad.addColorStop(0.7, '#B89020');
    crystalGrad.addColorStop(1, '#5A4A08');
    ctx.fillStyle = crystalGrad;
    ctx.beginPath();
    ctx.roundRect(-colW, -colH, colW * 2, colH + 2, 2);
    ctx.fill();
    ctx.strokeStyle = '#E0C040';
    ctx.lineWidth = 1;
    ctx.strokeRect(-colW, -colH, colW * 2, colH + 2);

    // Antenna dish — satellite-style above crystal
    const dishY = -colH - 5;
    const dishR = 6 + lv;
    ctx.fillStyle = 'rgba(200,180,100,0.2)';
    ctx.beginPath();
    ctx.arc(0, dishY, dishR, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#E0C040';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, dishY, dishR, Math.PI, 0);
    ctx.stroke();
    // Dish struts
    for (let i = -1; i <= 1; i += 2) {
        ctx.strokeStyle = '#C0A040';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(i * dishR * 0.6, dishY);
        ctx.lineTo(0, -colH);
        ctx.stroke();
    }
    // Dish center receiver
    ctx.fillStyle = `rgba(255,240,120,${0.6 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(0, dishY, 2, 0, Math.PI * 2);
    ctx.fill();

    // Emitter on top of dish
    const emitterY = dishY - dishR * 0.5;
    ctx.fillStyle = `rgba(255,255,200,${0.5 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.moveTo(0, emitterY - 4);
    ctx.lineTo(-2, emitterY);
    ctx.lineTo(2, emitterY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(0, emitterY - 4, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Range-sharing rings (pulsing outward)
    if (linkedCount > 0) {
        for (let i = 0; i < 2; i++) {
            const rPhase = (time * 0.8 + i * 0.5) % 1;
            const rRing = dishR + 4 + rPhase * 10;
            ctx.strokeStyle = `rgba(240,200,60,${0.15 * (1 - rPhase)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, emitterY - 2, rRing, 0, Math.PI * 2);
            ctx.stroke();
        }
        // Tiny data pulses traveling along rings
        for (let i = 0; i < 3; i++) {
            const da = time * 2 + i * Math.PI * 2 / 3;
            const dr = dishR + 5 + Math.sin(time * 4 + i) * 3;
            ctx.fillStyle = `rgba(255,240,150,0.6)`;
            ctx.beginPath();
            ctx.arc(Math.cos(da) * dr, emitterY - 2 + Math.sin(da) * dr, 1, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

        for (let i = 0; i < linkedCount && i < 4; i++) {

            ctx.fillStyle = `rgba(240,150,255,${0.5 + pulse * 0.4})`;
            ctx.beginPath();
            ctx.arc(lx, bw + 1, 1.8, 0, Math.PI * 2);
            ctx.fill();
        }

    // Prism crystal column — faceted, wider at top

    prismGrad.addColorStop(0, '#5A2070');
    prismGrad.addColorStop(0.2, '#B050D0');
    prismGrad.addColorStop(0.5, '#E080F0');
    prismGrad.addColorStop(0.8, '#A040C0');
    prismGrad.addColorStop(1, '#4A1070');

    ctx.lineTo(-colW + 2, -colH);
    ctx.lineTo(colW - 2, -colH);
    ctx.lineTo(colW, -colH + 3);
    ctx.lineTo(colW, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#D080E0';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = `rgba(240,200,255,${0.2 + pulse * 0.15})`;
    ctx.fillRect(-colW + 1, -colH + 2, colW * 2 - 2, colH - 2);

    // Horizontal energy bars on crystal
    for (let i = 0; i < 3; i++) {
        const ry = -colH + (i + 1) * colH / 4;
        ctx.strokeStyle = `rgba(240,200,255,${0.3 + Math.sin(time * 5 + i) * 0.2})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-colW - 1, ry);
        ctx.lineTo(colW + 1, ry);
        ctx.stroke();
    }

    // Main prism lens
    const lensW = colW + 2;
    const lensH = 5 + lv;
    const lensGrad = ctx.createLinearGradient(0, -colH - lensH, 0, -colH);
    lensGrad.addColorStop(0, '#F0C0FF');
    lensGrad.addColorStop(0.4, '#D060F0');
    lensGrad.addColorStop(1, '#8030A0');
    ctx.fillStyle = lensGrad;
    ctx.beginPath();
    ctx.moveTo(-lensW, -colH);
    ctx.lineTo(lensW, -colH);
    ctx.lineTo(lensW - 1, -colH - lensH);
    ctx.lineTo(-lensW + 1, -colH - lensH);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#E0A0F0';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Emitter point
    ctx.fillStyle = `rgba(255,255,255,${0.6 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(0, -colH - lensH - 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,200,255,${0.3 + pulse * 0.2})`;
    ctx.beginPath();
    ctx.arc(0, -colH - lensH - 1, 6, 0, Math.PI * 2);
    ctx.fill();

    // Orbiting refract crystals
    for (let i = 0; i < 4; i++) {
        const oa = time * 2.5 + i * Math.PI / 2;
        const or = bw + 4 + Math.sin(time * 3 + i) * 2;
        const ox = Math.cos(oa) * or;
        const oy = -colH * 0.4 + Math.sin(oa * 1.3) * colH * 0.5;
        // Small prism crystal
        ctx.fillStyle = `rgba(220,160,255,${0.5 + Math.sin(time * 5 + i) * 0.3})`;
        ctx.save();
        ctx.translate(ox, oy);
        ctx.rotate(oa * 2);
        ctx.beginPath();
        ctx.moveTo(0, -2.5);
        ctx.lineTo(2, 0);
        ctx.lineTo(0, 2.5);
        ctx.lineTo(-2, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,200,255,0.6)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.restore();
    }

    // Refraction beams between orbiting crystals
    if (linkedCount > 0) {
        ctx.strokeStyle = `rgba(255,150,255,${0.08 + pulse * 0.05})`;
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 4; i++) {
            const a1 = time * 2.5 + i * Math.PI / 2;
            const a2 = time * 2.5 + ((i + 1) % 4) * Math.PI / 2;
            const r = bw + 4;
            ctx.beginPath();
            ctx.moveTo(Math.cos(a1) * r, -colH * 0.4 + Math.sin(a1 * 1.3) * colH * 0.5);
            ctx.lineTo(Math.cos(a2) * r, -colH * 0.4 + Math.sin(a2 * 1.3) * colH * 0.5);
            ctx.stroke();
        }
    }
}

function drawEnemy(e) {
    if (!e.alive) return;
    ctx.save();
    ctx.translate(e.x, e.y);

    const enemyShadow = ctx.createRadialGradient(0, e.size * 0.45, 1, 0, e.size * 0.45, e.size * 1.25);
    enemyShadow.addColorStop(0, 'rgba(0,0,0,0.34)');
    enemyShadow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = enemyShadow;
    ctx.beginPath();
    ctx.ellipse(0, e.size * 0.48, e.size * 1.15, e.size * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();

    // Sheep transformation — draw cute white sheep or turncoat wolf-sheep
    if (e.isSheep) {
        const woolY = -e.size * 0.2;
        const isTurncoat = e.isTurncoat;

        // Woolly body (fluffy cloud-like)
        ctx.fillStyle = isTurncoat ? '#5B3A7A' : '#FEFEFE';
        for (let i = 0; i < 7; i++) {
            const a = (i / 7) * Math.PI * 2;
            const r = e.size * (0.7 + 0.15 * Math.sin(i * 3 + Date.now() / 400));
            ctx.beginPath();
            ctx.arc(Math.cos(a) * r * 0.8, woolY + Math.sin(a) * r * 0.6, e.size * 0.45, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = isTurncoat ? '#6B3A8A' : '#F8F8F8';
        ctx.beginPath();
        ctx.ellipse(0, woolY, e.size * 0.85, e.size * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = isTurncoat ? '#4A2060' : '#DDD';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Sheep head
        const headX = e.size * 0.5;
        const headY = woolY - e.size * 0.4;
        ctx.fillStyle = isTurncoat ? '#2A1030' : '#333';
        ctx.beginPath();
        ctx.ellipse(headX, headY, e.size * 0.28, e.size * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();

        if (isTurncoat) {
            // Horns (curved, menacing)
            ctx.fillStyle = '#8B7D6B';
            ctx.beginPath();
            ctx.moveTo(headX - 2, headY - 4);
            ctx.quadraticCurveTo(headX - 8, headY - 12, headX - 4, headY - 14);
            ctx.quadraticCurveTo(headX - 2, headY - 10, headX - 1, headY - 5);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(headX + 2, headY - 4);
            ctx.quadraticCurveTo(headX + 8, headY - 12, headX + 4, headY - 14);
            ctx.quadraticCurveTo(headX + 2, headY - 10, headX + 1, headY - 5);
            ctx.fill();
            // Glowing red eyes
            ctx.fillStyle = '#FF0000';
            ctx.beginPath(); ctx.arc(headX - 1.5, headY - 1, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(headX + 1.5, headY - 1, 2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FF6666';
            ctx.beginPath(); ctx.arc(headX - 1.5, headY - 1, 1, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(headX + 1.5, headY - 1, 1, 0, Math.PI * 2); ctx.fill();
            // Fangs
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(headX + 2, headY + 2);
            ctx.lineTo(headX + 4, headY + 6);
            ctx.lineTo(headX + 3, headY + 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(headX - 2, headY + 2);
            ctx.lineTo(headX - 4, headY + 6);
            ctx.lineTo(headX - 3, headY + 2);
            ctx.fill();
        } else {
            // Ears
            ctx.fillStyle = '#444';
            ctx.beginPath(); ctx.ellipse(headX - 2, headY - 4, 3, 5, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(headX + 2, headY - 4, 3, 5, 0.3, 0, Math.PI * 2); ctx.fill();
            // Eyes
            ctx.fillStyle = '#FFF';
            ctx.beginPath(); ctx.arc(headX - 1.5, headY - 1, 1.8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(headX + 1.5, headY - 1, 1.8, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(headX - 1.5, headY - 1, 0.8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(headX + 1.5, headY - 1, 0.8, 0, Math.PI * 2); ctx.fill();
        }

        // Tiny legs
        ctx.fillStyle = isTurncoat ? '#1A0A20' : '#333';
        for (let lx = -3; lx <= 3; lx += 6) {
            ctx.fillRect(lx - 1, woolY + e.size * 0.3, 2, e.size * 0.3);
        }

        if (isTurncoat) {
            // Rage particles
            const rAlpha = 0.5 + Math.sin(Date.now() / 300) * 0.3;
            ctx.fillStyle = `rgba(255,80,80,${rAlpha})`;
            ctx.font = `bold ${e.size * 0.6}px sans-serif`;
            ctx.fillText('⚡', e.size * 0.3, -e.size * 0.8 - Math.sin(Date.now() / 250) * 3);
            ctx.fillText('💢', -e.size * 0.5, -e.size * 1.1 - Math.sin(Date.now() / 300) * 2);
        } else {
            // "zzZ" floating text
            const zAlpha = 0.5 + Math.sin(Date.now() / 500) * 0.3;
            ctx.fillStyle = `rgba(200,180,255,${zAlpha})`;
            ctx.font = `${e.size * 0.7}px sans-serif`;
            ctx.fillText('z', e.size * 0.4, -e.size * 0.8 - Math.sin(Date.now() / 300) * 3);
            ctx.fillText('Z', e.size * 0.2, -e.size * 1.2 - Math.sin(Date.now() / 350) * 3);
        }

        // Health bar for sheep
        const sheepBarW = e.size * 2.5;
        const sheepBarH = 3;
        const sheepBarY = -e.size * 1.6;
        ctx.fillStyle = '#333';
        ctx.fillRect(-sheepBarW / 2, sheepBarY, sheepBarW, sheepBarH);
        const sheepHpPct = e.hp / e.maxHp;
        const sheepHpColor = sheepHpPct > 0.5 ? '#2ecc71' : sheepHpPct > 0.25 ? '#f39c12' : '#e74c3c';
        ctx.fillStyle = isTurncoat ? '#9B59B6' : sheepHpColor;
        ctx.fillRect(-sheepBarW / 2, sheepBarY, sheepBarW * sheepHpPct, sheepBarH);

        ctx.restore();
        return;
    }

    // Body
    const isBoss = e.type === 'boss';
    if (isBoss) {
        // Boss glow
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 8 + Math.sin(Date.now() / 200) * 3;
    }
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(0, 0, e.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Slow visual
    if (e.slowTimer > 0 && e.slowFactor < 1) {
        ctx.fillStyle = 'rgba(173,216,230,0.4)';
        ctx.beginPath();
        ctx.arc(0, 0, e.size + 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Health bar
    const barW = e.size * 2.5;
    const barH = 3;
    const barY = -e.size - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(-barW / 2, barY, barW, barH);
    const hpPct = e.hp / e.maxHp;
    const hpColor = hpPct > 0.5 ? '#2ecc71' : hpPct > 0.25 ? '#f39c12' : '#e74c3c';
    ctx.fillStyle = hpColor;
    ctx.fillRect(-barW / 2, barY, barW * hpPct, barH);

    ctx.restore();
}

function drawProjectile(p) {
    if (p.type === 'fire') {
        // Fireball — glowing orb with trail
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 6);
        grad.addColorStop(0, '#FFF8C0');
        grad.addColorStop(0.3, '#FFB830');
        grad.addColorStop(0.7, '#FF6B35');
        grad.addColorStop(1, 'rgba(200,30,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
        ctx.fill();
        // Outer glow
        ctx.fillStyle = 'rgba(255,140,20,0.3)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
        ctx.fill();
    } else if (p.type === 'shrapnel') {
        // Shrapnel fragment — small glowing dart
        const sAngle = Math.atan2(p.vy, p.vx);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(sAngle);
        // Glow
        ctx.fillStyle = 'rgba(255,180,20,0.35)';
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fill();
        // Core
        ctx.fillStyle = '#FFAA00';
        ctx.beginPath();
        ctx.moveTo(6, 0);
        ctx.lineTo(0, -1.5);
        ctx.lineTo(-2, 0);
        ctx.lineTo(0, 1.5);
        ctx.closePath();
        ctx.fill();
        // Bright center
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(2, 0, 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    } else if (p.type === 'missile' || p.type === 'missile_cluster' || p.type === 'missile_nuke' || p.type === 'missile_precision') {
        // Missile — vertical launch then arc toward target
        let angle;
        if (p.phase === 'launch') {
            angle = -Math.PI / 2;
        } else if (p.bezierP1) {
            const t = Math.min(p.bezierDist / p.bezierLen, 1);
            const tan = bezierTangent(p.bezierP0, p.bezierP1, p.bezierP2, t);
            angle = Math.atan2(tan.y, tan.x);
        } else {
            angle = Math.atan2(p.targetY - p.startY, p.targetX - p.startX);
        }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);

        const isNuke = p.type === 'missile_nuke';
        const isCluster = p.type === 'missile_cluster';
        const isPrecision = p.type === 'missile_precision';
        const isLaunch = p.phase === 'launch';

        // Outer glow — variant specific
        const glowColor = isNuke ? 'rgba(255,60,0,0.35)' : isCluster ? 'rgba(180,150,220,0.25)' : isPrecision ? 'rgba(0,200,255,0.25)' : 'rgba(255,140,20,0.25)';
        const glowSize = isNuke ? 22 : isCluster ? 12 : 14;
        ctx.fillStyle = glowColor;
        ctx.beginPath();
        ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
        ctx.fill();

        // Missile body dimensions
        const bodyLen = isNuke ? 32 : isCluster ? 20 : 24;
        const bodyH = isNuke ? 5 : 3.5;
        const bodyColor = isNuke ? '#3A2A1A' : isCluster ? '#E0D8F0' : isPrecision ? '#E0F4F8' : '#F0F0F0';
        const noseColor = isNuke ? '#CC3300' : isCluster ? '#C0A0E0' : isPrecision ? '#00F0FF' : '#CC2222';

        ctx.fillStyle = bodyColor;
        ctx.fillRect(-bodyLen / 2, -bodyH, bodyLen, bodyH * 2);
        ctx.strokeStyle = isPrecision ? '#00ACC1' : '#AAA';
        ctx.lineWidth = 1;
        ctx.strokeRect(-bodyLen / 2, -bodyH, bodyLen, bodyH * 2);

        // Body stripes / markings
        if (isNuke) {
            ctx.fillStyle = '#F0C040';
            ctx.fillRect(-10, -bodyH, 3, bodyH * 2);
            ctx.fillRect(-4, -bodyH, 3, bodyH * 2);
            ctx.fillRect(4, -bodyH, 2, bodyH * 2);
        } else if (isCluster) {
            ctx.fillStyle = '#9B59B6';
            ctx.fillRect(-6, -bodyH, 2, bodyH * 2);
            ctx.fillRect(0, -bodyH, 2, bodyH * 2);
        } else if (isPrecision) {
            ctx.fillStyle = '#00ACC1';
            ctx.fillRect(-8, -bodyH, 2, bodyH * 2);
            ctx.fillRect(-2, -bodyH, 2, bodyH * 2);
            ctx.fillRect(6, -bodyH, 1, bodyH * 2);
        } else {
            ctx.fillStyle = '#E74C3C';
            ctx.fillRect(-8, -bodyH, 3, bodyH * 2);
            ctx.fillRect(-2, -bodyH, 3, bodyH * 2);
        }

        // Nose cone
        ctx.fillStyle = noseColor;
        ctx.beginPath();
        ctx.moveTo(bodyLen / 2, -bodyH - 1);
        ctx.lineTo(bodyLen / 2, bodyH + 1);
        ctx.lineTo(bodyLen / 2 + (isNuke ? 12 : 7), 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = isNuke ? '#992200' : isPrecision ? '#008899' : isCluster ? '#8866AA' : '#991111';
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Rear fins
        ctx.fillStyle = isNuke ? '#2A1A0A' : isPrecision ? '#0A3040' : '#444';
        const finLen = isNuke ? 10 : 6;
        ctx.beginPath(); ctx.moveTo(-bodyLen / 2 + 2, -bodyH); ctx.lineTo(-bodyLen / 2, -bodyH - finLen); ctx.lineTo(-bodyLen / 2 + 5, -bodyH); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-bodyLen / 2 + 2, bodyH); ctx.lineTo(-bodyLen / 2, bodyH + finLen); ctx.lineTo(-bodyLen / 2 + 5, bodyH); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(bodyLen / 4, -bodyH); ctx.lineTo(bodyLen / 4 - 2, -bodyH - finLen * 0.6); ctx.lineTo(bodyLen / 4 + 3, -bodyH); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(bodyLen / 4, bodyH); ctx.lineTo(bodyLen / 4 - 2, bodyH + finLen * 0.6); ctx.lineTo(bodyLen / 4 + 3, bodyH); ctx.closePath(); ctx.fill();

        // Flame exhaust
        const flameLen = isLaunch ? (isNuke ? 40 : 24) : (isNuke ? 28 : 14);
        const flameCore = isNuke ? '#FFB830' : isCluster ? '#D0A0FF' : isPrecision ? '#00E0FF' : '#FFD700';
        const flameMid = isNuke ? '#FF4500' : isCluster ? '#9060C0' : isPrecision ? '#0088CC' : '#FF6B35';
        const flameEnd = isNuke ? 'rgba(200,20,0,0)' : isCluster ? 'rgba(100,40,160,0)' : isPrecision ? 'rgba(0,80,120,0)' : 'rgba(200,20,0,0)';

        const exhGrad1 = ctx.createLinearGradient(-bodyLen / 2, 0, -bodyLen / 2 - flameLen, 0);
        exhGrad1.addColorStop(0, flameCore);
        exhGrad1.addColorStop(0.3, flameMid);
        exhGrad1.addColorStop(1, flameEnd);
        ctx.fillStyle = exhGrad1;
        ctx.beginPath();
        ctx.moveTo(-bodyLen / 2, -bodyH);
        ctx.lineTo(-bodyLen / 2 - flameLen, -bodyH * 0.5);
        ctx.lineTo(-bodyLen / 2 - flameLen - 5, 0);
        ctx.lineTo(-bodyLen / 2 - flameLen, bodyH * 0.5);
        ctx.lineTo(-bodyLen / 2, bodyH);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    } else if (p.type === 'missile_sub') {
        // Small fast homing sub-missile
        const angle = Math.atan2(p.targetY - p.y, p.targetX - p.x);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);

        ctx.fillStyle = '#DDD6FE';
        ctx.fillRect(-8, -2, 16, 4);
        ctx.strokeStyle = '#C0A0E0';
        ctx.lineWidth = 0.8;
        ctx.strokeRect(-8, -2, 16, 4);
        // Purple nose
        ctx.fillStyle = '#9B59B6';
        ctx.beginPath();
        ctx.moveTo(8, -2);
        ctx.lineTo(8, 2);
        ctx.lineTo(13, 0);
        ctx.closePath();
        ctx.fill();
        // Tail fins
        ctx.fillStyle = '#8866AA';
        ctx.beginPath(); ctx.moveTo(-6, -2); ctx.lineTo(-8, -5); ctx.lineTo(-4, -2); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-6, 2); ctx.lineTo(-8, 5); ctx.lineTo(-4, 2); ctx.closePath(); ctx.fill();
        // Flame
        const subGrad = ctx.createLinearGradient(-8, 0, -16, 0);
        subGrad.addColorStop(0, '#D0A0FF');
        subGrad.addColorStop(1, 'rgba(120,60,180,0)');
        ctx.fillStyle = subGrad;
        ctx.beginPath();
        ctx.moveTo(-8, -1.5);
        ctx.lineTo(-16, -0.5);
        ctx.lineTo(-18, 0);
        ctx.lineTo(-16, 0.5);
        ctx.lineTo(-8, 1.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    } else if (p.type === 'sheep' || p.type === 'sheep_turncoat' || p.type === 'sheep_contagion') {
        // Orb based on sheep variant
        let innerColor, outerColor;
        if (p.type === 'sheep_turncoat') {
            innerColor = '#FF6688'; outerColor = 'rgba(155,50,100,0)';
            ctx.fillStyle = 'rgba(180,60,100,0.25)';
        } else if (p.type === 'sheep_contagion') {
            innerColor = '#A0F0B0'; outerColor = 'rgba(40,150,60,0)';
            ctx.fillStyle = 'rgba(60,180,100,0.25)';
        } else {
            innerColor = '#F0D0FF'; outerColor = 'rgba(200,160,240,0)';
            ctx.fillStyle = 'rgba(240,200,255,0.35)';
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fill();
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 5);
        grad.addColorStop(0, '#FFFFFF');
        grad.addColorStop(0.4, innerColor);
        grad.addColorStop(1, outerColor);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fill();
    } else if (p.type === 'archer_pierce') {
        // Piercing arrow — sleek violet with trail
        const pAngle = Math.atan2(p.targetY - p.startY, p.targetX - p.startX);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(pAngle);
        // Outer glow
        ctx.fillStyle = 'rgba(180,130,220,0.3)';
        ctx.beginPath();
        ctx.arc(0, 0, 9, 0, Math.PI * 2);
        ctx.fill();
        // Arrow shaft
        ctx.fillStyle = '#8E6BB8';
        ctx.fillRect(-6, -1, 14, 2);
        // Arrowhead
        ctx.fillStyle = '#C39BD3';
        ctx.beginPath();
        ctx.moveTo(8, -2.5);
        ctx.lineTo(8, 2.5);
        ctx.lineTo(12, 0);
        ctx.closePath();
        ctx.fill();
        // Glowing tip
        ctx.fillStyle = '#E8DAEF';
        ctx.beginPath();
        ctx.arc(11, 0, 2.5, 0, Math.PI * 2);
        ctx.fill();
        // Fletching
        ctx.fillStyle = '#7D5DA0';
        ctx.beginPath();
        ctx.moveTo(-6, -1);
        ctx.lineTo(-10, -3);
        ctx.lineTo(-8, 0);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-6, 1);
        ctx.lineTo(-10, 3);
        ctx.lineTo(-8, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    } else if (p.type === 'archer' || p.type === 'archer_crit' || p.type === 'archer_multi') {
        // Small arrow for archer family
        const aAngle = p.target ? Math.atan2(p.target.y - p.y, p.target.x - p.x) : 0;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(aAngle);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.moveTo(6, 0);
        ctx.lineTo(-2, -2);
        ctx.lineTo(-2, 2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    } else if (p.type === 'wind' || p.type === 'wind_gust') {
        // Wind gust — cyan/white streak toward target
        const wAngle = p.target ? Math.atan2(p.target.y - p.y, p.target.x - p.x) : 0;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(wAngle);
        // Outer glow
        ctx.fillStyle = 'rgba(200,248,240,0.25)';
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();
        // Streak lines
        ctx.strokeStyle = '#C8F8F0';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(8, 0);
        ctx.quadraticCurveTo(0, -3, -6, 0);
        ctx.stroke();
        ctx.strokeStyle = '#E8FFF8';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(7, 1);
        ctx.quadraticCurveTo(1, -1, -4, 1);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(7, -1);
        ctx.quadraticCurveTo(1, -4, -4, -1);
        ctx.stroke();
        ctx.restore();
    } else if (p.type === 'wind_vortex') {
        // Spiraling vortex orb
        const now = performance.now() / 1000;
        const vAlpha = Math.min(1, (now - (p.vortexBorn || now)) / 300);
        // Outer swirl
        ctx.strokeStyle = '#80E8D8';
        ctx.lineWidth = 3 * vAlpha;
        ctx.beginPath();
        for (let i = 0; i <= 16; i++) {
            const a = (i / 16) * Math.PI * 2 + now * 4;
            const r = 8 + Math.sin(i * 3 + now * 6) * 2;
            const sx = p.x + Math.cos(a) * r;
            const sy = p.y + Math.sin(a) * r;
            i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
        }
        ctx.stroke();
        // Inner bright core
        const vGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 6);
        vGrad.addColorStop(0, '#FFFFFF');
        vGrad.addColorStop(0.3, '#C8F8F0');
        vGrad.addColorStop(1, 'rgba(74,158,149,0)');
        ctx.fillStyle = vGrad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawParticles() {
    for (const p of game.particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        if (p.ring) {
            const progress = 1 - alpha;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3 * alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * progress, 0, Math.PI * 2);
            ctx.stroke();
        } else if (p.lightning) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2 * alpha;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            const midX = (p.x + p.x2) / 2 + (Math.random() - 0.5) * 30;
            const midY = (p.y + p.y2) / 2 + (Math.random() - 0.5) * 30;
            ctx.quadraticCurveTo(midX, midY, p.x2, p.y2);
            ctx.stroke();
        } else if (p.laserBeam) {
            // Laser beam — straight line with glow
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.size * alpha;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 6 * alpha;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x2, p.y2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else if (p.spoke) {
            // Radial spoke line — static, fades in place without expanding
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.size * alpha;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + Math.cos(p.angle) * p.length, p.y + Math.sin(p.angle) * p.length);
            ctx.stroke();
        } else if (p.smoke) {
            // Rising smoke cloud
            const progress = 1 - alpha;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = alpha * 0.5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (0.5 + progress * 0.5), 0, Math.PI * 2);
            ctx.fill();
        } else if (p.wool) {
            // Fluffy wool particle
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha * 0.5, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawHoverPreview() {
    if (!game.selectedType || game.hoverCol < 0 || game.hoverRow < 0) return;
    const pos = cellCenter(game.hoverCol, game.hoverRow);
    const valid = isBuildable(game.hoverCol, game.hoverRow);
    const def = TOWER_DEFS[game.selectedType];

    ctx.save();
    ctx.globalAlpha = valid ? 0.34 : 0.42;
    ctx.fillStyle = valid ? 'rgba(245, 200, 76, 0.34)' : 'rgba(231, 76, 60, 0.38)';
    ctx.strokeStyle = valid ? 'rgba(255, 236, 184, 0.78)' : 'rgba(255, 126, 105, 0.82)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.roundRect(pos.x - CELL / 2 + 4, pos.y - CELL / 2 + 4, CELL - 8, CELL - 8, 6);
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    ctx.globalAlpha = valid ? 0.58 : 0.56;
    ctx.fillStyle = valid ? def.color : '#e74c3c';

    // Draw type-specific silhouette
    ctx.save();
    ctx.translate(pos.x, pos.y);
    const s = 14;
    switch (game.selectedType) {
        case 'archer':
            ctx.beginPath();
            ctx.roundRect(-s, 0, s * 2, s + 1, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-s + 1, -8);
            ctx.lineTo(s - 1, -8);
            ctx.lineTo(0, -20);
            ctx.closePath();
            ctx.fill();
            break;
        case 'artillery':
            ctx.beginPath();
            ctx.arc(0, 0, s + 2, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'ice':
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(s - 2, -5);
            ctx.lineTo(s + 2, 2);
            ctx.lineTo(0, s);
            ctx.lineTo(-s - 2, 2);
            ctx.lineTo(-s + 2, -5);
            ctx.closePath();
            ctx.fill();
            break;
        case 'tesla':
            ctx.fillRect(-4, -18, 8, 8);
            ctx.fillRect(-6, -8, 12, 12);
            ctx.beginPath();
            ctx.arc(0, -6, 8, Math.PI, 0);
            ctx.fill();
            break;
        case 'fire':
            ctx.fillStyle = def.color;
            ctx.fillRect(-5, -6, 10, 12);
            ctx.beginPath();
            ctx.arc(0, -8, 6, Math.PI, 0);
            ctx.fill();
            // Flame silhouette on top
            ctx.fillStyle = '#FF6B35';
            ctx.beginPath();
            ctx.moveTo(-4, -9);
            ctx.quadraticCurveTo(-2, -18, 0, -22);
            ctx.quadraticCurveTo(2, -18, 4, -9);
            ctx.closePath();
            ctx.fill();
            break;
        case 'wind':
            ctx.fillStyle = def.color;
            ctx.beginPath(); ctx.arc(0, -2, 7, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#C8F8F0';
            ctx.beginPath(); ctx.arc(0, -5, 4, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#E8FFF8';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(0, -2, 9, -0.6, 2.5); ctx.stroke();
            break;
        case 'sheep':
            ctx.fillStyle = def.color;
            ctx.beginPath();
            ctx.roundRect(-5, -6, 10, 14, 4);
            ctx.fill();
            // Wool dome on top
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(0, -6, 8, Math.PI, 0);
            ctx.fill();
            // Tiny sheep ears
            ctx.fillStyle = '#DDD';
            ctx.beginPath(); ctx.ellipse(-4, -8, 2.5, 4, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(4, -8, 2.5, 4, 0.3, 0, Math.PI * 2); ctx.fill();
            break;
        case 'missile':
            // Silo shape
            ctx.fillStyle = def.color;
            ctx.fillRect(-6, -8, 12, 14);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.strokeRect(-6, -8, 12, 14);
            // Missile nose poking out
            ctx.fillStyle = '#E8E8E8';
            ctx.fillRect(-2, -10, 4, 4);
            ctx.fillStyle = '#CC3333';
            ctx.beginPath();
            ctx.moveTo(-2, -10);
            ctx.lineTo(2, -10);
            ctx.lineTo(0, -17);
            ctx.closePath();
            ctx.fill();
            // Fins
            ctx.fillStyle = '#555';
            ctx.beginPath(); ctx.moveTo(-6, -6); ctx.lineTo(-9, -4); ctx.lineTo(-6, -2); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(6, -6); ctx.lineTo(9, -4); ctx.lineTo(6, -2); ctx.closePath(); ctx.fill();
            break;
        case 'laser':
            // Crystal column silhouette
            ctx.fillStyle = def.color;
            ctx.fillRect(-4, -6, 8, 12);
            // Lens top
            ctx.fillStyle = '#FF4444';
            ctx.beginPath();
            ctx.moveTo(-5, -6);
            ctx.lineTo(5, -6);
            ctx.lineTo(3, -12);
            ctx.lineTo(-3, -12);
            ctx.closePath();
            ctx.fill();
            // Emitter dot
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(0, -12, 2, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'laser_core':
            // Massive crystal silhouette
            ctx.fillStyle = def.color;
            ctx.fillRect(-5, -5, 10, 12);
            // Large lens
            ctx.fillStyle = '#FF5533';
            ctx.beginPath();
            ctx.moveTo(-6, -5);
            ctx.lineTo(6, -5);
            ctx.lineTo(4, -13);
            ctx.lineTo(-4, -13);
            ctx.closePath();
            ctx.fill();
            // Bright emitter
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(0, -13, 2.5, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'laser_resonance':
            // Crystal + dish silhouette
            ctx.fillStyle = def.color;
            ctx.fillRect(-4, -5, 8, 11);
            // Dish arc
            ctx.fillStyle = '#E8A030';
            ctx.beginPath();
            ctx.arc(0, -7, 6, Math.PI, 0);
            ctx.fill();
            // Antenna
            ctx.strokeStyle = '#E0C040';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, -13);
            ctx.lineTo(0, -7);
            ctx.stroke();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(0, -13, 1.5, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'laser_refract':
            // Prism crystal silhouette (diamond shape)
            ctx.fillStyle = def.color;
            ctx.beginPath();
            ctx.moveTo(0, 2);
            ctx.lineTo(-4, -3);
            ctx.lineTo(-6, -8);
            ctx.lineTo(0, -14);
            ctx.lineTo(6, -8);
            ctx.lineTo(4, -3);
            ctx.closePath();
            ctx.fill();
            // Emitter
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(0, -14, 2, 0, Math.PI * 2);
            ctx.fill();
            break;
    }
    ctx.restore();

    ctx.strokeStyle = valid ? 'rgba(255, 245, 205, 0.88)' : 'rgba(255, 99, 87, 0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 18, 0, Math.PI * 2);
    ctx.stroke();

    // Range indicator
    if (valid) {
        ctx.globalAlpha = 1;
        ctx.fillStyle = 'rgba(245, 200, 76, 0.045)';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, def.range[0], 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 235, 180, 0.28)';
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, def.range[0], 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1;
}

function drawSelectedTowerRange() {
    if (!game.selectedTower) return;
    const t = game.selectedTower;
    const st = towerStats(t);
    const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;

    // Range circle
    ctx.fillStyle = 'rgba(245, 200, 76, 0.035)';
    ctx.beginPath();
    ctx.arc(t.x, t.y, st.range, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255, 232, 166, 0.35)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([7, 5]);
    ctx.beginPath();
    ctx.arc(t.x, t.y, st.range, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Selection ring (pulsing gold)
    ctx.strokeStyle = `rgba(245,200,76,${0.52 + pulse * 0.28})`;
    ctx.lineWidth = 2.4 * pulse;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 20 + t.level * 2, 0, Math.PI * 2);
    ctx.stroke();

    // Inner highlight dot
    ctx.fillStyle = `rgba(255,255,255,${0.3 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
    ctx.fill();
}

function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Layer 1: Grid
    drawGrid();
    // Layer 2: Tower range of selected
    drawSelectedTowerRange();

    // Layer 3: Towers — sort by Y so lower towers render on top
    const sortedTowers = [...game.towers].sort((a, b) => a.y - b.y);
    for (const t of sortedTowers) drawTower(t);

    // Layer 3.5: Laser link beams between connected laser towers
    drawLaserLinks();

    // Layer 4: Enemies
    for (const e of game.enemies) drawEnemy(e);

    // Layer 5: Fire zones & craters (ground AoE)
    drawFireZones();
    drawCraters();

    // Layer 6: Projectiles
    for (const p of game.projectiles) drawProjectile(p);

    // Layer 7: Particles
    drawParticles();

    // Layer 8: Shared color grade
    drawBattlefieldAtmosphere();

    // Layer 9: Hover preview
    drawHoverPreview();

}

// ==================== UI ====================
function updateHUD() {
    document.getElementById('gold-display').textContent = game.gold;
    document.getElementById('lives-display').textContent = game.lives;
    document.getElementById('wave-display').textContent = game.waveNum + '/' + game.totalWaves;
    document.getElementById('score-display').textContent = game.score;
}

function updateTowerButtons() {
    const btns = document.querySelectorAll('.tower-btn');
    btns.forEach(btn => {
        const type = btn.dataset.type;
        const cost = TOWER_DEFS[type].cost;
        if (game.gold < cost) {
            btn.classList.add('disabled');
        } else {
            btn.classList.remove('disabled');
        }
        if (type === game.selectedType) {
            btn.classList.add('selected');
        } else {
            btn.classList.remove('selected');
        }
    });
}

function selectTowerType(type) {
    if (game.gold < TOWER_DEFS[type].cost) return;
    if (game.state === 'game_over' || game.state === 'victory') return;
    if (game.selectedType === type) {
        game.selectedType = null;
    } else {
        game.selectedType = type;
        game.selectedTower = null;
        hideTowerInfo();
    }
    updateTowerButtons();
}

    if (py + 200 > window.innerHeight) py = window.innerHeight - 210;
    panel.style.left = px + 'px';
    panel.style.top = py + 'px';
    panel.style.display = 'block';

function hideTowerInfo() {
    document.getElementById('tower-info-panel').style.display = 'none';
    game.selectedTower = null;
}

function upgradeSelectedTower() {
    if (game.selectedTower) upgradeTower(game.selectedTower);
}

function evolveSelectedIndex(index) {
    if (!game.selectedTower || !game._evolveOptions) return;
    const t = game.selectedTower;
    if (t.level < 3) return;
    const opt = game._evolveOptions[index];
    if (!opt) return;
    const def = TOWER_DEFS[opt.type];
    if (!def || !def.evolveCost) return;
    if (game.gold < def.evolveCost) return;
    game.gold -= def.evolveCost;
    t.type = opt.type;
    t.level = 1;
    t.totalInvested += def.evolveCost;
    t.cooldown = 0;
    t.freezeTargetId = null;
    t.freezeStack = 0;
    t.focusTargetId = null;
    t.focusStack = 0;
    t.overflowCharge = 0;
    updateHUD();
    showTowerInfo(t);
}

function sellSelectedTower() {
    if (game.selectedTower) sellTower(game.selectedTower);
}

function toggleSpeed() {
    if (game.speedMult === 1) game.speedMult = 2;
    else if (game.speedMult === 2) game.speedMult = 4;
    else game.speedMult = 1;
    const btn = document.getElementById('speed-btn');
    btn.textContent = game.speedMult + 'x';
    btn.classList.remove('active', 'fast');
    if (game.speedMult === 2) btn.classList.add('active');
    else if (game.speedMult === 4) btn.classList.add('fast');
}

// Generate a compact description of a tower's special ability from its stats
function getTowerSpecial(def) {
    const parts = [];
    if (def.critChance) parts.push('暴击率' + Math.round(def.critChance * 100) + '% 暴击' + def.critMultiplier + 'x');
    if (def.multiShot) parts.push(def.multiShot + '箭齐发');
    if (def.pierceCount) parts.push('穿透' + def.pierceCount[0] + '-' + def.pierceCount[2] + '目标 衰减' + Math.round(def.pierceFalloff * 100) + '%');
    if (def.splash && def.splash.length) parts.push('溅射' + def.splash[0] + '-' + def.splash[2] + '范围 ' + Math.round(def.splashDmgPct * 100) + '%伤害');
    if (def.shrapnelCount) parts.push('碎片' + def.shrapnelCount[0] + '-' + def.shrapnelCount[2] + '枚');
    if (def.stunFactor) parts.push('击晕' + def.stunDuration[0] + '-' + def.stunDuration[2] + 'ms');
    if (def.slowFactor && def.slowFactor.length) parts.push('减速' + Math.round(def.slowFactor[0] * 100) + '-' + Math.round(def.slowFactor[2] * 100) + '%');
    if (def.freezeStacks) parts.push(def.freezeStacks + '层冻结' + def.freezeDuration[0] / 1000 + '-' + def.freezeDuration[2] / 1000 + 's');
    if (def.auraSlowFactor) parts.push('光环减速' + Math.round(def.auraSlowFactor[0] * 100) + '-' + Math.round(def.auraSlowFactor[2] * 100) + '%');
    if (def.chainCount && def.chainCount.length && !def.chainFalloff) parts.push('连锁' + def.chainCount[0] + '-' + def.chainCount[2] + '目标');
    if (def.chainCount && def.chainCount.length && def.chainFalloff) parts.push('折射' + def.chainCount[0] + '-' + def.chainCount[2] + '跳 衰减' + Math.round(def.chainFalloff * 100) + '%');
    if (def.chainDmgBoost) parts.push('连锁递增' + Math.round(def.chainDmgBoost * 100) + '%');
    if (def.resonanceShareRange) parts.push('范围共享');
    if (def.chargeMaxTime) parts.push('蓄力' + def.chargeDmgMultiplier[0] + '-' + def.chargeDmgMultiplier[2] + 'x');
    if (def.vulnFactor) parts.push('削弱' + Math.round(def.vulnFactor[0] * 100) + '-' + Math.round(def.vulnFactor[2] * 100) + '%承伤');
    if (def.focusDmgPerStack) parts.push('聚焦递增' + Math.round(def.focusDmgPerStack * 100) + '%/层 ' + def.focusMaxStacks[0] + '-' + def.focusMaxStacks[2] + '层');
    if (def.igniteFlameRadius) parts.push('点燃灼烧' + def.igniteFlameRadius[0] + '-' + def.igniteFlameRadius[2] + '范围');
    if (def.detonateDmg) parts.push('击杀爆' + def.detonateDmg[0] + '-' + def.detonateDmg[2] + '伤害');
    if (def.flameRadius) parts.push('火焰区域' + def.flameRadius[0] + '-' + def.flameRadius[2] + '范围 ' + def.flameDuration[0] / 1000 + '-' + def.flameDuration[2] / 1000 + 's');
    if (def.gustForce) parts.push('风力' + def.gustForce[0] + '-' + def.gustForce[2]);
    if (def.vortexPull) parts.push('牵引' + def.vortexPull[0] + '-' + def.vortexPull[2] + ' 持续' + def.vortexDuration[0] / 1000 + '-' + def.vortexDuration[2] / 1000 + 's');
    if (def.gustInterval) parts.push('狂风间隔' + def.gustInterval[0] / 1000 + '-' + def.gustInterval[2] / 1000 + 's 伤害' + def.gustDamage[0] + '-' + def.gustDamage[2]);
    if (def.auraSpeedMin) parts.push('乱速' + Math.round(def.auraSpeedMin[0] * 100) + '%-' + Math.round(def.auraSpeedMax[0] * 100) + '%');
    if (def.sheepDuration) parts.push('化羊' + def.sheepDuration[0] / 1000 + '-' + def.sheepDuration[2] / 1000 + 's');
    if (def.turncoatDamage) parts.push('策反伤害' + def.turncoatDamage[0] + '-' + def.turncoatDamage[2]);
    if (def.contagionRange) parts.push('传染' + def.contagionRange[0] + '-' + def.contagionRange[2] + '范围');
    if (def.auraSheepDuration) parts.push('光环化羊' + def.auraSheepDuration[0] / 1000 + '-' + def.auraSheepDuration[2] / 1000 + 's');
    if (def.arcHeight) parts.push('弧线导弹 溅射' + def.splash[0] + '-' + def.splash[2]);
    if (def.clusterCount) parts.push('集束' + def.clusterCount[0] + '-' + def.clusterCount[2] + '子炸弹');
    if (def.nukeZoneDuration) parts.push('核爆区域' + def.nukeZoneDuration[0] / 1000 + '-' + def.nukeZoneDuration[2] / 1000 + 's ' + def.nukeZoneDmg[0] + '-' + def.nukeZoneDmg[2] + '/跳');
    if (def.linkRange) parts.push('链接' + def.linkRange + '范围 伤害+' + Math.round(def.linkDmgBoost * 100) + '%/链接');
    return parts.join(' · ') || '-';
}

function buildCompendiumHTML() {
    const baseTowers = [
        { key: 'archer', base: 'archer' },
        { key: 'artillery', base: 'artillery' },
        { key: 'ice', base: 'ice' },
        { key: 'tesla', base: 'tesla' },
        { key: 'fire', base: 'fire' },
        { key: 'wind', base: null },
        { key: 'sheep', base: 'sheep' },
        { key: 'missile', base: 'missile' },
        { key: 'laser', base: 'laser' }
    ];

    let html = '';
    for (const bt of baseTowers) {
        const def = TOWER_DEFS[bt.key];
        const branches = EVOLVE_OPTIONS[bt.key] || [];
        const dmgStr = def.damage.join('/');
        const rangeStr = def.range.join('/');
        const cdStr = (def.cooldown[0] / 1000).toFixed(1) + '/' + (def.cooldown[1] / 1000).toFixed(1) + '/' + (def.cooldown[2] / 1000).toFixed(1) + 's';

        html += '<div class="comp-card">';
        html += '<div class="comp-base-row">';
        html += '<span class="comp-base-icon">' + def.icon + '</span>';
        html += '<span class="comp-base-name">' + def.name + '</span>';
        html += '<span class="comp-base-cost">💰' + def.cost + '</span>';
        html += '</div>';
        html += '<div class="comp-base-stats">伤害:' + dmgStr + ' | 射程:' + rangeStr + ' | 冷却:' + cdStr;
        const baseSpecial = getTowerSpecial(def);
        if (baseSpecial !== '-') html += '<br>特技:' + baseSpecial;
        html += '</div>';

        if (branches.length) {
            const evolveCost = TOWER_DEFS[branches[0].type].evolveCost;
            html += '<div class="comp-branches-title">升级分支 (进化费💰' + evolveCost + ')</div>';
            for (const br of branches) {
                const brDef = TOWER_DEFS[br.type];
                html += '<div class="comp-branch">';
                html += '<span class="branch-icon">' + br.icon + '</span>';
                html += '<div class="branch-info"><span class="branch-name">' + br.label + '</span>';
                html += '<br><span class="branch-desc">' + getTowerSpecial(brDef) + '</span></div>';
                html += '</div>';
            }
        }
        html += '</div>';
    }
    return html;
}

function toggleCompendium() {
    const overlay = document.getElementById('compendium-overlay');
    if (overlay.classList.contains('show')) {
        overlay.classList.remove('show');
    } else {
        document.getElementById('compendium-grid').innerHTML = buildCompendiumHTML();
        overlay.classList.add('show');
    }
}

function toggleAutoWave() {
    game.autoWave = !game.autoWave;
    const btn = document.getElementById('auto-wave-btn');
    if (game.autoWave) {
        btn.classList.add('active');
        btn.textContent = '⏩ 自动中';
        if (game.state === 'idle' && game.waveNum < game.totalWaves) {
            startNextWave();
        }
    } else {
        btn.classList.remove('active');
        btn.textContent = '⏩ 自动';
    }
}

function endGame(result) {
    game.state = result === 'victory' ? 'victory' : 'game_over';
    game.selectedType = null;
    game.selectedTower = null;
    hideTowerInfo();
    const overlay = document.getElementById('overlay');
    overlay.classList.add('show');
    document.getElementById('start-wave-btn').disabled = true;

    if (result === 'victory') {
        document.getElementById('overlay-title').textContent = '🎉 胜利！';
        document.getElementById('overlay-sub').textContent = '总分数: ' + game.score + ' | 剩余生命: ' + game.lives;
    } else {
        document.getElementById('overlay-title').textContent = '💀 游戏结束';
        document.getElementById('overlay-sub').textContent = '坚持了 ' + game.waveNum + ' 波 | 总分数: ' + game.score;
    }
}

function restartGame() {
    game.gold = 200;
    game.lives = 20;
    game.score = 0;
    game.waveNum = 0;
    game.state = 'idle';
    game.speedMult = 1;
    game.autoWave = false;
    game.countdown = 0;
    game.towers = [];
    game.enemies = [];
    game.projectiles = [];
    game.particles = [];
    game.fireZones = [];
    game.craterZones = [];
    game.selectedType = null;
    game.selectedTower = null;
    game.spawnQueue = [];
    game.spawnTimer = 0;
    game.waveSpawningDone = false;
    game.nextTowerId = 1;
    game.nextEnemyId = 1;

    document.getElementById('overlay').classList.remove('show');
    document.getElementById('speed-btn').textContent = '1x';
    document.getElementById('speed-btn').classList.remove('active', 'fast');
    document.getElementById('auto-wave-btn').textContent = '⏩ 自动';
    document.getElementById('auto-wave-btn').classList.remove('active');
    document.getElementById('start-wave-btn').disabled = false;
    document.getElementById('countdown-display').textContent = '';
    hideTowerInfo();
    updateHUD();
    updateTowerButtons();
}

// ==================== INPUT HANDLING ====================
function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
    };
}

canvas.addEventListener('mousemove', (e) => {
    const pos = getCanvasCoords(e);
    const g = canvasToGrid(pos.x, pos.y);
    game.hoverCol = g.col;
    game.hoverRow = g.row;

    // Update cursor
    if (game.selectedType && isBuildable(g.col, g.row)) {
        canvas.style.cursor = 'pointer';
    } else if (game.selectedType) {
        canvas.style.cursor = 'not-allowed';
    } else if (g.col >= 0 && g.row >= 0 && game.towers.some(t => t.col === g.col && t.row === g.row)) {
        canvas.style.cursor = 'pointer';
    } else {
        canvas.style.cursor = 'crosshair';
    }

    // Tooltip for existing towers
    const tower = game.towers.find(t => t.col === g.col && t.row === g.row);
    const tip = document.getElementById('tooltip');
    if (tower && !game.selectedType) {
        const st = towerStats(tower);
        tip.style.display = 'block';
        tip.style.left = (e.clientX + 15) + 'px';
        tip.style.top = (e.clientY - 30) + 'px';
        tip.textContent = st.name + ' Lv.' + tower.level + ' | 伤害:' + st.damage + ' | 射程:' + st.range;
    } else {
        tip.style.display = 'none';
    }
});

canvas.addEventListener('click', (e) => {
    e.stopPropagation();
    if (game.state === 'game_over' || game.state === 'victory') return;
    const pos = getCanvasCoords(e);
    const g = canvasToGrid(pos.x, pos.y);

    // Close tower info panel if clicking elsewhere
    if (game.selectedTower) {
        const t = game.selectedTower;
        if (t.col !== g.col || t.row !== g.row) {
            hideTowerInfo();
        }
    }

    // If placing a tower
    if (game.selectedType) {
        if (placeTower(game.selectedType, g.col, g.row)) {
            // Keep type selected for rapid placement (shift+click behavior)
            // Clear selection on single click
             game.selectedType = null;
             updateTowerButtons();
        }
        return;
    }

    // Click existing tower
    const tower = game.towers.find(t => t.col === g.col && t.row === g.row);
    if (tower) {
        showTowerInfo(tower);
        game.selectedType = null;
        updateTowerButtons();
    }
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Touch events
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('click', { clientX: touch.clientX, clientY: touch.clientY });
    canvas.dispatchEvent(mouseEvent);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
    canvas.dispatchEvent(mouseEvent);
}, { passive: false });

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (game.state === 'game_over' || game.state === 'victory') return;
    switch(e.key) {
        case 'Escape':
            game.selectedType = null;
            hideTowerInfo();
            updateTowerButtons();
            break;
        case '1': selectTowerType('archer'); break;
        case '2': selectTowerType('artillery'); break;
        case '3': selectTowerType('ice'); break;
        case '4': selectTowerType('tesla'); break;
        case '5': selectTowerType('fire'); break;
        case '6': selectTowerType('sheep'); break;
        case '7': selectTowerType('missile'); break;
        case '8': selectTowerType('wind'); break;
        case '9': selectTowerType('laser'); break;
        case ' ':
            e.preventDefault();
            if (game.state === 'idle') startNextWave();
            break;
    }
});

// Click outside canvas closes panels
document.addEventListener('click', (e) => {
    if (!canvas.contains(e.target) && !document.getElementById('tower-info-panel').contains(e.target)) {
        hideTowerInfo();
    }
});

// Make startNextWave and toggleSpeed globally accessible for onclick
window.startNextWave = startNextWave;
window.toggleSpeed = toggleSpeed;
window.selectTowerType = selectTowerType;
window.upgradeSelectedTower = upgradeSelectedTower;
window.sellSelectedTower = sellSelectedTower;
window.restartGame = restartGame;

// ==================== GAME LOOP ====================
let lastFrameTime = null;
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);

function gameLoop(timestamp) {
    if (!lastFrameTime) {
        lastFrameTime = timestamp;
        requestAnimationFrame(gameLoop);
        return;
    }

    let dt = (timestamp - lastFrameTime) / 1000;
    lastFrameTime = timestamp;

    if (dt <= 0 || dt > 0.5) {
        requestAnimationFrame(gameLoop);
        return;
    }

    // Apply speed multiplier for logic
    const logicDt = dt * game.speedMult;

    // Update game logic
    if (game.state === 'wave_active') {
        updateWaveSpawning(dt);
        updateEnemies(logicDt);
        updateTowers(logicDt);
        updateProjectiles(logicDt);
        checkWaveComplete();
    } else if (game.state === 'idle' || game.state === 'wave_complete') {
        // Still update towers during idle (they don't fire but let's keep state clean)
        updateTowers(0);
        updateProjectiles(0);
    }

    // Fire zones & craters always tick (even during idle — they burn out)
    updateFireZones(logicDt);
    updateCraters(logicDt);
    updateParticles(dt);

    // Render every frame (always at 1x visual speed)
    render();

    // Update HUD periodically
    updateHUD();

    requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
function init() {
    initGrid();
    updateHUD();
    updateTowerButtons();
    document.getElementById('start-wave-btn').disabled = false;
    document.getElementById('countdown-display').textContent = '';
    requestAnimationFrame(gameLoop);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
