// ===== SHRAPNEL TOWER — Evolved artillery: fragmentation bombard =====
function drawShrapnelTower(t, st, lv) {
    const r = 13 + lv * 1.5;
    const time = Date.now() / 1000;

    // Brass-reinforced platform
    const platGrad = ctx.createLinearGradient(0, -r, 0, r);
    platGrad.addColorStop(0, '#9B865B');
    platGrad.addColorStop(0.5, '#7B6640');
    platGrad.addColorStop(1, '#5B4620');
    ctx.fillStyle = platGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#DAA520';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Inner mechanism — visible gears
    const innerR = r - 4;
    ctx.fillStyle = '#5B4620';
    ctx.beginPath();
    ctx.arc(0, 0, innerR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Rotating gear teeth
    for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2 + time * 1.5;
        const gx = Math.cos(a) * (innerR - 2);
        const gy = Math.sin(a) * (innerR - 2);
        ctx.fillStyle = '#DAA520';
        ctx.fillRect(gx - 2, gy - 1, 4, 2.5);
    }

    // Fragmentation barrel — wider bore
    const ir = innerR - 2;
    ctx.save();
    ctx.rotate(t.angle);
    const barrelGrad = ctx.createLinearGradient(0, -ir * 0.4, 0, ir * 0.4);
    barrelGrad.addColorStop(0, '#7B6640');
    barrelGrad.addColorStop(0.5, '#C8A860');
    barrelGrad.addColorStop(1, '#5B4620');
    ctx.fillStyle = barrelGrad;
    ctx.fillRect(0, -ir * 0.5, r + lv + 4, ir * 1.0);
    // Shrapnel shell visible in barrel
    ctx.fillStyle = '#DAA520';
    ctx.beginPath();
    ctx.arc(r + lv + 1, 0, ir * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFA000';
    ctx.beginPath();
    ctx.arc(r + lv + 1, 0, ir * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Fragment particles orbiting tower
    for (let i = 0; i < 5; i++) {
        const a = time * 3 + i * Math.PI * 2 / 5;
        const px = Math.cos(a) * (r + 2);
        const py = Math.sin(a) * (r + 2);
        ctx.fillStyle = '#FFAA00';
        ctx.beginPath();
        ctx.arc(px, py, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ===== CONCUSS TOWER — Evolved artillery: concussive stun bombard =====
function drawConcussTower(t, st, lv) {
    const r = 13 + lv * 1.5;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 8) * 0.5; // faster pulse = stun burst feel

    // Blue-steel platform
    const platGrad = ctx.createLinearGradient(0, -r, 0, r);
    platGrad.addColorStop(0, '#4A6A9A');
    platGrad.addColorStop(0.5, '#3A5A8A');
    platGrad.addColorStop(1, '#2A4A7A');
    ctx.fillStyle = platGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5DADE2';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Concentric shockwave rings on platform
    const innerR = r - 4;
    for (let i = 1; i <= 3; i++) {
        const ringRad = innerR * i * 0.3 + pulse * (4 - i);
        ctx.strokeStyle = `rgba(200,230,255,${0.2 + pulse * 0.15})`;
        ctx.lineWidth = 1 + (1 - pulse) * 0.5;
        ctx.beginPath();
        ctx.arc(0, 0, ringRad, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.fillStyle = '#3A5A8A';
    ctx.beginPath();
    ctx.arc(0, 0, innerR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5DADE2';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Energy coil segments
    for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.strokeStyle = `rgba(180,220,255,${0.3 + pulse * 0.4})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(0, 0, innerR - 2, a, a + 0.6);
        ctx.stroke();
    }

    // Concussive barrel — flared muzzle brake
    const ir = innerR - 2;
    ctx.save();
    ctx.rotate(t.angle);
    const barrelGrad = ctx.createLinearGradient(0, -ir * 0.4, 0, ir * 0.4);
    barrelGrad.addColorStop(0, '#4A6A9A');
    barrelGrad.addColorStop(0.5, '#6A9ACA');
    barrelGrad.addColorStop(1, '#3A5A8A');
    ctx.fillStyle = barrelGrad;
    ctx.fillRect(0, -ir * 0.45, r + lv + 2, ir * 0.9);
    // Flared muzzle brake
    ctx.fillStyle = '#5DADE2';
    ctx.beginPath();
    ctx.moveTo(r + lv + 2, -ir * 0.7);
    ctx.lineTo(r + lv + 6, -ir * 0.5);
    ctx.lineTo(r + lv + 6, ir * 0.5);
    ctx.lineTo(r + lv + 2, ir * 0.7);
    ctx.closePath();
    ctx.fill();
    // Sharp shockwave burst at muzzle
    ctx.strokeStyle = `rgba(200,230,255,${0.3 + pulse * 0.5})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(r + lv + 4, 0, ir * 0.5 + pulse * 2, 0, Math.PI * 2);
    ctx.stroke();
    // Inner bright flash
    ctx.fillStyle = `rgba(255,255,255,${0.3 + pulse * 0.5})`;
    ctx.beginPath();
    ctx.arc(r + lv + 4, 0, ir * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

    const time = Date.now() / 1000;

    // Ice crystal base
    const baseGrad = ctx.createRadialGradient(0, 3, b * 0.2, 0, 3, b);
    baseGrad.addColorStop(0, '#E8F4FD');
    baseGrad.addColorStop(0.5, '#AED6F1');
    baseGrad.addColorStop(1, '#5DADE2');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(0, 3, b + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2E86C1';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Frost rune circle
    ctx.strokeStyle = 'rgba(174,214,241,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 3, b * 0.7, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        const rx = Math.cos(a) * b * 0.7;
        const ry = Math.sin(a) * b * 0.7 + 3;
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.arc(rx, ry, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Main tower — icy crystal spire
    const tw = b * 0.5;
    const bw = b * 0.8;
    const iceGrad = ctx.createLinearGradient(-bw, 0, bw, 0);
    iceGrad.addColorStop(0, '#85C1E9');
    iceGrad.addColorStop(0.3, '#D6EAF8');
    iceGrad.addColorStop(0.7, '#AED6F1');
    iceGrad.addColorStop(1, '#5DADE2');
    ctx.fillStyle = iceGrad;
    ctx.beginPath();
    ctx.moveTo(-bw, 0);
    ctx.lineTo(bw, 0);
    ctx.lineTo(tw, -h * 0.7);
    ctx.lineTo(-tw, -h * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3498DB';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Ice crystal lines
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 6; i++) {
        const y = -i * h * 0.7 / 6;
        ctx.beginPath();
        const wAtY = bw - (bw - tw) * (i / 6);
        ctx.moveTo(-wAtY + 1, y);
        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();
    }

    // Glowing ice window
    ctx.fillStyle = '#1A5276';
    ctx.fillRect(-2, -h * 0.45, 4, 10);
    ctx.fillStyle = 'rgba(133,193,233,0.6)';
    ctx.fillRect(-1.5, -h * 0.45 + 1, 3, 8);

    // Ice crystal spire roof
    ctx.fillStyle = '#85C1E9';
    ctx.beginPath();
    ctx.moveTo(-tw - 1, -h * 0.7);
    ctx.lineTo(tw + 1, -h * 0.7);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2E86C1';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Glowing frost orb at top
    const orbY = -h;
    const orbR = 3 + lv;
    ctx.shadowColor = 'rgba(133,193,233,0.9)';
    ctx.shadowBlur = 8 + lv * 3;
    const orbGrad = ctx.createRadialGradient(0, orbY - orbR * 0.3, orbR * 0.1, 0, orbY, orbR);
    orbGrad.addColorStop(0, '#FFFFFF');
    orbGrad.addColorStop(0.3, '#D6EAF8');
    orbGrad.addColorStop(0.7, '#5DADE2');
    orbGrad.addColorStop(1, 'rgba(41,128,185,0)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(0, orbY, orbR + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Orbiting ice crystals
    for (let i = 0; i < lv + 1; i++) {
        const a = time * 2 + i * Math.PI * 2 / (lv + 1);
        const dist = b + 4;
        const cx = Math.cos(a) * dist;
        const cy = -h * 0.3 + Math.sin(a) * dist * 0.5;
        ctx.fillStyle = '#D6EAF8';
        ctx.beginPath();
        ctx.moveTo(cx, cy - 4);
        ctx.lineTo(cx + 2.5, cy);
        ctx.lineTo(cx, cy + 4);
        ctx.lineTo(cx - 2.5, cy);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Ice wand barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#85C1E9';
    ctx.fillRect(3, -1, tw + 6, 2);
    ctx.fillStyle = '#D6EAF8';
    ctx.beginPath();
    ctx.arc(tw + 8, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== ICE_SPLASH TOWER — Frozen Domain: wide-area ice splash =====
function drawIceSplashTower(t, st, lv) {
    const b = 9 + lv;
    const h = 16 + lv * 5;
    const time = Date.now() / 1000;
    const pulse = 0.6 + Math.sin(time * 2.5) * 0.4;

    // Wide frost crystal base
    const baseGrad = ctx.createRadialGradient(0, 2, b * 0.3, 0, 2, b + 4);
    baseGrad.addColorStop(0, '#E8F4FD');
    baseGrad.addColorStop(0.4, '#AED6F1');
    baseGrad.addColorStop(0.8, '#6DB9DE');
    baseGrad.addColorStop(1, '#3A7CA5');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(0, 2, b + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2E86C1';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Pulsing frost ring (aura indicator)
    ctx.strokeStyle = `rgba(174,214,241,${0.3 + pulse * 0.25})`;
    ctx.lineWidth = 2 + pulse;
    ctx.beginPath();
    ctx.arc(0, 2, b + 2 + pulse * 3, -0.3, Math.PI + 0.3);
    ctx.stroke();

    // Frost rune nodes around base
    for (let i = 0; i < 8; i++) {
        const a = Math.PI * 2 * i / 8 + time * 0.5;
        const rx = Math.cos(a) * (b + 2);
        const ry = Math.sin(a) * (b + 2) + 2;
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.arc(rx, ry, 1.5 + pulse * 0.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Tower body — broadened ice crystal
    const bw = b * 0.9;
    const tw = b * 0.6;
    const bodyGrad = ctx.createLinearGradient(-bw, 0, bw, 0);
    bodyGrad.addColorStop(0, '#5DADE2');
    bodyGrad.addColorStop(0.2, '#AED6F1');
    bodyGrad.addColorStop(0.5, '#D6EAF8');
    bodyGrad.addColorStop(0.8, '#85C1E9');
    bodyGrad.addColorStop(1, '#2E86C1');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-bw, 0);
    ctx.lineTo(bw, 0);
    ctx.lineTo(tw, -h * 0.6);
    ctx.lineTo(-tw, -h * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#1A5276';
    ctx.lineWidth = 1.3;
    ctx.stroke();

    // Ice crystal ridges
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 5; i++) {
        const y = -i * h * 0.6 / 5;
        const wAtY = bw - (bw - tw) * (i / 5);
        ctx.beginPath();
        ctx.moveTo(-wAtY + 1, y);
        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();
    }

    // Inner glow chamber
    ctx.fillStyle = '#1A5276';
    ctx.fillRect(-3, -h * 0.4, 6, 12);
    ctx.fillStyle = `rgba(133,193,233,${0.5 + pulse * 0.3})`;
    ctx.fillRect(-2, -h * 0.4 + 1, 4, 10);

    // Wide crystal roof
    const roofGrad = ctx.createLinearGradient(0, -h * 0.6, 0, -h);
    roofGrad.addColorStop(0, '#AED6F1');
    roofGrad.addColorStop(0.4, '#D6EAF8');
    roofGrad.addColorStop(1, '#E8F4FD');
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.moveTo(-tw - 2, -h * 0.6);
    ctx.lineTo(tw + 2, -h * 0.6);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#5DADE2';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Glowing frost orb at apex
    ctx.shadowColor = 'rgba(174,214,241,0.8)';
    ctx.shadowBlur = 8 + lv * 2;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(0, -h, 3 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Splash crystal barrel — wider, shorter
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#6DB9DE';
    ctx.fillRect(1, -2, tw + 5, 4);
    // Triple crystal tips
    for (let i = -1; i <= 1; i++) {
        ctx.fillStyle = '#D6EAF8';
        ctx.beginPath();
        ctx.arc(tw + 6, i * 3, 2.5, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

// ===== ICE_FREEZE TOWER — Deep Freeze Arrow: pinpoint freeze =====
function drawIceFreezeTower(t, st, lv) {
    const b = 9 + lv;
    const h = 18 + lv * 5;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 3.5) * 0.5;

    // Deep blue crystal base
    const baseGrad = ctx.createRadialGradient(0, 3, b * 0.2, 0, 3, b + 2);
    baseGrad.addColorStop(0, '#D6EAF8');
    baseGrad.addColorStop(0.3, '#85C1E9');
    baseGrad.addColorStop(0.7, '#2E86C1');
    baseGrad.addColorStop(1, '#1A5276');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(0, 3, b + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#154360';
    ctx.lineWidth = 1.8;
    ctx.stroke();

    // Freeze stack indicator — 3 dots showing progress
    const freezeStack = t.freezeStack || 0;
    const freezeStacksNeeded = st.freezeStacks;
    for (let i = 0; i < freezeStacksNeeded; i++) {
        const dx = -b * 0.5 + i * b * 0.5;
        const dy = b + 2;
        const bright = i < freezeStack;
        ctx.fillStyle = bright ? '#FFFFFF' : 'rgba(255,255,255,0.3)';
        ctx.shadowColor = bright ? 'rgba(255,255,255,0.8)' : 'transparent';
        ctx.shadowBlur = bright ? 4 : 0;
        ctx.beginPath();
        ctx.arc(dx, dy, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
    }

    // Tower body — tall deep blue crystal
    const bw = b * 0.75;
    const tw = b * 0.4;
    const bodyGrad = ctx.createLinearGradient(-bw, 0, bw, 0);
    bodyGrad.addColorStop(0, '#154360');
    bodyGrad.addColorStop(0.3, '#2E86C1');
    bodyGrad.addColorStop(0.5, '#5DADE2');
    bodyGrad.addColorStop(0.7, '#2E86C1');
    bodyGrad.addColorStop(1, '#154360');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-bw, 0);
    ctx.lineTo(bw, 0);
    ctx.lineTo(tw, -h * 0.65);
    ctx.lineTo(-tw, -h * 0.65);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#1A5276';
    ctx.lineWidth = 1.4;
    ctx.stroke();

    // Concentric ring energy lines
    for (let i = 1; i < 6; i++) {
        const y = -i * h * 0.65 / 6;
        const wAtY = bw - (bw - tw) * (i / 6);
        ctx.strokeStyle = `rgba(174,214,241,${0.2 + i * 0.05})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(-wAtY, y);
        ctx.lineTo(wAtY, y);
        ctx.stroke();
    }

    // Freeze chamber window
    ctx.fillStyle = '#0D3B5E';
    ctx.fillRect(-2.5, -h * 0.45, 5, 11);
    ctx.fillStyle = `rgba(133,193,233,${0.5 + pulse * 0.3})`;
    ctx.fillRect(-1.5, -h * 0.45 + 1, 3, 9);

    // Sharp crystal roof
    const roofGrad = ctx.createLinearGradient(0, -h * 0.65, 0, -h);
    roofGrad.addColorStop(0, '#5DADE2');
    roofGrad.addColorStop(0.3, '#2E86C1');
    roofGrad.addColorStop(1, '#154360');
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.moveTo(-tw - 1, -h * 0.65);
    ctx.lineTo(tw + 1, -h * 0.65);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#1A5276';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Sharp crystal tip
    ctx.fillStyle = '#85C1E9';
    ctx.beginPath();
    ctx.moveTo(-1, -h);
    ctx.lineTo(1, -h);
    ctx.lineTo(0, -h - 6 - lv);
    ctx.closePath();
    ctx.fill();

    // Deep freeze barrel — long, focused ice lance
    ctx.save();
    ctx.rotate(t.angle);
    const barrelGrad = ctx.createLinearGradient(0, -2, 0, 2);
    barrelGrad.addColorStop(0, '#154360');
    barrelGrad.addColorStop(0.3, '#2E86C1');
    barrelGrad.addColorStop(0.7, '#85C1E9');
    barrelGrad.addColorStop(1, '#154360');
    ctx.fillStyle = barrelGrad;
    ctx.fillRect(1, -1.5, tw + 8, 3);
    // Penetrating crystal tip
    ctx.fillStyle = '#D6EAF8';
    ctx.beginPath();
    ctx.moveTo(tw + 9, -3);
    ctx.lineTo(tw + 9, 3);
    ctx.lineTo(tw + 14, 0);
    ctx.closePath();
    ctx.fill();
    // Glow on tip
    ctx.fillStyle = `rgba(133,193,233,${0.5 + pulse * 0.4})`;
    ctx.beginPath();
    ctx.arc(tw + 9, 0, 4 + pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== ICE_AURA TOWER — Frost Aura: passive slowing field =====
function drawIceAuraTower(t, st, lv) {
    const b = 9 + lv;
    const h = 13 + lv * 4;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 1.8) * 0.5;
    const auraPulse = 0.5 + Math.sin(time * 2.2) * 0.5;

    // Soft ethereal frost base
    const baseGrad = ctx.createRadialGradient(0, 3, b * 0.1, 0, 3, b + 3);
    baseGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
    baseGrad.addColorStop(0.3, 'rgba(232,244,253,0.7)');
    baseGrad.addColorStop(0.6, 'rgba(169,204,227,0.4)');
    baseGrad.addColorStop(1, 'rgba(169,204,227,0)');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(0, 3, b + 3, 0, Math.PI * 2);
    ctx.fill();

    // Outer pulsing aura ring (shows range)
    ctx.strokeStyle = `rgba(174,214,241,${0.15 + auraPulse * 0.15})`;
    ctx.lineWidth = 3 + auraPulse * 2;
    ctx.beginPath();
    ctx.arc(0, 2, b + 8 + auraPulse * 4, 0, Math.PI * 2);
    ctx.stroke();

    // Second ring
    ctx.strokeStyle = `rgba(133,193,233,${0.1 + auraPulse * 0.12})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.arc(0, 2, b + 6 + auraPulse * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Frost rune circle
    for (let i = 0; i < 8; i++) {
        const a = Math.PI * 2 * i / 8 + time * 0.3;
        const rx = Math.cos(a) * (b + 2);
        const ry = Math.sin(a) * (b + 2) + 3;
        ctx.fillStyle = `rgba(255,255,255,${0.4 + pulse * 0.3})`;
        ctx.beginPath();
        // Small snowflake shape
        for (let j = 0; j < 6; j++) {
            const sa = Math.PI * 2 * j / 6;
            const sr = 2.5;
            const sx = rx + Math.cos(sa) * sr;
            const sy = ry + Math.sin(sa) * sr;
            if (j === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#D6EAF8';
        ctx.lineWidth = 0.4;
        ctx.stroke();
    }

    // Tower body — gentle, rounded ice crystal (no weapon)
    const bw = b * 0.7;
    const tw = b * 0.55;
    const bodyGrad = ctx.createLinearGradient(-bw, 0, bw, 0);
    bodyGrad.addColorStop(0, 'rgba(133,193,233,0.8)');
    bodyGrad.addColorStop(0.3, 'rgba(214,234,248,0.9)');
    bodyGrad.addColorStop(0.5, 'rgba(232,244,253,1)');
    bodyGrad.addColorStop(0.7, 'rgba(214,234,248,0.9)');
    bodyGrad.addColorStop(1, 'rgba(133,193,233,0.8)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-bw, 0);
    ctx.lineTo(bw, 0);
    ctx.quadraticCurveTo(tw + 2, -h * 0.3, tw, -h * 0.55);
    ctx.quadraticCurveTo(0, -h * 0.62, -tw, -h * 0.55);
    ctx.quadraticCurveTo(-tw - 2, -h * 0.3, -bw, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#AED6F1';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Ethereal glow lines
    for (let i = 1; i < 4; i++) {
        const y = -i * h * 0.55 / 4;
        ctx.strokeStyle = `rgba(255,255,255,${0.3 + pulse * 0.15})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        const wAtY = bw - (bw - tw) * (i / 4);
        ctx.moveTo(-wAtY + 1, y);
        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();
    }

    // Inner light chamber
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-3, -h * 0.35, 6, 8);
    ctx.fillStyle = `rgba(174,214,241,${0.4 + pulse * 0.25})`;
    ctx.fillRect(-2, -h * 0.35 + 1, 4, 6);

    // Soft rounded dome roof
    const roofGrad = ctx.createRadialGradient(0, -h * 0.55, tw * 0.1, 0, -h * 0.6, tw + 3);
    roofGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
    roofGrad.addColorStop(0.4, 'rgba(214,234,248,0.8)');
    roofGrad.addColorStop(0.8, 'rgba(133,193,233,0.5)');
    roofGrad.addColorStop(1, 'rgba(169,204,227,0)');
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.arc(0, -h * 0.45, b, 0, Math.PI);
    ctx.fill();

    // Central frost orb (no weapon — pure support)
    const orbY = -h * 0.3;
    const orbR = 3 + lv;
    ctx.shadowColor = 'rgba(174,214,241,0.7)';
    ctx.shadowBlur = 8 + lv * 2;
    const orbGrad = ctx.createRadialGradient(0, orbY - orbR * 0.3, orbR * 0.1, 0, orbY, orbR);
    orbGrad.addColorStop(0, '#FFFFFF');
    orbGrad.addColorStop(0.4, '#D6EAF8');
    orbGrad.addColorStop(0.8, '#85C1E9');
    orbGrad.addColorStop(1, 'rgba(133,193,233,0)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(0, orbY, orbR + 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Floating snowflake orbiters
    for (let i = 0; i < lv + 3; i++) {
        const a = time * 1.5 + i * Math.PI * 2 / (lv + 3);
        const dist = b + 6;
        const sx = Math.cos(a) * dist;
        const sy = orbY + Math.sin(a) * dist * 0.4;
        ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(time * 3 + i) * 0.3})`;
        ctx.beginPath();
        // Tiny snowflake
        for (let j = 0; j < 4; j++) {
            const sa = Math.PI / 2 * j;
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx + Math.cos(sa) * 3, sy + Math.sin(sa) * 3);
        }
        ctx.strokeStyle = `rgba(255,255,255,${0.5 + Math.sin(time * 3 + i) * 0.3})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
    }
}

// ===== TESLA TOWER — Kingdom Rush Tesla / Dwarven Engineer =====
function drawTeslaTower(t, st, lv) {
    const w = 9 + lv;
    const h = 20 + lv * 5;

    // Riveted metal base
    ctx.fillStyle = '#6B5030';
    ctx.beginPath();
    ctx.roundRect(-w - 2, 3, (w + 2) * 2, w + 2, 3);
    ctx.fill();
    ctx.strokeStyle = '#4A3020';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Base rivets
    ctx.fillStyle = '#D4A030';
    for (let i = 0; i < 4; i++) {
        const rx = -w + 3 + i * (w * 2 - 6) / 3;
        ctx.beginPath();
        ctx.arc(rx, 3 + w / 2, 1.8, 0, Math.PI * 2);
        ctx.fill();
    }

    // Copper coil column
    const coilW = 4 + lv * 0.7;
    const coilH = h * 0.6;
    // Column body
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(-coilW, -coilH, coilW * 2, coilH + 3);
    ctx.strokeStyle = '#6B4F10';
    ctx.lineWidth = 1;
    ctx.strokeRect(-coilW, -coilH, coilW * 2, coilH + 3);

    // Copper windings
    const numCoils = 4 + lv * 2;
    for (let i = 0; i < numCoils; i++) {
        const y = -coilH + 2 + i * coilH / numCoils;
        ctx.strokeStyle = (i % 3 === 0) ? '#E8A020' : '#C87830';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-coilW - 0.8, y);
        ctx.lineTo(0, y + 3);
        ctx.lineTo(coilW + 0.8, y);
        ctx.stroke();
    }

    // Tesla coil top — metal dome
    const domeY = -coilH - 3;
    ctx.fillStyle = '#A08040';
    ctx.beginPath();
    ctx.arc(0, domeY, coilW + 2, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#7A6030';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Antenna / spike
    ctx.fillStyle = '#D4A030';
    ctx.fillRect(-1, domeY - 8 - lv * 3, 2, 8 + lv * 3);
    // Antenna ball
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, domeY - 9 - lv * 3, 3 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Energy orb glow
    const orbCY = domeY - 9 - lv * 3;
    const orbR = 6 + lv * 2;
    const glowGrad = ctx.createRadialGradient(0, orbCY - orbR * 0.3, orbR * 0.05, 0, orbCY, orbR);
    glowGrad.addColorStop(0, 'rgba(255,255,200,0.95)');
    glowGrad.addColorStop(0.2, 'rgba(255,228,50,0.7)');
    glowGrad.addColorStop(0.5, 'rgba(255,180,0,0.3)');
    glowGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, orbCY, orbR, 0, Math.PI * 2);
    ctx.fill();

    // Pulsing arcs
    const time = Date.now() / 1000;
    ctx.strokeStyle = 'rgba(255,228,80,0.8)';
    ctx.lineWidth = 1;
    for (let i = 0; i < lv + 1; i++) {
        const a0 = time * 5 + i * Math.PI * 2 / (lv + 1);
        const x0 = Math.cos(a0) * orbR * 0.4;
        const y0 = orbCY + Math.sin(a0) * orbR * 0.4;
        const a1 = a0 + 0.5 + Math.sin(time * 4 + i) * 0.3;
        const d1 = orbR * 0.8;
        const x1 = Math.cos(a1) * d1;
        const y1 = orbCY + Math.sin(a1) * d1;
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        const mx = (x0 + x1) / 2 + (Math.random() - 0.5) * 12;
        const my = (y0 + y1) / 2 + (Math.random() - 0.5) * 12;
        ctx.quadraticCurveTo(mx, my, x1, y1);
        ctx.stroke();
    }

    // Electrical prong barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#C89830';
    ctx.fillRect(2, -1, coilW + 8, 2);
    ctx.fillStyle = '#FFE44D';
    ctx.beginPath();
    ctx.arc(coilW + 9, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== TESLA CHAIN TOWER — Escalating chain lightning =====
function drawTeslaChainTower(t, st, lv) {
    const w = 10 + lv;
    const h = 20 + lv * 5;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 4) * 0.5;

    // Golden brass base — wider, reinforced
    const baseGrad = ctx.createLinearGradient(0, -2, 0, w + 4);
    baseGrad.addColorStop(0, '#C89830');
    baseGrad.addColorStop(0.5, '#8B6914');
    baseGrad.addColorStop(1, '#5C3A08');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-w - 4, 1, (w + 4) * 2, w + 5, 4);
    ctx.fill();
    ctx.strokeStyle = '#DAA520';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Chain-link detail on base
    for (let i = 0; i < 6; i++) {
        const cx = -w + 2 + i * w * 2 / 5;
        ctx.strokeStyle = `rgba(255,215,0,${0.3 + pulse * 0.3})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, w + 1, 2, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Iron pillar
    ctx.fillStyle = '#5C5030';
    ctx.fillRect(-3, -h * 0.2, 6, h * 0.2 + 1);

    // Copper coil chamber — larger
    const coilW = w - 1;
    const coilY = -h * 0.25;
    ctx.fillStyle = '#6B5030';
    ctx.beginPath();
    ctx.arc(0, coilY, coilW + 1, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#DAA520';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dense coil windings
    for (let i = 0; i < 8; i++) {
        const frac = i / 8;
        const y = coilY - frac * h * 0.35;
        const r = coilW - 2;
        ctx.strokeStyle = `rgba(255,200,60,${0.4 + pulse * 0.3})`;
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.arc(0, y, r + Math.sin(time * 8 + i) * 1, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Chain-arc antenna — glowing golden rods
    for (let i = -1; i <= 1; i += 2) {
        const ax = i * coilW * 0.5;
        const ay = coilY - h * 0.35;
        ctx.fillStyle = '#DAA520';
        ctx.fillRect(ax - 1, ay, 2, -h * 0.5 + lv * 3);
        // Arc ball at top
        ctx.fillStyle = `rgba(255,215,0,${0.6 + pulse * 0.4})`;
        ctx.beginPath();
        ctx.arc(ax, ay - h * 0.5 + lv * 3, 3 + lv * 0.5, 0, Math.PI * 2);
        ctx.fill();
    }
    // Arc between antennas
    ctx.strokeStyle = `rgba(255,230,80,${0.3 + pulse * 0.3})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, coilY - h * 0.35 - h * 0.5 + lv * 3, coilW * 0.5, Math.PI * 0.6, Math.PI * 0.4);
    ctx.stroke();

    // Central emitter coil
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(-2, -h * 0.5, 4, h * 0.4);
    for (let i = 0; i < 5; i++) {
        const wy = -h * 0.48 + i * h * 0.08;
        ctx.strokeStyle = `rgba(255,215,0,${0.4 + pulse * 0.3})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-3, wy); ctx.lineTo(3, wy); ctx.stroke();
    }

    // Pointed lightning rod
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(-2, -h * 0.9);
    ctx.lineTo(2, -h * 0.9);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();

    // Barrel — lightning fork
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#C89830';
    ctx.fillRect(3, -1, w + 4, 2);
    ctx.fillStyle = `rgba(255,230,80,${0.6 + pulse * 0.4})`;
    ctx.beginPath();
    ctx.arc(w + 6, 0, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== TESLA CHARGE TOWER — Divine lightning strike =====
function drawTeslaChargeTower(t, st, lv) {
    const w = 10 + lv;
    const h = 22 + lv * 6;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 3) * 0.5;
    const chargeRatio = st.chargeMaxTime > 0 ? Math.min(t.overflowCharge / st.chargeMaxTime, 1) : 0;

    // Dark storm-forged steel base
    const baseGrad = ctx.createLinearGradient(0, -2, 0, w + 4);
    baseGrad.addColorStop(0, '#5A4A8A');
    baseGrad.addColorStop(0.5, '#3A2A6A');
    baseGrad.addColorStop(1, '#1A0A4A');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-w - 4, 1, (w + 4) * 2, w + 5, 4);
    ctx.fill();
    ctx.strokeStyle = '#7B68EE';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Charge level indicator runes
    for (let i = 0; i < 5; i++) {
        const rx = -w + 3 + i * w * 2 / 4;
        const bright = i / 5 <= chargeRatio;
        ctx.fillStyle = bright ? '#E8E0FF' : 'rgba(200,180,255,0.2)';
        ctx.shadowColor = bright ? '#7B68EE' : 'transparent';
        ctx.shadowBlur = bright ? 6 : 0;
        ctx.beginPath();
        ctx.arc(rx, w + 3, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
    }

    // Massive stone pillar
    ctx.fillStyle = '#4A3A6A';
    ctx.fillRect(-4, -h * 0.15, 8, h * 0.15 + 1);

    // Energy containment chamber
    const coilW = w - 1;
    const coilY = -h * 0.2;
    ctx.fillStyle = '#3A2A6A';
    ctx.beginPath();
    ctx.arc(0, coilY, coilW + 1, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#7B68EE';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Charging energy core — brightness based on charge
    const coreAlpha = 0.3 + chargeRatio * 0.5 + pulse * 0.2;
    const coreGrad = ctx.createRadialGradient(0, coilY, 0, 0, coilY, coilW);
    coreGrad.addColorStop(0, `rgba(255,255,255,${coreAlpha})`);
    coreGrad.addColorStop(0.3, `rgba(200,180,255,${coreAlpha * 0.8})`);
    coreGrad.addColorStop(0.7, `rgba(120,100,220,${coreAlpha * 0.5})`);
    coreGrad.addColorStop(1, 'rgba(60,40,160,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.ellipse(0, coilY - 1, coilW - 2, (coilW - 2) * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ascending energy rings
    for (let i = 0; i < 3; i++) {
        const ry = coilY - 3 - i * (h * 0.5) / 3 - chargeRatio * h * 0.15;
        const ringAlpha = 0.2 + chargeRatio * 0.3 + pulse * 0.15;
        ctx.strokeStyle = `rgba(200,180,255,${ringAlpha})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, ry, coilW - 1 - i, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Tall lightning spire
    const spireGrad = ctx.createLinearGradient(0, -h * 0.2, 0, -h);
    spireGrad.addColorStop(0, '#7B68EE');
    spireGrad.addColorStop(0.4, '#9B8AF0');
    spireGrad.addColorStop(1, '#C8C0FF');
    ctx.fillStyle = spireGrad;
    ctx.beginPath();
    ctx.moveTo(-2.5, -h * 0.2);
    ctx.lineTo(2.5, -h * 0.2);
    ctx.lineTo(1.5, -h * 0.85);
    ctx.lineTo(0, -h);
    ctx.lineTo(-1.5, -h * 0.85);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#E8E0FF';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Spire tip — blinding when charged
    ctx.shadowColor = `rgba(200,180,255,${0.6 + chargeRatio * 0.4})`;
    ctx.shadowBlur = 8 + chargeRatio * 12;
    ctx.fillStyle = `rgba(255,255,255,${0.7 + chargeRatio * 0.3})`;
    ctx.beginPath();
    ctx.arc(0, -h, 2 + chargeRatio * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Barrel — energy focus rod
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#7B68EE';
    ctx.fillRect(3, -1.5, w + 5, 3);
    ctx.fillStyle = '#C8C0FF';
    ctx.fillRect(4, -0.5, w + 2, 1);
    // Energy orb at tip
    ctx.fillStyle = `rgba(200,180,255,${0.5 + chargeRatio * 0.4})`;
    ctx.beginPath();
    ctx.arc(w + 6, 0, 4 + chargeRatio * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== TESLA EMP TOWER — Passive vulnerability field =====
function drawTeslaEmpTower(t, st, lv) {
    const w = 9 + lv;
    const h = 14 + lv * 3;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 2.5) * 0.5;

    // Crystalline violet base
    const baseGrad = ctx.createRadialGradient(0, 3, w * 0.1, 0, 3, w + 4);
    baseGrad.addColorStop(0, 'rgba(180,160,240,0.6)');
    baseGrad.addColorStop(0.5, 'rgba(120,100,220,0.3)');
    baseGrad.addColorStop(1, 'rgba(80,60,200,0)');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(0, 3, w + 4, 0, Math.PI * 2);
    ctx.fill();

    // EMP pulse rings
    for (let i = 1; i <= 2; i++) {
        const ringRad = w + 2 + Math.sin(time * 3 + i) * 3;
        ctx.strokeStyle = `rgba(180,160,240,${0.12 + pulse * 0.1})`;
        ctx.lineWidth = 1.5 + i;
        ctx.setLineDash([i * 3, 5]);
        ctx.beginPath();
        ctx.arc(0, 2, ringRad, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Tower body — sleek purple crystal
    const bodyTop = -h * 0.5;
    const tw = w * 0.45;
    const bodyGrad = ctx.createLinearGradient(-w, 0, w, 0);
    bodyGrad.addColorStop(0, '#4A2080');
    bodyGrad.addColorStop(0.3, '#6C5CE7');
    bodyGrad.addColorStop(0.5, '#8B7AF0');
    bodyGrad.addColorStop(0.7, '#6C5CE7');
    bodyGrad.addColorStop(1, '#3A1070');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-w * 0.8, 0);
    ctx.quadraticCurveTo(-tw - 1, -h * 0.2, -tw, bodyTop);
    ctx.lineTo(tw, bodyTop);
    ctx.quadraticCurveTo(tw + 1, -h * 0.2, w * 0.8, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#9B8AF0';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Energy wave lines
    for (let i = 1; i < 4; i++) {
        const y = -i * h * 0.5 / 4;
        ctx.strokeStyle = `rgba(200,180,255,${0.2 + pulse * 0.12})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        const wAtY = w * 0.8 - (w * 0.8 - tw) * (i / 4);
        ctx.moveTo(-wAtY + 1, y);
        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();
    }

    // Core chamber — pulsing violet
    ctx.fillStyle = '#2A1060';
    ctx.fillRect(-2.5, -h * 0.3, 5, 7);
    ctx.fillStyle = `rgba(180,160,240,${0.45 + pulse * 0.3})`;
    ctx.fillRect(-1.5, -h * 0.3 + 1, 3, 5);

    // Dome — energy field projector (no weapon)
    const domeGrad = ctx.createRadialGradient(0, bodyTop, tw * 0.1, 0, bodyTop, tw + 3);
    domeGrad.addColorStop(0, 'rgba(220,200,255,0.9)');
    domeGrad.addColorStop(0.3, 'rgba(160,140,240,0.6)');
    domeGrad.addColorStop(0.7, 'rgba(100,80,220,0.3)');
    domeGrad.addColorStop(1, 'rgba(60,40,180,0)');
    ctx.fillStyle = domeGrad;
    ctx.beginPath();
    ctx.arc(0, bodyTop, tw + 4, Math.PI, 0);
    ctx.fill();

    // Central energy orb (passive, no barrel)
    const orbY = -h * 0.15;
    ctx.shadowColor = 'rgba(160,140,240,0.6)';
    ctx.shadowBlur = 8 + lv * 2;
    const orbGrad = ctx.createRadialGradient(0, orbY - 1, 1, 0, orbY, 4 + lv);
    orbGrad.addColorStop(0, '#E8E0FF');
    orbGrad.addColorStop(0.3, '#C0B0FF');
    orbGrad.addColorStop(0.7, '#8B7AF0');
    orbGrad.addColorStop(1, 'rgba(100,80,220,0)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(0, orbY, 4 + lv, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Orbiting energy motes
    for (let i = 0; i < lv + 2; i++) {
        const a = time * 2 + i * Math.PI * 2 / (lv + 2);
        const dist = w + 4;
        const mx = Math.cos(a) * dist;
        const my = orbY + Math.sin(a) * dist * 0.3;
        ctx.fillStyle = `rgba(200,180,255,${0.4 + Math.sin(time * 4 + i) * 0.3})`;
        ctx.beginPath();
        ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ===== FIRE TOWER — Brazier with persistent ground flames =====
function drawFireTower(t, st, lv) {
    const bw = 7 + lv;
    const h = 16 + lv * 4;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 4, bw + 4, bw * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Stone base platform — dark volcanic rock
    const baseGrad = ctx.createLinearGradient(0, -2, 0, bw + 3);
    baseGrad.addColorStop(0, '#5C4A3A');
    baseGrad.addColorStop(0.5, '#3D3025');
    baseGrad.addColorStop(1, '#2A1F18');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 3, 1, (bw + 3) * 2, bw + 4, 3);
    ctx.fill();
    ctx.strokeStyle = '#1A1008';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Base cracks / detail
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-bw + 2, 3); ctx.lineTo(-2, bw + 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bw - 2, 3); ctx.lineTo(1, bw + 3); ctx.stroke();

    // Iron stand / tripod legs
    const standY = -h * 0.25;
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-bw + 2, 2); ctx.lineTo(-3, standY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bw - 2, 2); ctx.lineTo(3, standY); ctx.stroke();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, bw + 2); ctx.lineTo(0, standY + 2); ctx.stroke();

    // Central pillar
    ctx.fillStyle = '#4A3728';
    ctx.fillRect(-3, standY, 6, -standY + 2);

    // Brazier bowl
    const bowlY = standY;
    const bowlW = bw + 1;
    ctx.fillStyle = '#5C3D2E';
    ctx.beginPath();
    ctx.arc(0, bowlY, bowlW, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#3A2010';
    ctx.lineWidth = 1.8;
    ctx.stroke();

    // Bowl rim highlights
    ctx.strokeStyle = '#7A5540';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, bowlY, bowlW - 1.5, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // Ember / coal bed inside bowl
    const emberGrad = ctx.createRadialGradient(0, bowlY - 2, 0, 0, bowlY - 3, bowlW - 2);
    emberGrad.addColorStop(0, '#FFAA00');
    emberGrad.addColorStop(0.4, '#FF5500');
    emberGrad.addColorStop(1, '#8B0000');
    ctx.fillStyle = emberGrad;
    ctx.beginPath();
    ctx.ellipse(0, bowlY - 3, bowlW - 3, (bowlW - 2) * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Animated flames rising from bowl
    const flameBaseY = bowlY - 3;
    const flameHeight = 10 + lv * 5;
    const numFlames = 4 + lv * 2;

    for (let i = 0; i < numFlames; i++) {
        const seed = i * 1.7 + time * 4;
        const ox = Math.sin(seed + i * 2.1) * (bowlW - 3) * 0.6;
        const fh = flameHeight * (0.5 + 0.5 * Math.abs(Math.sin(seed * 0.7 + i * 0.5)));
        const flicker = Math.sin(time * 12 + i * 2.5) * 0.15;
        const fw = 4 + lv * 0.8 + flicker * 3;

        const flameGrad = ctx.createLinearGradient(0, flameBaseY - fh, 0, flameBaseY);
        flameGrad.addColorStop(0, 'rgba(255,200,30,0.85)');
        flameGrad.addColorStop(0.3, 'rgba(255,140,10,0.8)');
        flameGrad.addColorStop(0.6, 'rgba(255,60,5,0.7)');
        flameGrad.addColorStop(1, 'rgba(200,20,0,0.5)');
        ctx.fillStyle = flameGrad;

        ctx.beginPath();
        ctx.moveTo(ox - fw, flameBaseY);
        const cp1x = ox - fw * 0.3;
        const cp1y = flameBaseY - fh * 0.5;
        const cp2x = ox + Math.sin(time * 6 + i) * fw * 0.5;
        const cp2y = flameBaseY - fh * 0.85;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, ox + Math.cos(time * 7 + i) * fw * 0.3, flameBaseY - fh);
        ctx.bezierCurveTo(cp2x + fw * 0.3, cp2y, cp1x + fw * 0.3, cp1y, ox + fw, flameBaseY);
        ctx.closePath();
        ctx.fill();
    }

    // Outer glow around flames
    const glowGrad = ctx.createRadialGradient(0, flameBaseY - flameHeight * 0.3, flameHeight * 0.1, 0, flameBaseY, flameHeight * 0.7);
    glowGrad.addColorStop(0, 'rgba(255,180,40,0.35)');
    glowGrad.addColorStop(0.5, 'rgba(255,100,15,0.15)');
    glowGrad.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, flameBaseY - flameHeight * 0.2, flameHeight * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Smoke wisps (Lv2+)
    if (lv >= 2) {
        for (let i = 0; i < 2 + lv; i++) {
            const sx = Math.sin(time * 1.5 + i * 2) * bowlW * 0.6;
            const sy = flameBaseY - flameHeight - 2 - i * 4 - Math.sin(time + i) * 3;
            const sa = 0.15 + Math.sin(time * 2 + i) * 0.05;
            ctx.fillStyle = `rgba(100,100,100,${sa})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 2 + i * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// ===== FOCUS TOWER — Evolved fire: single-target inferno ramping =====
function drawFireFocusTower(t, st, lv) {
    const bw = 8 + lv;
    const h = 18 + lv * 5;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 4) * 0.5;
    const focusStack = t.focusStack || 0;
    const focusMax = st.focusMaxStacks;

    // Dark obsidian base
    const baseGrad = ctx.createLinearGradient(0, -2, 0, bw + 4);
    baseGrad.addColorStop(0, '#3D1A1A');
    baseGrad.addColorStop(0.5, '#2A0A0A');
    baseGrad.addColorStop(1, '#1A0000');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 3, 1, (bw + 3) * 2, bw + 4, 3);
    ctx.fill();
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Focus stack indicator — glowing runes
    for (let i = 0; i < focusMax; i++) {
        const rx = -bw + 2 + i * bw * 2 / (focusMax - 1 || 1);
        const bright = i < focusStack;
        ctx.fillStyle = bright ? '#FFD700' : 'rgba(255,200,50,0.2)';
        ctx.shadowColor = bright ? '#FFAA00' : 'transparent';
        ctx.shadowBlur = bright ? 5 : 0;
        ctx.beginPath();
        ctx.arc(rx, bw + 2, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
    }

    // Iron pillar
    ctx.fillStyle = '#5C2A1A';
    ctx.fillRect(-3, -h * 0.2, 6, h * 0.2 + 2);

    // Focusing lens / crystal chamber
    const lensY = -h * 0.25;
    const lensW = bw + 1;
    ctx.fillStyle = '#3A1010';
    ctx.beginPath();
    ctx.arc(0, lensY, lensW, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#C0392B';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Crystal lens
    const lensGrad = ctx.createRadialGradient(0, lensY, 0, 0, lensY, lensW - 1);
    lensGrad.addColorStop(0, '#FFE880');
    lensGrad.addColorStop(0.3, '#FFAA00');
    lensGrad.addColorStop(0.7, '#FF5500');
    lensGrad.addColorStop(1, '#8B0000');
    ctx.fillStyle = lensGrad;
    ctx.beginPath();
    ctx.ellipse(0, lensY - 1, lensW - 2, (lensW - 2) * 0.4, 0, 0, Math.PI * 2);

    // Focused flame beam barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#4A1818';
    ctx.fillRect(0, -2, bw + lv + 3, 4);
    // Narrow intense flame at tip (intensity based on focus)
    const flameIntensity = 0.3 + (focusStack / focusMax) * 0.5 + pulse * 0.2;
    const flameGrad = ctx.createLinearGradient(bw + lv, 0, bw + lv + 8, 0);
    flameGrad.addColorStop(0, `rgba(255,200,30,${flameIntensity})`);
    flameGrad.addColorStop(0.5, `rgba(255,150,10,${flameIntensity * 0.8})`);
    flameGrad.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.moveTo(bw + lv + 3, -3);
    ctx.lineTo(bw + lv + 10, 0);
    ctx.lineTo(bw + lv + 3, 3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Heat shimmer around lens
    ctx.fillStyle = `rgba(255,150,20,${0.1 + pulse * 0.08})`;
    ctx.beginPath();
    ctx.arc(0, lensY, lensW + 4, 0, Math.PI * 2);

}

// ===== IGNITE TOWER — Evolved fire: passive area ignition =====
function drawFireIgniteTower(t, st, lv) {

    ctx.beginPath();
    ctx.arc(0, 2, bw + 6, 0, Math.PI * 2);

    bodyGrad.addColorStop(0.3, '#E67E22');
    bodyGrad.addColorStop(0.5, '#F5A623');
    bodyGrad.addColorStop(0.7, '#E67E22');

    ctx.quadraticCurveTo(tw + 1, -h * 0.25, bw * 0.85, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#D35400';
    ctx.lineWidth = 1.3;

    for (let i = 1; i < 4; i++) {

        ctx.strokeStyle = `rgba(255,255,200,${0.2 + pulse * 0.1})`;

        ctx.beginPath();

        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();

    // Glowing chamber
    ctx.fillStyle = '#3A1000';
    ctx.fillRect(-2.5, -h * 0.35, 5, 8);
    ctx.fillStyle = `rgba(255,200,80,${0.5 + pulse * 0.3})`;
    ctx.fillRect(-1.5, -h * 0.35 + 1, 3, 6);

    // Dome roof — golden crystal
    const roofGrad = ctx.createRadialGradient(0, bodyTop, tw * 0.2, 0, bodyTop - 1, tw + 2);
    roofGrad.addColorStop(0, 'rgba(255,255,200,0.9)');
    roofGrad.addColorStop(0.3, 'rgba(255,200,80,0.7)');
    roofGrad.addColorStop(0.7, 'rgba(230,130,20,0.4)');
    roofGrad.addColorStop(1, 'rgba(200,80,10,0)');
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.arc(0, bodyTop, tw + 3, Math.PI, 0);
    ctx.fill();

    // Central flame orb (no barrel — passive)
    const orbY = -h * 0.2;
    ctx.shadowColor = 'rgba(255,180,40,0.7)';
    ctx.shadowBlur = 10 + lv * 2;
    const orbGrad = ctx.createRadialGradient(0, orbY - 2, 1, 0, orbY, 5 + lv);
    orbGrad.addColorStop(0, '#FFE880');
    orbGrad.addColorStop(0.3, '#FFAA00');
    orbGrad.addColorStop(0.7, '#FF5500');
    orbGrad.addColorStop(1, 'rgba(255,60,0,0)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(0, orbY, 5 + lv, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Floating sparks
    for (let i = 0; i < lv + 3; i++) {
        const a = time * 2 + i * Math.PI * 2 / (lv + 3);
        const dist = bw + 5;
        const sx = Math.cos(a) * dist;
        const sy = orbY + Math.sin(a) * dist * 0.3;
        ctx.fillStyle = `rgba(255,200,40,${0.4 + Math.sin(time * 4 + i) * 0.3})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1 + Math.random() * 0.5, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ===== DETONATE TOWER — Evolved fire: on-kill explosion chain =====
function drawFireDetonateTower(t, st, lv) {
    const bw = 8 + lv;
    const h = 15 + lv * 4;
    const time = Date.now() / 1000;
    const pulse = 0.5 + Math.sin(time * 3.5) * 0.5;

    // Dark steel base
    const baseGrad = ctx.createLinearGradient(0, -2, 0, bw + 4);
    baseGrad.addColorStop(0, '#4A2A1A');
    baseGrad.addColorStop(0.5, '#3A1A0A');

    ctx.beginPath();
    ctx.roundRect(-bw - 3, 1, (bw + 3) * 2, bw + 4, 3);
    ctx.fill();
    ctx.strokeStyle = '#D35400';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Explosive charge indicators
    for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;

        const cy = Math.sin(a) * (bw) + 3;
        ctx.fillStyle = `rgba(255,100,20,${0.3 + pulse * 0.35})`;
        ctx.beginPath();
        ctx.arc(cx, cy, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Tower body — red-hot iron
    const bodyTop = -h * 0.5;
    const tw = bw * 0.55;
    const bodyGrad = ctx.createLinearGradient(-bw, 0, bw, 0);
    bodyGrad.addColorStop(0, '#6B1A0A');
    bodyGrad.addColorStop(0.3, '#C0392B');
    bodyGrad.addColorStop(0.5, '#D35400');
    bodyGrad.addColorStop(0.7, '#A0301A');
    bodyGrad.addColorStop(1, '#4A0A00');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-bw * 0.85, 0);
    ctx.lineTo(bw * 0.85, 0);
    ctx.lineTo(tw, bodyTop);
    ctx.lineTo(-tw, bodyTop);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#FF5733';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Thermal vents
    for (let i = 1; i < 4; i++) {
        const y = -i * h * 0.5 / 4;
        ctx.strokeStyle = `rgba(255,140,20,${0.3 + pulse * 0.2})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        const wAtY = bw * 0.85 - (bw * 0.85 - tw) * (i / 4);
        ctx.moveTo(-wAtY + 1, y);
        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();
    }

    // Charge chamber
    ctx.fillStyle = '#1A0500';
    ctx.fillRect(-3, -h * 0.3, 6, 10);
    ctx.fillStyle = `rgba(255,80,20,${0.4 + pulse * 0.35})`;
    ctx.fillRect(-2, -h * 0.3 + 1, 4, 8);

    // Pointed roof — blast cap
    const roofGrad = ctx.createLinearGradient(0, bodyTop, 0, -h);
    roofGrad.addColorStop(0, '#D35400');
    roofGrad.addColorStop(0.5, '#E67E22');
    roofGrad.addColorStop(1, '#FFA030');
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.moveTo(-tw - 2, bodyTop);
    ctx.lineTo(tw + 2, bodyTop);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#FF5733';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Blast cap tip
    ctx.fillStyle = '#FFC300';
    ctx.beginPath();
    ctx.arc(0, -h, 3 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Explosive barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#4A1A1A';
    ctx.fillRect(2, -2.5, bw + lv + 3, 5);
    ctx.fillStyle = '#8B3A2A';
    ctx.fillRect(3, -1.5, bw + lv - 1, 3);
    // Explosive tip
    ctx.fillStyle = `rgba(255,100,20,${0.4 + pulse * 0.35})`;
    ctx.beginPath();
    ctx.arc(bw + lv + 2, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,200,50,${0.35 + pulse * 0.4})`;
    ctx.beginPath();
    ctx.arc(bw + lv + 2, 0, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== WIND TOWER — Whirling column of air with swirling top =====
function drawWindTower(t, st, lv) {

    ctx.fillStyle = '#8B9D8B';

        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, orbY, orbR + 2 + i * 1.5, sa, sa + 1.8);
        ctx.stroke();
    }
}

// ===== WIND GUST TOWER — Tower with wing-like fins and wind streaks =====
function drawWindGustTower(t, st, lv) {
    const time = Date.now() / 1000;
    const r = 9 + lv;
    const h = 15 + lv * 3;

    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(0, 5, r + 2, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();

    // Light stone base
    ctx.fillStyle = '#8BAEAA'; ctx.beginPath(); ctx.roundRect(-r - 1, 2, (r + 1) * 2, r + 3, 3); ctx.fill();

    // Tapered tower body
    ctx.fillStyle = st.color;
    ctx.beginPath();
    ctx.moveTo(-r * 0.5, 0);
    ctx.lineTo(r * 0.5, 0);
    ctx.lineTo(r * 0.2, -h * 0.6);
    ctx.lineTo(-r * 0.2, -h * 0.6);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(216,255,248,0.35)'; ctx.lineWidth = 1; ctx.stroke();

    // Wing-like fins on sides
    for (let side = -1; side <= 1; side += 2) {
        const wingFlap = Math.sin(time * 6) * 3;
        ctx.save();
        ctx.fillStyle = 'rgba(168,232,224,0.5)';
        ctx.beginPath();
        ctx.moveTo(side * r * 0.3, -h * 0.2);
        ctx.quadraticCurveTo(side * (r + 8 + lv), -h * 0.35 + wingFlap, side * (r + 2), -h * 0.45 + wingFlap);
        ctx.quadraticCurveTo(side * (r + 6 + lv), -h * 0.5 + wingFlap, side * r * 0.3, -h * 0.4);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }

    // Wind streak lines
    for (let i = 0; i < 4; i++) {
        const phase = (time * 4 + i * 0.6) % 1;
        const sy = -h * 0.5 - i * 4;
        ctx.strokeStyle = `rgba(232,255,248,${0.4 * (1 - phase)})`;
        ctx.lineWidth = 1.2;
        const streakLen = phase * 14;
        ctx.beginPath();
        ctx.moveTo(-streakLen / 2, sy);
        ctx.lineTo(streakLen / 2, sy);
        ctx.stroke();
    }

    // Top wind vane
    ctx.save();
    ctx.rotate(time * 2);
    ctx.fillStyle = '#D8FFF8'; ctx.fillRect(-1, -h * 0.7, 2, 8 + lv);

}

// ===== SHEEP TOWER — Pastoral farm with magical wool core =====

    ctx.moveTo(-3.5, -h * 0.15);
    ctx.lineTo(0, -h * 0.05);
    ctx.lineTo(3.5, -h * 0.15);
    ctx.lineTo(0, -h * 0.3);
    ctx.closePath();
    ctx.fill();

    // Roof — round woolly dome
    const domeY = -h * 0.5;
    const domeR = bw - 1;
    const woolGrad = ctx.createRadialGradient(0, domeY - 2, domeR * 0.1, 0, domeY, domeR);
    woolGrad.addColorStop(0, '#FFFFFF');
    woolGrad.addColorStop(0.5, '#F5F0FA');
    woolGrad.addColorStop(1, '#D8C8E8');
    ctx.fillStyle = woolGrad;
    ctx.beginPath();
    ctx.arc(0, domeY, domeR, Math.PI, 0);
    ctx.fill();

    // Fluffy wool bumps on dome
    for (let i = 0; i < 8; i++) {
        const a = Math.PI + (i / 7) * Math.PI;
        const bx = Math.cos(a) * domeR * 0.85;
        const by = domeY + Math.sin(a) * domeR * 0.85;
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(bx, by, 3 + Math.sin(i * 2.5) * 1.2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Magical floating wool particles
    for (let i = 0; i < lv + 2; i++) {
        const px = Math.sin(time * 1.3 + i * 2.1) * (bw + 2);
        const py = domeY - 4 - i * 5 + Math.cos(time * 1.7 + i * 1.3) * 4;
        const pa = 0.4 + Math.sin(time * 2 + i) * 0.2;
        ctx.fillStyle = `rgba(240,220,255,${pa})`;
        ctx.beginPath();
        ctx.arc(px, py, 2.5 + Math.sin(time + i) * 1, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wand barrel — sparkly
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#D0B8E8';
    ctx.fillRect(3, -1.5, domeR + 4, 3);
    ctx.fillStyle = '#F0D8FF';
    ctx.beginPath();
    ctx.arc(domeR + 5, 0, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // Star sparkle at tip
    const sparkAlpha = 0.5 + Math.sin(time * 6) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${sparkAlpha})`;
    ctx.beginPath();
    ctx.arc(domeR + 5, -2, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== SHEEP TURNCOAT TOWER — Dark corrupted sheep pen with twisted energy =====
function drawSheepTurncoatTower(t, st, lv) {

// ===== SHEEP CONTAGION TOWER — Green spreading vine theme =====
function drawSheepContagionTower(t, st, lv) {
    const bw = 8 + lv;
    const h = 15 + lv * 3;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 5, bw + 3, bw * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mossy mound base
    const mossGrad = ctx.createLinearGradient(0, 0, 0, bw + 3);
    mossGrad.addColorStop(0, '#5B8C3E');
    mossGrad.addColorStop(1, '#2E5A1E');
    ctx.fillStyle = mossGrad;
    ctx.beginPath();
    ctx.ellipse(0, 4, bw + 3, bw * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Vine-covered fence
    ctx.fillStyle = '#7B6B4A';
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        const fx = Math.cos(a) * (bw + 1);
        const fy = Math.sin(a) * bw * 0.3 + 4;
        ctx.fillRect(fx - 1, fy - 7, 2.5, 7);
    }
    // Spreading vines from fence
    ctx.strokeStyle = '#4CAF50';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 + time * 0.3;
        const sx = Math.cos(a) * (bw + 3);
        const sy = Math.sin(a) * bw * 0.3 + 3;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        const ex = sx + Math.cos(a + 0.5) * 14;
        const ey = sy + Math.sin(a + 0.5) * 8;
        ctx.quadraticCurveTo(sx + Math.cos(a) * 8, sy - 5, ex, ey);
        ctx.stroke();
        // Tiny leaf
        ctx.fillStyle = '#7BCB5A';
        ctx.beginPath();
        ctx.arc(ex, ey, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Central pillar — earthy green

    pillarGrad.addColorStop(0.5, '#8BAA6B');

    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let yi = -h * 0.5; yi < 5; yi += 5) {

        else ctx.lineTo(vx, yi);

    ctx.stroke();

    // Spread symbol (concentric rings)
    ctx.strokeStyle = '#7BCB5A';
    ctx.lineWidth = 1;
    for (let r = 3; r <= 7; r += 2) {
        ctx.beginPath();
        ctx.arc(0, -h * 0.15, r, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.fillStyle = '#A9DFBF';
    ctx.beginPath();
    ctx.arc(0, -h * 0.15, 2, 0, Math.PI * 2);
    ctx.fill();

    // Green wool dome
    const domeY = -h * 0.5;
    const domeR = bw - 1;
    const woolGrad = ctx.createRadialGradient(0, domeY - 2, domeR * 0.1, 0, domeY, domeR);
    woolGrad.addColorStop(0, '#D0F0C0');
    woolGrad.addColorStop(0.5, '#A0D890');
    woolGrad.addColorStop(1, '#6BAA5B');
    ctx.fillStyle = woolGrad;
    ctx.beginPath();
    ctx.arc(0, domeY, domeR, Math.PI, 0);
    ctx.fill();

    // Fluffy wool bumps
    for (let i = 0; i < 8; i++) {
        const a = Math.PI + (i / 7) * Math.PI;
        const bx = Math.cos(a) * domeR * 0.85;
        const by = domeY + Math.sin(a) * domeR * 0.85;
        ctx.fillStyle = '#C8E8B0';
        ctx.beginPath();
        ctx.arc(bx, by, 3 + Math.sin(i * 2.5) * 1.2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Floating spores
    for (let i = 0; i < lv + 3; i++) {
        const px = Math.sin(time * 1.1 + i * 1.8) * (bw + 5);
        const py = domeY - 3 - i * 4 + Math.cos(time * 1.5 + i * 1.1) * 5;
        const pa = 0.35 + Math.sin(time * 1.8 + i) * 0.2;
        ctx.fillStyle = `rgba(160,240,140,${pa})`;
        ctx.beginPath();
        ctx.arc(px, py, 2 + Math.sin(time + i) * 0.7, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wand barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#7BAA5B';
    ctx.fillRect(3, -1.5, domeR + 4, 3);
    ctx.fillStyle = '#A9DF8B';
    ctx.beginPath();
    ctx.arc(domeR + 5, 0, 3.5, 0, Math.PI * 2);

// ===== MISSILE TOWER — Military silo with long-range missiles =====
function drawMissileTower(t, st, lv) {
    const bw = 10 + lv;
    const h = 20 + lv * 4;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 4, bw + 3, bw * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Concrete bunker base
    const bunkerGrad = ctx.createLinearGradient(0, 0, 0, bw + 2);
    bunkerGrad.addColorStop(0, '#7A7D7F');
    bunkerGrad.addColorStop(0.5, '#5A5D5F');
    bunkerGrad.addColorStop(1, '#3A3D3F');
    ctx.fillStyle = bunkerGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 2, 1, (bw + 2) * 2, bw + 4, 3);
    ctx.fill();
    ctx.strokeStyle = '#2A2D2F';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Concrete panel lines
    ctx.strokeStyle = '#6A6D6F';
    ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(0, bw + 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-bw + 2, bw / 2 + 2); ctx.lineTo(bw - 2, bw / 2 + 2); ctx.stroke();

    // Warning stripes on base
    for (let i = -3; i <= 3; i++) {
        if (i % 2 === 0) {
            ctx.fillStyle = '#F0C040';
            ctx.fillRect(i * (bw / 4), bw + 2, bw / 4, 3);
        } else {
            ctx.fillStyle = '#333';
            ctx.fillRect(i * (bw / 4), bw + 2, bw / 4, 3);
        }
    }

    // Missile silo / launch tube
    const tubeW = 5 + lv * 0.5;
    const tubeH = h * 0.5;
    const siloGrad = ctx.createLinearGradient(-tubeW, 0, tubeW, 0);
    siloGrad.addColorStop(0, '#5A5D5F');
    siloGrad.addColorStop(0.3, '#8A8D8F');
    siloGrad.addColorStop(0.7, '#7A7D7F');
    siloGrad.addColorStop(1, '#4A4D4F');
    ctx.fillStyle = siloGrad;
    ctx.fillRect(-tubeW, -tubeH, tubeW * 2, tubeH + 2);
    ctx.strokeStyle = '#3A3D3F';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-tubeW, -tubeH, tubeW * 2, tubeH + 2);

    // Tube rings
    for (let i = 0; i < 3; i++) {
        const ry = -tubeH + (i + 1) * tubeH / 4;
        ctx.strokeStyle = '#4A4D4F';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-tubeW - 1, ry);
        ctx.lineTo(tubeW + 1, ry);
        ctx.stroke();
        ctx.strokeStyle = '#9A9D9F';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-tubeW - 1, ry - 1);
        ctx.lineTo(tubeW + 1, ry - 1);
        ctx.stroke();
    }

    // Missile visible in tube with reload animation
    const missileW = 2 + lv * 0.5;
    const reloadProgress = st.cooldown > 0 ? Math.max(0, 1 - (t.cooldown / Math.max(st.cooldown, 1))) : 1;
    // Missile rises from bottom during last 40% of reload
    const riseThreshold = 0.6;
    if (reloadProgress >= 1) {
        // Fully loaded: missile at normal position
        const missileTipY = -tubeH + 4;
        ctx.fillStyle = '#E8E8E8';
        ctx.fillRect(-missileW, missileTipY, missileW * 2, 2);
        ctx.fillStyle = '#CC3333';
        ctx.beginPath();
        ctx.moveTo(-missileW, missileTipY);
        ctx.lineTo(missileW, missileTipY);
        ctx.lineTo(0, missileTipY - 6 - lv);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(-missileW - 2, missileTipY + 2);
        ctx.lineTo(-missileW, missileTipY + 2);
        ctx.lineTo(-missileW, missileTipY + 7);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(missileW + 2, missileTipY + 2);
        ctx.lineTo(missileW, missileTipY + 2);
        ctx.lineTo(missileW, missileTipY + 7);
        ctx.closePath();
        ctx.fill();
    } else if (reloadProgress > riseThreshold) {
        // Reloading: missile rises from bottom of tube
        const riseProgress = (reloadProgress - riseThreshold) / (1 - riseThreshold);
        const currentTipY = tubeH - 4 - riseProgress * (tubeH * 1.8);
        ctx.fillStyle = '#E8E8E8';
        ctx.fillRect(-missileW, currentTipY, missileW * 2, 2);
        ctx.fillStyle = '#CC3333';
        ctx.beginPath();
        ctx.moveTo(-missileW, currentTipY);
        ctx.lineTo(missileW, currentTipY);
        ctx.lineTo(0, currentTipY - 6 - lv);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(-missileW - 2, currentTipY + 2);
        ctx.lineTo(-missileW, currentTipY + 2);
        ctx.lineTo(-missileW, currentTipY + 7);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(missileW + 2, currentTipY + 2);
        ctx.lineTo(missileW, currentTipY + 2);
        ctx.lineTo(missileW, currentTipY + 7);
        ctx.closePath();
        ctx.fill();
    }
    // If reloadProgress <= riseThreshold, tube is empty (missile just launched)

    // Radar dish / antenna on side
    const dishX = tubeW + 5;
    const dishY = -tubeH * 0.5;
    ctx.fillStyle = '#555';
    ctx.fillRect(dishX - 0.5, dishY, 1, tubeH * 0.5);
    ctx.fillStyle = '#777';
    ctx.beginPath();
    ctx.ellipse(dishX, dishY, 5, 2, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Blinking light on antenna
    const blinkAlpha = 0.4 + Math.sin(time * 4) * 0.3;
    ctx.fillStyle = `rgba(255,50,50,${blinkAlpha})`;
    ctx.beginPath();
    ctx.arc(dishX + 1, dishY - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Launch smoke — billows from silo top after firing
    if (reloadProgress < 0.3) {
        const intensity = 1 - reloadProgress / 0.3;
        for (let i = 0; i < 5; i++) {
            const sx = -tubeW + 2 + Math.random() * (tubeW * 2 - 4);
            const sy = -tubeH - 4 - Math.random() * 12 * intensity;
            ctx.fillStyle = `rgba(160,160,160,${intensity * 0.5})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 3 + Math.random() * 5 * intensity, 0, Math.PI * 2);
            ctx.fill();
        }
        // Bright flash at launch
        ctx.fillStyle = `rgba(255,200,60,${intensity * 0.4})`;
        ctx.beginPath();
        ctx.arc(0, -tubeH, 6 * intensity, 0, Math.PI * 2);
        ctx.fill();
    }
    // Smoke/vent from silo base (Lv2+)
    if (lv >= 2) {
        for (let i = 0; i < 2; i++) {
            const sx = -tubeW + 2 + i * (tubeW * 2 - 4);
            const sy = -tubeH - 2 - Math.sin(time * 3 + i) * 4;
            ctx.fillStyle = `rgba(180,180,180,${0.2 + Math.sin(time * 2 + i) * 0.08})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 3 + i, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

    }

    // Triple launch tubes arranged in triangle

        { x: -bw + 2, y: 3 },

        tubeGrad.addColorStop(0.7, '#6A6090');

// ===== MISSILE NUKE TOWER — Heavy reinforced bunker with tactical warhead =====
function drawMissileNukeTower(t, st, lv) {
    const bw = 12 + lv;
    const h = 22 + lv * 5;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, 5, bw + 5, bw * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Heavy concrete bunker — extra thick
    const bunkerGrad = ctx.createLinearGradient(0, 0, 0, bw + 4);
    bunkerGrad.addColorStop(0, '#6B5D4B');
    bunkerGrad.addColorStop(0.3, '#4A3D2B');
    bunkerGrad.addColorStop(0.7, '#3A2D1B');
    bunkerGrad.addColorStop(1, '#2A1D0B');
    ctx.fillStyle = bunkerGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 3, 1, (bw + 3) * 2, bw + 6, 3);
    ctx.fill();
    ctx.strokeStyle = '#1A0D00';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Radiation warning stripes (yellow/black alternating)
    for (let i = -4; i <= 4; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#F0C040' : '#222';
        ctx.fillRect(i * (bw / 5), bw + 3, bw / 5, 4);
    }

    // Radiation trefoil symbol on base
    ctx.fillStyle = '#F0C040';
    ctx.beginPath();
    ctx.arc(0, bw * 0.5, 5, 0, Math.PI * 2);
    ctx.fill();
    for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * 7, bw * 0.5 + Math.sin(a) * 7, 3.5, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.fillStyle = '#4A2C0E';
    ctx.beginPath();
    ctx.arc(0, bw * 0.5, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Massive single launch silo
    const tubeW = 7 + lv;
    const tubeH = h * 0.6;
    const siloGrad = ctx.createLinearGradient(-tubeW, 0, tubeW, 0);
    siloGrad.addColorStop(0, '#3A2510');
    siloGrad.addColorStop(0.2, '#5A4530');
    siloGrad.addColorStop(0.5, '#6B5540');
    siloGrad.addColorStop(0.8, '#5A4530');
    siloGrad.addColorStop(1, '#3A2510');
    ctx.fillStyle = siloGrad;
    ctx.fillRect(-tubeW, -tubeH, tubeW * 2, tubeH + 4);
    ctx.strokeStyle = '#2A1500';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(-tubeW, -tubeH, tubeW * 2, tubeH + 4);

    // Heavy tube reinforcement rings
    for (let i = 0; i < 4; i++) {
        const ry = -tubeH + 5 + i * tubeH / 5;
        ctx.strokeStyle = '#2A1500';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-tubeW - 1, ry);
        ctx.lineTo(tubeW + 1, ry);
        ctx.stroke();
        ctx.strokeStyle = '#7A6550';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-tubeW - 1, ry - 1);
        ctx.lineTo(tubeW + 1, ry - 1);
        ctx.stroke();
    }

    const reloadProgress = st.cooldown > 0 ? Math.max(0, Math.min(1, 1 - (t.cooldown / Math.max(st.cooldown, 1)))) : 1;
    const warheadTopLoaded = -tubeH + 6;
    const warheadTopHidden = 5;
    const riseThreshold = 0.68;
    const drawNukeWarhead = (warheadY) => {
        ctx.save();
        ctx.beginPath();
        ctx.rect(-tubeW + 1, -tubeH - 14, tubeW * 2 - 2, tubeH + 20);
        ctx.clip();

        ctx.fillStyle = '#3A3020';
        ctx.fillRect(-tubeW + 2, warheadY, tubeW * 2 - 4, tubeH * 0.45);
        ctx.strokeStyle = '#2A2000';
        ctx.lineWidth = 1;
        ctx.strokeRect(-tubeW + 2, warheadY, tubeW * 2 - 4, tubeH * 0.45);

        ctx.fillStyle = '#CC3300';
        ctx.beginPath();
        ctx.moveTo(-tubeW + 2, warheadY);
        ctx.lineTo(tubeW - 2, warheadY);
        ctx.lineTo(0, warheadY - 10 - lv * 2);
        ctx.closePath();
        ctx.fill();

        const glowAlpha = 0.25 + Math.sin(time * 2) * 0.12;
        ctx.fillStyle = `rgba(255,100,20,${glowAlpha})`;
        ctx.beginPath();
        ctx.arc(0, warheadY - 6, tubeW * 0.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#F0C040';
        ctx.font = `${4 + lv}px sans-serif`;
        ctx.fillText('☢', -tubeW + 4, warheadY + tubeH * 0.3);
        ctx.restore();
    };

    // Empty bay / reload animation. The tactical warhead should not be visible immediately after launch.
    if (reloadProgress > riseThreshold) {
        const rise = (reloadProgress - riseThreshold) / (1 - riseThreshold);
        const warheadY = warheadTopHidden + (warheadTopLoaded - warheadTopHidden) * rise;
        drawNukeWarhead(warheadY);
    } else {
        ctx.fillStyle = 'rgba(12, 8, 4, 0.72)';
        ctx.fillRect(-tubeW + 2, -tubeH + 3, tubeW * 2 - 4, tubeH - 2);
        ctx.strokeStyle = 'rgba(240, 192, 64, 0.22)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-tubeW + 3, -tubeH + 5);
        ctx.lineTo(tubeW - 3, -tubeH + 5);
        ctx.stroke();

        if (reloadProgress > 0.15) {
            const barH = Math.max(2, (tubeH - 8) * Math.min(reloadProgress / riseThreshold, 1));
            ctx.fillStyle = 'rgba(240, 192, 64, 0.18)';
            ctx.fillRect(-tubeW + 4, 1 - barH, tubeW * 2 - 8, barH);
        }
    }

    // Ventilation pipes
    for (let sx = -1; sx <= 1; sx += 2) {
        const px = sx * (tubeW + 4);
        ctx.fillStyle = '#555';
        ctx.fillRect(px - 1, -tubeH + 10, 2, tubeH - 12);
        ctx.fillStyle = '#444';
        ctx.fillRect(px - 1.5, -tubeH + 8, 3, 4);
    }

    // Steam vents (Lv2+)
    if (lv >= 2) {
        for (let i = 0; i < 3; i++) {
            const sx = -tubeW + 3 + i * (tubeW * 2 - 6) / 2;
            const sy = -tubeH - 2 - Math.sin(time * 1.5 + i) * 3;
            ctx.fillStyle = `rgba(180,160,140,${0.15 + Math.sin(time * 2 + i) * 0.05})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 2 + i * 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// ===== LASER LINK RENDERING =====
function drawLaserLinks() {
    const time = Date.now() / 1000;
    const drawn = new Set();
    const LASER_TYPES = new Set(['laser', 'laser_core', 'laser_resonance', 'laser_refract']);
    const laserTowers = game.towers.filter(t => LASER_TYPES.has(t.type));
    for (const t of laserTowers) {
        if (!t.linkedTo) continue;
        for (const otherId of t.linkedTo) {
            const key = Math.min(t.id, otherId) + '_' + Math.max(t.id, otherId);
            if (drawn.has(key)) continue;
            drawn.add(key);
            const other = game.towers.find(tw => tw.id === otherId);
            if (!other) continue;
            const pulse = 0.5 + Math.sin(time * 4 + t.id * 0.7) * 0.3;
            // Glow beam
            ctx.strokeStyle = `rgba(255,180,50,${0.15 + pulse * 0.15})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(t.x, t.y);
            ctx.lineTo(other.x, other.y);
            ctx.stroke();
            // Core beam
            ctx.strokeStyle = `rgba(255,220,100,${0.3 + pulse * 0.25})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(t.x, t.y);
            ctx.lineTo(other.x, other.y);
            ctx.stroke();
            // Energy particles along the beam
            const dx = other.x - t.x;
            const dy = other.y - t.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            const nx = -dy / len;
            const ny = dx / len;
            for (let i = 1; i < 5; i++) {
                const f = (i / 5 + time * 0.3) % 1;
                const px = t.x + dx * f + nx * (Math.sin(time * 6 + i) * 3);
                const py = t.y + dy * f + ny * (Math.sin(time * 6 + i) * 3);
                ctx.fillStyle = `rgba(255,255,200,${0.5 + pulse * 0.4})`;
                ctx.beginPath();
                ctx.arc(px, py, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }
}
