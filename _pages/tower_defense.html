// ==================== RENDERING ====================
function drawGrid() {
    // === Layer 1: Base terrain with biome zones ===
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = c * CELL, y = r * CELL;
            const t = grid[r][c];

            if (t === TERRAIN.PATH) {
                // Dirt road - two-tone earth
                const shade = ((r + c) % 3) * 5;
                ctx.fillStyle = `rgb(${160 + shade},${130 + shade},${95 + shade})`;
                ctx.fillRect(x, y, CELL, CELL);
                // Cart tracks (subtle lines)
                ctx.fillStyle = `rgba(120,95,65,0.3)`;
                ctx.fillRect(x + 5, y, 2, CELL);
                ctx.fillRect(x + CELL - 8, y, 2, CELL);
            } else if (t === TERRAIN.GRASS) {
                // Buildable plateau - raised earth with stone border hint
                const shade = ((r * 13 + c * 7) % 16) - 8;
                ctx.fillStyle = `rgb(${62 + shade},${108 + shade},${42 + shade})`;
                ctx.fillRect(x, y, CELL, CELL);
                // Subtle plateau highlight
                ctx.fillStyle = `rgba(255,255,255,0.04)`;
                ctx.fillRect(x + 1, y + 1, CELL - 2, 2);
                // Stone edge accent
                ctx.strokeStyle = 'rgba(139,119,90,0.25)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
            } else {
                // Scenery ground - darker, varied greens and browns
                const biome = Math.floor((r / 5)) % 3;
                let base;
                if (biome === 0) {
                    base = { r: 48, g: 72, b: 30 }; // forest green
                } else if (biome === 1) {
                    base = { r: 55, g: 65, b: 35 }; // meadow
                } else {
                    base = { r: 50, g: 58, b: 40 }; // rocky area
                }
                const v = ((r * 17 + c * 11) % 14) - 7;
                ctx.fillStyle = `rgb(${base.r + v},${base.g + v},${base.b + v})`;
                ctx.fillRect(x, y, CELL, CELL);
                // Ground texture dots
                ctx.fillStyle = `rgba(0,0,0,0.06)`;
                const dotSeed = r * 100 + c;
                for (let d = 0; d < 3; d++) {
                    const dx = ((dotSeed * 7 + d * 13) % CELL);
                    const dy = ((dotSeed * 11 + d * 19) % CELL);
                    ctx.fillRect(x + dx, y + dy, 2, 2);
                }
            }
        }
    }

    // === Layer 2: Path edge softening (blend terrain) ===
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] !== TERRAIN.PATH) continue;
            const x = c * CELL, y = r * CELL;
            // Check neighbors — if adjacent to BLOCKED, draw grassy edge
            const neighbors = [
                [r-1,c],[r+1,c],[r,c-1],[r,c+1]
            ];
            for (const [nr, nc] of neighbors) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === TERRAIN.BLOCKED) {
                    ctx.fillStyle = 'rgba(90,130,50,0.35)';
                    if (nr < r) ctx.fillRect(x, y, CELL, 4);
                    if (nr > r) ctx.fillRect(x, y + CELL - 4, CELL, 4);
                    if (nc < c) ctx.fillRect(x, y, 4, CELL);
                    if (nc > c) ctx.fillRect(x + CELL - 4, y, 4, CELL);
                }
            }
        }
    }

    // === Layer 3: Grid lines ===
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(COLS * CELL, r * CELL);
        ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, ROWS * CELL);
        ctx.stroke();
    }
}

// Draw a single scenery item (tree, bush, rock)
function drawSceneryItem(cx, cy, type, size) {
    ctx.save();
    ctx.translate(cx, cy);
    const s = size;

    switch (type) {
        case 'pine': {
            // Trunk
            ctx.fillStyle = '#6B4226';
            ctx.fillRect(-2 * s, 0, 4 * s, 8 * s);
            // Three-tier pine triangle
            const tiers = [{y: -2, w: 10, h: 8}, {y: -6, w: 8, h: 7}, {y: -10, w: 5, h: 6}];
            for (const t of tiers) {
                ctx.fillStyle = '#3D6B2E';
                ctx.beginPath();
                ctx.moveTo(0, -t.y * s - t.h * s);
                ctx.lineTo(-t.w * s, -t.y * s);
                ctx.lineTo(t.w * s, -t.y * s);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#4A8038';
                ctx.beginPath();
                ctx.moveTo(0, -t.y * s - t.h * s + 3 * s);
                ctx.lineTo(-t.w * s + 2 * s, -t.y * s + 1 * s);
                ctx.lineTo(t.w * s - 2 * s, -t.y * s + 1 * s);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }
        case 'oak': {
            // Trunk
            ctx.fillStyle = '#8B5E3C';
            ctx.fillRect(-2.5 * s, 4 * s, 5 * s, 7 * s);
            // Canopy
            ctx.fillStyle = '#5B8C3E';
            ctx.beginPath();
            ctx.arc(0, -1 * s, 10 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6B9E4A';
            ctx.beginPath();
            ctx.arc(-3 * s, -3 * s, 6 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7AAF5C';
            ctx.beginPath();
            ctx.arc(2 * s, -5 * s, 5 * s, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'bush': {
            ctx.fillStyle = '#4A7C2E';
            ctx.beginPath();
            ctx.arc(0, 0, 6 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#5B9038';
            ctx.beginPath();
            ctx.arc(-2 * s, -1 * s, 4 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6BA044';
            ctx.beginPath();
            ctx.arc(2 * s, -2 * s, 3.5 * s, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
        case 'rock': {
            ctx.fillStyle = '#7A7A7A';
            ctx.beginPath();
            ctx.arc(0, 0, 5 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#8E8E8E';
            ctx.beginPath();
            ctx.arc(-1.5 * s, -2 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(-1 * s, -3 * s);
            ctx.lineTo(0.5 * s, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(1 * s, 1 * s);
            ctx.lineTo(3 * s, -1 * s);
            ctx.stroke();
            break;
        }
    }
    ctx.restore();
}

function drawTower(t) {
    const st = towerStats(t);
    const lv = t.level;
    ctx.save();
    ctx.translate(t.x, t.y);

    // Shadow under tower
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 3, 15, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    switch (t.type) {
        case 'archer': drawArcherTower(t, st, lv); break;
        case 'artillery': drawArtilleryTower(t, st, lv); break;
        case 'ice': drawIceTower(t, st, lv); break;
        case 'tesla': drawTeslaTower(t, st, lv); break;
        case 'fire': drawFireTower(t, st, lv); break;
        case 'knockback': drawKnockbackTower(t, st, lv); break;
        case 'sheep': drawSheepTower(t, st, lv); break;
        case 'missile': drawMissileTower(t, st, lv); break;
    }

    ctx.restore();
}

// ===== ARCHER TOWER — Kingdom Rush Marksmen Watchtower =====
function drawArcherTower(t, st, lv) {
    const b = 10 + lv * 2;  // base radius
    const h = 12 + lv * 4;  // roof height

    // Stone foundation ring
    ctx.fillStyle = '#8B7D6B';
    ctx.beginPath();
    ctx.arc(0, 6, b + 3, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#6B5D4B';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Timber platform (horizontal beams)
    ctx.fillStyle = '#C4A265';
    ctx.fillRect(-b - 2, 2, b * 2 + 4, 5);
    ctx.fillStyle = '#B89555';
    ctx.fillRect(-b, 2, b * 2, 3);

    // Main tower body — tapered wooden structure
    const bodyTop = -h + 10;
    const bw = b - 2;
    const tw = b - 5;
    ctx.fillStyle = '#A07840';
    ctx.beginPath();
    ctx.moveTo(-bw, 2);
    ctx.lineTo(bw, 2);
    ctx.lineTo(tw, bodyTop);
    ctx.lineTo(-tw, bodyTop);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7A5530';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Wood plank lines
    ctx.strokeStyle = '#8B6535';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 5; i++) {
        const y = 2 - i * (2 - bodyTop) / 5;
        ctx.beginPath();
        ctx.moveTo(-bw + 2 + i * 0.3, y);
        ctx.lineTo(bw - 2 - i * 0.3, y);
        ctx.stroke();
    }

    // Lookout window
    const winY = bodyTop + 8;
    ctx.fillStyle = '#3A2010';
    ctx.beginPath();
    ctx.roundRect(-4, winY, 8, 7, 2);
    ctx.fill();
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(-3, winY + 1, 6, 5);

    // Red tile roof — Kingdom Rush iconic
    ctx.fillStyle = '#8B2500';
    ctx.beginPath();
    ctx.moveTo(-b - 2, bodyTop + 2);
    ctx.lineTo(b + 2, bodyTop + 2);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#6B1C00';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Roof tile lines
    ctx.strokeStyle = '#A03000';
    ctx.lineWidth = 0.6;
    for (let i = 1; i <= lv + 1; i++) {
        const ry = bodyTop + 2 - i * (bodyTop + 2 + h) / (lv + 2);
        ctx.beginPath();
        const rw = b + 2 - (b + 2) * (i / (lv + 2)) * 0.5;
        ctx.moveTo(-rw, ry);
        ctx.lineTo(rw, ry);
        ctx.stroke();
    }

    // Roof finial / flag
    ctx.fillStyle = '#D4A030';
    ctx.fillRect(-1, -h, 2, -6);
    ctx.fillStyle = '#E74C3C';
    ctx.beginPath();
    ctx.moveTo(1, -h - 6);
    ctx.lineTo(10, -h - 8);
    ctx.lineTo(10, -h - 3);
    ctx.lineTo(1, -h - 2);
    ctx.closePath();
    ctx.fill();

    // Crossbow barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(3, -1, b + lv, 2.5);
    ctx.fillStyle = '#A07840';
    ctx.fillRect(b + lv - 3, -3, 8, 6);  // crossbow prod
    ctx.restore();
}

// ===== ARTILLERY TOWER — Kingdom Rush Dwarven Bombard =====
function drawArtilleryTower(t, st, lv) {
    const r = 13 + lv * 1.5;

    // Stone foundation platform
    const platGrad = ctx.createLinearGradient(0, -r, 0, r);
    platGrad.addColorStop(0, '#9E9080');
    platGrad.addColorStop(0.5, '#7A6E60');
    platGrad.addColorStop(1, '#5C5040');
    ctx.fillStyle = platGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4A3E30';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Stone brick pattern
    ctx.strokeStyle = '#6B5D4B';
    ctx.lineWidth = 0.7;
    for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(-r + 3, i * r * 0.35);
        ctx.lineTo(r - 3, i * r * 0.35);
        ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(0, -r + 2);
    ctx.lineTo(0, r - 2);
    ctx.stroke();

    // Inner iron platform
    const ir = r * 0.5 + lv;
    ctx.fillStyle = '#5C5C5C';
    ctx.beginPath();
    ctx.arc(0, 0, ir, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3A3A3A';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Rivets on platform
    ctx.fillStyle = '#888';
    for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * (ir - 2), Math.sin(a) * (ir - 2), 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wheels / gears on sides
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(-r + 2, 2, 4 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(r - 2, 2, 4 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Cannon barrel — big iron
    ctx.save();
    ctx.rotate(t.angle);
    const bw = 5 + lv;
    const bl = r * 0.6 + lv * 2;
    // Barrel gradient
    const barrelGrad = ctx.createLinearGradient(0, -bw, 0, bw);
    barrelGrad.addColorStop(0, '#666');
    barrelGrad.addColorStop(0.4, '#999');
    barrelGrad.addColorStop(0.6, '#777');
    barrelGrad.addColorStop(1, '#444');
    ctx.fillStyle = barrelGrad;
    ctx.fillRect(ir - 2, -bw / 2, bl, bw);
    // Barrel ring
    ctx.fillStyle = '#B8860B';
    ctx.fillRect(ir + bl * 0.5, -bw / 2 - 2, bw * 0.8, bw + 4);
    // Muzzle flare
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(ir + bl - 2, -bw / 2 - 3);
    ctx.lineTo(ir + bl + 4, -bw / 2);
    ctx.lineTo(ir + bl + 4, bw / 2);
    ctx.lineTo(ir + bl - 2, bw / 2 + 3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Smoke stack at back (for Lv2+)
    if (lv >= 2) {
        ctx.fillStyle = '#555';
        ctx.fillRect(-ir + 4, -r + 1, 5, -4 - lv * 2);
        ctx.fillStyle = '#777';
        ctx.fillRect(-ir + 3, -r + 1, 7, 2);
    }
}

// ===== ICE TOWER — Frost crystal spire with chilling aura =====
function drawIceTower(t, st, lv) {
    const b = 9 + lv * 1.5;
    const h = 18 + lv * 6;
    const time = Date.now() / 1000;

    // Ice crystal base
    const baseGrad = ctx.createRadialGradient(0, 3, b * 0.2, 0, 3, b);
    baseGrad.addColorStop(0, '#E8F4FD');
    baseGrad.addColorStop(0.5, '#AED6F1');
    baseGrad.addColorStop(1, '#5DADE2');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.arc(0, 3, b + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2E86C1';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Frost rune circle
    ctx.strokeStyle = 'rgba(174,214,241,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 3, b * 0.7, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        const rx = Math.cos(a) * b * 0.7;
        const ry = Math.sin(a) * b * 0.7 + 3;
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.arc(rx, ry, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Main tower — icy crystal spire
    const tw = b * 0.5;
    const bw = b * 0.8;
    const iceGrad = ctx.createLinearGradient(-bw, 0, bw, 0);
    iceGrad.addColorStop(0, '#85C1E9');
    iceGrad.addColorStop(0.3, '#D6EAF8');
    iceGrad.addColorStop(0.7, '#AED6F1');
    iceGrad.addColorStop(1, '#5DADE2');
    ctx.fillStyle = iceGrad;
    ctx.beginPath();
    ctx.moveTo(-bw, 0);
    ctx.lineTo(bw, 0);
    ctx.lineTo(tw, -h * 0.7);
    ctx.lineTo(-tw, -h * 0.7);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3498DB';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Ice crystal lines
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 6; i++) {
        const y = -i * h * 0.7 / 6;
        ctx.beginPath();
        const wAtY = bw - (bw - tw) * (i / 6);
        ctx.moveTo(-wAtY + 1, y);
        ctx.lineTo(wAtY - 1, y);
        ctx.stroke();
    }

    // Glowing ice window
    ctx.fillStyle = '#1A5276';
    ctx.fillRect(-2, -h * 0.45, 4, 10);
    ctx.fillStyle = 'rgba(133,193,233,0.6)';
    ctx.fillRect(-1.5, -h * 0.45 + 1, 3, 8);

    // Ice crystal spire roof
    ctx.fillStyle = '#85C1E9';
    ctx.beginPath();
    ctx.moveTo(-tw - 1, -h * 0.7);
    ctx.lineTo(tw + 1, -h * 0.7);
    ctx.lineTo(0, -h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2E86C1';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Glowing frost orb at top
    const orbY = -h;
    const orbR = 3 + lv;
    ctx.shadowColor = 'rgba(133,193,233,0.9)';
    ctx.shadowBlur = 8 + lv * 3;
    const orbGrad = ctx.createRadialGradient(0, orbY - orbR * 0.3, orbR * 0.1, 0, orbY, orbR);
    orbGrad.addColorStop(0, '#FFFFFF');
    orbGrad.addColorStop(0.3, '#D6EAF8');
    orbGrad.addColorStop(0.7, '#5DADE2');
    orbGrad.addColorStop(1, 'rgba(41,128,185,0)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(0, orbY, orbR + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Orbiting ice crystals
    for (let i = 0; i < lv + 1; i++) {
        const a = time * 2 + i * Math.PI * 2 / (lv + 1);
        const dist = b + 4;
        const cx = Math.cos(a) * dist;
        const cy = -h * 0.3 + Math.sin(a) * dist * 0.5;
        ctx.fillStyle = '#D6EAF8';
        ctx.beginPath();
        ctx.moveTo(cx, cy - 4);
        ctx.lineTo(cx + 2.5, cy);
        ctx.lineTo(cx, cy + 4);
        ctx.lineTo(cx - 2.5, cy);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Ice wand barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#85C1E9';
    ctx.fillRect(3, -1, tw + 6, 2);
    ctx.fillStyle = '#D6EAF8';
    ctx.beginPath();
    ctx.arc(tw + 8, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== TESLA TOWER — Kingdom Rush Tesla / Dwarven Engineer =====
function drawTeslaTower(t, st, lv) {
    const w = 9 + lv;
    const h = 20 + lv * 5;

    // Riveted metal base
    ctx.fillStyle = '#6B5030';
    ctx.beginPath();
    ctx.roundRect(-w - 2, 3, (w + 2) * 2, w + 2, 3);
    ctx.fill();
    ctx.strokeStyle = '#4A3020';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Base rivets
    ctx.fillStyle = '#D4A030';
    for (let i = 0; i < 4; i++) {
        const rx = -w + 3 + i * (w * 2 - 6) / 3;
        ctx.beginPath();
        ctx.arc(rx, 3 + w / 2, 1.8, 0, Math.PI * 2);
        ctx.fill();
    }

    // Copper coil column
    const coilW = 4 + lv * 0.7;
    const coilH = h * 0.6;
    // Column body
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(-coilW, -coilH, coilW * 2, coilH + 3);
    ctx.strokeStyle = '#6B4F10';
    ctx.lineWidth = 1;
    ctx.strokeRect(-coilW, -coilH, coilW * 2, coilH + 3);

    // Copper windings
    const numCoils = 4 + lv * 2;
    for (let i = 0; i < numCoils; i++) {
        const y = -coilH + 2 + i * coilH / numCoils;
        ctx.strokeStyle = (i % 3 === 0) ? '#E8A020' : '#C87830';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-coilW - 0.8, y);
        ctx.lineTo(0, y + 3);
        ctx.lineTo(coilW + 0.8, y);
        ctx.stroke();
    }

    // Tesla coil top — metal dome
    const domeY = -coilH - 3;
    ctx.fillStyle = '#A08040';
    ctx.beginPath();
    ctx.arc(0, domeY, coilW + 2, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#7A6030';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Antenna / spike
    ctx.fillStyle = '#D4A030';
    ctx.fillRect(-1, domeY - 8 - lv * 3, 2, 8 + lv * 3);
    // Antenna ball
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, domeY - 9 - lv * 3, 3 + lv * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Energy orb glow
    const orbCY = domeY - 9 - lv * 3;
    const orbR = 6 + lv * 2;
    const glowGrad = ctx.createRadialGradient(0, orbCY - orbR * 0.3, orbR * 0.05, 0, orbCY, orbR);
    glowGrad.addColorStop(0, 'rgba(255,255,200,0.95)');
    glowGrad.addColorStop(0.2, 'rgba(255,228,50,0.7)');
    glowGrad.addColorStop(0.5, 'rgba(255,180,0,0.3)');
    glowGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, orbCY, orbR, 0, Math.PI * 2);
    ctx.fill();

    // Pulsing arcs
    const time = Date.now() / 1000;
    ctx.strokeStyle = 'rgba(255,228,80,0.8)';
    ctx.lineWidth = 1;
    for (let i = 0; i < lv + 1; i++) {
        const a0 = time * 5 + i * Math.PI * 2 / (lv + 1);
        const x0 = Math.cos(a0) * orbR * 0.4;
        const y0 = orbCY + Math.sin(a0) * orbR * 0.4;
        const a1 = a0 + 0.5 + Math.sin(time * 4 + i) * 0.3;
        const d1 = orbR * 0.8;
        const x1 = Math.cos(a1) * d1;
        const y1 = orbCY + Math.sin(a1) * d1;
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        const mx = (x0 + x1) / 2 + (Math.random() - 0.5) * 12;
        const my = (y0 + y1) / 2 + (Math.random() - 0.5) * 12;
        ctx.quadraticCurveTo(mx, my, x1, y1);
        ctx.stroke();
    }

    // Electrical prong barrel
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#C89830';
    ctx.fillRect(2, -1, coilW + 8, 2);
    ctx.fillStyle = '#FFE44D';
    ctx.beginPath();
    ctx.arc(coilW + 9, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== FIRE TOWER — Brazier with persistent ground flames =====
function drawFireTower(t, st, lv) {
    const bw = 7 + lv;
    const h = 16 + lv * 4;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 4, bw + 4, bw * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Stone base platform — dark volcanic rock
    const baseGrad = ctx.createLinearGradient(0, -2, 0, bw + 3);
    baseGrad.addColorStop(0, '#5C4A3A');
    baseGrad.addColorStop(0.5, '#3D3025');
    baseGrad.addColorStop(1, '#2A1F18');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 3, 1, (bw + 3) * 2, bw + 4, 3);
    ctx.fill();
    ctx.strokeStyle = '#1A1008';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Base cracks / detail
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-bw + 2, 3); ctx.lineTo(-2, bw + 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bw - 2, 3); ctx.lineTo(1, bw + 3); ctx.stroke();

    // Iron stand / tripod legs
    const standY = -h * 0.25;
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-bw + 2, 2); ctx.lineTo(-3, standY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bw - 2, 2); ctx.lineTo(3, standY); ctx.stroke();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, bw + 2); ctx.lineTo(0, standY + 2); ctx.stroke();

    // Central pillar
    ctx.fillStyle = '#4A3728';
    ctx.fillRect(-3, standY, 6, -standY + 2);

    // Brazier bowl
    const bowlY = standY;
    const bowlW = bw + 1;
    ctx.fillStyle = '#5C3D2E';
    ctx.beginPath();
    ctx.arc(0, bowlY, bowlW, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#3A2010';
    ctx.lineWidth = 1.8;
    ctx.stroke();

    // Bowl rim highlights
    ctx.strokeStyle = '#7A5540';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, bowlY, bowlW - 1.5, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // Ember / coal bed inside bowl
    const emberGrad = ctx.createRadialGradient(0, bowlY - 2, 0, 0, bowlY - 3, bowlW - 2);
    emberGrad.addColorStop(0, '#FFAA00');
    emberGrad.addColorStop(0.4, '#FF5500');
    emberGrad.addColorStop(1, '#8B0000');
    ctx.fillStyle = emberGrad;
    ctx.beginPath();
    ctx.ellipse(0, bowlY - 3, bowlW - 3, (bowlW - 2) * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Animated flames rising from bowl
    const flameBaseY = bowlY - 3;
    const flameHeight = 10 + lv * 5;
    const numFlames = 4 + lv * 2;

    for (let i = 0; i < numFlames; i++) {
        const seed = i * 1.7 + time * 4;
        const ox = Math.sin(seed + i * 2.1) * (bowlW - 3) * 0.6;
        const fh = flameHeight * (0.5 + 0.5 * Math.abs(Math.sin(seed * 0.7 + i * 0.5)));
        const flicker = Math.sin(time * 12 + i * 2.5) * 0.15;
        const fw = 4 + lv * 0.8 + flicker * 3;

        const flameGrad = ctx.createLinearGradient(0, flameBaseY - fh, 0, flameBaseY);
        flameGrad.addColorStop(0, 'rgba(255,200,30,0.85)');
        flameGrad.addColorStop(0.3, 'rgba(255,140,10,0.8)');
        flameGrad.addColorStop(0.6, 'rgba(255,60,5,0.7)');
        flameGrad.addColorStop(1, 'rgba(200,20,0,0.5)');
        ctx.fillStyle = flameGrad;

        ctx.beginPath();
        ctx.moveTo(ox - fw, flameBaseY);
        const cp1x = ox - fw * 0.3;
        const cp1y = flameBaseY - fh * 0.5;
        const cp2x = ox + Math.sin(time * 6 + i) * fw * 0.5;
        const cp2y = flameBaseY - fh * 0.85;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, ox + Math.cos(time * 7 + i) * fw * 0.3, flameBaseY - fh);
        ctx.bezierCurveTo(cp2x + fw * 0.3, cp2y, cp1x + fw * 0.3, cp1y, ox + fw, flameBaseY);
        ctx.closePath();
        ctx.fill();
    }

    // Outer glow around flames
    const glowGrad = ctx.createRadialGradient(0, flameBaseY - flameHeight * 0.3, flameHeight * 0.1, 0, flameBaseY, flameHeight * 0.7);
    glowGrad.addColorStop(0, 'rgba(255,180,40,0.35)');
    glowGrad.addColorStop(0.5, 'rgba(255,100,15,0.15)');
    glowGrad.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, flameBaseY - flameHeight * 0.2, flameHeight * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Smoke wisps (Lv2+)
    if (lv >= 2) {
        for (let i = 0; i < 2 + lv; i++) {
            const sx = Math.sin(time * 1.5 + i * 2) * bowlW * 0.6;
            const sy = flameBaseY - flameHeight - 2 - i * 4 - Math.sin(time + i) * 3;
            const sa = 0.15 + Math.sin(time * 2 + i) * 0.05;
            ctx.fillStyle = `rgba(100,100,100,${sa})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 2 + i * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// ===== KNOCKBACK TOWER — Shockwave emitter with piston hammer =====
function drawKnockbackTower(t, st, lv) {
    const bw = 10 + lv;
    const h = 14 + lv * 3;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 5, bw + 2, bw * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Steel base platform
    const baseGrad = ctx.createLinearGradient(0, 0, 0, bw + 2);
    baseGrad.addColorStop(0, '#7D8B9C');
    baseGrad.addColorStop(1, '#4A5568');
    ctx.fillStyle = baseGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 1, 1, (bw + 1) * 2, bw + 3, 3);
    ctx.fill();
    ctx.strokeStyle = '#2D3748';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Steel rivets
    ctx.fillStyle = '#A0AEC0';
    for (let i = 0; i < 3; i++) {
        const rx = -bw + 4 + i * (bw * 2 - 8) / 2;
        ctx.beginPath();
        ctx.arc(rx, bw / 2 + 2, 1.8, 0, Math.PI * 2);
        ctx.fill();
    }

    // Central hydraulic piston
    const pistonW = 4 + lv;
    const pistonH = h * 0.45;
    ctx.fillStyle = '#A0AEC0';
    ctx.fillRect(-pistonW, -pistonH, pistonW * 2, pistonH + 2);
    ctx.strokeStyle = '#4A5568';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-pistonW, -pistonH, pistonW * 2, pistonH + 2);

    // Piston rings
    for (let i = 0; i < 4; i++) {
        const ry = -pistonH + (i + 1) * pistonH / 5;
        ctx.strokeStyle = '#718096';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-pistonW - 1, ry);
        ctx.lineTo(pistonW + 1, ry);
        ctx.stroke();
    }

    // Impact hammer head
    const hammerW = pistonW + 3;
    const hammerH = 5 + lv;
    const hammerY = -pistonH - hammerH;
    // Animated hammer movement (subtle vibration)
    const vibrate = Math.sin(time * 20) * (lv * 0.8);
    const hammerCY = hammerY + hammerH / 2 + vibrate;
    ctx.fillStyle = '#CBD5E0';
    ctx.fillRect(-hammerW, hammerCY - hammerH / 2, hammerW * 2, hammerH);
    ctx.strokeStyle = '#718096';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-hammerW, hammerCY - hammerH / 2, hammerW * 2, hammerH);

    // Hammer face highlight
    ctx.fillStyle = '#E2E8F0';
    ctx.fillRect(-hammerW + 2, hammerCY - hammerH / 2 + 1, hammerW * 2 - 4, 2);

    // Shockwave emitter coils on sides
    for (let side = -1; side <= 1; side += 2) {
        const coilX = side * (pistonW + 4);
        const coilY = -pistonH * 0.5;
        for (let i = 0; i < 3; i++) {
            const cy = coilY - i * 5;
            ctx.strokeStyle = '#63B3ED';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(coilX, cy, 3, 0, Math.PI * 2);
            ctx.stroke();
            // Glow
            const glowAlpha = 0.2 + Math.sin(time * 8 + i + side) * 0.1;
            ctx.fillStyle = `rgba(99,179,237,${glowAlpha})`;
            ctx.beginPath();
            ctx.arc(coilX, cy, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        // Connecting wire
        ctx.strokeStyle = '#63B3ED';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(coilX, coilY + 5);
        ctx.lineTo(side * pistonW, coilY + 5);
        ctx.stroke();
    }

    // Top antenna / discharge spike
    ctx.fillStyle = '#CBD5E0';
    ctx.fillRect(-1, hammerCY - hammerH / 2 - 6 - lv, 2, 6 + lv);
    // Discharge orb
    const orbCY = hammerCY - hammerH / 2 - 7 - lv;
    const orbR = 2.5 + lv * 0.7;
    const orbGrad = ctx.createRadialGradient(0, orbCY, 0, 0, orbCY, orbR);
    orbGrad.addColorStop(0, '#FFFFFF');
    orbGrad.addColorStop(0.3, '#BEE3F8');
    orbGrad.addColorStop(1, 'rgba(49,130,206,0)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(0, orbCY, orbR + 2, 0, Math.PI * 2);
    ctx.fill();

    // Pulsing shockwave rings from orb
    for (let i = 0; i < 2; i++) {
        const ringPhase = (time * 3 + i * 0.5) % 1;
        const ringR = orbR + ringPhase * 10;
        const ringA = (1 - ringPhase) * 0.4;
        ctx.strokeStyle = `rgba(99,179,237,${ringA})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, orbCY, ringR, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Barrel (energy projector)
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#A0AEC0';
    ctx.fillRect(2, -1.5, pistonW + 6, 3);
    ctx.fillStyle = '#63B3ED';
    ctx.beginPath();
    ctx.arc(pistonW + 7, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== SHEEP TOWER — Pastoral farm with magical wool core =====
function drawSheepTower(t, st, lv) {
    const bw = 8 + lv;
    const h = 15 + lv * 3;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 5, bw + 3, bw * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Grass mound base
    const grassGrad = ctx.createLinearGradient(0, 0, 0, bw + 3);
    grassGrad.addColorStop(0, '#8BC34A');
    grassGrad.addColorStop(1, '#558B2F');
    ctx.fillStyle = grassGrad;
    ctx.beginPath();
    ctx.ellipse(0, 4, bw + 3, bw * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wooden fence posts (ring around base)
    ctx.fillStyle = '#A08060';
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        const fx = Math.cos(a) * (bw + 1);
        const fy = Math.sin(a) * bw * 0.3 + 4;
        ctx.fillRect(fx - 1, fy - 7, 2.5, 7);
        ctx.fillStyle = '#C8A878';
        ctx.fillRect(fx - 0.5, fy - 7, 0.8, 7);
        ctx.fillStyle = '#A08060';
    }
    // Fence rope
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        const fx = Math.cos(a) * (bw + 1);
        const fy = Math.sin(a) * bw * 0.3 + 4;
        if (i === 0) ctx.moveTo(fx, fy - 3);
        else ctx.lineTo(fx, fy - 3);
    }
    ctx.stroke();

    // Central pillar — pastel stone
    const pillarGrad = ctx.createLinearGradient(-3, 0, 3, 0);
    pillarGrad.addColorStop(0, '#D8C8E8');
    pillarGrad.addColorStop(0.5, '#EDE0F5');
    pillarGrad.addColorStop(1, '#C8B8D8');
    ctx.fillStyle = pillarGrad;
    ctx.fillRect(-4, -h * 0.5, 8, h * 0.5 + 5);
    ctx.strokeStyle = '#B0A0C0';
    ctx.lineWidth = 1;
    ctx.strokeRect(-4, -h * 0.5, 8, h * 0.5 + 5);

    // Heart / wool symbol on pillar
    ctx.fillStyle = '#E8C0E0';
    ctx.beginPath();
    ctx.arc(-1.5, -h * 0.2, 2.5, 0, Math.PI * 2);
    ctx.arc(1.5, -h * 0.2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#F0D0F0';
    ctx.beginPath();
    ctx.moveTo(-3.5, -h * 0.15);
    ctx.lineTo(0, -h * 0.05);
    ctx.lineTo(3.5, -h * 0.15);
    ctx.lineTo(0, -h * 0.3);
    ctx.closePath();
    ctx.fill();

    // Roof — round woolly dome
    const domeY = -h * 0.5;
    const domeR = bw - 1;
    const woolGrad = ctx.createRadialGradient(0, domeY - 2, domeR * 0.1, 0, domeY, domeR);
    woolGrad.addColorStop(0, '#FFFFFF');
    woolGrad.addColorStop(0.5, '#F5F0FA');
    woolGrad.addColorStop(1, '#D8C8E8');
    ctx.fillStyle = woolGrad;
    ctx.beginPath();
    ctx.arc(0, domeY, domeR, Math.PI, 0);
    ctx.fill();

    // Fluffy wool bumps on dome
    for (let i = 0; i < 8; i++) {
        const a = Math.PI + (i / 7) * Math.PI;
        const bx = Math.cos(a) * domeR * 0.85;
        const by = domeY + Math.sin(a) * domeR * 0.85;
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(bx, by, 3 + Math.sin(i * 2.5) * 1.2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Magical floating wool particles
    for (let i = 0; i < lv + 2; i++) {
        const px = Math.sin(time * 1.3 + i * 2.1) * (bw + 2);
        const py = domeY - 4 - i * 5 + Math.cos(time * 1.7 + i * 1.3) * 4;
        const pa = 0.4 + Math.sin(time * 2 + i) * 0.2;
        ctx.fillStyle = `rgba(240,220,255,${pa})`;
        ctx.beginPath();
        ctx.arc(px, py, 2.5 + Math.sin(time + i) * 1, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wand barrel — sparkly
    ctx.save();
    ctx.rotate(t.angle);
    ctx.fillStyle = '#D0B8E8';
    ctx.fillRect(3, -1.5, domeR + 4, 3);
    ctx.fillStyle = '#F0D8FF';
    ctx.beginPath();
    ctx.arc(domeR + 5, 0, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // Star sparkle at tip
    const sparkAlpha = 0.5 + Math.sin(time * 6) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${sparkAlpha})`;
    ctx.beginPath();
    ctx.arc(domeR + 5, -2, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

// ===== MISSILE TOWER — Military silo with long-range missiles =====
function drawMissileTower(t, st, lv) {
    const bw = 10 + lv;
    const h = 20 + lv * 4;
    const time = Date.now() / 1000;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 4, bw + 3, bw * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Concrete bunker base
    const bunkerGrad = ctx.createLinearGradient(0, 0, 0, bw + 2);
    bunkerGrad.addColorStop(0, '#7A7D7F');
    bunkerGrad.addColorStop(0.5, '#5A5D5F');
    bunkerGrad.addColorStop(1, '#3A3D3F');
    ctx.fillStyle = bunkerGrad;
    ctx.beginPath();
    ctx.roundRect(-bw - 2, 1, (bw + 2) * 2, bw + 4, 3);
    ctx.fill();
    ctx.strokeStyle = '#2A2D2F';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Concrete panel lines
    ctx.strokeStyle = '#6A6D6F';
    ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(0, bw + 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-bw + 2, bw / 2 + 2); ctx.lineTo(bw - 2, bw / 2 + 2); ctx.stroke();

    // Warning stripes on base
    for (let i = -3; i <= 3; i++) {
        if (i % 2 === 0) {
            ctx.fillStyle = '#F0C040';
            ctx.fillRect(i * (bw / 4), bw + 2, bw / 4, 3);
        } else {
            ctx.fillStyle = '#333';
            ctx.fillRect(i * (bw / 4), bw + 2, bw / 4, 3);
        }
    }

    // Missile silo / launch tube
    const tubeW = 5 + lv * 0.5;
    const tubeH = h * 0.5;
    const siloGrad = ctx.createLinearGradient(-tubeW, 0, tubeW, 0);
    siloGrad.addColorStop(0, '#5A5D5F');
    siloGrad.addColorStop(0.3, '#8A8D8F');
    siloGrad.addColorStop(0.7, '#7A7D7F');
    siloGrad.addColorStop(1, '#4A4D4F');
    ctx.fillStyle = siloGrad;
    ctx.fillRect(-tubeW, -tubeH, tubeW * 2, tubeH + 2);
    ctx.strokeStyle = '#3A3D3F';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-tubeW, -tubeH, tubeW * 2, tubeH + 2);

    // Tube rings
    for (let i = 0; i < 3; i++) {
        const ry = -tubeH + (i + 1) * tubeH / 4;
        ctx.strokeStyle = '#4A4D4F';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-tubeW - 1, ry);
        ctx.lineTo(tubeW + 1, ry);
        ctx.stroke();
        ctx.strokeStyle = '#9A9D9F';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-tubeW - 1, ry - 1);
        ctx.lineTo(tubeW + 1, ry - 1);
        ctx.stroke();
    }

    // Missile visible in tube with reload animation
    const missileW = 2 + lv * 0.5;
    const reloadProgress = st.cooldown > 0 ? Math.max(0, 1 - (t.cooldown / Math.max(st.cooldown, 1))) : 1;
    // Missile rises from bottom during last 40% of reload
    const riseThreshold = 0.6;
    if (reloadProgress >= 1) {
        // Fully loaded: missile at normal position
        const missileTipY = -tubeH + 4;
        ctx.fillStyle = '#E8E8E8';
        ctx.fillRect(-missileW, missileTipY, missileW * 2, 2);
        ctx.fillStyle = '#CC3333';
        ctx.beginPath();
        ctx.moveTo(-missileW, missileTipY);
        ctx.lineTo(missileW, missileTipY);
        ctx.lineTo(0, missileTipY - 6 - lv);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(-missileW - 2, missileTipY + 2);
        ctx.lineTo(-missileW, missileTipY + 2);
        ctx.lineTo(-missileW, missileTipY + 7);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(missileW + 2, missileTipY + 2);
        ctx.lineTo(missileW, missileTipY + 2);
        ctx.lineTo(missileW, missileTipY + 7);
        ctx.closePath();
        ctx.fill();
    } else if (reloadProgress > riseThreshold) {
        // Reloading: missile rises from bottom of tube
        const riseProgress = (reloadProgress - riseThreshold) / (1 - riseThreshold);
        const currentTipY = tubeH - 4 - riseProgress * (tubeH * 1.8);
        ctx.fillStyle = '#E8E8E8';
        ctx.fillRect(-missileW, currentTipY, missileW * 2, 2);
        ctx.fillStyle = '#CC3333';
        ctx.beginPath();
        ctx.moveTo(-missileW, currentTipY);
        ctx.lineTo(missileW, currentTipY);
        ctx.lineTo(0, currentTipY - 6 - lv);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(-missileW - 2, currentTipY + 2);
        ctx.lineTo(-missileW, currentTipY + 2);
        ctx.lineTo(-missileW, currentTipY + 7);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(missileW + 2, currentTipY + 2);
        ctx.lineTo(missileW, currentTipY + 2);
        ctx.lineTo(missileW, currentTipY + 7);
        ctx.closePath();
        ctx.fill();
    }
    // If reloadProgress <= riseThreshold, tube is empty (missile just launched)

    // Radar dish / antenna on side
    const dishX = tubeW + 5;
    const dishY = -tubeH * 0.5;
    ctx.fillStyle = '#555';
    ctx.fillRect(dishX - 0.5, dishY, 1, tubeH * 0.5);
    ctx.fillStyle = '#777';
    ctx.beginPath();
    ctx.ellipse(dishX, dishY, 5, 2, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Blinking light on antenna
    const blinkAlpha = 0.4 + Math.sin(time * 4) * 0.3;
    ctx.fillStyle = `rgba(255,50,50,${blinkAlpha})`;
    ctx.beginPath();
    ctx.arc(dishX + 1, dishY - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Launch smoke — billows from silo top after firing
    if (reloadProgress < 0.3) {
        const intensity = 1 - reloadProgress / 0.3;
        for (let i = 0; i < 5; i++) {
            const sx = -tubeW + 2 + Math.random() * (tubeW * 2 - 4);
            const sy = -tubeH - 4 - Math.random() * 12 * intensity;
            ctx.fillStyle = `rgba(160,160,160,${intensity * 0.5})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 3 + Math.random() * 5 * intensity, 0, Math.PI * 2);
            ctx.fill();
        }
        // Bright flash at launch
        ctx.fillStyle = `rgba(255,200,60,${intensity * 0.4})`;
        ctx.beginPath();
        ctx.arc(0, -tubeH, 6 * intensity, 0, Math.PI * 2);
        ctx.fill();
    }
    // Smoke/vent from silo base (Lv2+)
    if (lv >= 2) {
        for (let i = 0; i < 2; i++) {
            const sx = -tubeW + 2 + i * (tubeW * 2 - 4);
            const sy = -tubeH - 2 - Math.sin(time * 3 + i) * 4;
            ctx.fillStyle = `rgba(180,180,180,${0.2 + Math.sin(time * 2 + i) * 0.08})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 3 + i, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function drawEnemy(e) {
    if (!e.alive) return;
    ctx.save();
    ctx.translate(e.x, e.y);

    // Sheep transformation — draw cute white sheep
    if (e.isSheep) {
        const woolY = -e.size * 0.2;
        // Woolly body (fluffy cloud-like)
        ctx.fillStyle = '#FEFEFE';
        for (let i = 0; i < 7; i++) {
            const a = (i / 7) * Math.PI * 2;
            const r = e.size * (0.7 + 0.15 * Math.sin(i * 3 + Date.now() / 400));
            ctx.beginPath();
            ctx.arc(Math.cos(a) * r * 0.8, woolY + Math.sin(a) * r * 0.6, e.size * 0.45, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#F8F8F8';
        ctx.beginPath();
        ctx.ellipse(0, woolY, e.size * 0.85, e.size * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#DDD';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Sheep head
        const headX = e.size * 0.5;
        const headY = woolY - e.size * 0.4;
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.ellipse(headX, headY, e.size * 0.28, e.size * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();

        // Ears
        ctx.fillStyle = '#444';
        ctx.beginPath(); ctx.ellipse(headX - 2, headY - 4, 3, 5, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(headX + 2, headY - 4, 3, 5, 0.3, 0, Math.PI * 2); ctx.fill();

        // Eyes
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(headX - 1.5, headY - 1, 1.8, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(headX + 1.5, headY - 1, 1.8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(headX - 1.5, headY - 1, 0.8, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(headX + 1.5, headY - 1, 0.8, 0, Math.PI * 2); ctx.fill();

        // Tiny legs
        ctx.fillStyle = '#333';
        for (let lx = -3; lx <= 3; lx += 6) {
            ctx.fillRect(lx - 1, woolY + e.size * 0.3, 2, e.size * 0.3);
        }

        // "zzZ" floating text
        const zAlpha = 0.5 + Math.sin(Date.now() / 500) * 0.3;
        ctx.fillStyle = `rgba(200,180,255,${zAlpha})`;
        ctx.font = `${e.size * 0.7}px sans-serif`;
        ctx.fillText('z', e.size * 0.4, -e.size * 0.8 - Math.sin(Date.now() / 300) * 3);
        ctx.fillText('Z', e.size * 0.2, -e.size * 1.2 - Math.sin(Date.now() / 350) * 3);

        ctx.restore();
        return;
    }

    // Body
    const isBoss = e.type === 'boss';
    if (isBoss) {
        // Boss glow
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 8 + Math.sin(Date.now() / 200) * 3;
    }
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(0, 0, e.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Slow visual
    if (e.slowTimer > 0 && e.slowFactor < 1) {
        ctx.fillStyle = 'rgba(173,216,230,0.4)';
        ctx.beginPath();
        ctx.arc(0, 0, e.size + 3, 0, Math.PI * 2);
        ctx.fill();
    }

    // Health bar
    const barW = e.size * 2.5;
    const barH = 3;
    const barY = -e.size - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(-barW / 2, barY, barW, barH);
    const hpPct = e.hp / e.maxHp;
    const hpColor = hpPct > 0.5 ? '#2ecc71' : hpPct > 0.25 ? '#f39c12' : '#e74c3c';
    ctx.fillStyle = hpColor;
    ctx.fillRect(-barW / 2, barY, barW * hpPct, barH);

    ctx.restore();
}

function drawProjectile(p) {
    if (p.type === 'fire') {
        // Fireball — glowing orb with trail
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 6);
        grad.addColorStop(0, '#FFF8C0');
        grad.addColorStop(0.3, '#FFB830');
        grad.addColorStop(0.7, '#FF6B35');
        grad.addColorStop(1, 'rgba(200,30,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
        ctx.fill();
        // Outer glow
        ctx.fillStyle = 'rgba(255,140,20,0.3)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
        ctx.fill();
    } else if (p.type === 'missile') {
        // Missile — vertical launch then arc toward target
        let angle;
        if (p.phase === 'launch') {
            angle = -Math.PI / 2; // Pointing straight up during launch
        } else if (p.bezierP1) {
            const t = Math.min(p.bezierDist / p.bezierLen, 1);
            const tan = bezierTangent(p.bezierP0, p.bezierP1, p.bezierP2, t);
            angle = Math.atan2(tan.y, tan.x);
        } else {
            angle = Math.atan2(p.targetY - p.startY, p.targetX - p.startX);
        }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);

        // Outer glow
        ctx.fillStyle = 'rgba(255,140,20,0.25)';
        ctx.beginPath();
        ctx.arc(0, 0, 14, 0, Math.PI * 2);
        ctx.fill();

        // Missile body — longer, sleeker
        const bodyLen = 24;
        const bodyH = 3.5;
        ctx.fillStyle = '#F0F0F0';
        ctx.fillRect(-12, -bodyH, bodyLen, bodyH * 2);
        ctx.strokeStyle = '#AAA';
        ctx.lineWidth = 1;
        ctx.strokeRect(-12, -bodyH, bodyLen, bodyH * 2);

        // Body stripe
        ctx.fillStyle = '#E74C3C';
        ctx.fillRect(-8, -bodyH, 3, bodyH * 2);
        ctx.fillRect(-2, -bodyH, 3, bodyH * 2);

        // Nose cone — larger
        ctx.fillStyle = '#CC2222';
        ctx.beginPath();
        ctx.moveTo(12, -bodyH - 1);
        ctx.lineTo(12, bodyH + 1);
        ctx.lineTo(19, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#991111';
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Nose tip highlight
        ctx.fillStyle = '#FF4444';
        ctx.beginPath();
        ctx.arc(17, 0, 1.2, 0, Math.PI * 2);
        ctx.fill();

        // Rear fins — larger
        ctx.fillStyle = '#444';
        ctx.beginPath(); ctx.moveTo(-10, -bodyH); ctx.lineTo(-12, -8); ctx.lineTo(-7, -bodyH); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-10, bodyH); ctx.lineTo(-12, 8); ctx.lineTo(-7, bodyH); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(2, -bodyH); ctx.lineTo(0, -6); ctx.lineTo(5, -bodyH); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(2, bodyH); ctx.lineTo(0, 6); ctx.lineTo(5, bodyH); ctx.closePath(); ctx.fill();

        // Big flame exhaust — multi-layer (longer during launch)
        const isLaunch = p.phase === 'launch';
        const flameLen = isLaunch ? 28 : 16;
        // Layer 1: bright core
        const exhGrad1 = ctx.createLinearGradient(-12, 0, -12 - flameLen, 0);
        exhGrad1.addColorStop(0, '#FFD700');
        exhGrad1.addColorStop(0.2, '#FFB830');
        exhGrad1.addColorStop(0.5, '#FF6B35');
        exhGrad1.addColorStop(1, 'rgba(200,20,0,0)');
        ctx.fillStyle = exhGrad1;
        ctx.beginPath();
        ctx.moveTo(-12, -3.5);
        ctx.lineTo(-12 - flameLen, -2);
        ctx.lineTo(-12 - flameLen - 4, 0);
        ctx.lineTo(-12 - flameLen, 2);
        ctx.lineTo(-12, 3.5);
        ctx.closePath();
        ctx.fill();

        // Layer 2: outer glow flames
        const exhGrad2 = ctx.createLinearGradient(-12, 0, -12 - flameLen * 0.7, 0);
        exhGrad2.addColorStop(0, 'rgba(255,200,40,0.6)');
        exhGrad2.addColorStop(1, 'rgba(255,40,0,0)');
        ctx.fillStyle = exhGrad2;
        ctx.beginPath();
        ctx.moveTo(-12, -5);
        ctx.lineTo(-12 - flameLen * 0.7, -4);
        ctx.lineTo(-12 - flameLen, 0);
        ctx.lineTo(-12 - flameLen * 0.7, 4);
        ctx.lineTo(-12, 5);
        ctx.closePath();
        ctx.fill();

        // Smoke puff right behind (bigger during launch)
        const smokeScale = isLaunch ? 1.6 : 1;
        ctx.fillStyle = 'rgba(140,140,140,0.4)';
        ctx.beginPath();
        ctx.arc(-13, 0, 6 * smokeScale, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(160,160,160,0.25)';
        ctx.beginPath();
        ctx.arc(-16, 0, 7 * smokeScale, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(120,120,120,0.15)';
        ctx.beginPath();
        ctx.arc(-20, 0, 9 * smokeScale, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    } else if (p.type === 'sheep') {
        // Sparkly pink/purple orb
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 5);
        grad.addColorStop(0, '#FFFFFF');
        grad.addColorStop(0.4, '#F0D0FF');
        grad.addColorStop(1, 'rgba(200,160,240,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(240,200,255,0.35)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawParticles() {
    for (const p of game.particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        if (p.ring) {
            const progress = 1 - alpha;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3 * alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * progress, 0, Math.PI * 2);
            ctx.stroke();
        } else if (p.lightning) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2 * alpha;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            const midX = (p.x + p.x2) / 2 + (Math.random() - 0.5) * 30;
            const midY = (p.y + p.y2) / 2 + (Math.random() - 0.5) * 30;
            ctx.quadraticCurveTo(midX, midY, p.x2, p.y2);
            ctx.stroke();
        } else if (p.smoke) {
            // Rising smoke cloud
            const progress = 1 - alpha;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = alpha * 0.5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (0.5 + progress * 0.5), 0, Math.PI * 2);
            ctx.fill();
        } else if (p.wool) {
            // Fluffy wool particle
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha * 0.5, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawHoverPreview() {
    if (!game.selectedType || game.hoverCol < 0 || game.hoverRow < 0) return;
    const pos = cellCenter(game.hoverCol, game.hoverRow);
    const valid = isBuildable(game.hoverCol, game.hoverRow);
    const def = TOWER_DEFS[game.selectedType];

    ctx.globalAlpha = valid ? 0.45 : 0.5;
    ctx.fillStyle = valid ? def.color : '#e74c3c';

    // Draw type-specific silhouette
    ctx.save();
    ctx.translate(pos.x, pos.y);
    const s = 14;
    switch (game.selectedType) {
        case 'archer':
            ctx.beginPath();
            ctx.roundRect(-s, 0, s * 2, s + 1, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-s + 1, -8);
            ctx.lineTo(s - 1, -8);
            ctx.lineTo(0, -20);
            ctx.closePath();
            ctx.fill();
            break;
        case 'artillery':
            ctx.beginPath();
            ctx.arc(0, 0, s + 2, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'ice':
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(s - 2, -5);
            ctx.lineTo(s + 2, 2);
            ctx.lineTo(0, s);
            ctx.lineTo(-s - 2, 2);
            ctx.lineTo(-s + 2, -5);
            ctx.closePath();
            ctx.fill();
            break;
        case 'tesla':
            ctx.fillRect(-4, -18, 8, 8);
            ctx.fillRect(-6, -8, 12, 12);
            ctx.beginPath();
            ctx.arc(0, -6, 8, Math.PI, 0);
            ctx.fill();
            break;
        case 'fire':
            ctx.fillStyle = def.color;
            ctx.fillRect(-5, -6, 10, 12);
            ctx.beginPath();
            ctx.arc(0, -8, 6, Math.PI, 0);
            ctx.fill();
            // Flame silhouette on top
            ctx.fillStyle = '#FF6B35';
            ctx.beginPath();
            ctx.moveTo(-4, -9);
            ctx.quadraticCurveTo(-2, -18, 0, -22);
            ctx.quadraticCurveTo(2, -18, 4, -9);
            ctx.closePath();
            ctx.fill();
            break;
        case 'knockback':
            ctx.fillStyle = def.color;
            ctx.fillRect(-6, -4, 12, 12);
            ctx.fillStyle = '#CBD5E0';
            ctx.fillRect(-4, -8, 8, 6);
            ctx.strokeStyle = '#63B3ED';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(0, -5, 5, 0, Math.PI * 2); ctx.stroke();
            break;
        case 'sheep':
            ctx.fillStyle = def.color;
            ctx.beginPath();
            ctx.roundRect(-5, -6, 10, 14, 4);
            ctx.fill();
            // Wool dome on top
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(0, -6, 8, Math.PI, 0);
            ctx.fill();
            // Tiny sheep ears
            ctx.fillStyle = '#DDD';
            ctx.beginPath(); ctx.ellipse(-4, -8, 2.5, 4, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(4, -8, 2.5, 4, 0.3, 0, Math.PI * 2); ctx.fill();
            break;
        case 'missile':
            // Silo shape
            ctx.fillStyle = def.color;
            ctx.fillRect(-6, -8, 12, 14);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.strokeRect(-6, -8, 12, 14);
            // Missile nose poking out
            ctx.fillStyle = '#E8E8E8';
            ctx.fillRect(-2, -10, 4, 4);
            ctx.fillStyle = '#CC3333';
            ctx.beginPath();
            ctx.moveTo(-2, -10);
            ctx.lineTo(2, -10);
            ctx.lineTo(0, -17);
            ctx.closePath();
            ctx.fill();
            // Fins
            ctx.fillStyle = '#555';
            ctx.beginPath(); ctx.moveTo(-6, -6); ctx.lineTo(-9, -4); ctx.lineTo(-6, -2); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(6, -6); ctx.lineTo(9, -4); ctx.lineTo(6, -2); ctx.closePath(); ctx.fill();
            break;
    }
    ctx.restore();

    ctx.strokeStyle = valid ? '#fff' : '#f00';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Range indicator
    if (valid) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, def.range[0], 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1;
}

function drawSelectedTowerRange() {
    if (!game.selectedTower) return;
    const t = game.selectedTower;
    const st = towerStats(t);
    const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;

    // Range circle
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(t.x, t.y, st.range, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Selection ring (pulsing gold)
    ctx.strokeStyle = `rgba(241,196,15,${0.5 + pulse * 0.3})`;
    ctx.lineWidth = 2.5 * pulse;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 20 + t.level * 2, 0, Math.PI * 2);
    ctx.stroke();

    // Inner highlight dot
    ctx.fillStyle = `rgba(255,255,255,${0.3 + pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
    ctx.fill();
}

function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Layer 1: Grid
    drawGrid();

    // Layer 2: Tower range of selected
    drawSelectedTowerRange();

    // Layer 3: Towers
    for (const t of game.towers) drawTower(t);

    // Layer 4: Enemies
    for (const e of game.enemies) drawEnemy(e);

    // Layer 5: Fire zones (ground AoE)
    drawFireZones();

    // Layer 6: Projectiles
    for (const p of game.projectiles) drawProjectile(p);

    // Layer 7: Particles
    drawParticles();

    // Layer 7: Hover preview
    drawHoverPreview();

    // Path arrows (subtle direction hints at waypoints)
    for (let i = 1; i < WAYPOINTS.length; i++) {
        const a = WAYPOINTS[i - 1], b = WAYPOINTS[i];
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        if (mx < 0 || mx > CANVAS_W || my < 0 || my > CANVAS_H) continue;
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.arc(mx, my, 6, 0, Math.PI * 2);
        ctx.fill();
    }

}

// ==================== UI ====================
function updateHUD() {
    document.getElementById('gold-display').textContent = game.gold;
    document.getElementById('lives-display').textContent = game.lives;
    document.getElementById('wave-display').textContent = game.waveNum + '/' + game.totalWaves;
    document.getElementById('score-display').textContent = game.score;
}

function updateTowerButtons() {
    const btns = document.querySelectorAll('.tower-btn');
    btns.forEach(btn => {
        const type = btn.dataset.type;
        const cost = TOWER_DEFS[type].cost;
        if (game.gold < cost) {
            btn.classList.add('disabled');
        } else {
            btn.classList.remove('disabled');
        }
        if (type === game.selectedType) {
            btn.classList.add('selected');
        } else {
            btn.classList.remove('selected');
        }
    });
}

function selectTowerType(type) {
    if (game.gold < TOWER_DEFS[type].cost) return;
    if (game.state === 'game_over' || game.state === 'victory') return;
    if (game.selectedType === type) {
        game.selectedType = null;
    } else {
        game.selectedType = type;
        game.selectedTower = null;
        hideTowerInfo();
    }
    updateTowerButtons();
}

function showTowerInfo(t) {
    game.selectedTower = t;
    const st = towerStats(t);
    const panel = document.getElementById('tower-info-panel');
    document.getElementById('tip-tower-name').textContent = st.name + ' Lv.' + t.level;
    document.getElementById('tip-stats').innerHTML =
        '<div class="stat-row"><span>伤害</span><span>' + st.damage + '</span></div>' +
        '<div class="stat-row"><span>射程</span><span>' + st.range + '</span></div>' +
        '<div class="stat-row"><span>攻速</span><span>' + (st.cooldown / 1000).toFixed(1) + 's</span></div>' +
        (st.splashRadius > 0 ? '<div class="stat-row"><span>溅射</span><span>' + st.splashRadius + 'px</span></div>' : '') +
        (st.slowFactor > 0 ? '<div class="stat-row"><span>减速</span><span>' + Math.round(st.slowFactor * 100) + '%</span></div>' : '') +
        (st.chainCount > 0 ? '<div class="stat-row"><span>连锁</span><span>' + st.chainCount + '个</span></div>' : '') +
        (st.flameRadius > 0 ? '<div class="stat-row"><span>火焰范围</span><span>' + st.flameRadius + 'px</span></div>' : '') +
        (st.flameDuration > 0 ? '<div class="stat-row"><span>火焰持续</span><span>' + (st.flameDuration / 1000).toFixed(1) + 's</span></div>' : '') +
        (st.sheepDuration > 0 ? '<div class="stat-row"><span>变羊持续</span><span>' + (st.sheepDuration / 1000).toFixed(1) + 's</span></div>' : '') +
        (st.arcHeight > 0 ? '<div class="stat-row"><span>导弹弧线</span><span>是</span></div>' : '') +
        (st.knockbackDist > 0 ? '<div class="stat-row"><span>击退距离</span><span>' + st.knockbackDist + 'px</span></div>' : '');

    const upBtn = document.getElementById('upgrade-btn');
    if (t.level >= 3) {
        upBtn.textContent = '已满级';
        upBtn.disabled = true;
    } else {
        upBtn.textContent = '升级 (' + st.upgradeCost + '💰)';
        upBtn.disabled = game.gold < st.upgradeCost;
    }

    const sellBtn = document.getElementById('sell-btn');
    const refund = Math.floor(t.totalInvested * 0.6);
    sellBtn.textContent = '出售 (' + refund + '💰)';

    // Position panel near the tower (but within viewport)
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    let px = rect.left + t.x / scaleX + 20;
    let py = rect.top + t.y / scaleY - 60;
    if (px + 200 > window.innerWidth) px = window.innerWidth - 210;
    if (py < 10) py = 10;
    if (py + 200 > window.innerHeight) py = window.innerHeight - 210;
    panel.style.left = px + 'px';
    panel.style.top = py + 'px';
    panel.style.display = 'block';
}

function hideTowerInfo() {
    document.getElementById('tower-info-panel').style.display = 'none';
    game.selectedTower = null;
}

function upgradeSelectedTower() {
    if (game.selectedTower) upgradeTower(game.selectedTower);
}

function sellSelectedTower() {
    if (game.selectedTower) sellTower(game.selectedTower);
}

function toggleSpeed() {
    game.speedMult = game.speedMult === 1 ? 2 : 1;
    const btn = document.getElementById('speed-btn');
    btn.textContent = game.speedMult + 'x';
    if (game.speedMult === 2) btn.classList.add('active'); else btn.classList.remove('active');
}

function endGame(result) {
    game.state = result === 'victory' ? 'victory' : 'game_over';
    game.selectedType = null;
    game.selectedTower = null;
    hideTowerInfo();
    const overlay = document.getElementById('overlay');
    overlay.classList.add('show');
    document.getElementById('start-wave-btn').disabled = true;

    if (result === 'victory') {
        document.getElementById('overlay-title').textContent = '🎉 胜利！';
        document.getElementById('overlay-sub').textContent = '总分数: ' + game.score + ' | 剩余生命: ' + game.lives;
    } else {
        document.getElementById('overlay-title').textContent = '💀 游戏结束';
        document.getElementById('overlay-sub').textContent = '坚持了 ' + game.waveNum + ' 波 | 总分数: ' + game.score;
    }
}

function restartGame() {
    game.gold = 200;
    game.lives = 20;
    game.score = 0;
    game.waveNum = 0;
    game.state = 'idle';
    game.speedMult = 1;
    game.countdown = 0;
    game.towers = [];
    game.enemies = [];
    game.projectiles = [];
    game.particles = [];
    game.fireZones = [];
    game.selectedType = null;
    game.selectedTower = null;
    game.spawnQueue = [];
    game.spawnTimer = 0;
    game.waveSpawningDone = false;
    game.nextTowerId = 1;
    game.nextEnemyId = 1;

    document.getElementById('overlay').classList.remove('show');
    document.getElementById('speed-btn').textContent = '1x';
    document.getElementById('speed-btn').classList.remove('active');
    document.getElementById('start-wave-btn').disabled = false;
    document.getElementById('countdown-display').textContent = '';
    hideTowerInfo();
    updateHUD();
    updateTowerButtons();
}

// ==================== INPUT HANDLING ====================
function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
    };
}

canvas.addEventListener('mousemove', (e) => {
    const pos = getCanvasCoords(e);
    const g = canvasToGrid(pos.x, pos.y);
    game.hoverCol = g.col;
    game.hoverRow = g.row;

    // Update cursor
    if (game.selectedType && isBuildable(g.col, g.row)) {
        canvas.style.cursor = 'pointer';
    } else if (game.selectedType) {
        canvas.style.cursor = 'not-allowed';
    } else if (g.col >= 0 && g.row >= 0 && game.towers.some(t => t.col === g.col && t.row === g.row)) {
        canvas.style.cursor = 'pointer';
    } else {
        canvas.style.cursor = 'crosshair';
    }

    // Tooltip for existing towers
    const tower = game.towers.find(t => t.col === g.col && t.row === g.row);
    const tip = document.getElementById('tooltip');
    if (tower && !game.selectedType) {
        const st = towerStats(tower);
        tip.style.display = 'block';
        tip.style.left = (e.clientX + 15) + 'px';
        tip.style.top = (e.clientY - 30) + 'px';
        tip.textContent = st.name + ' Lv.' + tower.level + ' | 伤害:' + st.damage + ' | 射程:' + st.range;
    } else {
        tip.style.display = 'none';
    }
});

canvas.addEventListener('click', (e) => {
    e.stopPropagation();
    if (game.state === 'game_over' || game.state === 'victory') return;
    const pos = getCanvasCoords(e);
    const g = canvasToGrid(pos.x, pos.y);

    // Close tower info panel if clicking elsewhere
    if (game.selectedTower) {
        const t = game.selectedTower;
        if (t.col !== g.col || t.row !== g.row) {
            hideTowerInfo();
        }
    }

    // If placing a tower
    if (game.selectedType) {
        if (placeTower(game.selectedType, g.col, g.row)) {
            // Keep type selected for rapid placement (shift+click behavior)
            // Clear selection on single click
             game.selectedType = null;
             updateTowerButtons();
        }
        return;
    }

    // Click existing tower
    const tower = game.towers.find(t => t.col === g.col && t.row === g.row);
    if (tower) {
        showTowerInfo(tower);
        game.selectedType = null;
        updateTowerButtons();
    }
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Touch events
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('click', { clientX: touch.clientX, clientY: touch.clientY });
    canvas.dispatchEvent(mouseEvent);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
    canvas.dispatchEvent(mouseEvent);
}, { passive: false });

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (game.state === 'game_over' || game.state === 'victory') return;
    switch(e.key) {
        case 'Escape':
            game.selectedType = null;
            hideTowerInfo();
            updateTowerButtons();
            break;
        case '1': selectTowerType('archer'); break;
        case '2': selectTowerType('artillery'); break;
        case '3': selectTowerType('ice'); break;
        case '4': selectTowerType('tesla'); break;
        case '5': selectTowerType('fire'); break;
        case '6': selectTowerType('sheep'); break;
        case '7': selectTowerType('missile'); break;
        case '8': selectTowerType('knockback'); break;
        case ' ':
            e.preventDefault();
            if (game.state === 'idle') startNextWave();
            break;
    }
});

// Click outside canvas closes panels
document.addEventListener('click', (e) => {
    if (!canvas.contains(e.target) && !document.getElementById('tower-info-panel').contains(e.target)) {
        hideTowerInfo();
    }
});

// Make startNextWave and toggleSpeed globally accessible for onclick
window.startNextWave = startNextWave;
window.toggleSpeed = toggleSpeed;
window.selectTowerType = selectTowerType;
window.upgradeSelectedTower = upgradeSelectedTower;
window.sellSelectedTower = sellSelectedTower;
window.restartGame = restartGame;

// ==================== GAME LOOP ====================
let lastFrameTime = null;
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);

function gameLoop(timestamp) {
    if (!lastFrameTime) {
        lastFrameTime = timestamp;
        requestAnimationFrame(gameLoop);
        return;
    }

    let dt = (timestamp - lastFrameTime) / 1000;
    lastFrameTime = timestamp;

    if (dt <= 0 || dt > 0.5) {
        requestAnimationFrame(gameLoop);
        return;
    }

    // Apply speed multiplier for logic
    const logicDt = dt * game.speedMult;

    // Update game logic
    if (game.state === 'wave_active') {
        updateWaveSpawning(dt);
        updateEnemies(logicDt);
        updateTowers(logicDt);
        updateProjectiles(logicDt);
        checkWaveComplete();
    } else if (game.state === 'idle' || game.state === 'wave_complete') {
        // Still update towers during idle (they don't fire but let's keep state clean)
        updateTowers(0);
        updateProjectiles(0);
    }

    // Fire zones always tick (even during idle — they burn out)
    updateFireZones(logicDt);
    updateParticles(dt);

    // Render every frame (always at 1x visual speed)
    render();

    // Update HUD periodically
    updateHUD();

    requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
function init() {
    initGrid();
    updateHUD();
    updateTowerButtons();
    document.getElementById('start-wave-btn').disabled = false;
    document.getElementById('countdown-display').textContent = '';
    requestAnimationFrame(gameLoop);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
