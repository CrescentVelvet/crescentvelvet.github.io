<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沙盘战争 - 像素战场</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-bg: #2c3e50;
            --pixel-primary: #3498db;
            --pixel-secondary: #e74c3c;
            --pixel-accent: #f1c40f;
            --pixel-text: #ecf0f1;
            --pixel-border: 4px;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Press Start 2P', cursive;
            background-color: #2c3e50;
            background-image: 
                linear-gradient(30deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(150deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(30deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(150deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(60deg, #2c3e5077 25%, transparent 25.5%, transparent 75%, #2c3e5077 75%, #2c3e5077),
                linear-gradient(60deg, #2c3e5077 25%, transparent 25.5%, transparent 75%, #2c3e5077 75%, #2c3e5077);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
            min-height: 100vh;
            color: var(--pixel-text);
            image-rendering: pixelated;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 4px 4px 0px #000;
            font-size: 2em;
            color: var(--pixel-accent);
            line-height: 1.5;
        }

        .game-ui {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .controls-panel {
            flex: 1;
            min-width: 300px;
            background: #000;
            border: 4px solid var(--pixel-text);
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            padding: 10px 15px;
            border: 4px solid;
            background: transparent;
            color: var(--pixel-text);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
            position: relative;
            transition: transform 0.1s;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        .btn-ally { border-color: var(--pixel-primary); color: var(--pixel-primary); }
        .btn-enemy { border-color: var(--pixel-secondary); color: var(--pixel-secondary); }
        .btn-action { border-color: var(--pixel-accent); color: var(--pixel-accent); }
        .btn-obstacle { border-color: #9b8f6a; color: #d8c98b; }
        .btn-danger { border-color: #95a5a6; color: #95a5a6; }

        .pixel-input, .pixel-select {
            font-family: 'Press Start 2P', cursive;
            background: #000;
            border: 2px solid var(--pixel-text);
            color: var(--pixel-text);
            padding: 8px;
            font-size: 10px;
        }

        .battlefield {
            width: 100%;
            height: 750px;
            background: #26362c;
            border: 4px solid var(--pixel-text);
            position: relative;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 18% 22%, rgba(160, 135, 82, 0.45) 0 18px, transparent 19px),
                radial-gradient(circle at 74% 68%, rgba(60, 90, 62, 0.7) 0 30px, transparent 31px),
                linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
                linear-gradient(135deg, rgba(29, 46, 36, 0.9), rgba(50, 58, 38, 0.9));
            background-size: 220px 180px, 260px 220px, 40px 40px, 40px 40px, auto;
        }

        .unit {
            position: absolute;
            width: var(--unit-size);
            height: var(--unit-size);
            cursor: pointer;
            image-rendering: pixelated;
            z-index: 10;
        }

        .unit-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform: rotate(var(--angle, 0deg));
            transform-origin: center;
        }

        .unit.tank {
            --unit-size: 36px;
        }

        .tank-track,
        .tank-body,
        .tank-turret,
        .tank-barrel,
        .soldier-body,
        .soldier-head {
            position: absolute;
        }

        .tank-track {
            width: 8px;
            height: 27px;
            top: 5px;
            background: #15191b;
            box-shadow: inset 0 0 0 2px #30383b;
        }

        .tank-track.left { left: 3px; }
        .tank-track.right { right: 3px; }

        .tank-body {
            width: 22px;
            height: 24px;
            left: 7px;
            top: 6px;
            background: var(--color-dark);
            box-shadow: inset 0 0 0 3px var(--color), 0 3px 0 rgba(0,0,0,0.45);
        }

        .tank-turret {
            width: 15px;
            height: 15px;
            left: 10px;
            top: 10px;
            background: var(--color-light);
            box-shadow: inset 0 0 0 3px var(--color);
        }

        .tank-barrel {
            width: 5px;
            height: 19px;
            left: 15px;
            top: -5px;
            background: var(--color-light);
            box-shadow: inset 0 0 0 2px var(--color);
        }

        .unit.soldier {
            --unit-size: 22px;
        }

        .soldier-body {
            width: 12px;
            height: 13px;
            left: 5px;
            top: 6px;
            background: var(--color);
            box-shadow: inset 0 0 0 2px var(--color-dark), 0 2px 0 rgba(0,0,0,0.45);
        }

        .soldier-head {
            width: 9px;
            height: 8px;
            left: 6px;
            top: 1px;
            background: var(--color-light);
            box-shadow: inset 0 0 0 2px var(--color);
        }

        .unit.ally { --color: #3498db; --color-dark: #2980b9; --color-light: #5dade2; }
        .unit.enemy { --color: #e74c3c; --color-dark: #c0392b; --color-light: #ec7063; }

        /* ---- 火炮 (32px) ---- */
        .unit.artillery {
            --unit-size: 32px;
        }

        .artillery-wheel {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #1a1a1a;
            box-shadow: inset 0 0 0 1px #444;
            top: 21px;
        }
        .artillery-wheel.left  { left: 2px; }
        .artillery-wheel.right { right: 2px; }

        .artillery-chassis {
            position: absolute;
            width: 20px;
            height: 8px;
            left: 6px;
            top: 20px;
            background: var(--color-dark);
            box-shadow: inset 0 0 0 2px var(--color);
        }

        .artillery-trail {
            position: absolute;
            width: 4px;
            height: 9px;
            left: 14px;
            top: 25px;
            background: var(--color-dark);
            box-shadow: inset 0 0 0 1px var(--color);
        }

        .artillery-barrel {
            position: absolute;
            width: 3px;
            height: 22px;
            left: 14px;
            top: -2px;
            background: var(--color-light);
            box-shadow: inset 0 0 0 1px var(--color);
        }

        .artillery-shield {
            position: absolute;
            width: 14px;
            height: 4px;
            left: 9px;
            top: 17px;
            background: var(--color);
            box-shadow: inset 0 0 0 1px var(--color-dark);
        }

        .unit.artillery .artillery-stabilizer { display: none; }
        .unit.artillery.deployed .artillery-stabilizer { display: block; }
        .artillery-stabilizer {
            position: absolute;
            width: 5px;
            height: 12px;
            background: var(--color-dark);
            box-shadow: inset 0 0 0 1px var(--color);
            top: 18px;
        }
        .artillery-stabilizer.left  { left: -2px;  transform: rotate(-20deg); }
        .artillery-stabilizer.right { right: -2px; transform: rotate(20deg); }

        .unit.artillery .deploy-dot {
            display: none;
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #f1c40f;
            left: 50%;
            margin-left: -2px;
            bottom: -7px;
            z-index: 2;
        }
        .unit.artillery.deployed .deploy-dot { display: block; }
        .unit.artillery.deploying .deploy-dot {
            display: block;
            background: #e67e22;
            animation: deployPulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes deployPulse {
            from { opacity: 0.3; }
            to   { opacity: 1; }
        }

        .unit.selected {
            filter: drop-shadow(0 0 4px #f1c40f);
            z-index: 100;
        }

        .unit.moving {
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.25));
        }

        .hp-bar {
            position: absolute;
            left: 2px;
            right: 2px;
            bottom: -6px;
            height: 3px;
            background: rgba(0,0,0,0.8);
            z-index: 1;
        }

        .hp-fill {
            width: 100%;
            height: 100%;
            background: #2ecc71;
        }

        .projectile {
            position: absolute;
            width: 7px;
            height: 7px;
            background: #f7e07b;
            border: 2px solid #fff6bd;
            box-shadow: 0 0 8px #f7e07b;
            pointer-events: none;
            z-index: 6;
        }

        .obstacle {
            position: absolute;
            background: #6f664f;
            border: 4px solid #2f2b22;
            box-shadow:
                inset 0 0 0 4px rgba(255,255,255,0.08),
                6px 6px 0 rgba(0,0,0,0.35);
            z-index: 4;
        }

        .obstacle::before,
        .obstacle::after {
            content: '';
            position: absolute;
            background: rgba(0,0,0,0.22);
        }

        .obstacle::before {
            width: 45%;
            height: 6px;
            left: 12%;
            top: 28%;
        }

        .obstacle::after {
            width: 34%;
            height: 6px;
            right: 10%;
            bottom: 24%;
        }

        .impact {
            position: absolute;
            width: 22px;
            height: 22px;
            margin-left: -11px;
            margin-top: -11px;
            border: 3px solid #ffd166;
            background: rgba(231, 76, 60, 0.35);
            animation: impactFlash 0.25s ease-out forwards;
            pointer-events: none;
            z-index: 7;
        }

        @keyframes impactFlash {
            from { transform: scale(0.4); opacity: 1; }
            to { transform: scale(1.8); opacity: 0; }
        }

        .battle-log {
            height: 150px;
            background: #000;
            border: 4px solid var(--pixel-text);
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-y: auto;
            color: #2ecc71;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .log-entry { margin: 2px 0; line-height: 1.4; }
        .log-entry.ally { color: #3498db; }
        .log-entry.enemy { color: #e74c3c; }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #000;
            border: 4px solid var(--pixel-text);
            font-size: 10px;
            color: var(--pixel-accent);
            margin-top: 10px;
        }

        /* 移除旧样式干扰 */
        .back-button, .sidebar, .main-content { display: none; }
        .container { display: block; }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            h1 {
                font-size: 1.1em;
                text-shadow: 2px 2px 0px #000;
                margin-bottom: 12px;
            }

            .game-ui {
                flex-direction: column;
                gap: 10px;
            }

            .controls-panel {
                min-width: unset;
                padding: 12px;
                border-width: 3px;
                box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
                gap: 8px;
            }

            .control-row {
                gap: 6px;
            }

            .pixel-btn {
                font-size: 8px;
                padding: 8px 10px;
                border-width: 3px;
                box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
            }

            .pixel-select, .pixel-input {
                font-size: 8px;
                padding: 6px;
            }

            .battlefield {
                height: 450px;
                border-width: 3px;
                box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            }

            .battle-log {
                height: 100px;
                font-size: 10px;
                padding: 6px;
                margin-top: 10px;
            }

            .status-bar {
                font-size: 8px;
                padding: 6px;
                flex-wrap: wrap;
                gap: 4px;
            }

            .container {
                gap: 10px;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 0.9em;
            }

            .pixel-btn {
                font-size: 7px;
                padding: 6px 8px;
            }

            .pixel-select, .pixel-input {
                font-size: 7px;
                padding: 4px;
            }

            .battlefield {
                height: 340px;
            }

            .battle-log {
                height: 80px;
                font-size: 9px;
            }

            .control-row label {
                font-size: 7px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👾 PIXEL WAR 👾</h1>
        
        <div class="game-ui">
            <div class="controls-panel">
                <div class="control-row">
                    <label>UNIT:</label>
                    <select id="unitType" class="pixel-select">
                        <option value="tank">TANK</option>
                        <option value="soldier">SOLDIER</option>
                        <option value="artillery">ARTILLERY</option>
                    </select>
                    
                    <label>HP:</label>
                    <input type="number" id="unitHealth" value="100" min="1" max="200" class="pixel-input" style="width: 60px;">
                </div>
                
                <div class="control-row">
                    <button onclick="addAllyUnit()" class="pixel-btn btn-ally">+ ALLY</button>
                    <button onclick="addEnemyUnit()" class="pixel-btn btn-enemy">+ ENEMY</button>
                    <button onclick="addObstacle()" class="pixel-btn btn-obstacle">+ COVER</button>
                    <button onclick="toggleBattle()" id="battleBtn" class="pixel-btn btn-action">START</button>
                    <button onclick="clearBattlefield()" class="pixel-btn btn-danger">CLEAR</button>
                </div>
            </div>
        </div>

        <div class="battlefield" id="battlefield">
            <div class="empty-state" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.5; pointer-events: none;">
                <p>DEPLOY UNITS TO START</p>
                <p style="font-size: 0.8em; margin-top: 10px;">CLICK TO ADD UNITS</p>
            </div>
        </div>

        <div class="status-bar">
            <span>FPS: <span id="fpsValue">0</span></span>
            <span>UNITS: <span id="unitCount">0</span></span>
            <span>UPDATED: <span id="lastModified"></span></span>
        </div>

        <div class="battle-log" id="battleLog"></div>
    </div>

    <div class="unit-info" id="unitInfo"></div>

    <script>
        // ... (保持原有逻辑，只需调整部分 UI 交互) ...

        class GameObject {
            constructor(x, y, type, team, health) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.team = team;
                this.health = health;
                this.maxHealth = health;
                this.element = null;
                this.selected = false;
                this.angle = 0;
                this.desiredAngle = 0;
                this.maxTurnSpeed = 140; // 度/秒
                this.state = 'patrol';
                this.currentTarget = null;
                
                // 实时移动和攻击系统
                this.targetX = x;
                this.targetY = y;
                this.path = [];
                this.pathTargetX = x;
                this.pathTargetY = y;
                this.lastPathTime = 0;
                this.pathCooldown = 450;
                this.isMoving = false;
                this.lastAttackTime = 0;
                this.attackCooldown = 1000; // 1秒攻击冷却
                this.lastMoveTime = 0;
                this.moveCooldown = 2000; // 2秒移动冷却
                this.velocity = { x: 0, y: 0 };
                this.maxSpeed = 22; // 像素/秒
                this.strafeDirection = Math.random() > 0.5 ? 1 : -1;
                this.lastStrafeSwitch = Date.now();
            }

            // 模板方法
            createElement() {
                this.element = document.createElement('div');
                this.element.className = `unit ${this.type} ${this.team}`;
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.width = this.getSize() + 'px';
                this.element.style.height = this.getSize() + 'px';

                this.element.innerHTML = this.getDisplayMarkup();
                this.bodyElement = this.element.querySelector('.unit-body');
                this.element.onclick = () => this.select();
                this.element.onmouseover = (e) => this.showInfo(e);
                this.element.onmouseout = () => this.hideInfo();

                return this.element;
            }

            getSize() {
                if (this.type === 'tank') return 36;
                if (this.type === 'artillery') return 32;
                return 22;
            }

            getDisplayMarkup() {
                const body = this.type === 'tank'
                    ? '<div class="tank-track left"></div><div class="tank-track right"></div><div class="tank-body"></div><div class="tank-turret"></div><div class="tank-barrel"></div>'
                    : '<div class="soldier-head"></div><div class="soldier-body"></div>';

                return `<div class="unit-body">${body}</div><div class="hp-bar"><div class="hp-fill" style="width: ${this.getHealthPercent()}%"></div></div>`;
            }

            getHealthPercent() {
                return Math.max(0, Math.min(100, (this.health / this.maxHealth) * 100));
            }

            updateVisual() {
                if (!this.element) return;

                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';

                if (this.bodyElement) {
                    this.bodyElement.style.setProperty('--angle', `${this.angle}deg`);
                }

                const hpFill = this.element.querySelector('.hp-fill');
                if (hpFill) {
                    hpFill.style.width = this.getHealthPercent() + '%';
                    hpFill.style.background = this.getHealthPercent() < 35 ? '#e74c3c' : '#2ecc71';
                }

                this.element.classList.toggle('moving', this.isMoving);
            }

            normalizeAngle(angle) {
                return ((angle % 360) + 360) % 360;
            }

            shortestAngleDelta(from, to) {
                return ((to - from + 540) % 360) - 180;
            }

            getAngleTo(target) {
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                return this.normalizeAngle(Math.atan2(dy, dx) * 180 / Math.PI + 90);
            }

            setDesiredAngle(angle) {
                this.desiredAngle = this.normalizeAngle(angle);
            }

            updateRotation(deltaTime) {
                const delta = this.shortestAngleDelta(this.angle, this.desiredAngle);
                const maxStep = this.maxTurnSpeed * deltaTime;

                if (Math.abs(delta) <= maxStep) {
                    this.angle = this.desiredAngle;
                } else {
                    this.angle = this.normalizeAngle(this.angle + Math.sign(delta) * maxStep);
                }
            }

            isFacing(target, tolerance = 14) {
                return Math.abs(this.shortestAngleDelta(this.angle, this.getAngleTo(target))) <= tolerance;
            }

            angleToPoint(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return this.normalizeAngle(Math.atan2(dy, dx) * 180 / Math.PI + 90);
            }

            forwardVector() {
                const radians = (this.angle - 90) * Math.PI / 180;
                return {
                    x: Math.cos(radians),
                    y: Math.sin(radians)
                };
            }

            select() {
                // 取消其他单位的选择
                document.querySelectorAll('.unit.selected').forEach(unit => {
                    unit.classList.remove('selected');
                });
                
                this.selected = true;
                this.element.classList.add('selected');
            }

            showInfo(event) {
                const info = document.getElementById('unitInfo');
                const typeName = this.type === 'tank' ? '坦克' : (this.type === 'artillery' ? '火炮' : '士兵');
                let extra = '';
                if (this.type === 'artillery' && this.deployed !== undefined) {
                    extra = `<br>状态: ${this.deployed ? '已部署' : (this.deploying ? '部署中...' : '移动中')}`;
                }
                info.innerHTML = `
                    <strong>${typeName}</strong><br>
                    阵营: ${this.team === 'ally' ? '友军' : '敌军'}<br>
                    生命值: ${this.health}/${this.maxHealth}${extra}<br>
                    位置: (${Math.round(this.x)}, ${Math.round(this.y)})
                `;
                info.style.display = 'block';
                info.style.left = event.pageX + 10 + 'px';
                info.style.top = event.pageY - 10 + 'px';
            }

            hideInfo() {
                document.getElementById('unitInfo').style.display = 'none';
            }

            getAttackDamage() {
                throw new Error('子类必须实现getAttackDamage方法');
            }

            move(dx, dy) {
                this.x += dx;
                this.y += dy;
                this.updateVisual();
            }

            smoothMove(targetX, targetY, duration = 1000) {
                if (!this.element) return;
                
                // 添加移动状态
                this.element.classList.add('moving');
                
                const startX = this.x;
                const startY = this.y;
                const deltaX = targetX - startX;
                const deltaY = targetY - startY;
                const startTime = performance.now();
                
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // 使用缓动函数
                    const easeProgress = this.easeInOutCubic(progress);
                    
                    this.x = startX + deltaX * easeProgress;
                    this.y = startY + deltaY * easeProgress;
                    
                    if (this.element) {
                        this.element.style.left = this.x + 'px';
                        this.element.style.top = this.y + 'px';
                    }
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // 移动完成，移除移动状态
                        if (this.element) this.element.classList.remove('moving');
                    }
                };
                
                requestAnimationFrame(animate);
            }

            easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
            }

            // 实时更新方法
            update(deltaTime, allUnits) {
                if (this.isDead()) return;

                const nearestEnemy = this.acquireTarget(allUnits);
                
                if (nearestEnemy) {
                    const distance = this.getDistance(nearestEnemy);

                    if (this.health < this.maxHealth * 0.3 && distance < this.attackRange * 1.1) {
                        this.state = 'retreat';
                        this.moveAwayFrom(nearestEnemy, 160);
                    } else if (distance > this.attackRange * 0.9) {
                        this.state = 'chase';
                        this.moveTowards(nearestEnemy);
                    } else if (distance < this.attackRange * 0.45) {
                        this.state = 'backoff';
                        this.moveAwayFrom(nearestEnemy, 110);
                    } else {
                        this.state = 'skirmish';
                        this.strafeAround(nearestEnemy);
                        this.tryAttack(nearestEnemy);
                    }
                } else {
                    this.state = 'patrol';
                    this.randomMove(deltaTime);
                }

                this.updatePosition(deltaTime, allUnits);
            }

            findNearestEnemy(allUnits) {
                let nearestEnemy = null;
                let nearestScore = Infinity;

                for (const unit of allUnits) {
                    if (unit !== this && unit.team !== this.team && !unit.isDead()) {
                        const distance = this.getDistance(unit);
                        const penalty = unit.type === 'artillery' ? 100 : 0;
                        const score = distance + penalty;
                        if (score < nearestScore) {
                            nearestScore = score;
                            nearestEnemy = unit;
                        }
                    }
                }

                return nearestEnemy;
            }

            acquireTarget(allUnits) {
                if (
                    this.currentTarget &&
                    !this.currentTarget.isDead() &&
                    this.currentTarget.team !== this.team &&
                    allUnits.includes(this.currentTarget) &&
                    this.getDistance(this.currentTarget) < this.attackRange * 1.8
                ) {
                    return this.currentTarget;
                }

                this.currentTarget = this.findNearestEnemy(allUnits);
                return this.currentTarget;
            }

            getDistance(target) {
                const myCenterX = this.x + this.getSize() / 2;
                const myCenterY = this.y + this.getSize() / 2;
                const targetCenterX = target.x + target.getSize() / 2;
                const targetCenterY = target.y + target.getSize() / 2;

                const dx = targetCenterX - myCenterX;
                const dy = targetCenterY - myCenterY;
                return Math.sqrt(dx * dx + dy * dy);
            }

            tryAttack(target) {
                const now = Date.now();
                if (now - this.lastAttackTime < this.attackCooldown) return;

                const distance = this.getDistance(target);
                if (distance <= this.attackRange && target.team !== this.team && !target.isDead()) {
                    this.turnToward(target);
                    if (!this.isFacing(target)) return;

                    this.lastAttackTime = now;
                    battlefieldManager.spawnProjectile(this, target, this.getAttackDamage());
                }
            }

            turnToward(target) {
                this.setDesiredAngle(this.getAngleTo(target));
            }

            clampTarget() {
                const battlefield = document.getElementById('battlefield');
                const maxX = battlefield.offsetWidth - this.getSize();
                const maxY = battlefield.offsetHeight - this.getSize();

                this.targetX = Math.max(0, Math.min(maxX, this.targetX));
                this.targetY = Math.max(0, Math.min(maxY, this.targetY));
                this.updatePathToTarget();
                this.isMoving = true;
            }

            updatePathToTarget(force = false) {
                if (!battlefieldManager || battlefieldManager.obstacles.length === 0) {
                    this.path = [];
                    return;
                }

                const now = Date.now();
                const targetMoved = Math.abs(this.targetX - this.pathTargetX) > 24 || Math.abs(this.targetY - this.pathTargetY) > 24;
                const lineBlocked = battlefieldManager.pathBlockedByObstacle(this.x, this.y, this.targetX, this.targetY, this.getSize());

                if (!lineBlocked) {
                    this.path = [];
                    this.pathTargetX = this.targetX;
                    this.pathTargetY = this.targetY;
                    return;
                }

                if (!force && !targetMoved && this.path.length > 0 && now - this.lastPathTime < this.pathCooldown) {
                    return;
                }

                if (!force && now - this.lastPathTime < this.pathCooldown) {
                    return;
                }

                this.path = battlefieldManager.findPath(this.x, this.y, this.targetX, this.targetY, this.getSize());
                this.pathTargetX = this.targetX;
                this.pathTargetY = this.targetY;
                this.lastPathTime = now;
            }

            getMoveTarget() {
                if (this.path.length === 0) {
                    return { x: this.targetX, y: this.targetY, isWaypoint: false };
                }

                const waypoint = this.path[0];
                const dx = waypoint.x - this.x;
                const dy = waypoint.y - this.y;
                if (Math.sqrt(dx * dx + dy * dy) < 8) {
                    this.path.shift();
                    return this.getMoveTarget();
                }

                return { x: waypoint.x, y: waypoint.y, isWaypoint: true };
            }

            moveTowards(target) {
                const targetCenterX = target.x + target.getSize() / 2;
                const targetCenterY = target.y + target.getSize() / 2;
                const myCenterX = this.x + this.getSize() / 2;
                const myCenterY = this.y + this.getSize() / 2;

                const dx = targetCenterX - myCenterX;
                const dy = targetCenterY - myCenterY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    const stopDist = this.attackRange * 0.72;
                    const ratio = Math.max(0, dist - stopDist) / dist;
                    
                    this.targetX = myCenterX + dx * ratio - this.getSize() / 2;
                    this.targetY = myCenterY + dy * ratio - this.getSize() / 2;
                    this.setDesiredAngle(Math.atan2(dy, dx) * 180 / Math.PI + 90);
                    this.clampTarget();
                }
            }

            moveAwayFrom(target, distance) {
                const dx = this.x - target.x;
                const dy = this.y - target.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;

                this.targetX = this.x + (dx / dist) * distance;
                this.targetY = this.y + (dy / dist) * distance;
                this.setDesiredAngle(Math.atan2(-dy, -dx) * 180 / Math.PI + 90);
                this.clampTarget();
            }

            strafeAround(target) {
                const now = Date.now();
                if (now - this.lastStrafeSwitch > 1800 + Math.random() * 900) {
                    this.strafeDirection *= -1;
                    this.lastStrafeSwitch = now;
                }

                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const perpendicularX = -dy / dist;
                const perpendicularY = dx / dist;
                const rangeCorrection = (dist - this.attackRange * 0.68) * 0.25;

                this.targetX = this.x + perpendicularX * this.strafeDirection * 80 + (dx / dist) * rangeCorrection;
                this.targetY = this.y + perpendicularY * this.strafeDirection * 80 + (dy / dist) * rangeCorrection;
                this.turnToward(target);
                this.clampTarget();
            }

            randomMove(deltaTime) {
                const now = Date.now();
                if (this.lastMoveTime > 0 && now - this.lastMoveTime < this.moveCooldown) return;

                const battlefield = document.getElementById('battlefield');
                const maxX = battlefield.offsetWidth - this.getSize();
                const maxY = battlefield.offsetHeight - this.getSize();

                const angle = Math.random() * Math.PI * 2;
                const moveDistance = 55 + Math.random() * 65;
                
                this.targetX = Math.max(0, Math.min(maxX, this.x + Math.cos(angle) * moveDistance));
                this.targetY = Math.max(0, Math.min(maxY, this.y + Math.sin(angle) * moveDistance));
                this.setDesiredAngle(angle * 180 / Math.PI + 90);
                this.isMoving = true;
                this.lastMoveTime = now;
            }

            updatePosition(deltaTime, allUnits) {
                if (this.type !== 'tank') {
                    this.updateRotation(deltaTime);
                }

                // 1. 处理分离（防止重叠）
                this.handleSeparation(allUnits);

                // 2. 处理主动移动
                if (this.isMoving) {
                    this.moveTowardTarget(deltaTime, allUnits);
                }

                // 3. 战斗中始终保持炮管指向目标，不被倒车逻辑覆盖朝向
                if (this.type === 'tank' && this.currentTarget && !this.currentTarget.isDead() && this.state !== 'retreat' && this.state !== 'backoff') {
                    this.setDesiredAngle(this.getAngleTo(this.currentTarget));
                    this.updateRotation(deltaTime);
                }

                // 4. 更新 DOM
                if (this.element) {
                    this.updateVisual();
                } else {
                    console.warn('Unit element missing for updatePosition');
                }
            }

            moveTowardTarget(deltaTime, allUnits) {
                const moveTarget = this.getMoveTarget();
                const dx = moveTarget.x - this.x;
                const dy = moveTarget.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 3) {
                    if (moveTarget.isWaypoint) {
                        this.path.shift();
                    } else {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.isMoving = false;
                    }
                    if (this.element) this.element.classList.remove('moving');
                    return;
                }

                const moveSpeed = this.maxSpeed * deltaTime;
                const nextX = this.x + (dx / distance) * moveSpeed;
                const nextY = this.y + (dy / distance) * moveSpeed;

                if (!this.checkCollision(nextX, nextY, allUnits)) {
                    this.x = nextX;
                    this.y = nextY;
                } else if (!this.checkCollision(nextX, this.y, allUnits)) {
                    this.x = nextX;
                } else if (!this.checkCollision(this.x, nextY, allUnits)) {
                    this.y = nextY;
                } else {
                    this.updatePathToTarget(true);
                }
            }

            handleSeparation(allUnits) {
                const mySize = this.getSize();
                const myCenterX = this.x + mySize / 2;
                const myCenterY = this.y + mySize / 2;

                for (const other of allUnits) {
                    if (other === this || other.isDead()) continue;

                    const otherSize = other.getSize();
                    const otherCenterX = other.x + otherSize / 2;
                    const otherCenterY = other.y + otherSize / 2;

                    const dx = myCenterX - otherCenterX;
                    const dy = myCenterY - otherCenterY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = (mySize + otherSize) / 2;

                    if (dist < minDist && dist > 0) {
                        // 产生一个轻微的排斥力
                        const pushForce = (minDist - dist) * 0.1;
                        this.x += (dx / dist) * pushForce;
                        this.y += (dy / dist) * pushForce;
                        
                        // 边界检查
                        const battlefield = document.getElementById('battlefield');
                        this.x = Math.max(0, Math.min(battlefield.offsetWidth - mySize, this.x));
                        this.y = Math.max(0, Math.min(battlefield.offsetHeight - mySize, this.y));
                    }
                }
            }

            checkCollision(nextX, nextY, allUnits) {
                const mySize = this.getSize();
                const myCenterX = nextX + mySize / 2;
                const myCenterY = nextY + mySize / 2;

                if (battlefieldManager && battlefieldManager.collidesWithObstacle(nextX, nextY, mySize, mySize)) {
                    return true;
                }

                for (const other of allUnits) {
                    if (other === this || other.isDead()) continue;

                    const otherSize = other.getSize();
                    const otherCenterX = other.x + otherSize / 2;
                    const otherCenterY = other.y + otherSize / 2;

                    const dist = Math.sqrt(Math.pow(myCenterX - otherCenterX, 2) + Math.pow(myCenterY - otherCenterY, 2));
                    const minDist = (mySize + otherSize) / 2 * 0.9; // 允许 10% 重叠

                    if (dist < minDist) return true;
                }
                return false;
            }

            takeDamage(damage) {
                this.health = Math.max(0, this.health - damage);
                this.updateVisual();
                return this.health <= 0;
            }

            isDead() {
                return this.health <= 0;
            }
        }

        // 坦克类
        class Tank extends GameObject {
            constructor(x, y, team, health) {
                super(x, y, 'tank', team, health);
                this.attackRange = 230;
                this.attackPower = 30;
                this.maxSpeed = 28; // 坦克移动速度
                this.reverseSpeedRatio = 0.45;
                this.maxTurnSpeed = 95; // 坦克车体转向更沉稳
                this.attackCooldown = 2000; // 2秒攻击冷却
                this.moveCooldown = 500; // 0.5秒移动冷却
            }

            getAttackDamage() {
                return this.attackPower + Math.floor(Math.random() * 10);
            }

            turnToward(target) {
                this.setDesiredAngle(this.getAngleTo(target));
            }

            moveTowardTarget(deltaTime, allUnits) {
                const moveTarget = this.getMoveTarget();
                const dx = moveTarget.x - this.x;
                const dy = moveTarget.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 6) {
                    if (moveTarget.isWaypoint) {
                        this.path.shift();
                    } else {
                        this.isMoving = false;
                    }
                    if (this.element) this.element.classList.remove('moving');
                    return;
                }

                const targetAngle = this.angleToPoint(moveTarget.x, moveTarget.y);
                let angleDelta = this.shortestAngleDelta(this.angle, targetAngle);
                let direction = 1;

                if (Math.abs(angleDelta) > 105) {
                    direction = -1;
                    angleDelta = this.shortestAngleDelta(this.angle, this.normalizeAngle(targetAngle + 180));
                }

                this.setDesiredAngle(this.normalizeAngle(this.angle + angleDelta));
                this.updateRotation(deltaTime);

                const alignment = Math.cos(Math.abs(angleDelta) * Math.PI / 180);
                const throttle = Math.max(0, alignment);
                const speed = this.maxSpeed * (direction === -1 ? this.reverseSpeedRatio : 1) * throttle * deltaTime;

                if (speed < 0.1) return;

                const forward = this.forwardVector();
                const nextX = this.x + forward.x * speed * direction;
                const nextY = this.y + forward.y * speed * direction;

                if (!this.checkCollision(nextX, nextY, allUnits)) {
                    this.x = nextX;
                    this.y = nextY;
                } else {
                    this.updatePathToTarget(true);
                    if (this.path.length === 0) {
                        this.strafeDirection *= -1;
                        this.setDesiredAngle(this.normalizeAngle(this.desiredAngle + 45 * this.strafeDirection));
                    }
                }
            }

        }

        // 士兵类
        class Soldier extends GameObject {
            constructor(x, y, team, health) {
                super(x, y, 'soldier', team, health);
                this.attackRange = 105;
                this.attackPower = 20;
                this.maxSpeed = 42; // 士兵移动较快
                this.maxTurnSpeed = 210;
                this.attackCooldown = 1500; // 1.5秒攻击冷却
                this.moveCooldown = 300; // 0.3秒移动冷却
            }

            getAttackDamage() {
                return this.attackPower + Math.floor(Math.random() * 8);
            }

        }

        // 火炮类（牵引火炮：需架设才能开火，有最小射程盲区）
        class Artillery extends GameObject {
            constructor(x, y, team, health) {
                super(x, y, 'artillery', team, health);
                this.attackRange = 420;
                this.minRange = 120;
                this.attackPower = 45;
                this.maxSpeed = 18;
                this.maxTurnSpeed = 70;
                this.attackCooldown = 3000;
                this.moveCooldown = 600;
                this.deployed = false;
                this.deploying = false;
                this.deployStartTime = 0;
                this.deployDuration = 2000;
            }

            getSize() { return 32; }

            getAttackDamage() {
                return this.attackPower + Math.floor(Math.random() * 10);
            }

            getDisplayMarkup() {
                const body = '<div class="artillery-wheel left"></div><div class="artillery-wheel right"></div><div class="artillery-chassis"></div><div class="artillery-trail"></div><div class="artillery-barrel"></div><div class="artillery-shield"></div><div class="artillery-stabilizer left"></div><div class="artillery-stabilizer right"></div><div class="deploy-dot"></div>';
                return `<div class="unit-body">${body}</div><div class="hp-bar"><div class="hp-fill" style="width:${this.getHealthPercent()}%"></div></div>`;
            }

            updateVisual() {
                super.updateVisual();
                if (!this.element) return;
                this.element.classList.toggle('deployed', this.deployed);
                this.element.classList.toggle('deploying', this.deploying && !this.deployed);
            }

            update(deltaTime, allUnits) {
                if (this.isDead()) return;
                const nearestEnemy = this.acquireTarget(allUnits);

                if (nearestEnemy) {
                    const distance = this.getDistance(nearestEnemy);

                    if (this.deploying) {
                        const elapsed = Date.now() - this.deployStartTime;
                        if (elapsed >= this.deployDuration) {
                            this.deployed = true;
                            this.deploying = false;
                            this.state = 'firing';
                        } else if (this.isMoving || distance < this.minRange * 1.3) {
                            this.deploying = false;
                            this.state = 'fallback';
                            if (distance < this.minRange * 1.3) this.moveAwayFrom(nearestEnemy, 200);
                        }
                    } else if (this.deployed) {
                        if (distance < this.minRange * 1.3) {
                            this.deployed = false;
                            this.state = 'fallback';
                            this.moveAwayFrom(nearestEnemy, 220);
                        } else if (distance <= this.attackRange && distance >= this.minRange) {
                            this.state = 'firing';
                            this.turnToward(nearestEnemy);
                            if (this.isFacing(nearestEnemy)) this.tryAttack(nearestEnemy);
                        } else if (distance > this.attackRange) {
                            this.deployed = false;
                            this.state = 'maneuver';
                            this.moveTowards(nearestEnemy);
                        }
                    } else {
                        if (distance < this.minRange * 1.6) {
                            this.state = 'fallback';
                            this.moveAwayFrom(nearestEnemy, 220);
                        } else if (distance >= this.minRange * 1.2 && distance <= this.attackRange * 0.8) {
                            this.isMoving = false;
                            this.deploying = true;
                            this.deployStartTime = Date.now();
                            this.state = 'deploying';
                            this.turnToward(nearestEnemy);
                        } else if (distance > this.attackRange * 0.8) {
                            this.state = 'maneuver';
                            this.moveTowards(nearestEnemy);
                        } else {
                            this.state = 'maneuver';
                            this.moveAwayFrom(nearestEnemy, 100);
                        }
                    }
                } else {
                    this.state = 'patrol';
                    this.deployed = false;
                    this.deploying = false;
                    this.randomMove(deltaTime);
                }

                this.updatePosition(deltaTime, allUnits);
            }

            tryAttack(target) {
                if (!this.deployed) return;
                const distance = this.getDistance(target);
                if (distance < this.minRange) return;
                super.tryAttack(target);
            }

            moveTowards(target) {
                this.deployed = false;
                this.deploying = false;
                super.moveTowards(target);
            }

            moveAwayFrom(target, dist) {
                this.deployed = false;
                this.deploying = false;
                super.moveAwayFrom(target, dist);
            }

            strafeAround(target) {
                this.deployed = false;
                this.deploying = false;
                super.strafeAround(target);
            }

            randomMove(deltaTime) {
                this.deployed = false;
                this.deploying = false;
                super.randomMove(deltaTime);
            }
        }

        class Projectile {
            constructor(source, target, damage) {
                this.source = source;
                this.target = target;
                this.team = source.team;
                this.damage = damage;
                this.speed = source.type === 'tank' ? 520 : (source.type === 'artillery' ? 280 : 340);
                this.radius = source.type === 'tank' ? 12 : (source.type === 'artillery' ? 10 : 9);
                this.x = source.x + source.getSize() / 2;
                this.y = source.y + source.getSize() / 2;
                this.element = document.createElement('div');
                this.element.className = `projectile ${this.team}`;
                this.element.style.background = this.team === 'ally' ? '#8fd3ff' : '#ff9a8f';
                this.element.style.borderColor = this.team === 'ally' ? '#d6f1ff' : '#ffd3cd';
                this.updateVisual();
            }

            update(deltaTime) {
                if (!this.target || this.target.isDead()) return false;

                if (battlefieldManager.collidesWithObstacle(this.x, this.y, 8, 8)) {
                    this.createImpact(this.x, this.y);
                    return false;
                }

                const targetX = this.target.x + this.target.getSize() / 2;
                const targetY = this.target.y + this.target.getSize() / 2;
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist <= this.radius) {
                    const killed = this.target.takeDamage(this.damage);
                    logBattle(`${this.team === 'ally' ? 'ALLY' : 'ENEMY'} ${this.source.type.toUpperCase()} HIT ${this.target.team === 'ally' ? 'ALLY' : 'ENEMY'} ${this.target.type.toUpperCase()} (-${this.damage})${killed ? ' - DESTROYED!' : ''}`, `${this.team} attack`);
                    this.createImpact(targetX, targetY);
                    return false;
                }

                const step = Math.min(dist, this.speed * deltaTime);
                this.x += (dx / dist) * step;
                this.y += (dy / dist) * step;
                if (battlefieldManager.collidesWithObstacle(this.x, this.y, 8, 8)) {
                    this.createImpact(this.x, this.y);
                    return false;
                }
                this.updateVisual();
                return true;
            }

            updateVisual() {
                this.element.style.left = (this.x - 5) + 'px';
                this.element.style.top = (this.y - 5) + 'px';
            }

            createImpact(x, y) {
                const impact = document.createElement('div');
                impact.className = 'impact';
                impact.style.left = x + 'px';
                impact.style.top = y + 'px';
                document.getElementById('battlefield').appendChild(impact);
                setTimeout(() => impact.remove(), 260);
            }

            remove() {
                this.element.remove();
            }
        }

        class Obstacle {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.element = document.createElement('div');
                this.element.className = 'obstacle';
                this.updateVisual();
            }

            updateVisual() {
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.width = this.width + 'px';
                this.element.style.height = this.height + 'px';
            }

            remove() {
                this.element.remove();
            }
        }

        // 战场管理器（组合模式的核心）
        class BattlefieldManager {
            constructor() {
                this.units = [];
                this.projectiles = [];
                this.obstacles = [];
                this.battlefield = document.getElementById('battlefield');
                this.isBattleActive = false;
                this.isPaused = false;
                this.lastUpdateTime = 0;
                this.deltaTime = 0;
                this.animationId = null;
                
                // 帧率控制相关
                this.lastFrameTime = 0;
                this.fps = 0;
                this.framesThisSecond = 0;
                this.lastFpsUpdate = 0;
                this.targetFPS = 60;
                this.isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                // 移动端优化
                if (this.isMobile) {
                    this.targetFPS = 30; // 移动端目标30fps
                    this.maxDeltaTime = 1/20; // 最大deltaTime限制为20fps
                } else {
                    this.maxDeltaTime = 1/30; // PC端最大deltaTime限制为30fps
                }
                
            }

            addUnit(unit) {
                const emptyState = this.battlefield.querySelector('.empty-state');
                if (emptyState) emptyState.remove();

                this.units.push(unit);
                const element = unit.createElement();
                this.battlefield.appendChild(element);
                const typeLabel = unit.type === 'tank' ? 'TANK' : (unit.type === 'artillery' ? 'ARTILLERY' : 'SOLDIER');
                logBattle(`DEPLOYED ${unit.team === 'ally' ? 'ALLY' : 'ENEMY'} ${typeLabel}`, unit.team);
            }

            addObstacle(obstacle) {
                const emptyState = this.battlefield.querySelector('.empty-state');
                if (emptyState) emptyState.remove();

                this.obstacles.push(obstacle);
                this.battlefield.appendChild(obstacle.element);
                logBattle('COVER PLACED', 'info');
            }

            collidesWithObstacle(x, y, width, height, padding = 2) {
                return this.obstacles.some(obstacle => {
                    return !(
                        x + width < obstacle.x - padding ||
                        x > obstacle.x + obstacle.width + padding ||
                        y + height < obstacle.y - padding ||
                        y > obstacle.y + obstacle.height + padding
                    );
                });
            }

            collidesWithUnit(x, y, width, height) {
                const centerX = x + width / 2;
                const centerY = y + height / 2;

                return this.units.some(unit => {
                    if (unit.isDead()) return false;

                    const unitSize = unit.getSize();
                    const unitCenterX = unit.x + unitSize / 2;
                    const unitCenterY = unit.y + unitSize / 2;
                    const minDist = (Math.max(width, height) + unitSize) / 2;
                    const dist = Math.sqrt((centerX - unitCenterX) ** 2 + (centerY - unitCenterY) ** 2);

                    return dist < minDist;
                });
            }

            pathBlockedByObstacle(startX, startY, endX, endY, size) {
                const dx = endX - startX;
                const dy = endY - startY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const steps = Math.max(1, Math.ceil(distance / 18));

                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const x = startX + dx * t;
                    const y = startY + dy * t;
                    if (this.collidesWithObstacle(x, y, size, size, 4)) {
                        return true;
                    }
                }

                return false;
            }

            findPath(startX, startY, endX, endY, size) {
                const cellSize = 32;
                const cols = Math.max(1, Math.ceil(this.battlefield.offsetWidth / cellSize));
                const rows = Math.max(1, Math.ceil(this.battlefield.offsetHeight / cellSize));
                const toCell = (x, y) => ({
                    x: Math.max(0, Math.min(cols - 1, Math.floor((x + size / 2) / cellSize))),
                    y: Math.max(0, Math.min(rows - 1, Math.floor((y + size / 2) / cellSize)))
                });
                const toPoint = (cell) => ({
                    x: Math.max(0, Math.min(this.battlefield.offsetWidth - size, cell.x * cellSize + cellSize / 2 - size / 2)),
                    y: Math.max(0, Math.min(this.battlefield.offsetHeight - size, cell.y * cellSize + cellSize / 2 - size / 2))
                });
                const key = (cell) => `${cell.x},${cell.y}`;
                const walkable = (cell) => {
                    if (cell.x < 0 || cell.y < 0 || cell.x >= cols || cell.y >= rows) return false;

                    const point = toPoint(cell);
                    return !this.collidesWithObstacle(point.x, point.y, size, size, 6);
                };
                const nearestWalkable = (cell) => {
                    if (walkable(cell)) return cell;

                    for (let radius = 1; radius < 8; radius++) {
                        for (let y = cell.y - radius; y <= cell.y + radius; y++) {
                            for (let x = cell.x - radius; x <= cell.x + radius; x++) {
                                const candidate = { x, y };
                                if (walkable(candidate)) return candidate;
                            }
                        }
                    }

                    return null;
                };

                const start = nearestWalkable(toCell(startX, startY));
                const goal = nearestWalkable(toCell(endX, endY));
                if (!start || !goal) return [];

                const open = [start];
                const cameFrom = new Map();
                const gScore = new Map([[key(start), 0]]);
                const fScore = new Map([[key(start), Math.hypot(goal.x - start.x, goal.y - start.y)]]);
                const closed = new Set();
                const directions = [
                    { x: 1, y: 0, cost: 1 }, { x: -1, y: 0, cost: 1 },
                    { x: 0, y: 1, cost: 1 }, { x: 0, y: -1, cost: 1 },
                    { x: 1, y: 1, cost: 1.4 }, { x: 1, y: -1, cost: 1.4 },
                    { x: -1, y: 1, cost: 1.4 }, { x: -1, y: -1, cost: 1.4 }
                ];

                let iterations = 0;
                while (open.length && iterations++ < 700) {
                    open.sort((a, b) => (fScore.get(key(a)) ?? Infinity) - (fScore.get(key(b)) ?? Infinity));
                    const current = open.shift();
                    const currentKey = key(current);

                    if (current.x === goal.x && current.y === goal.y) {
                        const cells = [current];
                        let traceKey = currentKey;
                        while (cameFrom.has(traceKey)) {
                            const previous = cameFrom.get(traceKey);
                            cells.unshift(previous);
                            traceKey = key(previous);
                        }

                        return cells
                            .slice(1)
                            .filter((cell, index) => index % 2 === 0 || cell.x === goal.x && cell.y === goal.y)
                            .map(toPoint);
                    }

                    closed.add(currentKey);

                    for (const direction of directions) {
                        const neighbor = { x: current.x + direction.x, y: current.y + direction.y };
                        const neighborKey = key(neighbor);
                        if (closed.has(neighborKey) || !walkable(neighbor)) continue;

                        if (direction.x !== 0 && direction.y !== 0) {
                            if (!walkable({ x: current.x + direction.x, y: current.y }) || !walkable({ x: current.x, y: current.y + direction.y })) {
                                continue;
                            }
                        }

                        const tentative = (gScore.get(currentKey) ?? Infinity) + direction.cost;
                        if (tentative < (gScore.get(neighborKey) ?? Infinity)) {
                            cameFrom.set(neighborKey, current);
                            gScore.set(neighborKey, tentative);
                            fScore.set(neighborKey, tentative + Math.hypot(goal.x - neighbor.x, goal.y - neighbor.y));
                            if (!open.some(cell => cell.x === neighbor.x && cell.y === neighbor.y)) {
                                open.push(neighbor);
                            }
                        }
                    }
                }

                return [];
            }

            removeUnit(unit) {
                const index = this.units.indexOf(unit);
                if (index > -1) {
                    this.units.splice(index, 1);
                    if (unit.element) {
                        unit.element.remove();
                    }
                }
            }

            clearAll() {
                this.units.forEach(unit => {
                    if (unit.element) {
                        unit.element.remove();
                    }
                });
                this.projectiles.forEach(projectile => projectile.remove());
                this.obstacles.forEach(obstacle => obstacle.remove());
                this.units = [];
                this.projectiles = [];
                this.obstacles = [];
                this.isBattleActive = false;
                this.isPaused = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.battlefield.innerHTML = '<div class="empty-state" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.5; pointer-events: none;"><p>DEPLOY UNITS TO START</p><p style="font-size: 0.8em; margin-top: 10px;">CLICK TO ADD UNITS</p></div>';
                resetBattleButton();
                logBattle('BATTLEFIELD CLEARED', 'info');
            }

            spawnProjectile(source, target, damage) {
                const projectile = new Projectile(source, target, damage);
                this.projectiles.push(projectile);
                this.battlefield.appendChild(projectile.element);
            }

            startBattle() {
                if (this.units.length < 2) {
                    alert('DEPLOY AT LEAST 2 UNITS!');
                    return;
                }

                this.isBattleActive = true;
                this.isPaused = false;
                this.lastUpdateTime = performance.now();
                this.lastFrameTime = 0; // 重置帧时间
                this.framesThisSecond = 0; // 重置帧计数
                logBattle('BATTLE STARTED!', 'info');
                
                this.animationId = requestAnimationFrame((timestamp) => this.gameLoop(timestamp));
            }

            gameLoop(timestamp) {
                if (!this.isBattleActive) return;

                // 初始化帧时间
                if (!this.lastFrameTime) {
                    this.lastFrameTime = timestamp;
                    this.lastFpsUpdate = timestamp; // 初始化FPS计算时间
                    this.animationId = requestAnimationFrame((ts) => this.gameLoop(ts));
                    return;
                }

                // 计算deltaTime
                this.deltaTime = (timestamp - this.lastFrameTime) / 1000; // 转换为秒
                this.lastFrameTime = timestamp;

                // 安全校验：限制deltaTime避免异常情况
                if (this.deltaTime <= 0 || this.deltaTime > this.maxDeltaTime) {
                    this.animationId = requestAnimationFrame((ts) => this.gameLoop(ts));
                    return;
                }

                // 更新FPS计算
                this.framesThisSecond++;
                if (timestamp > this.lastFpsUpdate + 1000) {
                    this.fps = this.framesThisSecond;
                    this.framesThisSecond = 0;
                    this.lastFpsUpdate = timestamp;
                    
                    // 更新显示
                    const fpsElement = document.getElementById('fpsValue');
                    const unitCountElement = document.getElementById('unitCount');
                    
                    if (fpsElement) {
                        fpsElement.textContent = this.fps;
                    }
                    if (unitCountElement) {
                        unitCountElement.textContent = this.units.length;
                    }
                }

                if (!this.isPaused) {
                    this.updateAllUnits();
                    this.updateProjectiles();
                    this.checkBattleEnd();
                }

                this.animationId = requestAnimationFrame((ts) => this.gameLoop(ts));
            }

            updateAllUnits() {
                // 更新所有单位
                for (const unit of this.units) {
                    if (!unit.isDead()) {
                        unit.update(this.deltaTime, this.units);
                    }
                }

                // 移除死亡的单位
                this.units = this.units.filter(unit => {
                    if (unit.isDead() && unit.element) {
                        unit.element.remove();
                        return false;
                    }
                    return true;
                });
            }

            updateProjectiles() {
                this.projectiles = this.projectiles.filter(projectile => {
                    const active = projectile.update(this.deltaTime);
                    if (!active) {
                        projectile.remove();
                    }
                    return active;
                });
            }

            checkBattleEnd() {
                const allyUnits = this.units.filter(unit => unit.team === 'ally' && !unit.isDead());
                const enemyUnits = this.units.filter(unit => unit.team === 'enemy' && !unit.isDead());
                
                if (allyUnits.length === 0 || enemyUnits.length === 0) {
                    this.endBattle();
                }
            }

            pauseBattle() {
                if (!this.isBattleActive) return;
                
                this.isPaused = !this.isPaused;
                
                if (this.isPaused) {
                    logBattle('BATTLE PAUSED', 'info');
                } else {
                    logBattle('BATTLE RESUMED', 'info');
                }
            }


            endBattle() {
                this.isBattleActive = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.projectiles.forEach(projectile => projectile.remove());
                this.projectiles = [];
                resetBattleButton();
                
                const allyUnits = this.units.filter(unit => unit.team === 'ally' && !unit.isDead());
                const enemyUnits = this.units.filter(unit => unit.team === 'enemy' && !unit.isDead());
                
                if (allyUnits.length === 0 && enemyUnits.length === 0) {
                    logBattle('GAME OVER: DRAW', 'info');
                } else if (allyUnits.length === 0) {
                    logBattle('GAME OVER: ENEMY WINS!', 'info');
                } else if (enemyUnits.length === 0) {
                    logBattle('GAME OVER: ALLY WINS!', 'info');
                } else {
                    logBattle('GAME STOPPED', 'info');
                }
            }
        }

        // 全局变量
        const battlefieldManager = new BattlefieldManager();

        // 工具函数
        function logBattle(message, type = 'info') {
            const logContent = document.getElementById('battleLog'); // 修改了ID
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.appendChild(logEntry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function addAllyUnit() {
            addUnitWithTeam('ally');
        }

        function addEnemyUnit() {
            addUnitWithTeam('enemy');
        }

        function addObstacle() {
            const battlefield = document.getElementById('battlefield');
            const sizes = [
                { width: 86, height: 46 },
                { width: 64, height: 64 },
                { width: 118, height: 34 }
            ];
            const size = sizes[Math.floor(Math.random() * sizes.length)];
            const margin = 32;

            for (let attempt = 0; attempt < 60; attempt++) {
                const x = margin + Math.random() * (battlefield.offsetWidth - size.width - margin * 2);
                const y = margin + Math.random() * (battlefield.offsetHeight - size.height - margin * 2);

                if (
                    !battlefieldManager.collidesWithObstacle(x, y, size.width, size.height, 18) &&
                    !battlefieldManager.collidesWithUnit(x, y, size.width, size.height)
                ) {
                    battlefieldManager.addObstacle(new Obstacle(x, y, size.width, size.height));
                    return;
                }
            }

            logBattle('NO ROOM FOR COVER', 'info');
        }

        function addUnitWithTeam(team) {
            const type = document.getElementById('unitType').value;
            const health = parseInt(document.getElementById('unitHealth').value);
            const battlefield = document.getElementById('battlefield');
            let unitSize;
            if (type === 'tank') unitSize = 36;
            else if (type === 'artillery') unitSize = 32;
            else unitSize = 22;
            const deploymentDepth = Math.min(280, battlefield.offsetWidth * 0.28);
            let x = 0;
            let y = 0;
            let placed = false;

            for (let attempt = 0; attempt < 60; attempt++) {
                x = team === 'ally'
                    ? 30 + Math.random() * deploymentDepth
                    : battlefield.offsetWidth - deploymentDepth - unitSize - 30 + Math.random() * deploymentDepth;
                y = 40 + Math.random() * (battlefield.offsetHeight - unitSize - 80);

                if (
                    !battlefieldManager.collidesWithObstacle(x, y, unitSize, unitSize, 8) &&
                    !battlefieldManager.collidesWithUnit(x, y, unitSize, unitSize)
                ) {
                    placed = true;
                    break;
                }
            }

            if (!placed) {
                logBattle('NO ROOM TO DEPLOY UNIT', 'info');
                return;
            }

            let unit;
            if (type === 'tank') {
                unit = new Tank(x, y, team, health);
            } else if (type === 'artillery') {
                unit = new Artillery(x, y, team, health);
            } else {
                unit = new Soldier(x, y, team, health);
            }

            battlefieldManager.addUnit(unit);
        }

        function toggleBattle() {
            const battleBtn = document.getElementById('battleBtn');
            
            if (!battlefieldManager.isBattleActive) {
                // 开始战斗
                if (battlefieldManager.units.length < 2) {
                    alert('DEPLOY AT LEAST 2 UNITS!'); // 英文提示
                    return;
                }
                
                battlefieldManager.startBattle();
                battleBtn.textContent = 'PAUSE'; // 英文按钮
                battleBtn.style.color = '#f1c40f';
                battleBtn.style.borderColor = '#f1c40f';
            } else {
                // 暂停/继续战斗
                battlefieldManager.pauseBattle();
                
                if (battlefieldManager.isPaused) {
                    battleBtn.textContent = 'RESUME'; // 英文按钮
                    battleBtn.style.color = '#2ecc71';
                    battleBtn.style.borderColor = '#2ecc71';
                } else {
                    battleBtn.textContent = 'PAUSE'; // 英文按钮
                    battleBtn.style.color = '#f1c40f';
                    battleBtn.style.borderColor = '#f1c40f';
                }
            }
        }

        function clearBattlefield() {
            battlefieldManager.clearAll();
        }

        function resetBattleButton() {
            const battleBtn = document.getElementById('battleBtn');
            if (!battleBtn) return;

            battleBtn.textContent = 'START';
            battleBtn.style.color = '#f1c40f';
            battleBtn.style.borderColor = '#f1c40f';
        }

        // 移动端触摸优化
        function addMobileOptimizations() {
            if (battlefieldManager.isMobile) {
                // 禁用双击缩放
                document.addEventListener('touchstart', function(e) {
                    if (e.touches.length > 1) {
                        e.preventDefault();
                    }
                }, { passive: false });

                // 禁用页面滚动
                document.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                }, { passive: false });

                // 优化触摸响应
                document.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                }, { passive: false });

                // 添加触摸反馈
                const battlefield = document.getElementById('battlefield');
                battlefield.addEventListener('touchstart', function(e) {
                    const touch = e.touches[0];
                    const rect = battlefield.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    
                    // 创建触摸反馈效果
                    const feedback = document.createElement('div');
                    feedback.style.cssText = `
                        position: absolute;
                        left: ${x - 10}px;
                        top: ${y - 10}px;
                        width: 20px;
                        height: 20px;
                        background: rgba(255, 255, 255, 0.5);
                        border-radius: 50%;
                        pointer-events: none;
                        animation: touchFeedback 0.3s ease-out forwards;
                    `;
                    
                    battlefield.appendChild(feedback);
                    
                    setTimeout(() => {
                        feedback.remove();
                    }, 300);
                });
            }
        }

        // 添加触摸反馈动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes touchFeedback {
                0% {
                    transform: scale(0);
                    opacity: 1;
                }
                100% {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            logBattle('SYSTEM READY', 'info');
            addMobileOptimizations();
            const lastModifiedSpan = document.getElementById('lastModified');
            if (lastModifiedSpan) {
                lastModifiedSpan.textContent = document.lastModified;
            }
        });
    </script>
</body>
