<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沙盘战争 - 像素战场</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-bg: #2c3e50;
            --pixel-primary: #3498db;
            --pixel-secondary: #e74c3c;
            --pixel-accent: #f1c40f;
            --pixel-text: #ecf0f1;
            --pixel-border: 4px;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Press Start 2P', cursive;
            background-color: #2c3e50;
            background-image: 
                linear-gradient(30deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(150deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(30deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(150deg, #34495e 12%, transparent 12.5%, transparent 87%, #34495e 87.5%, #34495e),
                linear-gradient(60deg, #2c3e5077 25%, transparent 25.5%, transparent 75%, #2c3e5077 75%, #2c3e5077),
                linear-gradient(60deg, #2c3e5077 25%, transparent 25.5%, transparent 75%, #2c3e5077 75%, #2c3e5077);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
            min-height: 100vh;
            color: var(--pixel-text);
            image-rendering: pixelated;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 4px 4px 0px #000;
            font-size: 2em;
            color: var(--pixel-accent);
            line-height: 1.5;
        }

        .game-ui {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .controls-panel {
            flex: 1;
            min-width: 300px;
            background: #000;
            border: 4px solid var(--pixel-text);
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            padding: 10px 15px;
            border: 4px solid;
            background: transparent;
            color: var(--pixel-text);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
            position: relative;
            transition: transform 0.1s;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        .btn-ally { border-color: var(--pixel-primary); color: var(--pixel-primary); }
        .btn-enemy { border-color: var(--pixel-secondary); color: var(--pixel-secondary); }
        .btn-action { border-color: var(--pixel-accent); color: var(--pixel-accent); }
        .btn-danger { border-color: #95a5a6; color: #95a5a6; }

        .pixel-input, .pixel-select {
            font-family: 'Press Start 2P', cursive;
            background: #000;
            border: 2px solid var(--pixel-text);
            color: var(--pixel-text);
            padding: 8px;
            font-size: 10px;
        }

        .battlefield {
            width: 100%;
            height: 600px;
            background: #26362c;
            border: 4px solid var(--pixel-text);
            position: relative;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 18% 22%, rgba(160, 135, 82, 0.45) 0 18px, transparent 19px),
                radial-gradient(circle at 74% 68%, rgba(60, 90, 62, 0.7) 0 30px, transparent 31px),
                linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
                linear-gradient(135deg, rgba(29, 46, 36, 0.9), rgba(50, 58, 38, 0.9));
            background-size: 220px 180px, 260px 220px, 40px 40px, 40px 40px, auto;
        }

        .unit {
            position: absolute;
            width: var(--unit-size);
            height: var(--unit-size);
            cursor: pointer;
            transform: rotate(var(--angle, 0deg));
            transform-origin: center;
            image-rendering: pixelated;
            z-index: 10;
        }

        .unit.tank {
            --unit-size: 56px;
        }

        .tank-track,
        .tank-body,
        .tank-turret,
        .tank-barrel,
        .soldier-body,
        .soldier-head {
            position: absolute;
        }

        .tank-track {
            width: 12px;
            height: 42px;
            top: 7px;
            background: #15191b;
            box-shadow: inset 0 0 0 3px #30383b;
        }

        .tank-track.left { left: 4px; }
        .tank-track.right { right: 4px; }

        .tank-body {
            width: 34px;
            height: 38px;
            left: 11px;
            top: 9px;
            background: var(--color-dark);
            box-shadow: inset 0 0 0 4px var(--color), 0 4px 0 rgba(0,0,0,0.45);
        }

        .tank-turret {
            width: 24px;
            height: 24px;
            left: 16px;
            top: 16px;
            background: var(--color-light);
            box-shadow: inset 0 0 0 4px var(--color);
        }

        .tank-barrel {
            width: 8px;
            height: 30px;
            left: 24px;
            top: -8px;
            background: var(--color-light);
            box-shadow: inset 0 0 0 2px var(--color);
        }

        .unit.soldier {
            --unit-size: 34px;
        }

        .soldier-body {
            width: 18px;
            height: 20px;
            left: 8px;
            top: 10px;
            background: var(--color);
            box-shadow: inset 0 0 0 3px var(--color-dark), 0 3px 0 rgba(0,0,0,0.45);
        }

        .soldier-head {
            width: 14px;
            height: 12px;
            left: 10px;
            top: 2px;
            background: var(--color-light);
            box-shadow: inset 0 0 0 3px var(--color);
        }

        .unit.ally { --color: #3498db; --color-dark: #2980b9; --color-light: #5dade2; }
        .unit.enemy { --color: #e74c3c; --color-dark: #c0392b; --color-light: #ec7063; }

        .unit.selected {
            filter: drop-shadow(0 0 4px #f1c40f);
            z-index: 100;
        }

        .unit.moving {
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.25));
        }

        .hp-bar {
            position: absolute;
            left: 4px;
            right: 4px;
            bottom: -9px;
            height: 4px;
            background: rgba(0,0,0,0.8);
            transform: rotate(calc(-1 * var(--angle, 0deg)));
        }

        .hp-fill {
            width: 100%;
            height: 100%;
            background: #2ecc71;
        }

        .projectile {
            position: absolute;
            width: 7px;
            height: 7px;
            background: #f7e07b;
            border: 2px solid #fff6bd;
            box-shadow: 0 0 8px #f7e07b;
            pointer-events: none;
            z-index: 6;
        }

        .impact {
            position: absolute;
            width: 22px;
            height: 22px;
            margin-left: -11px;
            margin-top: -11px;
            border: 3px solid #ffd166;
            background: rgba(231, 76, 60, 0.35);
            animation: impactFlash 0.25s ease-out forwards;
            pointer-events: none;
            z-index: 7;
        }

        @keyframes impactFlash {
            from { transform: scale(0.4); opacity: 1; }
            to { transform: scale(1.8); opacity: 0; }
        }

        .battle-log {
            height: 150px;
            background: #000;
            border: 4px solid var(--pixel-text);
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-y: auto;
            color: #2ecc71;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .log-entry { margin: 2px 0; line-height: 1.4; }
        .log-entry.ally { color: #3498db; }
        .log-entry.enemy { color: #e74c3c; }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #000;
            border: 4px solid var(--pixel-text);
            font-size: 10px;
            color: var(--pixel-accent);
            margin-top: 10px;
        }

        /* 移除旧样式干扰 */
        .back-button, .sidebar, .main-content { display: none; }
        .container { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👾 PIXEL WAR 👾</h1>
        
        <div class="game-ui">
            <div class="controls-panel">
                <div class="control-row">
                    <label>UNIT:</label>
                    <select id="unitType" class="pixel-select">
                        <option value="tank">TANK</option>
                        <option value="soldier">SOLDIER</option>
                    </select>
                    
                    <label>HP:</label>
                    <input type="number" id="unitHealth" value="100" min="1" max="200" class="pixel-input" style="width: 60px;">
                </div>
                
                <div class="control-row">
                    <button onclick="addAllyUnit()" class="pixel-btn btn-ally">+ ALLY</button>
                    <button onclick="addEnemyUnit()" class="pixel-btn btn-enemy">+ ENEMY</button>
                    <button onclick="toggleBattle()" id="battleBtn" class="pixel-btn btn-action">START</button>
                    <button onclick="clearBattlefield()" class="pixel-btn btn-danger">CLEAR</button>
                </div>
            </div>
        </div>

        <div class="battlefield" id="battlefield">
            <div class="empty-state" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.5; pointer-events: none;">
                <p>DEPLOY UNITS TO START</p>
                <p style="font-size: 0.8em; margin-top: 10px;">CLICK TO ADD UNITS</p>
            </div>
        </div>

        <div class="status-bar">
            <span>FPS: <span id="fpsValue">0</span></span>
            <span>UNITS: <span id="unitCount">0</span></span>
            <span>UPDATED: <span id="lastModified"></span></span>
        </div>

        <div class="battle-log" id="battleLog"></div>
    </div>

    <div class="unit-info" id="unitInfo"></div>

    <script>
        // ... (保持原有逻辑，只需调整部分 UI 交互) ...

        class GameObject {
            constructor(x, y, type, team, health) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.team = team;
                this.health = health;
                this.maxHealth = health;
                this.element = null;
                this.selected = false;
                this.angle = 0;
                this.desiredAngle = 0;
                this.maxTurnSpeed = 140; // 度/秒
                this.state = 'patrol';
                this.currentTarget = null;
                
                // 实时移动和攻击系统
                this.targetX = x;
                this.targetY = y;
                this.isMoving = false;
                this.lastAttackTime = 0;
                this.attackCooldown = 1000; // 1秒攻击冷却
                this.lastMoveTime = 0;
                this.moveCooldown = 2000; // 2秒移动冷却
                this.velocity = { x: 0, y: 0 };
                this.maxSpeed = 30; // 像素/秒
                this.strafeDirection = Math.random() > 0.5 ? 1 : -1;
                this.lastStrafeSwitch = Date.now();
            }

            // 模板方法
            createElement() {
                this.element = document.createElement('div');
                this.element.className = `unit ${this.type} ${this.team}`;
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.width = this.getSize() + 'px';
                this.element.style.height = this.getSize() + 'px';
                this.element.style.setProperty('--angle', `${this.angle}deg`);
                
                this.element.innerHTML = this.getDisplayMarkup();
                this.element.onclick = () => this.select();
                this.element.onmouseover = (e) => this.showInfo(e);
                this.element.onmouseout = () => this.hideInfo();
                
                return this.element;
            }

            getSize() {
                return this.type === 'tank' ? 56 : 34;
            }

            getDisplayMarkup() {
                const body = this.type === 'tank'
                    ? '<div class="tank-track left"></div><div class="tank-track right"></div><div class="tank-body"></div><div class="tank-turret"></div><div class="tank-barrel"></div>'
                    : '<div class="soldier-head"></div><div class="soldier-body"></div>';

                return `${body}<div class="hp-bar"><div class="hp-fill" style="width: ${this.getHealthPercent()}%"></div></div>`;
            }

            getHealthPercent() {
                return Math.max(0, Math.min(100, (this.health / this.maxHealth) * 100));
            }

            updateVisual() {
                if (!this.element) return;

                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.setProperty('--angle', `${this.angle}deg`);

                const hpFill = this.element.querySelector('.hp-fill');
                if (hpFill) {
                    hpFill.style.width = this.getHealthPercent() + '%';
                    hpFill.style.background = this.getHealthPercent() < 35 ? '#e74c3c' : '#2ecc71';
                }

                this.element.classList.toggle('moving', this.isMoving);
            }

            normalizeAngle(angle) {
                return ((angle % 360) + 360) % 360;
            }

            shortestAngleDelta(from, to) {
                return ((to - from + 540) % 360) - 180;
            }

            getAngleTo(target) {
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                return this.normalizeAngle(Math.atan2(dy, dx) * 180 / Math.PI + 90);
            }

            setDesiredAngle(angle) {
                this.desiredAngle = this.normalizeAngle(angle);
            }

            updateRotation(deltaTime) {
                const delta = this.shortestAngleDelta(this.angle, this.desiredAngle);
                const maxStep = this.maxTurnSpeed * deltaTime;

                if (Math.abs(delta) <= maxStep) {
                    this.angle = this.desiredAngle;
                } else {
                    this.angle = this.normalizeAngle(this.angle + Math.sign(delta) * maxStep);
                }
            }

            isFacing(target, tolerance = 14) {
                return Math.abs(this.shortestAngleDelta(this.angle, this.getAngleTo(target))) <= tolerance;
            }

            select() {
                // 取消其他单位的选择
                document.querySelectorAll('.unit.selected').forEach(unit => {
                    unit.classList.remove('selected');
                });
                
                this.selected = true;
                this.element.classList.add('selected');
            }

            showInfo(event) {
                const info = document.getElementById('unitInfo');
                info.innerHTML = `
                    <strong>${this.type === 'tank' ? '坦克' : '士兵'}</strong><br>
                    阵营: ${this.team === 'ally' ? '友军' : '敌军'}<br>
                    生命值: ${this.health}/${this.maxHealth}<br>
                    位置: (${this.x}, ${this.y})
                `;
                info.style.display = 'block';
                info.style.left = event.pageX + 10 + 'px';
                info.style.top = event.pageY - 10 + 'px';
            }

            hideInfo() {
                document.getElementById('unitInfo').style.display = 'none';
            }

            getAttackDamage() {
                throw new Error('子类必须实现getAttackDamage方法');
            }

            move(dx, dy) {
                this.x += dx;
                this.y += dy;
                this.updateVisual();
            }

            smoothMove(targetX, targetY, duration = 1000) {
                if (!this.element) return;
                
                // 添加移动状态
                this.element.classList.add('moving');
                
                const startX = this.x;
                const startY = this.y;
                const deltaX = targetX - startX;
                const deltaY = targetY - startY;
                const startTime = performance.now();
                
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // 使用缓动函数
                    const easeProgress = this.easeInOutCubic(progress);
                    
                    this.x = startX + deltaX * easeProgress;
                    this.y = startY + deltaY * easeProgress;
                    
                    if (this.element) {
                        this.element.style.left = this.x + 'px';
                        this.element.style.top = this.y + 'px';
                    }
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // 移动完成，移除移动状态
                        if (this.element) this.element.classList.remove('moving');
                    }
                };
                
                requestAnimationFrame(animate);
            }

            easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
            }

            // 实时更新方法
            update(deltaTime, allUnits) {
                if (this.isDead()) return;

                const nearestEnemy = this.acquireTarget(allUnits);
                
                if (nearestEnemy) {
                    const distance = this.getDistance(nearestEnemy);

                    if (this.health < this.maxHealth * 0.3 && distance < this.attackRange * 1.1) {
                        this.state = 'retreat';
                        this.moveAwayFrom(nearestEnemy, 160);
                    } else if (distance > this.attackRange * 0.9) {
                        this.state = 'chase';
                        this.moveTowards(nearestEnemy);
                    } else if (distance < this.attackRange * 0.45) {
                        this.state = 'backoff';
                        this.moveAwayFrom(nearestEnemy, 110);
                    } else {
                        this.state = 'skirmish';
                        this.strafeAround(nearestEnemy);
                        this.tryAttack(nearestEnemy);
                    }
                } else {
                    this.state = 'patrol';
                    this.randomMove(deltaTime);
                }

                this.updatePosition(deltaTime, allUnits);
            }

            findNearestEnemy(allUnits) {
                let nearestEnemy = null;
                let nearestDistance = Infinity;

                for (const unit of allUnits) {
                    if (unit !== this && unit.team !== this.team && !unit.isDead()) {
                        const distance = this.getDistance(unit);
                        if (distance < nearestDistance) {
                            nearestDistance = distance;
                            nearestEnemy = unit;
                        }
                    }
                }

                return nearestEnemy;
            }

            acquireTarget(allUnits) {
                if (
                    this.currentTarget &&
                    !this.currentTarget.isDead() &&
                    this.currentTarget.team !== this.team &&
                    allUnits.includes(this.currentTarget) &&
                    this.getDistance(this.currentTarget) < this.attackRange * 1.8
                ) {
                    return this.currentTarget;
                }

                this.currentTarget = this.findNearestEnemy(allUnits);
                return this.currentTarget;
            }

            getDistance(target) {
                const myCenterX = this.x + this.getSize() / 2;
                const myCenterY = this.y + this.getSize() / 2;
                const targetCenterX = target.x + target.getSize() / 2;
                const targetCenterY = target.y + target.getSize() / 2;
                
                const dx = targetCenterX - myCenterX;
                const dy = targetCenterY - myCenterY;
                return Math.sqrt(dx * dx + dy * dy);
            }

            tryAttack(target) {
                const now = Date.now();
                if (now - this.lastAttackTime < this.attackCooldown) return;

                const distance = this.getDistance(target);
                if (distance <= this.attackRange && target.team !== this.team && !target.isDead()) {
                    this.turnToward(target);
                    if (!this.isFacing(target)) return;

                    this.lastAttackTime = now;
                    battlefieldManager.spawnProjectile(this, target, this.getAttackDamage());
                }
            }

            turnToward(target) {
                this.setDesiredAngle(this.getAngleTo(target));
            }

            clampTarget() {
                const battlefield = document.getElementById('battlefield');
                const maxX = battlefield.offsetWidth - this.getSize();
                const maxY = battlefield.offsetHeight - this.getSize();

                this.targetX = Math.max(0, Math.min(maxX, this.targetX));
                this.targetY = Math.max(0, Math.min(maxY, this.targetY));
                this.isMoving = true;
            }

            moveTowards(target) {
                const targetCenterX = target.x + target.getSize() / 2;
                const targetCenterY = target.y + target.getSize() / 2;
                const myCenterX = this.x + this.getSize() / 2;
                const myCenterY = this.y + this.getSize() / 2;

                const dx = targetCenterX - myCenterX;
                const dy = targetCenterY - myCenterY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    const stopDist = this.attackRange * 0.72;
                    const ratio = Math.max(0, dist - stopDist) / dist;
                    
                    this.targetX = myCenterX + dx * ratio - this.getSize() / 2;
                    this.targetY = myCenterY + dy * ratio - this.getSize() / 2;
                    this.setDesiredAngle(Math.atan2(dy, dx) * 180 / Math.PI + 90);
                    this.clampTarget();
                }
            }

            moveAwayFrom(target, distance) {
                const dx = this.x - target.x;
                const dy = this.y - target.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;

                this.targetX = this.x + (dx / dist) * distance;
                this.targetY = this.y + (dy / dist) * distance;
                this.setDesiredAngle(Math.atan2(-dy, -dx) * 180 / Math.PI + 90);
                this.clampTarget();
            }

            strafeAround(target) {
                const now = Date.now();
                if (now - this.lastStrafeSwitch > 1800 + Math.random() * 900) {
                    this.strafeDirection *= -1;
                    this.lastStrafeSwitch = now;
                }

                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const perpendicularX = -dy / dist;
                const perpendicularY = dx / dist;
                const rangeCorrection = (dist - this.attackRange * 0.68) * 0.25;

                this.targetX = this.x + perpendicularX * this.strafeDirection * 80 + (dx / dist) * rangeCorrection;
                this.targetY = this.y + perpendicularY * this.strafeDirection * 80 + (dy / dist) * rangeCorrection;
                this.turnToward(target);
                this.clampTarget();
            }

            randomMove(deltaTime) {
                const now = Date.now();
                if (this.lastMoveTime > 0 && now - this.lastMoveTime < this.moveCooldown) return;

                const battlefield = document.getElementById('battlefield');
                const maxX = battlefield.offsetWidth - this.getSize();
                const maxY = battlefield.offsetHeight - this.getSize();

                const angle = Math.random() * Math.PI * 2;
                const moveDistance = 100 + Math.random() * 100;
                
                this.targetX = Math.max(0, Math.min(maxX, this.x + Math.cos(angle) * moveDistance));
                this.targetY = Math.max(0, Math.min(maxY, this.y + Math.sin(angle) * moveDistance));
                this.setDesiredAngle(angle * 180 / Math.PI + 90);
                this.isMoving = true;
                this.lastMoveTime = now;
            }

            updatePosition(deltaTime, allUnits) {
                this.updateRotation(deltaTime);

                // 1. 处理分离（防止重叠）
                this.handleSeparation(allUnits);

                // 2. 处理主动移动
                if (this.isMoving) {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 3) {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.isMoving = false;
                        if (this.element) this.element.classList.remove('moving');
                    } else {
                        const moveSpeed = this.maxSpeed * deltaTime;
                        // 尝试移动，如果会碰撞则尝试绕行
                        const nextX = this.x + (dx / distance) * moveSpeed;
                        const nextY = this.y + (dy / distance) * moveSpeed;

                        if (!this.checkCollision(nextX, nextY, allUnits)) {
                            this.x = nextX;
                            this.y = nextY;
                        } else {
                            // 简单绕行逻辑：尝试只改 X 或只改 Y
                            if (!this.checkCollision(nextX, this.y, allUnits)) {
                                this.x = nextX;
                            } else if (!this.checkCollision(this.x, nextY, allUnits)) {
                                this.y = nextY;
                            }
                        }
                    }
                }

                // 3. 更新 DOM - 修复位置刷新逻辑
                if (this.element) {
                    this.updateVisual();
                } else {
                    console.warn('Unit element missing for updatePosition');
                }
            }

            handleSeparation(allUnits) {
                const mySize = this.getSize();
                const myCenterX = this.x + mySize / 2;
                const myCenterY = this.y + mySize / 2;

                for (const other of allUnits) {
                    if (other === this || other.isDead()) continue;

                    const otherSize = other.getSize();
                    const otherCenterX = other.x + otherSize / 2;
                    const otherCenterY = other.y + otherSize / 2;

                    const dx = myCenterX - otherCenterX;
                    const dy = myCenterY - otherCenterY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = (mySize + otherSize) / 2;

                    if (dist < minDist && dist > 0) {
                        // 产生一个轻微的排斥力
                        const pushForce = (minDist - dist) * 0.1;
                        this.x += (dx / dist) * pushForce;
                        this.y += (dy / dist) * pushForce;
                        
                        // 边界检查
                        const battlefield = document.getElementById('battlefield');
                        this.x = Math.max(0, Math.min(battlefield.offsetWidth - mySize, this.x));
                        this.y = Math.max(0, Math.min(battlefield.offsetHeight - mySize, this.y));
                    }
                }
            }

            checkCollision(nextX, nextY, allUnits) {
                const mySize = this.getSize();
                const myCenterX = nextX + mySize / 2;
                const myCenterY = nextY + mySize / 2;

                for (const other of allUnits) {
                    if (other === this || other.isDead()) continue;

                    const otherSize = other.getSize();
                    const otherCenterX = other.x + otherSize / 2;
                    const otherCenterY = other.y + otherSize / 2;

                    const dist = Math.sqrt(Math.pow(myCenterX - otherCenterX, 2) + Math.pow(myCenterY - otherCenterY, 2));
                    const minDist = (mySize + otherSize) / 2 * 0.9; // 允许 10% 重叠

                    if (dist < minDist) return true;
                }
                return false;
            }

            takeDamage(damage) {
                this.health = Math.max(0, this.health - damage);
                this.updateVisual();
                return this.health <= 0;
            }

            isDead() {
                return this.health <= 0;
            }
        }

        // 坦克类
        class Tank extends GameObject {
            constructor(x, y, team, health) {
                super(x, y, 'tank', team, health);
                this.attackRange = 230;
                this.attackPower = 30;
                this.maxSpeed = 50; // 坦克移动速度
                this.maxTurnSpeed = 95; // 坦克炮塔转向更沉稳
                this.attackCooldown = 2000; // 2秒攻击冷却
                this.moveCooldown = 500; // 0.5秒移动冷却
            }

            getAttackDamage() {
                return this.attackPower + Math.floor(Math.random() * 10);
            }

        }

        // 士兵类
        class Soldier extends GameObject {
            constructor(x, y, team, health) {
                super(x, y, 'soldier', team, health);
                this.attackRange = 105;
                this.attackPower = 20;
                this.maxSpeed = 80; // 士兵移动较快
                this.maxTurnSpeed = 210;
                this.attackCooldown = 1500; // 1.5秒攻击冷却
                this.moveCooldown = 300; // 0.3秒移动冷却
            }

            getAttackDamage() {
                return this.attackPower + Math.floor(Math.random() * 8);
            }

        }

        class Projectile {
            constructor(source, target, damage) {
                this.source = source;
                this.target = target;
                this.team = source.team;
                this.damage = damage;
                this.speed = source.type === 'tank' ? 520 : 340;
                this.radius = source.type === 'tank' ? 12 : 9;
                this.x = source.x + source.getSize() / 2;
                this.y = source.y + source.getSize() / 2;
                this.element = document.createElement('div');
                this.element.className = `projectile ${this.team}`;
                this.element.style.background = this.team === 'ally' ? '#8fd3ff' : '#ff9a8f';
                this.element.style.borderColor = this.team === 'ally' ? '#d6f1ff' : '#ffd3cd';
                this.updateVisual();
            }

            update(deltaTime) {
                if (!this.target || this.target.isDead()) return false;

                const targetX = this.target.x + this.target.getSize() / 2;
                const targetY = this.target.y + this.target.getSize() / 2;
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist <= this.radius) {
                    const killed = this.target.takeDamage(this.damage);
                    logBattle(`${this.team === 'ally' ? 'ALLY' : 'ENEMY'} ${this.source.type.toUpperCase()} HIT ${this.target.team === 'ally' ? 'ALLY' : 'ENEMY'} ${this.target.type.toUpperCase()} (-${this.damage})${killed ? ' - DESTROYED!' : ''}`, `${this.team} attack`);
                    this.createImpact(targetX, targetY);
                    return false;
                }

                const step = Math.min(dist, this.speed * deltaTime);
                this.x += (dx / dist) * step;
                this.y += (dy / dist) * step;
                this.updateVisual();
                return true;
            }

            updateVisual() {
                this.element.style.left = (this.x - 5) + 'px';
                this.element.style.top = (this.y - 5) + 'px';
            }

            createImpact(x, y) {
                const impact = document.createElement('div');
                impact.className = 'impact';
                impact.style.left = x + 'px';
                impact.style.top = y + 'px';
                document.getElementById('battlefield').appendChild(impact);
                setTimeout(() => impact.remove(), 260);
            }

            remove() {
                this.element.remove();
            }
        }

        // 战场管理器（组合模式的核心）
        class BattlefieldManager {
            constructor() {
                this.units = [];
                this.projectiles = [];
                this.battlefield = document.getElementById('battlefield');
                this.isBattleActive = false;
                this.isPaused = false;
                this.lastUpdateTime = 0;
                this.deltaTime = 0;
                this.animationId = null;
                
                // 帧率控制相关
                this.lastFrameTime = 0;
                this.fps = 0;
                this.framesThisSecond = 0;
                this.lastFpsUpdate = 0;
                this.targetFPS = 60;
                this.isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                // 移动端优化
                if (this.isMobile) {
                    this.targetFPS = 30; // 移动端目标30fps
                    this.maxDeltaTime = 1/20; // 最大deltaTime限制为20fps
                } else {
                    this.maxDeltaTime = 1/30; // PC端最大deltaTime限制为30fps
                }
                
            }

            addUnit(unit) {
                const emptyState = this.battlefield.querySelector('.empty-state');
                if (emptyState) emptyState.remove();

                this.units.push(unit);
                const element = unit.createElement();
                this.battlefield.appendChild(element);
                logBattle(`DEPLOYED ${unit.team === 'ally' ? 'ALLY' : 'ENEMY'} ${unit.type === 'tank' ? 'TANK' : 'SOLDIER'}`, unit.team);
            }

            removeUnit(unit) {
                const index = this.units.indexOf(unit);
                if (index > -1) {
                    this.units.splice(index, 1);
                    if (unit.element) {
                        unit.element.remove();
                    }
                }
            }

            clearAll() {
                this.units.forEach(unit => {
                    if (unit.element) {
                        unit.element.remove();
                    }
                });
                this.projectiles.forEach(projectile => projectile.remove());
                this.units = [];
                this.projectiles = [];
                this.isBattleActive = false;
                this.isPaused = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.battlefield.innerHTML = '<div class="empty-state" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.5; pointer-events: none;"><p>DEPLOY UNITS TO START</p><p style="font-size: 0.8em; margin-top: 10px;">CLICK TO ADD UNITS</p></div>';
                resetBattleButton();
                logBattle('BATTLEFIELD CLEARED', 'info');
            }

            spawnProjectile(source, target, damage) {
                const projectile = new Projectile(source, target, damage);
                this.projectiles.push(projectile);
                this.battlefield.appendChild(projectile.element);
            }

            startBattle() {
                if (this.units.length < 2) {
                    alert('DEPLOY AT LEAST 2 UNITS!');
                    return;
                }

                this.isBattleActive = true;
                this.isPaused = false;
                this.lastUpdateTime = performance.now();
                this.lastFrameTime = 0; // 重置帧时间
                this.framesThisSecond = 0; // 重置帧计数
                logBattle('BATTLE STARTED!', 'info');
                
                this.animationId = requestAnimationFrame((timestamp) => this.gameLoop(timestamp));
            }

            gameLoop(timestamp) {
                if (!this.isBattleActive) return;

                // 初始化帧时间
                if (!this.lastFrameTime) {
                    this.lastFrameTime = timestamp;
                    this.lastFpsUpdate = timestamp; // 初始化FPS计算时间
                    this.animationId = requestAnimationFrame((ts) => this.gameLoop(ts));
                    return;
                }

                // 计算deltaTime
                this.deltaTime = (timestamp - this.lastFrameTime) / 1000; // 转换为秒
                this.lastFrameTime = timestamp;

                // 安全校验：限制deltaTime避免异常情况
                if (this.deltaTime <= 0 || this.deltaTime > this.maxDeltaTime) {
                    this.animationId = requestAnimationFrame((ts) => this.gameLoop(ts));
                    return;
                }

                // 更新FPS计算
                this.framesThisSecond++;
                if (timestamp > this.lastFpsUpdate + 1000) {
                    this.fps = this.framesThisSecond;
                    this.framesThisSecond = 0;
                    this.lastFpsUpdate = timestamp;
                    
                    // 更新显示
                    const fpsElement = document.getElementById('fpsValue');
                    const unitCountElement = document.getElementById('unitCount');
                    
                    if (fpsElement) {
                        fpsElement.textContent = this.fps;
                    }
                    if (unitCountElement) {
                        unitCountElement.textContent = this.units.length;
                    }
                }

                if (!this.isPaused) {
                    this.updateAllUnits();
                    this.updateProjectiles();
                    this.checkBattleEnd();
                }

                this.animationId = requestAnimationFrame((ts) => this.gameLoop(ts));
            }

            updateAllUnits() {
                // 更新所有单位
                for (const unit of this.units) {
                    if (!unit.isDead()) {
                        unit.update(this.deltaTime, this.units);
                    }
                }

                // 移除死亡的单位
                this.units = this.units.filter(unit => {
                    if (unit.isDead() && unit.element) {
                        unit.element.remove();
                        return false;
                    }
                    return true;
                });
            }

            updateProjectiles() {
                this.projectiles = this.projectiles.filter(projectile => {
                    const active = projectile.update(this.deltaTime);
                    if (!active) {
                        projectile.remove();
                    }
                    return active;
                });
            }

            checkBattleEnd() {
                const allyUnits = this.units.filter(unit => unit.team === 'ally' && !unit.isDead());
                const enemyUnits = this.units.filter(unit => unit.team === 'enemy' && !unit.isDead());
                
                if (allyUnits.length === 0 || enemyUnits.length === 0) {
                    this.endBattle();
                }
            }

            pauseBattle() {
                if (!this.isBattleActive) return;
                
                this.isPaused = !this.isPaused;
                
                if (this.isPaused) {
                    logBattle('BATTLE PAUSED', 'info');
                } else {
                    logBattle('BATTLE RESUMED', 'info');
                }
            }


            endBattle() {
                this.isBattleActive = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                this.projectiles.forEach(projectile => projectile.remove());
                this.projectiles = [];
                resetBattleButton();
                
                const allyUnits = this.units.filter(unit => unit.team === 'ally' && !unit.isDead());
                const enemyUnits = this.units.filter(unit => unit.team === 'enemy' && !unit.isDead());
                
                if (allyUnits.length === 0 && enemyUnits.length === 0) {
                    logBattle('GAME OVER: DRAW', 'info');
                } else if (allyUnits.length === 0) {
                    logBattle('GAME OVER: ENEMY WINS!', 'info');
                } else if (enemyUnits.length === 0) {
                    logBattle('GAME OVER: ALLY WINS!', 'info');
                } else {
                    logBattle('GAME STOPPED', 'info');
                }
            }
        }

        // 全局变量
        const battlefieldManager = new BattlefieldManager();

        // 工具函数
        function logBattle(message, type = 'info') {
            const logContent = document.getElementById('battleLog'); // 修改了ID
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.appendChild(logEntry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function addAllyUnit() {
            addUnitWithTeam('ally');
        }

        function addEnemyUnit() {
            addUnitWithTeam('enemy');
        }

        function addUnitWithTeam(team) {
            const type = document.getElementById('unitType').value;
            const health = parseInt(document.getElementById('unitHealth').value);
            const battlefield = document.getElementById('battlefield');
            const unitSize = type === 'tank' ? 56 : 34;
            const deploymentDepth = Math.min(260, battlefield.offsetWidth * 0.32);
            const x = team === 'ally'
                ? 30 + Math.random() * deploymentDepth
                : battlefield.offsetWidth - deploymentDepth - unitSize - 30 + Math.random() * deploymentDepth;
            const y = 40 + Math.random() * (battlefield.offsetHeight - unitSize - 80);
            
            let unit;
            if (type === 'tank') {
                unit = new Tank(x, y, team, health);
            } else {
                unit = new Soldier(x, y, team, health);
            }
            
            battlefieldManager.addUnit(unit);
        }

        function toggleBattle() {
            const battleBtn = document.getElementById('battleBtn');
            
            if (!battlefieldManager.isBattleActive) {
                // 开始战斗
                if (battlefieldManager.units.length < 2) {
                    alert('DEPLOY AT LEAST 2 UNITS!'); // 英文提示
                    return;
                }
                
                battlefieldManager.startBattle();
                battleBtn.textContent = 'PAUSE'; // 英文按钮
                battleBtn.style.color = '#f1c40f';
                battleBtn.style.borderColor = '#f1c40f';
            } else {
                // 暂停/继续战斗
                battlefieldManager.pauseBattle();
                
                if (battlefieldManager.isPaused) {
                    battleBtn.textContent = 'RESUME'; // 英文按钮
                    battleBtn.style.color = '#2ecc71';
                    battleBtn.style.borderColor = '#2ecc71';
                } else {
                    battleBtn.textContent = 'PAUSE'; // 英文按钮
                    battleBtn.style.color = '#f1c40f';
                    battleBtn.style.borderColor = '#f1c40f';
                }
            }
        }

        function clearBattlefield() {
            battlefieldManager.clearAll();
        }

        function resetBattleButton() {
            const battleBtn = document.getElementById('battleBtn');
            if (!battleBtn) return;

            battleBtn.textContent = 'START';
            battleBtn.style.color = '#f1c40f';
            battleBtn.style.borderColor = '#f1c40f';
        }

        // 移动端触摸优化
        function addMobileOptimizations() {
            if (battlefieldManager.isMobile) {
                // 禁用双击缩放
                document.addEventListener('touchstart', function(e) {
                    if (e.touches.length > 1) {
                        e.preventDefault();
                    }
                }, { passive: false });

                // 禁用页面滚动
                document.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                }, { passive: false });

                // 优化触摸响应
                document.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                }, { passive: false });

                // 添加触摸反馈
                const battlefield = document.getElementById('battlefield');
                battlefield.addEventListener('touchstart', function(e) {
                    const touch = e.touches[0];
                    const rect = battlefield.getBoundingClientRect();
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    
                    // 创建触摸反馈效果
                    const feedback = document.createElement('div');
                    feedback.style.cssText = `
                        position: absolute;
                        left: ${x - 10}px;
                        top: ${y - 10}px;
                        width: 20px;
                        height: 20px;
                        background: rgba(255, 255, 255, 0.5);
                        border-radius: 50%;
                        pointer-events: none;
                        animation: touchFeedback 0.3s ease-out forwards;
                    `;
                    
                    battlefield.appendChild(feedback);
                    
                    setTimeout(() => {
                        feedback.remove();
                    }, 300);
                });
            }
        }

        // 添加触摸反馈动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes touchFeedback {
                0% {
                    transform: scale(0);
                    opacity: 1;
                }
                100% {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            logBattle('SYSTEM READY', 'info');
            addMobileOptimizations();
            const lastModifiedSpan = document.getElementById('lastModified');
            if (lastModifiedSpan) {
                lastModifiedSpan.textContent = document.lastModified;
            }
        });
    </script>
</body>
