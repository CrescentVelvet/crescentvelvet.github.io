<script>
window.files = window.files.filter(f => f && f.trim());

// ═══ Global state ═══
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const popup = document.getElementById('info-popup');
const popupTitle = document.getElementById('popup-title');
const popupMeta = document.getElementById('popup-meta');
const popupPreview = document.getElementById('popup-preview');
const zoomIndicator = document.getElementById('zoom-indicator');
const hudSummary = document.getElementById('hud-summary');

let allEntries = [];       // { year, month, day, text, wordCount, paraCount, category }
let treeData = {};         // year → month → day → entries[]
let viewX = 0, viewY = 0;
let scale = 1;
const SCALE_MIN = 0.32, SCALE_MAX = 5;
const DAY_NODE_SCALE = 1.08;
const DAY_LABEL_SCALE = 1.55;
const DAY_DETAIL_SCALE = 2.15;
let dragging = false;
let dragStartX = 0, dragStartY = 0;
let dragViewX = 0, dragViewY = 0;
let hoveredNode = null;
let selectedNode = null;
let animationId = null;

// Layout computed values (recomputed on resize / data change)
let layout = { years: [], yearWidth: 0, monthHeight: 0, colGap: 0, totalWidth: 0, totalHeight: 0 };

// Touch state
let touchDist0 = 0;
let touchScale0 = 1;
let touchStartX = 0;
let touchStartY = 0;
let touchMoved = false;
let touchWasZooming = false;

// ═══ Coordinate convention ═══
// Layout is computed once at scale = 1 (base/world coordinates). Visual zoom is
// applied uniformly in draw() via ctx.scale(scale, scale). Because world
// coordinates no longer depend on `scale`, the anchor math in zoomAt() keeps the
// point under the cursor fixed — no sideways drift.

function monthGap() {
    return 7;
}

function getMonthY(month) {
    return (month - 1) * (layout.monthHeight + monthGap()) + 48;
}

// Layout day dots in a wrapped grid that fits inside the month card so 30+ days
// don't overlap. The dot radius shrinks until the grid fits the card height.
// Shared by draw() and hitTest() so click targets match what's drawn.
function dayNodePositions(cardX, cardW, cardH, cy, dayCount) {
    const gap = 3;
    let r = Math.min(layout.monthHeight * 0.24, 9);
    let cols, rows;
    for (; r >= 2; r -= 0.5) {
        cols = Math.min(dayCount, Math.max(1, Math.floor((cardW - 12) / (r * 2 + gap))));
        rows = Math.ceil(dayCount / cols);
        if (rows * (r * 2 + gap) <= cardH - 6) break;
    }
    if (r < 2) r = 2;
    const cell = r * 2 + gap;
    const gridW = cols * cell;
    const gridH = rows * cell;
    const startX = cardX + (cardW - gridW) / 2 + r;
    const startY = cy - gridH / 2 + r;
    const positions = [];
    for (let i = 0; i < dayCount; i++) {
        const rr = Math.floor(i / cols);
        const cc = i % cols;
        positions.push({ dx: startX + cc * cell, dy: startY + rr * cell });
    }
    return { positions, r };
}

function getViewMode() {
    if (scale >= DAY_DETAIL_SCALE) return '日详情';
    if (scale >= DAY_NODE_SCALE) return '日节点';
    return '月概览';
}

function formatCompactNumber(num) {
    if (num >= 10000) return (num / 10000).toFixed(num >= 100000 ? 0 : 1) + '万';
    if (num >= 1000) return (num / 1000).toFixed(num >= 10000 ? 0 : 1) + 'k';
    return String(num);
}

function getMonthEntries(year, month) {
    const monthData = treeData[year] && treeData[year][month] ? treeData[year][month] : {};
    const entries = [];
    for (const day of Object.keys(monthData).map(Number).sort((a, b) => a - b)) {
        entries.push(...monthData[day]);
    }
    return entries;
}

function dominantCategory(entries) {
    const counts = entries.reduce((acc, entry) => {
        acc[entry.category] = (acc[entry.category] || 0) + 1;
        return acc;
    }, {});
    return Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0] || 'normal';
}

function getMonthStats(year, month) {
    const monthData = treeData[year] && treeData[year][month] ? treeData[year][month] : {};
    const days = Object.keys(monthData).map(Number).sort((a, b) => a - b);
    const entries = getMonthEntries(year, month);
    const wordCount = entries.reduce((sum, entry) => sum + entry.wordCount, 0);
    const paraCount = entries.reduce((sum, entry) => sum + entry.paraCount, 0);
    return {
        days,
        dayCount: days.length,
        entryCount: entries.length,
        wordCount,
        paraCount,
        category: dominantCategory(entries),
        entries
    };
}

function getDayStats(year, month, day) {
    const entries = treeData[year] && treeData[year][month] && treeData[year][month][day]
        ? treeData[year][month][day]
        : [];
    const wordCount = entries.reduce((sum, entry) => sum + entry.wordCount, 0);
    const paraCount = entries.reduce((sum, entry) => sum + entry.paraCount, 0);
    return {
        entries,
        entryCount: entries.length,
        wordCount,
        paraCount,
        category: dominantCategory(entries)
    };
}

function getYearStats(year) {
    const yearData = treeData[year] || {};
    let dayCount = 0;
    let entryCount = 0;
    let wordCount = 0;
    let paraCount = 0;
    for (const month of Object.keys(yearData).map(Number)) {
        const stats = getMonthStats(year, month);
        dayCount += stats.dayCount;
        entryCount += stats.entryCount;
        wordCount += stats.wordCount;
        paraCount += stats.paraCount;
    }
    return {
        monthCount: Object.keys(yearData).length,
        dayCount,
        entryCount,
        wordCount,
        paraCount
    };
}

function getAllStats() {
    return layout.years.reduce((acc, yl) => {
        const stats = getYearStats(yl.year);
        acc.yearCount += 1;
        acc.monthCount += stats.monthCount;
        acc.dayCount += stats.dayCount;
        acc.entryCount += stats.entryCount;
        acc.wordCount += stats.wordCount;
        return acc;
    }, { yearCount: 0, monthCount: 0, dayCount: 0, entryCount: 0, wordCount: 0 });
}

// ═══ Date parsing ═══
function extractDateFromText(text) {
    // Support YYYY-MM-DD, YYYY/MM/DD, YYYY.MM.DD — year must be 2000–2099
    const m = text.match(/\b(20\d{2})[-\/. ](\d{1,2})[-\/. ](\d{1,2})\b/);
    if (m) {
        const year = parseInt(m[1]), month = parseInt(m[2]), day = parseInt(m[3]);
        if (month >= 1 && month <= 12 && day >= 1 && day <= 31) {
            return { year, month, day };
        }
    }
    return null;
}

function classifyEntry(text) {
    if (/闲情逸致/.test(text)) return 'leisure';
    if (/梦幻空花/.test(text)) return 'dream';
    if (/做视频想法/.test(text)) return 'video';
    if (/回顾/.test(text) && /\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2}回顾/.test(text)) return 'review';
    return 'normal';
}

function parseDecryptedText(text, sourceFile) {
    // Strip HTML tags if the decrypted text is HTML-wrapped (exported from enc_reader)
    const isHtml = /<\/?p[\s>]/.test(text);
    let plainText = text;
    if (isHtml) {
        // Extract text from <p> tags — join with newlines
        const pRegex = /<p[^>]*>([\s\S]*?)<\/p>/gi;
        const parts = [];
        let m;
        while ((m = pRegex.exec(text)) !== null) {
            parts.push(m[1]);
        }
        plainText = parts.join('\n');
        console.log('[diary_tree] Stripped HTML from ' + sourceFile + ', got ' + parts.length + ' paragraphs');
    }

    const entries = [];
    const lines = plainText.split(/\r?\n/);
    let currentDate = null;
    let currentTextLines = [];

    for (const line of lines) {
        const dateMatch = extractDateFromText(line);
        if (dateMatch) {
            if (currentDate && currentTextLines.length > 0) {
                const body = currentTextLines.join('\n').trim();
                if (body) {
                    entries.push({
                        year: currentDate.year,
                        month: currentDate.month,
                        day: currentDate.day,
                        text: body,
                        wordCount: body.replace(/\s/g, '').length,
                        paraCount: body.split(/\n{2,}/).filter(p => p.trim()).length,
                        category: classifyEntry(body),
                        source: sourceFile
                    });
                }
            }
            currentDate = dateMatch;
            currentTextLines = [];
        } else if (currentDate) {
            const trimmed = line.trim();
            if (trimmed && !trimmed.includes('撤回了一条消息')) {
                currentTextLines.push(line);
            }
        }
    }
    if (currentDate && currentTextLines.length > 0) {
        const body = currentTextLines.join('\n').trim();
        if (body) {
            entries.push({
                year: currentDate.year,
                month: currentDate.month,
                day: currentDate.day,
                text: body,
                wordCount: body.replace(/\s/g, '').length,
                paraCount: body.split(/\n{2,}/).filter(p => p.trim()).length,
                category: classifyEntry(body),
                source: sourceFile
            });
        }
    }
    if (entries.length === 0) {
        // Debug: log first 200 chars of decrypted text so we can see the format
        console.log('[diary_tree] No entries from ' + sourceFile + '. First 200 chars:', text.slice(0, 200));
    } else {
        console.log('[diary_tree] Parsed ' + entries.length + ' entries from ' + sourceFile);
    }
    return entries;
}

// ═══ Build tree ═══
function buildTree(entries) {
    const tree = {};
    for (const e of entries) {
        if (!tree[e.year]) tree[e.year] = {};
        if (!tree[e.year][e.month]) tree[e.year][e.month] = {};
        if (!tree[e.year][e.month][e.day]) tree[e.year][e.month][e.day] = [];
        tree[e.year][e.month][e.day].push(e);
    }
    return tree;
}

// ═══ Layout computation ═══
function computeLayout() {
    const years = Object.keys(treeData).map(Number).filter(y => y >= 2000).sort((a, b) => a - b);
    if (years.length === 0) { layout = { years: [], yearWidth: 0, monthHeight: 0, colGap: 0, totalWidth: 0, totalHeight: 0 }; return; }

    // Base layout at scale = 1, in CSS pixels. The drawing context is already
    // scaled by DPR (see resize), so all coordinates are CSS pixels. Visual zoom
    // is applied separately via ctx.scale(scale, scale) in draw().
    const w = canvas._w || window.innerWidth;
    const h = canvas._h || window.innerHeight;
    const colGap = 44;
    const yearWidth = Math.max((w - colGap * (years.length + 1)) / years.length, 120);
    const monthCount = 12;
    const gap = monthGap();
    const monthHeight = Math.max((h - 104) / monthCount, 26);

    layout.years = years.map((year, yi) => {
        const months = [];
        for (let m = 1; m <= 12; m++) {
            const days = treeData[year] && treeData[year][m] ? Object.keys(treeData[year][m]).map(Number).sort((a, b) => a - b) : [];
            months.push({ month: m, days });
        }
        const x = colGap + yi * (yearWidth + colGap);
        return { year, months, x, width: yearWidth };
    });

    layout.yearWidth = yearWidth;
    layout.monthHeight = monthHeight;
    layout.colGap = colGap;
    layout.totalWidth = colGap + years.length * (yearWidth + colGap);
    layout.totalHeight = monthCount * (monthHeight + gap) + 56;
}

// ═══ Category color ═══
function categoryColor(cat, alpha = 1) {
    const colors = {
        leisure: `rgba(211,95,5,${alpha})`,
        dream: `rgba(138,43,226,${alpha})`,
        video: `rgba(0,86,179,${alpha})`,
        review: `rgba(230,126,34,${alpha})`,
        normal: `rgba(74,144,226,${alpha})`
    };
    return colors[cat] || colors.normal;
}

function categoryLabel(cat) {
    const labels = {
        leisure: '闲情逸致',
        dream: '梦幻空花',
        video: '做视频想法',
        review: '未来回顾',
        normal: '日常'
    };
    return labels[cat] || labels.normal;
}

function yearColor(yi, total, alpha = 1) {
    const hue = 200 + (yi / Math.max(total - 1, 1)) * 80;
    return `hsla(${hue}, 55%, 70%, ${alpha})`;
}

// ═══ Hit testing ═══
// mx/my are world (base) coordinates: (clientX - viewX) / scale.
function hitTest(mx, my) {
    for (const yl of layout.years) {
        for (const mo of yl.months) {
            const myOff = getMonthY(mo.month);
            const cy = myOff + layout.monthHeight / 2;
            const cx = yl.x + yl.width / 2;
            const padX = 7;
            const cardX = yl.x + padX;
            const cardW = yl.width - padX * 2;
            const cardH = Math.max(layout.monthHeight * 0.72, 20);
            const cardY = cy - cardH / 2;

            // Day nodes take priority once zoomed in enough.
            if (scale >= DAY_NODE_SCALE && mo.days.length > 0) {
                const dayCount = mo.days.length;
                const cardH = Math.max(layout.monthHeight * 0.72, 20);
                const { positions, r: dayRadius } = dayNodePositions(cardX, cardW, cardH, cy, dayCount);
                for (let di = 0; di < dayCount; di++) {
                    const { dx, dy } = positions[di];
                    const dist = Math.hypot(mx - dx, my - dy);
                    if (dist < dayRadius + 4) {
                        return { type: 'day', year: yl.year, month: mo.month, day: mo.days[di], cx: dx, cy: dy, radius: dayRadius };
                    }
                }
            }

            // Month summary card / node.
            if (mx >= cardX && mx <= cardX + cardW && my >= cardY && my <= cardY + cardH) {
                return { type: 'month', year: yl.year, month: mo.month, days: mo.days, cx, cy, x: cardX, y: cardY, w: cardW, h: cardH };
            }
        }
        // Year node
        const yTop = 12;
        const yBottom = yTop + 28;
        if (my >= yTop && my <= yBottom && mx >= yl.x && mx <= yl.x + yl.width) {
            return { type: 'year', year: yl.year, cx: yl.x + yl.width / 2, cy: yTop + 14, x: yl.x, y: yTop, w: yl.width, h: 28 };
        }
    }
    return null;
}

// ═══ Drawing ═══
function drawCurvePath(x1, y1, x2, y2) {
    const cpx = (x1 + x2) / 2;
    ctx.bezierCurveTo(cpx, y1, cpx, y2, x2, y2);
}

function draw() {
    const w = canvas._w || window.innerWidth;
    const h = canvas._h || window.innerHeight;
    ctx.clearRect(0, 0, w, h);

    // Warm paper-like background so canvas is never transparent.
    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, '#fbf8f2');
    bg.addColorStop(0.5, '#f3efe8');
    bg.addColorStop(1, '#fbf3e8');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    const years = layout.years;

    // No-data state
    if (years.length === 0) {
        ctx.fillStyle = 'rgba(88, 61, 41, 0.62)';
        ctx.font = `16px "Segoe UI","Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('解密后，这里会长出一棵日记时间树', w / 2, h / 2);
        zoomIndicator.textContent = '100% · 月概览';
        if (hudSummary) hudSummary.textContent = '解密后可以缩小看月份概览，放大看每日记录。';
        return;
    }

    ctx.save();
    // viewX/viewY is the screen-space pan offset; scale zooms uniformly around
    // the origin AFTER translation, so zoomAt()'s cursor-anchor math holds.
    ctx.translate(viewX, viewY);
    ctx.scale(scale, scale);

    // Draw soft year background columns.
    for (let yi = 0; yi < years.length; yi++) {
        const yl = years[yi];
        const columnPad = 8;
        const columnX = yl.x - columnPad;
        const columnY = 8;
        const columnW = yl.width + columnPad * 2;
        const columnH = layout.totalHeight + 26;
        const columnGradient = ctx.createLinearGradient(columnX, columnY, columnX, columnY + columnH);
        columnGradient.addColorStop(0, yearColor(yi, years.length, 0.16));
        columnGradient.addColorStop(1, yearColor(yi, years.length, 0.045));
        ctx.fillStyle = columnGradient;
        ctx.strokeStyle = yearColor(yi, years.length, 0.22);
        ctx.lineWidth = 1;
        ctx.beginPath();
        roundRect(ctx, columnX, columnY, columnW, columnH, 26);
        ctx.fill();
        ctx.stroke();
    }

    // Draw a quiet snake spine that visually ties the years together.
    if (years.length > 1 && scale > 0.36) {
        const spineY = getMonthY(6) + layout.monthHeight / 2;
        ctx.strokeStyle = 'rgba(160, 117, 86, 0.18)';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        for (let yi = 0; yi < years.length; yi++) {
            const yl = years[yi];
            const x = yl.x + yl.width / 2;
            const y = spineY + Math.sin(yi * 0.9) * 18;
            if (yi === 0) ctx.moveTo(x, y);
            else {
                const prev = years[yi - 1];
                const px = prev.x + prev.width / 2;
                const py = spineY + Math.sin((yi - 1) * 0.9) * 18;
                const cpx = (px + x) / 2;
                ctx.bezierCurveTo(cpx, py, cpx, y, x, y);
            }
        }
        ctx.stroke();
    }

    // Draw month connector curves inside each year.
    if (scale > 0.42) {
        for (let yi = 0; yi < years.length; yi++) {
            const yl = years[yi];
            ctx.strokeStyle = yearColor(yi, years.length, 0.18);
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            for (let mi = 0; mi < yl.months.length; mi++) {
                const mo = yl.months[mi];
                const cx = yl.x + yl.width / 2;
                const cy = getMonthY(mo.month) + layout.monthHeight / 2;
                if (mi === 0) ctx.moveTo(cx, cy);
                else {
                    const prevMonth = yl.months[mi - 1].month;
                    const py = getMonthY(prevMonth) + layout.monthHeight / 2;
                    ctx.bezierCurveTo(cx - 10, py, cx + 10, cy, cx, cy);
                }
            }
            ctx.stroke();
        }
    }

    // Draw month summary cards and day detail nodes.
    for (const yl of years) {
        for (const mo of yl.months) {
            const myOff = getMonthY(mo.month);
            const cx = yl.x + yl.width / 2;
            const cy = myOff + layout.monthHeight / 2;
            const padX = 7;
            const cardX = yl.x + padX;
            const cardW = yl.width - padX * 2;
            const cardH = Math.max(layout.monthHeight * 0.72, 20);
            const cardY = cy - cardH / 2;
            const cardR = Math.min(cardH / 2, 10);
            const stats = getMonthStats(yl.year, mo.month);
            const hasEntries = stats.entryCount > 0;
            const intensity = Math.min(stats.entryCount / 12, 1);
            const fillAlpha = hasEntries ? 0.72 + intensity * 0.18 : 0.32;
            const strokeAlpha = hasEntries ? 0.24 + intensity * 0.16 : 0.08;

            const cardGradient = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY);
            cardGradient.addColorStop(0, `rgba(255, 252, 246, ${fillAlpha})`);
            cardGradient.addColorStop(1, hasEntries ? `hsla(23, 78%, ${88 - intensity * 10}%, ${0.42 + intensity * 0.24})` : 'rgba(255,255,255,0.22)');
            ctx.fillStyle = 'rgba(82, 55, 35, 0.055)';
            ctx.beginPath();
            roundRect(ctx, cardX + 1.5, cardY + 2, cardW, cardH, cardR);
            ctx.fill();
            ctx.fillStyle = cardGradient;
            ctx.strokeStyle = `rgba(130, 91, 65, ${strokeAlpha})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            roundRect(ctx, cardX, cardY, cardW, cardH, cardR);
            ctx.fill();
            ctx.stroke();

            // Activity fill: the wider it is, the more days have entries.
            if (hasEntries) {
                const barH = 3.2;
                const barW = Math.max(barH, (cardW - 8) * Math.min(stats.dayCount / 31, 1));
                ctx.fillStyle = categoryColor(stats.category, 0.32);
                ctx.beginPath();
                roundRect(ctx, cardX + 4, cardY + cardH - barH - 4, barW, barH, barH / 2);
                ctx.fill();
            }

            // Month label
            if (scale > 0.36) {
                ctx.fillStyle = hasEntries ? 'rgba(91, 59, 42, 0.96)' : 'rgba(91, 59, 42, 0.38)';
                ctx.font = `700 10px "Segoe UI","Microsoft YaHei",sans-serif`;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                const labelY = scale >= DAY_NODE_SCALE ? cardY + 11 : cy - (scale > 0.58 ? 5 : 0);
                ctx.fillText(`${mo.month}月`, cardX + 10, labelY);
            }

            // Month summary at overview zoom.
            if (scale > 0.52 && scale < DAY_DETAIL_SCALE) {
                ctx.fillStyle = hasEntries ? 'rgba(91, 74, 64, 0.72)' : 'rgba(91, 74, 64, 0.28)';
                ctx.font = `8.5px "Segoe UI","Microsoft YaHei",sans-serif`;
                ctx.textAlign = scale >= DAY_NODE_SCALE ? 'right' : 'left';
                ctx.textBaseline = 'middle';
                const summary = hasEntries
                    ? `${stats.dayCount}天 · ${stats.entryCount}篇 · ${formatCompactNumber(stats.wordCount)}字`
                    : '无记录';
                const tx = scale >= DAY_NODE_SCALE ? cardX + cardW - 10 : cardX + 10;
                const ty = scale >= DAY_NODE_SCALE ? cardY + 11 : cy + 7;
                ctx.fillText(summary, tx, ty);
            }

            // Highlight hovered/selected month
            if (hoveredNode && hoveredNode.type === 'month' && hoveredNode.year === yl.year && hoveredNode.month === mo.month) {
                ctx.strokeStyle = 'rgba(184,105,68,0.62)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                roundRect(ctx, cardX - 2, cardY - 2, cardW + 4, cardH + 4, cardR + 2);
                ctx.stroke();
            }
            if (selectedNode && selectedNode.type === 'month' && selectedNode.year === yl.year && selectedNode.month === mo.month) {
                ctx.strokeStyle = 'rgba(211,95,5,0.8)';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([4, 3]);
                ctx.beginPath();
                roundRect(ctx, cardX - 3, cardY - 3, cardW + 6, cardH + 6, cardR + 3);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Day nodes emerge when zoomed in. At high zoom they include compact stats.
            if (scale >= DAY_NODE_SCALE && mo.days.length > 0) {
                const dayCount = mo.days.length;
                const { positions, r: dayRadius } = dayNodePositions(cardX, cardW, cardH, cy, dayCount);
                const dotMinR = dayRadius * 0.6;

                for (let di = 0; di < dayCount; di++) {
                    const day = mo.days[di];
                    const dayStats = getDayStats(yl.year, mo.month, day);
                    const { dx, dy } = positions[di];

                    const cat = dayStats.category;
                    const dr = Math.max(dotMinR, dayRadius * (0.72 + 0.36 * Math.min(dayStats.wordCount / 2400, 1)));

                    ctx.fillStyle = categoryColor(cat, 0.16);
                    ctx.beginPath();
                    ctx.arc(dx, dy, dr + 4, 0, Math.PI * 2);
                    ctx.fill();

                    const dotGradient = ctx.createRadialGradient(dx - dr * 0.35, dy - dr * 0.35, 1, dx, dy, dr);
                    dotGradient.addColorStop(0, 'rgba(255,255,255,0.9)');
                    dotGradient.addColorStop(0.22, categoryColor(cat, 0.72));
                    dotGradient.addColorStop(1, categoryColor(cat, 0.96));
                    ctx.fillStyle = dotGradient;
                    ctx.beginPath();
                    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.72)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Highlight hovered/selected day
                    if (hoveredNode && hoveredNode.type === 'day' && hoveredNode.year === yl.year && hoveredNode.month === mo.month && hoveredNode.day === day) {
                        ctx.strokeStyle = 'rgba(184,105,68,0.95)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(dx, dy, dr + 3, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    if (selectedNode && selectedNode.type === 'day' && selectedNode.year === yl.year && selectedNode.month === mo.month && selectedNode.day === day) {
                        ctx.strokeStyle = 'rgba(211,95,5,0.8)';
                        ctx.lineWidth = 2.5;
                        ctx.setLineDash([4, 3]);
                        ctx.beginPath();
                        ctx.arc(dx, dy, dr + 5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }

                    if (scale >= DAY_LABEL_SCALE && dr >= 6) {
                        ctx.fillStyle = '#fff';
                        ctx.font = `700 ${Math.min(dr, 8)}px "Segoe UI","Microsoft YaHei",sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(day, dx, dy);
                    }
                }
            }
        }
    }

    // Year labels float above the cards.
    for (let yi = 0; yi < years.length; yi++) {
        const yl = years[yi];
        const yearStats = getYearStats(yl.year);
        const yLabelY = 13;
        ctx.fillStyle = 'rgba(70, 46, 34, 0.9)';
        ctx.font = `700 14px "Segoe UI","Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(yl.year, yl.x + yl.width / 2, yLabelY);

        if (scale > 0.46) {
            ctx.fillStyle = yearColor(yi, years.length, 0.68);
            ctx.font = `8.5px "Segoe UI","Microsoft YaHei",sans-serif`;
            ctx.fillText(`${yearStats.monthCount}月 · ${yearStats.entryCount}篇`, yl.x + yl.width / 2, yLabelY + 17);
        }
    }

    ctx.restore();

    const allStats = getAllStats();
    const mode = getViewMode();
    zoomIndicator.textContent = `${Math.round(scale * 100)}% · ${mode}`;
    if (hudSummary) {
        hudSummary.textContent = `${allStats.yearCount}年 · ${allStats.monthCount}个月 · ${allStats.dayCount}天 · ${allStats.entryCount}篇 · ${formatCompactNumber(allStats.wordCount)}字｜当前：${mode}`;
    }
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

function render() {
    computeLayout();
    draw();
}

// ═══ Resize ═══
function resize() {
    canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
    canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    canvas._w = window.innerWidth;
    canvas._h = window.innerHeight;
    canvas.getBoundingClientRect = function() {
        return { left: 0, top: 0, width: canvas._w, height: canvas._h, right: canvas._w, bottom: canvas._h };
    };
}

function resizeAndRender() {
    resize();
    render();
}

// ═══ Zoom ═══
// cx/cy are screen-space (clientX/Y). Because world coordinates are stable
// (layout is scale-independent and zoom is applied via ctx.scale), this anchor
// formula keeps the world point under the cursor pinned in place.
function zoomAt(cx, cy, factor) {
    const newScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, scale * factor));
    const actualFactor = newScale / scale;
    viewX = cx - actualFactor * (cx - viewX);
    viewY = cy - actualFactor * (cy - viewY);
    scale = newScale;
    render();
}

function resetView() {
    scale = 1;
    viewX = 0;
    viewY = 0;
    selectedNode = null;
    popup.classList.remove('visible');
    render();
}

document.getElementById('zoomOut').addEventListener('click', () => {
    zoomAt(window.innerWidth / 2, window.innerHeight / 2, 0.82);
});

document.getElementById('zoomIn').addEventListener('click', () => {
    zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1.22);
});

document.getElementById('zoomReset').addEventListener('click', resetView);

// ═══ Popup ═══
function showPopup(node, screenX, screenY) {
    selectedNode = node;

    if (node.type === 'day') {
        const dayStats = getDayStats(node.year, node.month, node.day);
        const entries = dayStats.entries;
        const categories = [...new Set(entries.map(e => categoryLabel(e.category)))].join(' / ');
        popupTitle.textContent = `${node.year}-${String(node.month).padStart(2,'0')}-${String(node.day).padStart(2,'0')}`;
        popupMeta.textContent = `${entries.length}篇 · ${dayStats.wordCount}字 · ${dayStats.paraCount}段${categories ? ' · ' + categories : ''}`;
        // Full, untruncated diary text for the whole day.
        popupPreview.textContent = entries.map(e => e.text).join('\n\n———\n\n');
    } else if (node.type === 'month') {
        const monthStats = getMonthStats(node.year, node.month);
        popupTitle.textContent = `${node.year}年${node.month}月`;
        popupMeta.textContent = `${monthStats.dayCount}天 · ${monthStats.entryCount}篇 · ${monthStats.wordCount}字 · ${monthStats.paraCount}段`;
        // Show first 5 entries as previews
        const sorted = [...monthStats.entries].sort((a, b) => a.day - b.day || (a.category === 'normal' ? 1 : -1));
        const previewEntries = sorted.slice(0, 5);
        popupPreview.textContent = previewEntries.length > 0 ? previewEntries.map(e =>
            `${node.year}-${String(node.month).padStart(2,'0')}-${String(e.day).padStart(2,'0')}  ` +
            e.text.slice(0, 120) + (e.text.length > 120 ? '...' : '')
        ).join('\n\n') : '这个月还没有可显示的日记。';
    } else if (node.type === 'year') {
        const yearData = treeData[node.year] || {};
        const yearStats = getYearStats(node.year);
        const allYearEntries = [];
        for (const m of Object.values(yearData)) {
            for (const d of Object.values(m)) {
                allYearEntries.push(...d);
            }
        }
        popupTitle.textContent = `${node.year}年`;
        popupMeta.textContent = `${yearStats.monthCount}个月 · ${yearStats.dayCount}天 · ${yearStats.entryCount}篇 · ${yearStats.wordCount}字`;
        // Show first 5 entries as previews
        const sorted = allYearEntries.sort((a, b) => a.month - b.month || a.day - b.day);
        const previewEntries = sorted.slice(0, 5);
        popupPreview.textContent = previewEntries.length > 0 ? previewEntries.map(e =>
            `${node.year}-${String(e.month).padStart(2,'0')}-${String(e.day).padStart(2,'0')}  ` +
            e.text.slice(0, 120) + (e.text.length > 120 ? '...' : '')
        ).join('\n\n') : '这一年还没有可显示的日记。';
    }

    popup.classList.add('visible');
    const pw = popup.offsetWidth;
    const ph = popup.offsetHeight;
    let px = screenX - pw / 2;
    let py = screenY - ph - 20;
    if (px < 10) px = 10;
    if (px + pw > window.innerWidth - 10) px = window.innerWidth - pw - 10;
    if (py < 10) py = screenY + 20;
    if (py + ph > window.innerHeight - 10) py = window.innerHeight - ph - 10;
    popup.style.left = px + 'px';
    popup.style.top = py + 'px';

    render();
}

function hidePopup() {
    selectedNode = null;
    popup.classList.remove('visible');
    render();
}

document.getElementById('popup-close').onclick = (e) => {
    e.stopPropagation();
    hidePopup();
};

// ═══ Mouse events ═══
canvas.addEventListener('mousedown', (e) => {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
});

canvas.addEventListener('mousemove', (e) => {
    // Convert screen → world (base) coordinates for hit testing.
    const mx = (e.clientX - viewX) / scale;
    const my = (e.clientY - viewY) / scale;

    if (dragging) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            viewX = dragViewX + dx;
            viewY = dragViewY + dy;
            render();
        }
    } else {
        hoveredNode = hitTest(mx, my);
        if (hoveredNode) {
            canvas.style.cursor = 'pointer';
        } else {
            canvas.style.cursor = 'grab';
        }
        render();
    }
});

canvas.addEventListener('mouseup', (e) => {
    if (dragging) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (Math.abs(dx) < 3 && Math.abs(dy) < 3) {
            // Click
            const mx = (e.clientX - viewX) / scale;
            const my = (e.clientY - viewY) / scale;
            const node = hitTest(mx, my);
            if (node) {
                showPopup(node, e.clientX, e.clientY);
            } else {
                hidePopup();
            }
        }
    }
    dragging = false;
});

canvas.addEventListener('mouseleave', () => {
    dragging = false;
    hoveredNode = null;
    render();
});

canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

// ═══ Touch events ═══
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
        dragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        touchStartX = dragStartX;
        touchStartY = dragStartY;
        touchMoved = false;
        touchWasZooming = false;
        dragViewX = viewX;
        dragViewY = viewY;
    } else if (e.touches.length === 2) {
        dragging = false;
        touchWasZooming = true;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchDist0 = Math.hypot(dx, dy);
        touchScale0 = scale;
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
        const dx = e.touches[0].clientX - dragStartX;
        const dy = e.touches[0].clientY - dragStartY;
        if (Math.hypot(e.touches[0].clientX - touchStartX, e.touches[0].clientY - touchStartY) > 6) {
            touchMoved = true;
        }
        viewX = dragViewX + dx;
        viewY = dragViewY + dy;
        render();
    } else if (e.touches.length === 2) {
        touchWasZooming = true;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        if (touchDist0 > 0) {
            const factor = dist / touchDist0;
            const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            zoomAt(cx, cy, factor);
            touchDist0 = dist;
            touchScale0 = scale;
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
        const touch = e.changedTouches[0];
        if (touch && !touchWasZooming && !touchMoved) {
            const mx = (touch.clientX - viewX) / scale;
            const my = (touch.clientY - viewY) / scale;
            const node = hitTest(mx, my);
            if (node) {
                showPopup(node, touch.clientX, touch.clientY);
            } else {
                hidePopup();
            }
        }
        dragging = false;
        touchMoved = false;
        touchWasZooming = false;
    }
});

// ═══ Keyboard ═══
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hidePopup();
    if (e.key === '0' && !e.ctrlKey && !e.metaKey) {
        resetView();
    }
});

// ═══ Auth & data loading ═══
document.getElementById('unlockBtn').onclick = async function() {
    const password = document.getElementById('password').value;
    const status = document.getElementById('auth-status');
    if (!password) {
        status.textContent = '请输入密码';
        status.className = 'error';
        return;
    }
    status.textContent = '正在解密...';
    status.className = 'loading';

    const loadedEntries = [];
    let filesFetched = 0;
    let filesFailed = 0;

    for (const file of window.files) {
        try {
            const res = await fetch(`/assets/data/${file}`);
            if (!res.ok) { filesFailed++; continue; }
            const ciphertext = await res.text();
            const bytes = CryptoJS.AES.decrypt(ciphertext, password);
            const decrypted = bytes.toString(CryptoJS.enc.Utf8);
            if (!decrypted) {
                // Decryption produced empty output — likely wrong password
                filesFailed++;
                continue;
            }
            const entries = parseDecryptedText(decrypted, file);
            loadedEntries.push(...entries);
            filesFetched++;
        } catch (e) {
            filesFailed++;
        }
    }

    console.log('[diary_tree] files_fetched:', filesFetched, 'files_failed:', filesFailed, 'entries_parsed:', loadedEntries.length);

    // CryptoJS with wrong password returns garbage bytes (non-empty), so we
    // must check the actual entry count, NOT just whether decryption "succeeded".
    if (loadedEntries.length === 0) {
        status.textContent = window.files.length === 0
            ? '未找到任何日记数据文件（请确保在 Jekyll 构建后访问）'
            : '密码错误或未找到可解析的日记条目';
        status.className = 'error';
        console.log('[diary_tree] No entries parsed. window.files count:', window.files.length);
        return;
    }

    allEntries = loadedEntries;
    window.allEntries = allEntries;
    treeData = buildTree(allEntries);

    document.getElementById('auth-overlay').classList.add('hidden');
    resize();
    render();

    status.textContent = `成功解密 ${filesFetched} 个文件，共 ${allEntries.length} 条日记`;
};

// Allow Enter key to submit
document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('unlockBtn').click();
});

// ═══ Init ═══
window.addEventListener('resize', resizeAndRender);
resize();
render();
</script>
</body>
</html>
