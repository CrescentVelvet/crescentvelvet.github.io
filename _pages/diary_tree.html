<script>
window.files = window.files.filter(f => f && f.trim());

// ═══ Global state ═══
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const popup = document.getElementById('info-popup');
const popupTitle = document.getElementById('popup-title');
const popupMeta = document.getElementById('popup-meta');
const popupPreview = document.getElementById('popup-preview');
const zoomIndicator = document.getElementById('zoom-indicator');

let allEntries = [];       // { year, month, day, text, wordCount, paraCount, category }
let treeData = {};         // year → month → day → entries[]
let viewX = 0, viewY = 0;
let scale = 1;
const SCALE_MIN = 0.3, SCALE_MAX = 4;
let dragging = false;
let dragStartX = 0, dragStartY = 0;
let dragViewX = 0, dragViewY = 0;
let hoveredNode = null;
let selectedNode = null;
let animationId = null;

// Layout computed values (recomputed on resize / data change)
let layout = { years: [], yearWidth: 0, monthHeight: 0, colGap: 0, totalWidth: 0, totalHeight: 0 };

// Touch state
let touchDist0 = 0;
let touchScale0 = 1;

// ═══ Date parsing ═══
function extractDateFromText(text) {
    // Support YYYY-MM-DD, YYYY/MM/DD, YYYY.MM.DD — year must be 2000–2099
    const m = text.match(/\b(20\d{2})[-\/. ](\d{1,2})[-\/. ](\d{1,2})\b/);
    if (m) {
        const year = parseInt(m[1]), month = parseInt(m[2]), day = parseInt(m[3]);
        if (month >= 1 && month <= 12 && day >= 1 && day <= 31) {
            return { year, month, day };
        }
    }
    return null;
}

function classifyEntry(text) {
    if (/闲情逸致/.test(text)) return 'leisure';
    if (/梦幻空花/.test(text)) return 'dream';
    if (/做视频想法/.test(text)) return 'video';
    if (/回顾/.test(text) && /\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2}回顾/.test(text)) return 'review';
    return 'normal';
}

function parseDecryptedText(text, sourceFile) {
    // Strip HTML tags if the decrypted text is HTML-wrapped (exported from enc_reader)
    const isHtml = /<\/?p[\s>]/.test(text);
    let plainText = text;
    if (isHtml) {
        // Extract text from <p> tags — join with newlines
        const pRegex = /<p[^>]*>([\s\S]*?)<\/p>/gi;
        const parts = [];
        let m;
        while ((m = pRegex.exec(text)) !== null) {
            parts.push(m[1]);
        }
        plainText = parts.join('\n');
        console.log('[diary_tree] Stripped HTML from ' + sourceFile + ', got ' + parts.length + ' paragraphs');
    }

    const entries = [];
    const lines = plainText.split(/\r?\n/);
    let currentDate = null;
    let currentTextLines = [];

    for (const line of lines) {
        const dateMatch = extractDateFromText(line);
        if (dateMatch) {
            if (currentDate && currentTextLines.length > 0) {
                const body = currentTextLines.join('\n').trim();
                if (body) {
                    entries.push({
                        year: currentDate.year,
                        month: currentDate.month,
                        day: currentDate.day,
                        text: body,
                        wordCount: body.replace(/\s/g, '').length,
                        paraCount: body.split(/\n{2,}/).filter(p => p.trim()).length,
                        category: classifyEntry(body),
                        source: sourceFile
                    });
                }
            }
            currentDate = dateMatch;
            currentTextLines = [];
        } else if (currentDate) {
            const trimmed = line.trim();
            if (trimmed && !trimmed.includes('撤回了一条消息')) {
                currentTextLines.push(line);
            }
        }
    }
    if (currentDate && currentTextLines.length > 0) {
        const body = currentTextLines.join('\n').trim();
        if (body) {
            entries.push({
                year: currentDate.year,
                month: currentDate.month,
                day: currentDate.day,
                text: body,
                wordCount: body.replace(/\s/g, '').length,
                paraCount: body.split(/\n{2,}/).filter(p => p.trim()).length,
                category: classifyEntry(body),
                source: sourceFile
            });
        }
    }
    if (entries.length === 0) {
        // Debug: log first 200 chars of decrypted text so we can see the format
        console.log('[diary_tree] No entries from ' + sourceFile + '. First 200 chars:', text.slice(0, 200));
    } else {
        console.log('[diary_tree] Parsed ' + entries.length + ' entries from ' + sourceFile);
    }
    return entries;
}

// ═══ Build tree ═══
function buildTree(entries) {
    const tree = {};
    for (const e of entries) {
        if (!tree[e.year]) tree[e.year] = {};
        if (!tree[e.year][e.month]) tree[e.year][e.month] = {};
        if (!tree[e.year][e.month][e.day]) tree[e.year][e.month][e.day] = [];
        tree[e.year][e.month][e.day].push(e);
    }
    return tree;
}

// ═══ Layout computation ═══
function computeLayout() {
    const years = Object.keys(treeData).map(Number).filter(y => y >= 2000).sort((a, b) => a - b);
    console.log('[diary_tree] Years in data:', years);
    if (years.length === 0) { layout = { years: [], yearWidth: 0, monthHeight: 0, colGap: 0, totalWidth: 0, totalHeight: 0 }; return; }

    // Use CSS-pixel dimensions (canvas._w/_h), NOT canvas.width/height which are
    // internal pixels scaled by devicePixelRatio.  The drawing context is already
    // scaled by DPR so all coordinates are in CSS pixels.
    const w = canvas._w || window.innerWidth;
    const h = canvas._h || window.innerHeight;
    const colGap = Math.max(40 * scale, 20);
    const yearWidth = Math.max((w - colGap * (years.length + 1)) / years.length, 120 * scale);
    const monthCount = 12;
    const monthGap = Math.max(6 * scale, 3);
    const monthHeight = Math.max((h - 80 * scale) / monthCount, 24 * scale);

    layout.years = years.map((year, yi) => {
        const months = [];
        for (let m = 1; m <= 12; m++) {
            const days = treeData[year] && treeData[year][m] ? Object.keys(treeData[year][m]).map(Number).sort((a, b) => a - b) : [];
            months.push({ month: m, days });
        }
        const x = colGap + yi * (yearWidth + colGap);
        return { year, months, x, width: yearWidth };
    });

    layout.yearWidth = yearWidth;
    layout.monthHeight = monthHeight;
    layout.colGap = colGap;
    layout.totalWidth = colGap + years.length * (yearWidth + colGap);
    layout.totalHeight = monthCount * (monthHeight + monthGap) + 40 * scale;
}

// ═══ Category color ═══
function categoryColor(cat, alpha = 1) {
    const colors = {
        leisure: `rgba(211,95,5,${alpha})`,
        dream: `rgba(138,43,226,${alpha})`,
        video: `rgba(0,86,179,${alpha})`,
        review: `rgba(230,126,34,${alpha})`,
        normal: `rgba(74,144,226,${alpha})`
    };
    return colors[cat] || colors.normal;
}

function yearColor(yi, total, alpha = 1) {
    const hue = 200 + (yi / Math.max(total - 1, 1)) * 80;
    return `hsla(${hue}, 55%, 70%, ${alpha})`;
}

// ═══ Hit testing ═══
function hitTest(mx, my) {
    for (const yl of layout.years) {
        for (const mo of yl.months) {
            const myOff = (mo.month - 1) * (layout.monthHeight + Math.max(6 * scale, 3)) + 40 * scale;
            const cy = myOff + layout.monthHeight / 2;
            const cx = yl.x + yl.width / 2;

            // Month node
            const distToMonth = Math.hypot(mx - cx, my - cy);
            if (distToMonth < layout.monthHeight * 0.4) {
                return { type: 'month', year: yl.year, month: mo.month, days: mo.days, cx, cy, x: yl.x, y: myOff, w: yl.width, h: layout.monthHeight };
            }

            // Day nodes (only when zoomed in enough)
            if (scale > 0.8 && mo.days.length > 0) {
                const dayRadius = Math.min(layout.monthHeight * 0.35, 12 * scale);
                const dayCount = mo.days.length;
                const availW = yl.width - dayRadius * 2;
                const spacing = dayCount > 1 ? availW / (dayCount - 1) : 0;
                for (let di = 0; di < dayCount; di++) {
                    const dx = yl.x + dayRadius + di * spacing;
                    const dy = cy;
                    const dist = Math.hypot(mx - dx, my - dy);
                    if (dist < dayRadius + 2) {
                        return { type: 'day', year: yl.year, month: mo.month, day: mo.days[di], cx: dx, cy: dy, radius: dayRadius };
                    }
                }
            }
        }
        // Year node
        const yTop = 8 * scale;
        const yBottom = yTop + 24 * scale;
        if (my >= yTop && my <= yBottom && mx >= yl.x && mx <= yl.x + yl.width) {
            return { type: 'year', year: yl.year, cx: yl.x + yl.width / 2, cy: yTop + 12 * scale, x: yl.x, y: yTop, w: yl.width, h: 24 * scale };
        }
    }
    return null;
}

// ═══ Drawing ═══
function drawCurvePath(x1, y1, x2, y2) {
    const cpx = (x1 + x2) / 2;
    ctx.bezierCurveTo(cpx, y1, cpx, y2, x2, y2);
}

function draw() {
    const w = canvas._w || window.innerWidth;
    const h = canvas._h || window.innerHeight;
    ctx.clearRect(0, 0, w, h);

    // Background fill so canvas is never transparent
    ctx.fillStyle = '#f8f9fa';
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.translate(viewX, viewY);

    const years = layout.years;

    // No-data state
    if (years.length === 0) {
        ctx.fillStyle = '#888';
        ctx.font = `${Math.max(14, 16)}px "Segoe UI","Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('没有日记数据', w / 2, h / 2);
        ctx.restore();
        zoomIndicator.textContent = '100%';
        return;
    }

    // Draw year background columns
    for (let yi = 0; yi < years.length; yi++) {
        const yl = years[yi];
        ctx.fillStyle = yearColor(yi, years.length, 0.08);
        ctx.strokeStyle = yearColor(yi, years.length, 0.25);
        ctx.lineWidth = 1;
        ctx.beginPath();
        const rx = 8 * scale;
        roundRect(ctx, yl.x - 4 * scale, 4 * scale, yl.width + 8 * scale, layout.totalHeight + 60 * scale, rx);
        ctx.fill();
        ctx.stroke();
    }

    // Draw month nodes and day nodes (snake order: Jan top, Dec bottom)
    for (const yl of years) {
        for (const mo of yl.months) {
            const myOff = (mo.month - 1) * (layout.monthHeight + Math.max(6 * scale, 3)) + 40 * scale;
            const cx = yl.x + yl.width / 2;
            const cy = myOff + layout.monthHeight / 2;

            // Month node (activity-scaled size)
            const totalEntries = mo.days.reduce((sum, d) => {
                const dayEntries = treeData[yl.year][mo.month][d] || [];
                return sum + dayEntries.length;
            }, 0);
            const baseR = layout.monthHeight * 0.36;
            const activityR = baseR * (0.7 + 0.3 * Math.min(totalEntries / 10, 1));
            const monthR = Math.min(activityR, layout.monthHeight * 0.48);

            // Month node shadow
            ctx.fillStyle = 'rgba(0,0,0,0.06)';
            ctx.beginPath();
            ctx.arc(cx + 1 * scale, cy + 1 * scale, monthR, 0, Math.PI * 2);
            ctx.fill();

            // Month node fill
            const intensity = Math.min(totalEntries / 15, 1);
            const r = Math.round(255 - intensity * 40);
            const g = Math.round(140 - intensity * 60);
            const b = Math.round(100 - intensity * 40);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.beginPath();
            ctx.arc(cx, cy, monthR, 0, Math.PI * 2);
            ctx.fill();

            // Month label
            if (scale > 0.5) {
                ctx.fillStyle = '#fff';
                ctx.font = `${Math.max(9 * scale, 7)}px "Segoe UI","Microsoft YaHei",sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${mo.month}月`, cx, cy);
            }

            // Highlight hovered/selected month
            if (hoveredNode && hoveredNode.type === 'month' && hoveredNode.year === yl.year && hoveredNode.month === mo.month) {
                ctx.strokeStyle = 'rgba(74,144,226,0.7)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, monthR + 3, 0, Math.PI * 2);
                ctx.stroke();
            }
            if (selectedNode && selectedNode.type === 'month' && selectedNode.year === yl.year && selectedNode.month === mo.month) {
                ctx.strokeStyle = 'rgba(211,95,5,0.8)';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([4 * scale, 3 * scale]);
                ctx.beginPath();
                ctx.arc(cx, cy, monthR + 5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Day nodes
            if (scale > 0.8 && mo.days.length > 0) {
                const dayRadius = Math.min(layout.monthHeight * 0.28, 10 * scale);
                const dayCount = mo.days.length;
                const availW = yl.width - dayRadius * 2;
                const spacing = dayCount > 1 ? availW / (dayCount - 1) : 0;

                for (let di = 0; di < dayCount; di++) {
                    const day = mo.days[di];
                    const dayEntries = treeData[yl.year][mo.month][day] || [];
                    const dx = yl.x + dayRadius + di * spacing;
                    const dy = cy;

                    const cat = dayEntries.length > 0 ? dayEntries[0].category : 'normal';
                    const dr = dayRadius * (0.7 + 0.3 * Math.min(dayEntries.length / 5, 1));

                    ctx.fillStyle = categoryColor(cat, 0.75);
                    ctx.beginPath();
                    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = categoryColor(cat, 0.3);
                    ctx.beginPath();
                    ctx.arc(dx, dy, dr + 1.5 * scale, 0, Math.PI * 2);
                    ctx.fill();

                    // Highlight hovered/selected day
                    if (hoveredNode && hoveredNode.type === 'day' && hoveredNode.year === yl.year && hoveredNode.month === mo.month && hoveredNode.day === day) {
                        ctx.strokeStyle = 'rgba(74,144,226,0.9)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(dx, dy, dr + 3, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    if (selectedNode && selectedNode.type === 'day' && selectedNode.year === yl.year && selectedNode.month === mo.month && selectedNode.day === day) {
                        ctx.strokeStyle = 'rgba(211,95,5,0.8)';
                        ctx.lineWidth = 2.5;
                        ctx.setLineDash([4 * scale, 3 * scale]);
                        ctx.beginPath();
                        ctx.arc(dx, dy, dr + 5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }

                    // Day number on hover/zoom
                    if (scale > 1.5) {
                        ctx.fillStyle = '#fff';
                        ctx.font = `${Math.max(7 * scale, 6)}px "Segoe UI","Microsoft YaHei",sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(day, dx, dy);
                    }
                }
            }

            // Connect days within month with a curve (snake)
            if (scale > 1 && mo.days.length > 1) {
                const dayRadius = Math.min(layout.monthHeight * 0.28, 10 * scale);
                const availW = yl.width - dayRadius * 2;
                const spacing = (mo.days.length - 1) > 0 ? availW / (mo.days.length - 1) : 0;
                ctx.strokeStyle = 'rgba(180,180,200,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let di = 0; di < mo.days.length; di++) {
                    const dx = yl.x + dayRadius + di * spacing;
                    if (di === 0) ctx.moveTo(dx, cy);
                    else ctx.lineTo(dx, cy);
                }
                ctx.stroke();
            }
        }

        // Year label
        const yearIndex = years.indexOf(yl);
        ctx.fillStyle = yearColor(yearIndex, years.length, 0.9);
        ctx.font = `bold ${Math.max(14 * scale, 10)}px "Segoe UI","Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        const yLabelY = 8 * scale;
        ctx.fillText(yl.year, yl.x + yl.width / 2, yLabelY);

        // Year summary line
        const yearTotal = Object.values(treeData[yl.year] || {}).reduce((sum, m) => {
            return sum + Object.values(m).reduce((s, d) => s + d.length, 0);
        }, 0);
        if (scale > 0.5) {
            ctx.fillStyle = yearColor(yearIndex, years.length, 0.5);
            ctx.font = `${Math.max(9 * scale, 7)}px "Segoe UI","Microsoft YaHei",sans-serif`;
            ctx.fillText(`${yearTotal}篇`, yl.x + yl.width / 2, yLabelY + 16 * scale);
        }
    }

    // Draw inter-month connection curves (vertical, within each year column, connecting months in snake order)
    if (scale > 0.4) {
        for (const yl of years) {
            ctx.strokeStyle = yearColor(years.indexOf(yl), years.length, 0.15);
            ctx.lineWidth = Math.max(1.5 * scale, 1);
            ctx.beginPath();
            for (let mi = 0; mi < yl.months.length; mi++) {
                const mo = yl.months[mi];
                const myOff = (mo.month - 1) * (layout.monthHeight + Math.max(6 * scale, 3)) + 40 * scale;
                const cx = yl.x + yl.width / 2;
                const cy = myOff + layout.monthHeight / 2;
                if (mi === 0) ctx.moveTo(cx, cy);
                else ctx.lineTo(cx, cy);
            }
            ctx.stroke();
        }
    }

    ctx.restore();

    zoomIndicator.textContent = Math.round(scale * 100) + '%';
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

function render() {
    computeLayout();
    draw();
}

// ═══ Resize ═══
function resize() {
    canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
    canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    canvas._w = window.innerWidth;
    canvas._h = window.innerHeight;
    canvas.getBoundingClientRect = function() {
        return { left: 0, top: 0, width: canvas._w, height: canvas._h, right: canvas._w, bottom: canvas._h };
    };
}

function resizeAndRender() {
    resize();
    render();
}

// ═══ Zoom ═══
function zoomAt(cx, cy, factor) {
    const newScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, scale * factor));
    const actualFactor = newScale / scale;
    viewX = cx - actualFactor * (cx - viewX);
    viewY = cy - actualFactor * (cy - viewY);
    scale = newScale;
    render();
}

// ═══ Popup ═══
function showPopup(node, screenX, screenY) {
    selectedNode = node;

    if (node.type === 'day') {
        const entries = treeData[node.year][node.month][node.day] || [];
        const totalWords = entries.reduce((s, e) => s + e.wordCount, 0);
        popupTitle.textContent = `${node.year}-${String(node.month).padStart(2,'0')}-${String(node.day).padStart(2,'0')}`;
        popupMeta.textContent = `${entries.length}篇 · ${totalWords}字 · ${entries.reduce((s,e) => s + e.paraCount, 0)}段`;
        popupPreview.textContent = entries.map(e => e.text.slice(0, 200) + (e.text.length > 200 ? '...' : '')).join('\n\n———\n\n');
    } else if (node.type === 'month') {
        const monthData = treeData[node.year] && treeData[node.year][node.month] ? treeData[node.year][node.month] : {};
        const dayCount = Object.keys(monthData).length;
        let totalEntries = 0, totalWords = 0;
        const allMonthEntries = [];
        for (const d of Object.values(monthData)) {
            totalEntries += d.length;
            totalWords += d.reduce((s, e) => s + e.wordCount, 0);
            allMonthEntries.push(...d);
        }
        popupTitle.textContent = `${node.year}年${node.month}月`;
        popupMeta.textContent = `${dayCount}天 · ${totalEntries}篇 · ${totalWords}字`;
        // Show first 5 entries as previews
        const sorted = allMonthEntries.sort((a, b) => a.day - b.day || (a.category === 'normal' ? 1 : -1));
        const previewEntries = sorted.slice(0, 5);
        popupPreview.textContent = previewEntries.map(e =>
            `${node.year}-${String(node.month).padStart(2,'0')}-${String(e.day).padStart(2,'0')}  ` +
            e.text.slice(0, 120) + (e.text.length > 120 ? '...' : '')
        ).join('\n\n');
    } else if (node.type === 'year') {
        const yearData = treeData[node.year] || {};
        let totalEntries = 0, totalWords = 0;
        const allYearEntries = [];
        for (const m of Object.values(yearData)) {
            for (const d of Object.values(m)) {
                totalEntries += d.length;
                totalWords += d.reduce((s, e) => s + e.wordCount, 0);
                allYearEntries.push(...d);
            }
        }
        const monthCount = Object.keys(yearData).length;
        popupTitle.textContent = `${node.year}年`;
        popupMeta.textContent = `${monthCount}个月 · ${totalEntries}篇 · ${totalWords}字`;
        // Show first 5 entries as previews
        const sorted = allYearEntries.sort((a, b) => a.month - b.month || a.day - b.day);
        const previewEntries = sorted.slice(0, 5);
        popupPreview.textContent = previewEntries.map(e =>
            `${node.year}-${String(e.month).padStart(2,'0')}-${String(e.day).padStart(2,'0')}  ` +
            e.text.slice(0, 120) + (e.text.length > 120 ? '...' : '')
        ).join('\n\n');
    }

    popup.classList.add('visible');
    const pw = popup.offsetWidth;
    const ph = popup.offsetHeight;
    let px = screenX - pw / 2;
    let py = screenY - ph - 20;
    if (px < 10) px = 10;
    if (px + pw > window.innerWidth - 10) px = window.innerWidth - pw - 10;
    if (py < 10) py = screenY + 20;
    if (py + ph > window.innerHeight - 10) py = window.innerHeight - ph - 10;
    popup.style.left = px + 'px';
    popup.style.top = py + 'px';

    render();
}

function hidePopup() {
    selectedNode = null;
    popup.classList.remove('visible');
    render();
}

document.getElementById('popup-close').onclick = (e) => {
    e.stopPropagation();
    hidePopup();
};

// ═══ Mouse events ═══
canvas.addEventListener('mousedown', (e) => {
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
});

canvas.addEventListener('mousemove', (e) => {
    const mx = (e.clientX - viewX);
    const my = (e.clientY - viewY);

    if (dragging) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            viewX = dragViewX + dx;
            viewY = dragViewY + dy;
            render();
        }
    } else {
        hoveredNode = hitTest(mx, my);
        if (hoveredNode) {
            canvas.style.cursor = 'pointer';
        } else {
            canvas.style.cursor = 'grab';
        }
        render();
    }
});

canvas.addEventListener('mouseup', (e) => {
    if (dragging) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (Math.abs(dx) < 3 && Math.abs(dy) < 3) {
            // Click
            const mx = (e.clientX - viewX);
            const my = (e.clientY - viewY);
            const node = hitTest(mx, my);
            if (node) {
                showPopup(node, e.clientX, e.clientY);
            } else {
                hidePopup();
            }
        }
    }
    dragging = false;
});

canvas.addEventListener('mouseleave', () => {
    dragging = false;
    hoveredNode = null;
    render();
});

canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

// ═══ Touch events ═══
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
        dragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        dragViewX = viewX;
        dragViewY = viewY;
    } else if (e.touches.length === 2) {
        dragging = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchDist0 = Math.hypot(dx, dy);
        touchScale0 = scale;
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
        viewX = dragViewX + (e.touches[0].clientX - dragStartX);
        viewY = dragViewY + (e.touches[0].clientY - dragStartY);
        render();
    } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        if (touchDist0 > 0) {
            const factor = dist / touchDist0;
            const newScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, touchScale0 * factor));
            const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            scale = newScale;
            render();
            touchDist0 = dist;
            touchScale0 = scale;
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
        dragging = false;
    }
});

// ═══ Keyboard ═══
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hidePopup();
    if (e.key === '0' && !e.ctrlKey && !e.metaKey) {
        scale = 1;
        viewX = 0;
        viewY = 0;
        render();
    }
});

// ═══ Auth & data loading ═══
document.getElementById('unlockBtn').onclick = async function() {
    const password = document.getElementById('password').value;
    const status = document.getElementById('auth-status');
    if (!password) {
        status.textContent = '请输入密码';
        status.className = 'error';
        return;
    }
    status.textContent = '正在解密...';
    status.className = 'loading';

    const allEntries = [];
    let filesFetched = 0;
    let filesFailed = 0;

    for (const file of window.files) {
        try {
            const res = await fetch(`/assets/data/${file}`);
            if (!res.ok) { filesFailed++; continue; }
            const ciphertext = await res.text();
            const bytes = CryptoJS.AES.decrypt(ciphertext, password);
            const decrypted = bytes.toString(CryptoJS.enc.Utf8);
            if (!decrypted) {
                // Decryption produced empty output — likely wrong password
                filesFailed++;
                continue;
            }
            const entries = parseDecryptedText(decrypted, file);
            allEntries.push(...entries);
            filesFetched++;
        } catch (e) {
            filesFailed++;
        }
    }

    console.log('[diary_tree] files_fetched:', filesFetched, 'files_failed:', filesFailed, 'entries_parsed:', allEntries.length);

    // CryptoJS with wrong password returns garbage bytes (non-empty), so we
    // must check the actual entry count, NOT just whether decryption "succeeded".
    if (allEntries.length === 0) {
        status.textContent = window.files.length === 0
            ? '未找到任何日记数据文件（请确保在 Jekyll 构建后访问）'
            : '密码错误或未找到可解析的日记条目';
        status.className = 'error';
        console.log('[diary_tree] No entries parsed. window.files count:', window.files.length);
        return;
    }

    window.allEntries = allEntries;
    treeData = buildTree(allEntries);

    document.getElementById('auth-overlay').classList.add('hidden');
    resize();
    render();

    status.textContent = `成功解密 ${filesFetched} 个文件，共 ${allEntries.length} 条日记`;
};

// Allow Enter key to submit
document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('unlockBtn').click();
});

// ═══ Init ═══
window.addEventListener('resize', resizeAndRender);
resize();
render();
</script>
