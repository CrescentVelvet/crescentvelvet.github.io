<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动画世代 - 动画追踪</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg: #16162a;
            --bg-elev: #1f1f38;
            --bg-elev-2: #2a2a48;
            --border: #34344f;
            --text: #e8e8f0;
            --text-muted: #9090a8;
            --accent: #f1c40f;
            --watched: #4ade80;
            --watched-bg: rgba(74, 222, 128, 0.16);
            --hover: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(22, 22, 42, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 1.15em;
            margin: 0;
            color: var(--accent);
            font-weight: 700;
            white-space: nowrap;
        }

        .search-box {
            flex: 1;
            min-width: 160px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 32px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0.6;
            pointer-events: none;
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .stats b {
            color: var(--accent);
            font-weight: 700;
        }

        .progress-track {
            width: 90px;
            height: 6px;
            background: var(--bg-elev);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--watched);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .btn {
            padding: 7px 12px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.15s, border-color 0.15s;
        }

        .btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .year-section {
            margin-bottom: 28px;
        }

        .year-section.hidden {
            display: none;
        }

        .year-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .year-title {
            font-size: 1.15em;
            font-weight: 700;
            color: var(--accent);
        }

        .year-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .year-progress {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
        }

        .year-progress b {
            color: var(--watched);
            font-weight: 700;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }

        .anime-cell {
            padding: 10px 12px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text);
            text-align: center;
            word-break: break-word;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background-color 0.15s, border-color 0.15s, transform 0.05s;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .anime-cell:hover {
            background: var(--hover);
            border-color: var(--text-muted);
        }

        .anime-cell:active {
            transform: scale(0.97);
        }

        .anime-cell.watched {
            background: var(--watched-bg);
            border-color: var(--watched);
            color: var(--watched);
        }

        .anime-cell.watched::after {
            content: "✓";
            position: absolute;
            top: 3px;
            right: 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header { padding: 10px 12px; }
            .container { padding: 16px 12px 32px; }
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 6px;
            }
            .anime-cell {
                font-size: 12px;
                padding: 8px 6px;
                min-height: 40px;
            }
            h1 { font-size: 1em; }
            .progress-track { width: 60px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>动画世代</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索动画名…" autocomplete="off">
            </div>
            <div class="stats">
                <span>看过 <b id="watchedCount">0</b> / <span id="totalCount">0</span></span>
                <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                <span><b id="progressPercent">0</b>%</span>
            </div>
            <button class="btn" id="resetBtn" title="清除所有已选">重置</button>
        </div>
    </div>

    <div class="container" id="animeContainer"></div>

    <script>
    (function() {
        var animeData = {
            "2024": ["败犬女主太多了！", "GIRLS BAND CRY", "胆大党", "义妹生活", "迷宫饭", "我独自升级", "小市民系列", "梦想成为魔法少女", "青之箱", "2.5次元的誘惑", "地。——关于地球的运动——", "失忆投捕"],
            "2023": ["葬送的芙莉莲", "药屋少女的呢喃", "BanG Dream! It's MyGO!!!!!", "我心里危险的东西", "超超超超超喜欢你的100个女朋友", "别当欧尼酱了！", "跃动青春", "宝可梦 地平线", "香格里拉·弗陇提亚", "无神世界的神明活动", "我推的孩子", "天国大魔境"],
            "2022": ["孤独摇滚！", "莉可丽丝", "想要成为影之实力者！", "夏日重现", "异世界舅舅", "更衣人偶坠入爱河", "彻夜之歌", "测不准的阿波连同学", "间谍过家家", "不道德公会", "电锯人", "明日酱的水手服"],
            "2021": ["86-不存在的战区", "无职转生", "回复术士的重来人生", "奇巧计程车", "打了300年的史莱姆不知不觉就练到了满级", "漂流少年", "堀与宫村", "战斗员派遣中！", "古见同学有交流障碍症", "奇蛋物语", "我们的重制人生", "看得见的女孩"],
            "2020": ["异种族风俗娘评鉴指南", "魔女之旅", "安达与岛村", "异度侵入", "别对映像研出手！", "咒术回战", "总之就是非常可爱", "隐瞒之事", "虚构推理", "恋爱小行星", "你与我最后的战场，亦或是世界的终结", "邪神与厨二病少女"],
            "2019": ["冰海战记", "辉夜大小姐想让我告白", "街角魔族", "鬼灭之刃", "炎炎消防队", "女高中生的虚度日常", "慎重勇者", "天使降临到我身边", "不吉波普不笑", "笨拙的上野同学", "五等分的新娘", "约定的梦幻岛"],
            "2018": ["刀剑神域", "魔卡少女樱", "莉兹与青鸟", "强风吹拂", "Fate/EXTRA Last Encore", "魔法禁书目录", "比宇宙更远的地方", "SSSS.GRIDMAN", "青春笨蛋少年不做兔女郎学姐的梦", "终将成为你"],
            "2017": ["少女终末旅行", "来自深渊", "小林家的龙女仆", "狂赌之渊", "来自风平浪静的明天", "月色真美", "重启咲良田", "BanG Dream!", "幼女战记", "小魔女学园", "Just Because!", "埃罗芒阿老师"],
            "2016": ["为美好的世界献上祝福!", "月曜日的妹妹", "Re:LIFE", "乔乔的奇妙冒险", "Re：从零开始的异世界生活", "在下坂本，有何贵干", "魔法少女育成计划", "这个美术社大有问题", "轻音少女", "NEW GAME!"],
            "2015": ["黑子的篮球", "新番警察", "一拳超人", "终结的炽天使", "夏洛特", "OVERLORD", "监狱学园", "可塑性记忆", "在地下城寻求邂逅是否搞错了什么", "干物妹小埋", "终物语"],
            "2014": ["白箱", "月刊少女野崎君", "Fate/stay night Unlimited", "漫画家生活", "乒乓", "甘城光辉游乐园", "寄生兽", "虫师", "刀剑神域", "请问您今天要来点兔子吗", "新妹魔王的契约者", "大图书馆的牧羊人"],
            "2013": ["生命的巨人", "罪恶王冠", "我的青春恋爱物语果然有问题", "伪恋", "王者天下", "向山进发", "兵长大战巨人", "进击的巨人", "我的脑内选项正在全力妨碍学院恋爱喜剧", "魔法战争"],
            "2012": ["冰果", "JOJO的奇妙冒险", "男子高中生的日常", "中二病也要谈恋爱", "来自新世界", "伪物语", "Another", "黑子的篮球", "少女与战车", "刀剑神域", "力动漫场", "人类衰退之后"],
            "2011": ["命运石之门", "日常", "Fate/Zero", "魔法少女小圆", "回转企鹅罐", "摇曳百合", "未来日记", "花开物语", "偶像大师", "GOSICK", "我的妹妹不可能那么可爱"],
            "2010": ["荒川爆笑团", "四叶游戏", "会长是女仆", "轻音少女", "天降之物", "天使心", "无法逃离的背叛", "我的朋友很少", "金色琴弦", "我的妹妹不可能那么可爱", "女仆咖啡厅", "萝莉的时间"],
            "2009": ["钢之炼金术师", "破刃之剑", "轻音部", "守护甜心", "学生会的一己之见", "天降之物", "天才麻将少女", "白色相簿", "好想告诉你"],
            "2008": ["出包王女", "龙与虎", "魔法禁书目录", "黑执事", "神枪", "枪与剑", "伯爵与妖精"],
            "2007": ["幸运星", "CLANNAD", "天元突破红莲螺岩", "地狱少女", "灼眼的夏娜", "传说中勇者的传说", "秒速五厘米", "南瓜剪子心", "日在校园"],
            "2006": ["死亡笔记", "银魂", "黑之契约者", "Code Geass 反叛的鲁路修", "欢迎来到NHK!", "Fate/stay night", "凉宫春日的忧郁", "零之使魔", "Kanon", "传说", "xxxHOLiC"]
        };

        var container = document.getElementById('animeContainer');
        var watchedCountEl = document.getElementById('watchedCount');
        var totalCountEl = document.getElementById('totalCount');
        var progressPercentEl = document.getElementById('progressPercent');
        var progressFillEl = document.getElementById('progressFill');
        var searchInput = document.getElementById('searchInput');
        var resetBtn = document.getElementById('resetBtn');

        var watched;
        try {
            watched = JSON.parse(localStorage.getItem('watchedAnimes') || '[]');
        } catch (e) {
            watched = [];
        }

        var years = Object.keys(animeData).sort(function(a, b) { return b - a; });
        var yearSections = {};
        var cellMap = {};
        var totalCells = 0;

        years.forEach(function(year) {
            var animes = animeData[year];
            var section = document.createElement('section');
            section.className = 'year-section';

            var header = document.createElement('div');
            header.className = 'year-header';

            var title = document.createElement('span');
            title.className = 'year-title';
            title.textContent = year;

            var count = document.createElement('span');
            count.className = 'year-count';
            count.textContent = animes.length + ' 部';

            var prog = document.createElement('span');
            prog.className = 'year-progress';
            prog.innerHTML = '已看 <b>0</b> / ' + animes.length;

            header.appendChild(title);
            header.appendChild(count);
            header.appendChild(prog);

            var grid = document.createElement('div');
            grid.className = 'anime-grid';

            animes.forEach(function(anime) {
                totalCells++;
                var cell = document.createElement('div');
                var isWatched = watched.indexOf(anime) !== -1;
                cell.className = 'anime-cell' + (isWatched ? ' watched' : '');
                cell.textContent = anime;
                cell.dataset.name = anime;

                cell.addEventListener('click', function() {
                    var nowWatched = !this.classList.contains('watched');
                    this.classList.toggle('watched', nowWatched);

                    if (nowWatched) {
                        if (watched.indexOf(anime) === -1) watched.push(anime);
                    } else {
                        var idx = watched.indexOf(anime);
                        if (idx > -1) watched.splice(idx, 1);
                    }

                    try {
                        localStorage.setItem('watchedAnimes', JSON.stringify(watched));
                    } catch (e) {}

                    updateStats();
                    updateYearProgress(year, prog);
                });

                grid.appendChild(cell);
                cellMap[anime] = cell;
            });

            section.appendChild(header);
            section.appendChild(grid);
            container.appendChild(section);
            yearSections[year] = { section: section, prog: prog, total: animes.length };
        });

        function updateYearProgress(year, progEl) {
            var data = yearSections[year];
            var cnt = 0;
            animeData[year].forEach(function(a) { if (watched.indexOf(a) !== -1) cnt++; });
            data.prog.innerHTML = '已看 <b>' + cnt + '</b> / ' + data.total;
        }

        function updateStats() {
            var watchedCells = watched.length;
            watchedCountEl.textContent = watchedCells;
            totalCountEl.textContent = totalCells;
            var pct = totalCells > 0 ? Math.round(watchedCells / totalCells * 100) : 0;
            progressPercentEl.textContent = pct;
            progressFillEl.style.width = pct + '%';
        }

        function applyFilter(query) {
            query = (query || '').trim().toLowerCase();
            years.forEach(function(year) {
                var data = yearSections[year];
                var anyVisible = false;
                animeData[year].forEach(function(anime) {
                    var cell = cellMap[anime];
                    var match = !query || anime.toLowerCase().indexOf(query) !== -1;
                    cell.style.display = match ? '' : 'none';
                    if (match) anyVisible = true;
                });
                data.section.classList.toggle('hidden', !anyVisible);
            });
        }

        searchInput.addEventListener('input', function() {
            applyFilter(this.value);
        });

        resetBtn.addEventListener('click', function() {
            if (!confirm('确定要清除所有已选记录吗？')) return;
            watched = [];
            try { localStorage.removeItem('watchedAnimes'); } catch (e) {}
            Object.keys(cellMap).forEach(function(name) {
                cellMap[name].classList.remove('watched');
            });
            years.forEach(function(year) { updateYearProgress(year); });
            updateStats();
        });

        years.forEach(function(year) { updateYearProgress(year); });
        updateStats();
    })();
    </script>
</body>
</html>
