    <title>动画世代 - 动画追踪</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg: #16162a;
            --bg-elev: #1f1f38;
            --border: #34344f;
            --text: #e8e8f0;
            --text-muted: #9090a8;
            --accent: #f1c40f;
            --year-bg: #6c5ce7;
            --watched: #4ade80;
            --watched-bg: rgba(74, 222, 128, 0.16);
            --hover: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(22, 22, 42, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 1.15em;
            margin: 0;
            color: var(--accent);
            font-weight: 700;
            white-space: nowrap;
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .stats b {
            color: var(--accent);
            font-weight: 700;
        }

        .progress-track {
            width: 100px;
            height: 6px;
            background: var(--bg-elev);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--watched);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .btn {
            margin-left: auto;
            padding: 7px 12px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.15s, border-color 0.15s;
        }

        .btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .rank-banner {
            max-width: 1200px;
            margin: 10px auto 0;
            padding: 0 16px;
            text-align: center;
        }

        .rank-title {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--rank-color, #7f8c9a);
            text-shadow: 0 0 14px var(--rank-glow, rgba(127, 140, 154, 0.3));
            letter-spacing: 2px;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        .rank-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 600px) {
            .rank-title { font-size: 1.15em; letter-spacing: 1px; }
            .rank-desc { font-size: 11px; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .year-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .year-label {
            min-width: 0;
            min-height: 48px;
            background: var(--year-bg);
            color: #fff;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            font-weight: 700;
        }

        .year-label .y {
            font-size: 14px;
            line-height: 1.2;
        }

        .year-label .c {
            font-size: 10px;
            font-weight: 400;
            opacity: 0.85;
            margin-top: 2px;
        }

        .anime-cell {
            min-width: 0;
            min-height: 48px;
            padding: 6px 4px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text);
            text-align: center;
            word-break: break-word;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background-color 0.15s, border-color 0.15s, transform 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .anime-cell:hover {
            background: var(--hover);
            border-color: var(--text-muted);
        }

        .anime-cell:active {
            transform: scale(0.97);
        }

        .anime-cell.watched {
            background: var(--watched-bg);
            border-color: var(--watched);
            color: var(--watched);
        }

        .anime-cell.watched::after {
            content: "✓";
            position: absolute;
            top: 2px;
            right: 5px;
            font-size: 11px;
            font-weight: bold;
        }

        .anime-cell.placeholder {
            background: transparent;
            border: 1px dashed var(--border);
            color: #606080;
            cursor: default;
            opacity: 0.55;
        }

        .anime-cell.placeholder:hover {
            background: transparent;
            border-color: var(--border);
        }

        .anime-cell.placeholder:active {
            transform: none;
        }
    </style>
</head>

            { min: 51,  title: '「炼狱的斗士」',     desc: '历经炼狱的淬炼，灵魂已半数觉醒',           color: '#e67e22', glow: 'rgba(230,126,34,0.5)' },
            { min: 41,  title: '「常夜的开辟者」',   desc: '于永夜中开辟属于自己的圣域',               color: '#9b59b6', glow: 'rgba(155,89,182,0.5)' },
            { min: 31,  title: '「星霜的巡礼者」',   desc: '跨越星霜，追寻逝去的帧数',                 color: '#3a6ea5', glow: 'rgba(58,110,165,0.45)' },
            { min: 21,  title: '「黄昏的迷子」',     desc: '在现实与二次元的夹缝中徘徊',               color: '#48c9b0', glow: 'rgba(72,201,176,0.45)' },
            { min: 11,  title: '「微光的旅人」',     desc: '手持残烛，步入无尽的番剧之森',             color: '#5dade2', glow: 'rgba(93,174,226,0.45)' },
            { min: 1,   title: '「原初的觉醒者」',   desc: '灵魂深处的齿轮开始转动，窥见了世界的一角', color: '#b0b8c4', glow: 'rgba(176,184,196,0.4)' },
            { min: 0,   title: '「虚无的观测者」',   desc: '仍在虚数空间中沉睡，尚未踏出第一步',       color: '#7f8c9a', glow: 'rgba(127,140,154,0.35)' }
        ];

        function getRank(pct) {
            for (var i = 0; i < ranks.length; i++) {
                if (pct >= ranks[i].min) return ranks[i];
            }
            return ranks[ranks.length - 1];
        }

        var years = Object.keys(animeData).sort(function(a, b) { return b - a; });
        var totalCells = 0;

        years.forEach(function(year) {
            var animes = animeData[year];
            var realCount = animes.filter(function(a) { return a !== PLACEHOLDER; }).length;
            totalCells += realCount;

            var row = document.createElement('div');
            row.className = 'year-row';
            row.dataset.year = year;

            var label = document.createElement('div');
            label.className = 'year-label';
            label.innerHTML = '<span class="y">' + year + '</span><span class="c">0/' + realCount + '</span>';
            row.appendChild(label);

            animes.forEach(function(anime) {
                var cell = document.createElement('div');

                if (anime === PLACEHOLDER) {
                    cell.className = 'anime-cell placeholder';
                    cell.textContent = anime;
                    row.appendChild(cell);
                    return;
                }

                var isWatched = watched.indexOf(anime) !== -1;
                cell.className = 'anime-cell' + (isWatched ? ' watched' : '');
                cell.textContent = anime;
                cell.dataset.name = anime;

                cell.addEventListener('click', function() {
                    var nowWatched = !this.classList.contains('watched');
                    this.classList.toggle('watched', nowWatched);

                    if (nowWatched) {
                        if (watched.indexOf(anime) === -1) watched.push(anime);
                    } else {
                        var idx = watched.indexOf(anime);
                        if (idx > -1) watched.splice(idx, 1);
                    }

                    try {
                        localStorage.setItem('watchedAnimes', JSON.stringify(watched));
                    } catch (e) {}

                    updateStats();
                    updateYearCount(row, animes);
                });

                row.appendChild(cell);
            });

            container.appendChild(row);
            updateYearCount(row, animes);
        });

        function updateYearCount(row, animes) {
            var realCount = 0, cnt = 0;
            animes.forEach(function(a) {
                if (a === PLACEHOLDER) return;
                realCount++;
                if (watched.indexOf(a) !== -1) cnt++;
            });
            var c = row.querySelector('.year-label .c');
            if (c) c.textContent = cnt + '/' + realCount;
        }

        function updateStats() {
            var watchedCells = watched.length;
            watchedCountEl.textContent = watchedCells;
            totalCountEl.textContent = totalCells;
            var pct = totalCells > 0 ? Math.round(watchedCells / totalCells * 100) : 0;
            progressPercentEl.textContent = pct;
            progressFillEl.style.width = pct + '%';

            var rank = getRank(pct);
            rankTitleEl.textContent = rank.title;
            rankDescEl.textContent = rank.desc;
            rankBannerEl.style.setProperty('--rank-color', rank.color);
            rankBannerEl.style.setProperty('--rank-glow', rank.glow);
        }

        resetBtn.addEventListener('click', function() {
            if (!confirm('确定要清除所有已选记录吗？')) return;
            watched = [];
            try { localStorage.removeItem('watchedAnimes'); } catch (e) {}
            var rows = container.querySelectorAll('.year-row');
            rows.forEach(function(row) {
                row.querySelectorAll('.anime-cell:not(.placeholder)').forEach(function(cell) {
                    cell.classList.remove('watched');
                });
                updateYearCount(row, animeData[row.dataset.year]);
            });
            updateStats();
        });

        updateStats();
    })();
    </script>
</body>
</html>
